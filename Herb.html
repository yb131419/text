<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>草本產品購買明細表</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", "PingFang TC", "Heiti TC", sans-serif !important;
            font-size: 12px !important;
        }

        :root {
            --primary: #2A5F48;
            --secondary: #6B9F8A;
            --accent: #C85C6E;
            --light: #F8FAF9;
            --gray: #E9ECEB;
            --dark: #333333;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 8px;
        }

        body {
            background-color: #F3F5F4;
            padding: 5px;
            color: var(--dark);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 8px 12px;
            text-align: center;
        }

        .header h1 {
            font-size: 16px !important;
            font-weight: 600;
        }

        .info-card {
            padding: 10px 8px;
            border-bottom: 1px solid var(--gray);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            min-width: 140px;
        }

        .info-item:nth-child(2),
        .info-item:nth-child(3) {
            flex: 0 0 48% !important;
            min-width: auto !important;
        }

        .info-item label {
            font-weight: 600;
            color: var(--primary);
            width: 38px;
        }

        .info-item input, .info-item select {
            border: 1px solid var(--gray);
            border-radius: 4px;
            padding: 3px 5px;
            outline: none;
            transition: 0.2s;
            flex: 1;
        }

        @media (max-width: 768px) {
            body { padding: 2px; }
            .info-card { padding: 8px 5px; gap: 4px; }
            .info-item { flex: 0 0 48%; min-width: auto; }
            .month-section { padding: 8px 5px; }
            .month-title { font-size: 14px !important; }
            .btn { padding: 3px 6px; }
        }

        .month-section {
            padding: 10px 8px;
            border-bottom: 2px solid var(--gray);
        }

        .month-title {
            font-size: 14px !important;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
            padding-left: 6px;
            border-left: 3px solid var(--accent);
        }

        .collapse-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            background: var(--light);
            border-radius: var(--radius);
            cursor: pointer;
            margin-bottom: 6px;
        }

        .collapse-content {
            display: none;
            padding: 6px 8px;
            background: var(--light);
            border-radius: var(--radius);
        }

        .collapse-content.show { display: block; }
        .collapse-btn { background: none; border: none; color: var(--primary); cursor: pointer; }

        .product-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            max-height: 100px;
            overflow-y: auto;
        }

        .product-tag {
            padding: 3px 8px;
            background: white;
            border: 1px solid var(--secondary);
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
        }

        .product-tag.added {
            background: var(--secondary);
            color: white;
            cursor: not-allowed;
        }

        .action-bar {
            padding: 6px 0;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 3px 6px;
            border: none;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-light { background: white; border: 1px solid var(--gray); }
        .btn-accent { background: var(--accent); color: white; }

        .nutrition-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 380px;
        }

        .nutrition-table thead { background: var(--primary); color: white; }
        .nutrition-table th {
            padding: 3px 1px !important;
            border-right: 1px solid rgba(255,255,255,0.2);
            font-weight: 500;
            white-space: nowrap;
        }

        .nutrition-table td {
            padding: 3px 1px !important;
            text-align: center;
            vertical-align: middle;
        }

        /* 🔥 產品編號欄位（整格）縮小 */
        .nutrition-table th:first-child,
        .nutrition-table td:first-child {
            width: 85px !important;
            max-width: 85px !important;
        }

        /* 🔥 顆數欄位 縮小 */
        .nutrition-table th:nth-child(2),
        .nutrition-table td:nth-child(2) {
            width: 36px !important;
            max-width: 36px !important;
        }

        /* 🔥 早 / 中 / 晚 欄位 縮小 */
        .nutrition-table th:nth-child(3),
        .nutrition-table td:nth-child(3),
        .nutrition-table th:nth-child(4),
        .nutrition-table td:nth-child(4),
        .nutrition-table th:nth-child(5),
        .nutrition-table td:nth-child(5) {
            width: 26px !important;
            max-width: 26px !important;
        }

        /* 🔥 刪除欄位 縮小 */
        .nutrition-table th:last-child,
        .nutrition-table td:last-child {
            width: 32px !important;
            max-width: 32px !important;
        }

        /* 🔥 產品編號「輸入框」放大一點 + 靠左 */
        .edit-input.prod-name {
            width: 80px !important;
            height: 20px !important;
            text-align: left !important;
            padding-left: 4px !important;
            border: 1px solid var(--gray);
            border-radius: 3px;
        }

        /* 顆數 */
        .edit-input:not(.prod-name) {
            width: 32px !important;
            height: 20px !important;
            text-align: center;
            border: 1px solid var(--gray);
            border-radius: 3px;
            padding: 0;
        }

        .check-btn {
            width: 20px !important;
            height: 20px !important;
            border-radius: 3px;
            border: 1px solid var(--secondary);
            background: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .check-btn.active { background: #FFF0F3; }

        .del-single-btn {
            width: 28px !important;
            height: 20px !important;
            padding: 0;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px !important;
        }

        .share-section { padding: 10px; text-align: center; border-top: 1px solid var(--gray); }
        .notes { padding: 10px; background: var(--light); line-height: 1.4; }
        .note-item { margin-bottom: 4px; }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 2px; }
    </style>
</head>
<body>
    <div class="container" id="captureContainer">
        <div class="header">
            <h1>草本產品購買明細表</h1>
        </div>

        <div class="info-card">
            <div class="info-item">
                <label>日期：</label>
                <input type="text" id="date" readonly>
            </div>
            <div class="info-item">
                <label>姓名：</label>
                <input type="text" id="name" placeholder="請輸入姓名">
            </div>
            <div class="info-item">
                <label>介紹人：</label>
                <input type="text" id="introducer" placeholder="請輸入介紹人">
            </div>
            <div class="info-item">
                <label>地點：</label>
                <input type="text" id="location" placeholder="請輸入地點" value="">
            </div>
            <div class="info-item">
                <label>入會：</label>
                <select id="memberType">
                    <option value="">請選擇</option>
                    <option value="草本（男）">草本（男）</option>
                    <option value="草本（女）">草本（女）</option>
                    <option value="命運九號">命運九號</option>
                    <option value="已入會">已入會</option>
                </select>
            </div>
            <div class="info-item">
                <label>基本保養：</label>
                <input type="text" id="basicNutrition" value="211、300、299A各3顆">
            </div>
            <div class="info-item">
                <label>火山甘露：</label>
                <select id="volcanoTea">
                    <option value="0">0包</option>
                    <option value="1">1包</option>
                    <option value="2">2包</option>
                    <option value="3" selected>3包</option>
                    <option value="4">4包</option>
                    <option value="5">5包</option>
                    <option value="6">6包</option>
                </select>
                <span>/天</span>
            </div>
        </div>

        <!-- 第一個月 -->
        <div class="month-section">
            <div class="month-title">第一個月</div>
            <div class="product-panel">
                <div class="collapse-header" onclick="toggleCollapse(1)">
                    <div class="panel-title">🔘 快捷選擇產品（雙擊添加）</div>
                    <button class="collapse-btn" id="collapseBtn1">展開 ▼</button>
                </div>
                <div class="collapse-content" id="collapseContent1">
                    <div class="product-tags" id="tags1"></div>
                </div>
            </div>
            <div class="action-bar">
                <button class="btn btn-primary" onclick="copyToNextMonth(1)">📋 複製到下個月</button>
                <button class="btn btn-light" onclick="clearTable(1)">🧹 清空</button>
            </div>
            <table class="nutrition-table">
                <thead>
                    <tr>
                        <th>產品編號</th>
                        <th>顆數</th>
                        <th>早</th>
                        <th>中</th>
                        <th>晚</th>
                        <th>刪除</th>
                    </tr>
                </thead>
                <tbody id="body1"></tbody>
            </table>
        </div>

        <!-- 第二個月 -->
        <div class="month-section">
            <div class="month-title">第二個月</div>
            <div class="product-panel">
                <div class="collapse-header" onclick="toggleCollapse(2)">
                    <div class="panel-title">🔘 快捷選擇產品（雙擊添加）</div>
                    <button class="collapse-btn" id="collapseBtn2">展開 ▼</button>
                </div>
                <div class="collapse-content" id="collapseContent2">
                    <div class="product-tags" id="tags2"></div>
                </div>
            </div>
            <div class="action-bar">
                <button class="btn btn-primary" onclick="copyToNextMonth(2)">📋 複製到下個月</button>
                <button class="btn btn-light" onclick="clearTable(2)">🧹 清空</button>
            </div>
            <table class="nutrition-table">
                <thead>
                    <tr>
                        <th>產品編號</th>
                        <th>顆數</th>
                        <th>早</th>
                        <th>中</th>
                        <th>晚</th>
                        <th>刪除</th>
                    </tr>
                </thead>
                <tbody id="body2"></tbody>
            </table>
        </div>

        <!-- 第三個月 -->
        <div class="month-section">
            <div class="month-title">第三個月</div>
            <div class="product-panel">
                <div class="collapse-header" onclick="toggleCollapse(3)">
                    <div class="panel-title">🔘 快捷選擇產品（雙擊添加）</div>
                    <button class="collapse-btn" id="collapseBtn3">展開 ▼</button>
                </div>
                <div class="collapse-content" id="collapseContent3">
                    <div class="product-tags" id="tags3"></div>
                </div>
            </div>
            <div class="action-bar">
                <button class="btn btn-primary" onclick="alert('❌ 已是最後一個月，無法複製！')">📋 已到最後一月</button>
                <button class="btn btn-light" onclick="clearTable(3)">🧹 清空</button>
            </div>
            <table class="nutrition-table">
                <thead>
                    <tr>
                        <th>產品編號</th>
                        <th>顆數</th>
                        <th>早</th>
                        <th>中</th>
                        <th>晚</th>
                        <th>刪除</th>
                    </tr>
                </thead>
                <tbody id="body3"></tbody>
            </table>
        </div>

        <div class="notes">
            <div class="note-item">☐220～飯後服用。</div>
            <div class="note-item">◇晚上睡覺前6小時，不能吃澱粉類食物。</div>
            <div class="note-item">○705～月經來時不能服用。</div>
            <div class="note-item">金色果：每天____包　復甦精華露：每次____管　海神泥：每週數____次</div>
            <div class="note-item">一氧化氮：早、晚各____顆　循清蔘：早、晚各____顆</div>
            <div class="note-item">○205 兩顆加211A一顆～拆殼後，粉倒入口中含著。</div>
        </div>

        <div class="share-section">
            <button class="btn btn-accent" onclick="shareReportImage()">📤 分享報表圖片</button>
        </div>
    </div>

    <script>
        const productList = [
            "新入會(9號）","新入會(草本）男","新入會(草本）女","2711AB(1)限4盒","限入會2711AB(4)限1組",
            "211","300","299A","火山甘露_限4盒","200","201","202","205","209","210","211A","220","222",
            "233","240","255A","260","266","268","270","280","286","288","289","290","295","299",
            "701","702","703","705","706","707","708","747AB","777Q","777Q(4)限2組",
            "大女王","極樂鳥","101","111","168","金色果(2）","海神泥","復甦精華露"
        ];

        const defaultProducts = {1: ["211","300","299A","211A"],2: ["211","300","299A"],3: ["211","300","299A"]};
        const addedProducts = {1:[],2:[],3:[]};

        function loadTodayDate(){const now=new Date();const year=now.getFullYear()-1911;const month=now.getMonth()+1;const day=now.getDate();const week=['日','一','二','三','四','五','六'][now.getDay()];document.getElementById('date').value=`${year}.${month}.${day}(${week})`;}
        function toggleCollapse(month){const content=document.getElementById(`collapseContent${month}`);const btn=document.getElementById(`collapseBtn${month}`);content.classList.toggle('show');btn.textContent=content.classList.contains('show')?'收起 ▲':'展開 ▼';}
        function renderAllTags(){[1,2,3].forEach(month=>{const container=document.getElementById(`tags${month}`);productList.forEach(item=>{const tag=document.createElement('div');tag.className='product-tag';tag.textContent=item;tag.dataset.product=item;tag.ondblclick=()=>addProductWithRow(month,item,tag);container.appendChild(tag);});});}
        function updateTagStyle(month,product,isAdded){const tags=document.querySelectorAll(`#tags${month} .product-tag`);tags.forEach(tag=>{if(tag.dataset.product===product){if(isAdded)tag.classList.add('added');else tag.classList.remove('added');}});}
        function addProductWithRow(month,product,tag){if(addedProducts[month].includes(product)){alert(`❌ 【${product}】已添加至本月，無法重複添加！`);return;}const tbody=document.getElementById(`body${month}`);const tr=document.createElement('tr');addedProducts[month].push(product);updateTagStyle(month,product,true);tr.innerHTML=`<td><input type="text" class="edit-input prod-name" value="${product}" readonly></td><td><input type="number" class="edit-input" value="3"></td><td><button class="check-btn active" ondblclick="toggleCheck(this)">√</button></td><td><button class="check-btn" ondblclick="toggleCheck(this)"></button></td><td><button class="check-btn active" ondblclick="toggleCheck(this)">√</button></td><td><button class="del-single-btn" onclick="delSingleRow(${month}, this)">刪</button></td>`;tbody.appendChild(tr);}
        function addRow(month){const tbody=document.getElementById(`body${month}`);const tr=document.createElement('tr');tr.innerHTML=`<td><input type="text" class="edit-input prod-name" placeholder="雙擊添加"></td><td><input type="number" class="edit-input" value="3"></td><td><button class="check-btn active" ondblclick="toggleCheck(this)">√</button></td><td><button class="check-btn" ondblclick="toggleCheck(this)"></button></td><td><button class="check-btn active" ondblclick="toggleCheck(this)">√</button></td><td><button class="del-single-btn" onclick="delSingleRow(${month}, this)">刪</button></td>`;tbody.appendChild(tr);}
        function delSingleRow(month,btn){const row=btn.closest('tr');const product=row.querySelector('.prod-name').value;const index=addedProducts[month].indexOf(product);if(index>-1){addedProducts[month].splice(index,1);updateTagStyle(month,product,false);}row.remove();}
        function clearTable(month){if(confirm('確定清空？')){document.getElementById(`body${month}`).innerHTML='';addedProducts[month]=[];document.querySelectorAll(`#tags${month} .product-tag`).forEach(tag=>tag.classList.remove('added'));}}
        function copyToNextMonth(currentMonth){const nextMonth=currentMonth+1;if(nextMonth>3){alert("❌ 已是最後一個月，無法複製！");return;}const rows=document.querySelectorAll(`#body${currentMonth} tr`);if(rows.length===0){alert("❌ 當月沒有資料可複製！");return;}clearTable(nextMonth);rows.forEach(row=>{const product=row.querySelector('.prod-name').value;const count=row.querySelector('.edit-input:not(.prod-name)').value;const morning=row.querySelector('td:nth-child(3) .check-btn').classList.contains('active');const noon=row.querySelector('td:nth-child(4) .check-btn').classList.contains('active');const night=row.querySelector('td:nth-child(5) .check-btn').classList.contains('active');const tr=document.createElement('tr');tr.innerHTML=`<td><input type="text" class="edit-input prod-name" value="${product}" readonly></td><td><input type="number" class="edit-input" value="${count}"></td><td><button class="check-btn ${morning?'active':''}" ondblclick="toggleCheck(this)">${morning?'√':''}</button></td><td><button class="check-btn ${noon?'active':''}" ondblclick="toggleCheck(this)">${noon?'√':''}</button></td><td><button class="check-btn ${night?'active':''}" ondblclick="toggleCheck(this)">${night?'√':''}</button></td><td><button class="del-single-btn" onclick="delSingleRow(${nextMonth}, this)">刪</button></td>`;document.getElementById(`body${nextMonth}`).appendChild(tr);addedProducts[nextMonth].push(product);updateTagStyle(nextMonth,product,true);});alert(`✅ 成功複製【第${currentMonth}個月】→【第${nextMonth}個月】`);}
        function loadDefaultProducts(){for(let month in defaultProducts){const products=defaultProducts[month];products.forEach(p=>{const tag=document.querySelector(`#tags${month} .product-tag[data-product="${p}"]`);addProductWithRow(month,p,tag);});}}
        function toggleCheck(btn){btn.classList.toggle('active');btn.textContent=btn.classList.contains('active')?'√':'';}
        async function shareReportImage(){try{const canvas=await html2canvas(document.getElementById('captureContainer'),{useCORS:true,scale:2,backgroundColor:'#ffffff'});canvas.toBlob(async(blob)=>{const file=new File([blob],"草本產品報表.png",{type:"image/png"});if(navigator.share){await navigator.share({title:'草本產品購買明細表',files:[file]});}else{const link=document.createElement('a');link.download='草本產品報表.png';link.href=canvas.toDataURL('image/png');link.click();alert('瀏覽器不支援分享，已自動下載！');}},'image/png');}catch(err){alert('分享失敗，請手動截圖！');}}
        window.onload=function(){loadTodayDate();renderAllTags();loadDefaultProducts();};
    </script>
</body>
</html>
