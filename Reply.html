<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>初心系統 頭像</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0a0a0a;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.avatar {
  width: 640px;
  height: 640px;
  position: relative;
  overflow: hidden;
  background: #04070f;
}

/* ── 背景 ── */
.bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 90% 90% at 50% 40%, rgba(14,32,70,0.95) 0%, transparent 70%),
    radial-gradient(ellipse 60% 60% at 80% 80%, rgba(8,18,40,0.8) 0%, transparent 60%),
    linear-gradient(160deg, #020510 0%, #060d1e 50%, #03070f 100%);
}

/* 中央金光 */
.glow-center {
  position: absolute;
  width: 480px;
  height: 480px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212,175,55,0.10) 0%, transparent 65%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -55%);
}
.glow-blue {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(30,70,180,0.07) 0%, transparent 65%);
  bottom: -100px;
  left: 50%;
  transform: translateX(-50%);
}

/* ── 星點 ── */
.p {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: tw var(--d,3s) ease-in-out infinite alternate;
}
@keyframes tw {
  from { opacity: var(--lo,0.1); }
  to   { opacity: var(--hi,0.5); }
}

/* ── 外框：圓形金邊 ── */
.ring-outer {
  position: absolute;
  top: 28px; left: 28px; right: 28px; bottom: 28px;
  border-radius: 50%;
  border: 1px solid rgba(212,175,55,0.22);
}
.ring-inner {
  position: absolute;
  top: 38px; left: 38px; right: 38px; bottom: 38px;
  border-radius: 50%;
  border: 1px solid rgba(212,175,55,0.12);
}

/* 四角裝飾點 */
.corner-dot {
  position: absolute;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(212,175,55,0.55);
  box-shadow: 0 0 6px rgba(212,175,55,0.6);
}
.cd-t { top: 26px; left: 50%; transform: translateX(-50%); }
.cd-b { bottom: 26px; left: 50%; transform: translateX(-50%); }
.cd-l { left: 26px; top: 50%; transform: translateY(-50%); }
.cd-r { right: 26px; top: 50%; transform: translateY(-50%); }

/* 四條短刻度線 */
.tick {
  position: absolute;
  background: rgba(212,175,55,0.4);
}
.tick-t { width: 1px; height: 12px; top: 20px; left: 50%; transform: translateX(-50%); }
.tick-b { width: 1px; height: 12px; bottom: 20px; left: 50%; transform: translateX(-50%); }
.tick-l { height: 1px; width: 12px; left: 20px; top: 50%; transform: translateY(-50%); }
.tick-r { height: 1px; width: 12px; right: 20px; top: 50%; transform: translateY(-50%); }

/* ── 蓮花 ── */
.lotus-wrap {
  position: absolute;
  top: 55px;
  left: 50%;
  transform: translateX(-50%);
  width: 180px;
  height: 180px;
  animation: breath 5s ease-in-out infinite alternate;
}
@keyframes breath {
  from { opacity: 0.28; transform: translateX(-50%) scale(1); }
  to   { opacity: 0.38; transform: translateX(-50%) scale(1.04); }
}

/* ── 主文字區 ── */
.content {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  top: 220px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
}

/* 頂部英文 */
.en-label {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 5px;
  color: rgba(212,175,55,0.55);
  margin-bottom: 16px;
}

/* 初心 大字 */
.chuxin {
  font-family: 'Noto Serif TC', serif;
  font-weight: 200;
  font-size: 108px;
  color: #d4af37;
  letter-spacing: 16px;
  line-height: 1;
  text-align: center;
  text-shadow:
    0 0 50px rgba(212,175,55,0.45),
    0 0 100px rgba(212,175,55,0.15),
    0 3px 0 rgba(0,0,0,0.5);
}

/* 分隔裝飾 */
.orn {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 18px 0 16px;
}
.orn-line  { width: 44px; height: 1px; background: linear-gradient(to right, transparent, rgba(212,175,55,0.55)); }
.orn-line-r { width: 44px; height: 1px; background: linear-gradient(to left, transparent, rgba(212,175,55,0.55)); }
.orn-diamond { width: 6px; height: 6px; background: rgba(212,175,55,0.75); transform: rotate(45deg); box-shadow: 0 0 6px rgba(212,175,55,0.5); }
.orn-dot   { width: 3px; height: 3px; border-radius: 50%; background: rgba(212,175,55,0.4); }

/* 副標語 */
.subtitle {
  font-family: 'Noto Serif TC', serif;
  font-weight: 200;
  font-size: 22px;
  color: rgba(210,225,255,0.78);
  letter-spacing: 7px;
  text-align: center;
  text-shadow: 0 0 20px rgba(80,120,220,0.25);
}

/* 底部英文 */
.bottom-en {
  position: absolute;
  bottom: 56px;
  left: 0; right: 0;
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 4px;
  color: rgba(212,175,55,0.3);
}
</style>
</head>
<body>
<div class="avatar">

  <!-- 背景 -->
  <div class="bg"></div>
  <div class="glow-center"></div>
  <div class="glow-blue"></div>

  <!-- 星點 -->
  <div class="p" style="--d:2.8s;--lo:0.08;--hi:0.45;width:2px;height:2px;top:8%;left:14%"></div>
  <div class="p" style="--d:3.5s;--lo:0.05;--hi:0.3;width:1px;height:1px;top:20%;left:80%"></div>
  <div class="p" style="--d:4.1s;--lo:0.08;--hi:0.42;width:2px;height:2px;top:72%;left:12%"></div>
  <div class="p" style="--d:2.5s;--lo:0.06;--hi:0.35;width:1px;height:1px;top:78%;left:82%"></div>
  <div class="p" style="--d:5s;--lo:0.04;--hi:0.25;width:2px;height:2px;top:35%;left:6%"></div>
  <div class="p" style="--d:3.2s;--lo:0.06;--hi:0.38;width:1px;height:1px;top:55%;left:90%"></div>
  <div class="p" style="--d:4.6s;--lo:0.05;--hi:0.28;width:1px;height:1px;top:15%;left:50%"></div>
  <div class="p" style="--d:2.9s;--lo:0.07;--hi:0.4;width:2px;height:2px;top:88%;left:48%"></div>

  <!-- 圓形框線 -->
  <div class="ring-outer"></div>
  <div class="ring-inner"></div>
  <div class="corner-dot cd-t"></div>
  <div class="corner-dot cd-b"></div>
  <div class="corner-dot cd-l"></div>
  <div class="corner-dot cd-r"></div>
  <div class="tick tick-t"></div>
  <div class="tick tick-b"></div>
  <div class="tick tick-l"></div>
  <div class="tick tick-r"></div>

  <!-- 蓮花 -->
  <div class="lotus-wrap">
    <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="rgba(220,235,255,0.9)"/>
          <stop offset="55%"  stop-color="rgba(180,210,240,0.65)"/>
          <stop offset="100%" stop-color="rgba(140,180,220,0.35)"/>
        </linearGradient>
        <linearGradient id="pi" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="rgba(245,228,190,0.85)"/>
          <stop offset="100%" stop-color="rgba(212,175,55,0.25)"/>
        </linearGradient>
      </defs>
      <!-- 外層12瓣 -->
      <ellipse cx="100" cy="100" rx="9" ry="52" fill="url(#pg)" transform="rotate(0 100 100)"/>
      <ellipse cx="100" cy="100" rx="9" ry="52" fill="url(#pg)" transform="rotate(30 100 100)"/>
      <ellipse cx="100" cy="100" rx="9" ry="52" fill="url(#pg)" transform="rotate(60 100 100)"/>
      <ellipse cx="100" cy="100" rx="9" ry="52" fill="url(#pg)" transform="rotate(90 100 100)"/>
      <ellipse cx="100" cy="100" rx="9" ry="52" fill="url(#pg)" transform="rotate(120 100 100)"/>
      <ellipse cx="100" cy="100" rx="9" ry="52" fill="url(#pg)" transform="rotate(150 100 100)"/>
      <ellipse cx="100" cy="100" rx="9" ry="52" fill="url(#pg)" transform="rotate(180 100 100)"/>
      <ellipse cx="100" cy="100" rx="9" ry="52" fill="url(#pg)" transform="rotate(210 100 100)"/>
      <ellipse cx="100" cy="100" rx="9" ry="52" fill="url(#pg)" transform="rotate(240 100 100)"/>
      <ellipse cx="100" cy="100" rx="9" ry="52" fill="url(#pg)" transform="rotate(270 100 100)"/>
      <ellipse cx="100" cy="100" rx="9" ry="52" fill="url(#pg)" transform="rotate(300 100 100)"/>
      <ellipse cx="100" cy="100" rx="9" ry="52" fill="url(#pg)" transform="rotate(330 100 100)"/>
      <!-- 內層6瓣 -->
      <ellipse cx="100" cy="100" rx="6" ry="30" fill="url(#pi)" opacity="0.6" transform="rotate(15 100 100)"/>
      <ellipse cx="100" cy="100" rx="6" ry="30" fill="url(#pi)" opacity="0.6" transform="rotate(75 100 100)"/>
      <ellipse cx="100" cy="100" rx="6" ry="30" fill="url(#pi)" opacity="0.6" transform="rotate(135 100 100)"/>
      <ellipse cx="100" cy="100" rx="6" ry="30" fill="url(#pi)" opacity="0.6" transform="rotate(195 100 100)"/>
      <ellipse cx="100" cy="100" rx="6" ry="30" fill="url(#pi)" opacity="0.6" transform="rotate(255 100 100)"/>
      <ellipse cx="100" cy="100" rx="6" ry="30" fill="url(#pi)" opacity="0.6" transform="rotate(315 100 100)"/>
      <!-- 花心 -->
      <circle cx="100" cy="100" r="18" fill="none" stroke="rgba(212,175,55,0.8)" stroke-width="1.5"/>
      <circle cx="100" cy="100" r="12" fill="rgba(212,175,55,0.5)"/>
      <circle cx="100" cy="100" r="6"  fill="rgba(255,240,180,0.95)"/>
      <!-- 光環 -->
      <circle cx="100" cy="100" r="62" fill="none" stroke="rgba(212,175,55,0.1)" stroke-width="0.8"/>
      <circle cx="100" cy="100" r="74" fill="none" stroke="rgba(212,175,55,0.06)" stroke-width="0.6"/>
      <!-- 蓮莖 -->
      <path d="M100 152 Q103 168 100 185" stroke="rgba(150,200,170,0.5)" stroke-width="1.8" fill="none"/>
      <!-- 蓮葉 -->
      <ellipse cx="83" cy="175" rx="19" ry="7" fill="rgba(90,160,130,0.45)" transform="rotate(-22 83 175)"/>
      <ellipse cx="118" cy="179" rx="17" ry="6" fill="rgba(90,160,130,0.38)" transform="rotate(17 118 179)"/>
    </svg>
  </div>

  <!-- 主內容 -->
  <div class="content">
    <div class="en-label">CHUXIN · 初心系統</div>

    <div class="chuxin">初心</div>

    <div class="orn">
      <div class="orn-line"></div>
      <div class="orn-dot"></div>
      <div class="orn-diamond"></div>
      <div class="orn-dot"></div>
      <div class="orn-line-r"></div>
    </div>

    <div class="subtitle">願世間無苦難</div>
  </div>

  <div class="bottom-en">CHUXIN SYSTEM · LINE OFFICIAL</div>

</div>
</body>
</html>
