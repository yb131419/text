<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>回覆靈感</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

/* ── Tokens ── */
:root{
  --bg:       #F5F4F1;
  --surface:  #FFFFFF;
  --surface2: #EFEDE9;
  --border:   #E2DFD8;
  --border2:  #C5C1B8;
  --ink:      #1A1916;
  --ink2:     #4A4844;
  --ink3:     #908D86;
  --green:    #2A6644;
  --green-bg: #E8F2EC;
  --green-dk: #1F4F33;
  --amber:    #A8720A;
  --amber-bg: #FBF3E0;
  --red:      #B83232;
  --red-bg:   #FBEEEE;
  --tab-h:    56px;
  --nav-h:    52px;
  --safe-b:   env(safe-area-inset-bottom, 0px);
  --r:        14px;
  --r-sm:     10px;
  --ease:     cubic-bezier(.16,1,.3,1);
  --shadow:   0 1px 6px rgba(0,0,0,.07);
  --shadow-md:0 4px 20px rgba(0,0,0,.10);
}

/* ── Base ── */
html,body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  font-size:15px;
  line-height:1.6;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── App Shell ── */
.app{
  display:flex;flex-direction:column;
  height:100vh;height:100dvh;
  overflow:hidden;
}

/* ════════════════════════════
   TOP NAV
════════════════════════════ */
.topnav{
  flex:none;
  height:var(--nav-h);
  padding:0 16px;
  padding-top:env(safe-area-inset-top,0);
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  box-shadow:var(--shadow);
  z-index:100;
}
.topnav-brand{
  flex:1;min-width:0;
  display:flex;align-items:center;gap:8px;
}
.topnav-icon{
  width:32px;height:32px;border-radius:9px;
  background:var(--green);
  display:grid;place-items:center;flex:none;
}
.topnav-icon svg{width:17px;height:17px;fill:#fff}
.topnav-title{
  font-family:'Noto Serif TC',serif;
  font-size:17px;font-weight:700;
  color:var(--ink);letter-spacing:-.01em;
  white-space:nowrap;
}
.topnav-sep{width:1px;height:14px;background:var(--border);flex:none}
.model-pill{
  font-size:10.5px;color:var(--ink3);
  letter-spacing:.03em;white-space:nowrap;
  padding:3px 9px;border-radius:99px;
  background:var(--surface2);
  border:1px solid var(--border);
  cursor:pointer;
  transition:background .15s;
}
.model-pill:active{background:var(--border)}
.model-pill b{color:var(--green);font-weight:600}

.settings-btn{
  flex:none;
  width:38px;height:38px;
  border-radius:var(--r-sm);
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--ink2);
  font-size:17px;
  display:grid;place-items:center;
  cursor:pointer;
  transition:background .15s;
}
.settings-btn:active{background:var(--border)}

/* ════════════════════════════
   SCROLL AREA
════════════════════════════ */
.scroll{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--tab-h) + var(--safe-b) + 60px);
}

/* ════════════════════════════
   CONTENT
════════════════════════════ */
.page{display:none;padding:16px 14px 0}
.page.show{display:block;animation:fadeUp .2s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.page-head{margin-bottom:16px}
.page-head-title{
  font-size:13px;font-weight:600;
  color:var(--ink3);
  letter-spacing:.06em;text-transform:uppercase;
  margin-bottom:2px;
}
.page-head-desc{font-size:13px;color:var(--ink3);line-height:1.65}

/* ════════════════════════════
   STEP CARD
════════════════════════════ */
.steps{display:flex;flex-direction:column;gap:10px}

.step{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  box-shadow:var(--shadow);
}
.step-head{
  display:flex;align-items:center;gap:10px;
  padding:13px 16px;
  border-bottom:1px solid var(--border);
}
.step-num{
  width:26px;height:26px;
  border-radius:8px;
  background:var(--green);
  color:#fff;
  font-size:12px;font-weight:700;
  display:grid;place-items:center;
  flex:none;
}
.step-num.amber{background:var(--amber)}
.step-label{
  font-size:14px;font-weight:600;
  color:var(--ink);flex:1;min-width:0;
}
.step-badge{
  flex:none;
  font-size:11px;padding:2px 9px;border-radius:99px;
  background:var(--green-bg);color:var(--green);
  border:1px solid rgba(42,102,68,.15);font-weight:500;
}
.step-badge.amber{
  background:var(--amber-bg);color:var(--amber);
  border-color:rgba(168,114,10,.2);
}
.step-body{padding:14px 16px}

/* ════════════════════════════
   INPUT TABS
════════════════════════════ */
.itabs{
  display:flex;
  border-bottom:1px solid var(--border);
  margin-bottom:14px;
}
.itab{
  flex:1;
  padding:9px 4px 10px;
  border:none;border-bottom:2px solid transparent;
  background:transparent;
  color:var(--ink3);
  font-family:'Inter',sans-serif;font-size:13.5px;font-weight:500;
  cursor:pointer;
  margin-bottom:-1px;
  transition:color .15s,border-color .15s;
}
.itab.on{color:var(--green);border-bottom-color:var(--green)}
.ipane{display:none}
.ipane.show{display:block;animation:fadeUp .15s var(--ease) both}

/* ════════════════════════════
   DROP ZONE
════════════════════════════ */
.dropzone{
  display:flex;flex-direction:column;align-items:center;
  gap:10px;padding:28px 16px;
  border:1.5px dashed var(--border2);
  border-radius:var(--r-sm);
  background:var(--surface2);
  cursor:pointer;text-align:center;
  transition:all .18s;
}
.dropzone:active,.dropzone.over{border-color:var(--green);background:var(--green-bg)}
.dropzone input{display:none}
.dz-icon{
  width:48px;height:48px;border-radius:12px;
  background:var(--surface);
  border:1px solid var(--border);
  display:grid;place-items:center;
  font-size:24px;box-shadow:var(--shadow);
}
.dz-main{font-size:14px;font-weight:500;color:var(--ink)}
.dz-hint{font-size:12px;color:var(--ink3);line-height:1.7}
.dz-tags{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:2px}
.dz-tag{
  font-size:11px;padding:2px 8px;border-radius:6px;
  background:var(--border);color:var(--ink2);
}

/* Preview */
.prev-wrap{display:none;margin-top:12px;position:relative}
.prev-wrap.show{display:block}
.prev-wrap img{
  width:100%;max-height:260px;object-fit:contain;
  border-radius:var(--r-sm);
  border:1px solid var(--border);
  background:var(--surface2);
  display:block;
}
.prev-rm{
  position:absolute;top:8px;right:8px;
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.95);
  border:1px solid var(--border);
  color:var(--ink2);font-size:13px;
  display:grid;place-items:center;
  cursor:pointer;box-shadow:var(--shadow);
}
.prev-rm:active{background:var(--red-bg);color:var(--red)}

/* ════════════════════════════
   TEXTAREA
════════════════════════════ */
textarea{
  width:100%;min-height:130px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  color:var(--ink);
  font-family:'Inter',sans-serif;font-size:14px;
  line-height:1.75;padding:12px 14px;
  resize:vertical;
  transition:border-color .15s;
  -webkit-appearance:none;
}
textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(42,102,68,.10)}
textarea::placeholder{color:var(--ink3)}

/* ════════════════════════════
   CHIPS
════════════════════════════ */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  padding:9px 18px;
  border-radius:99px;
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--ink2);
  font-family:'Inter',sans-serif;font-size:14px;font-weight:400;
  cursor:pointer;min-height:44px;
  display:inline-flex;align-items:center;
  transition:all .15s;
}
.chip:active{transform:scale(.95)}
.chip.on{
  border-color:var(--green);
  background:var(--green);
  color:#fff;font-weight:500;
}
.chip.on.amber-chip{border-color:var(--amber);background:var(--amber)}

/* ════════════════════════════
   FORM FIELD
════════════════════════════ */
.field-input{
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  color:var(--ink);
  font-family:'Inter',sans-serif;font-size:14px;
  padding:12px 14px;min-height:48px;
  transition:border-color .15s;
  -webkit-appearance:none;
}
.field-input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(168,114,10,.10)}
.field-input::placeholder{color:var(--ink3)}
.field-ta{resize:vertical;min-height:90px;line-height:1.7}

/* ════════════════════════════
   CTA
════════════════════════════ */
.page-cta{margin-top:14px}
.btn-primary{
  position:relative;overflow:hidden;
  width:100%;padding:16px 24px;
  border:none;border-radius:var(--r);cursor:pointer;
  font-family:'Inter',sans-serif;font-size:15px;font-weight:600;
  color:#fff;
  background:var(--green);
  min-height:54px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 18px rgba(42,102,68,.35);
  transition:opacity .15s,transform .15s;
  -webkit-appearance:none;
}
.btn-primary:active{transform:scale(.98);opacity:.9}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-primary.amber{
  background:var(--amber);
  box-shadow:0 4px 18px rgba(168,114,10,.35);
}
.btn-primary::after{
  content:'';position:absolute;
  top:0;left:-80%;width:50%;height:100%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.18),transparent);
  transform:skewX(-20deg);
  transition:left .6s ease;
}
.btn-primary:hover:not(:disabled)::after{left:140%}

/* ════════════════════════════
   LOADING
════════════════════════════ */
.loading{
  display:none;
  align-items:center;gap:10px;
  margin-top:12px;padding:13px 14px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  font-size:13px;color:var(--ink3);
}
.loading.show{display:flex}
.dots{display:flex;gap:5px}
.dots i{
  width:6px;height:6px;border-radius:50%;
  background:var(--green);display:block;
  animation:blink 1.2s ease-in-out infinite;
}
.loading.amber .dots i{background:var(--amber)}
.dots i:nth-child(2){animation-delay:.16s}
.dots i:nth-child(3){animation-delay:.32s}
@keyframes blink{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}

/* ════════════════════════════
   ERROR
════════════════════════════ */
.err{
  display:none;margin-top:10px;
  padding:12px 14px;
  background:var(--red-bg);
  border:1px solid rgba(184,50,50,.18);
  border-radius:var(--r-sm);
  color:var(--red);font-size:13px;line-height:1.6;
}
.err.show{display:block}

/* ════════════════════════════
   RESULTS
════════════════════════════ */
.results{display:flex;flex-direction:column;gap:10px;margin-top:12px}

.reply-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  box-shadow:var(--shadow);
  animation:fadeUp .35s var(--ease) both;
}
.reply-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
}
.reply-label{
  font-size:12px;font-weight:600;
  color:var(--green);letter-spacing:.04em;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;
}
.reply-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex:none}
.reply-body{
  padding:14px 16px;
  font-size:15px;line-height:1.9;
  color:var(--ink);white-space:pre-wrap;
}
.copy-btn{
  padding:7px 14px;border-radius:99px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--ink2);
  font-family:'Inter',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;min-height:34px;
  transition:all .15s;
  display:flex;align-items:center;gap:4px;
}
.copy-btn:active{transform:scale(.94)}
.copy-btn.done{background:var(--green);color:#fff;border-color:transparent}
.copy-btn.done-amber{background:var(--amber);color:#fff;border-color:transparent}

.appr-card{
  background:var(--surface);
  border:1px solid rgba(168,114,10,.22);
  border-radius:var(--r);
  overflow:hidden;
  box-shadow:var(--shadow);
  animation:fadeUp .35s var(--ease) both;
}
.appr-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;
  background:var(--amber-bg);
  border-bottom:1px solid rgba(168,114,10,.15);
}
.appr-label{
  font-size:13px;font-weight:600;
  color:var(--amber);
  display:flex;align-items:center;gap:6px;
}
.appr-body{
  padding:14px 16px;
  font-size:15px;line-height:2;
  color:var(--ink);white-space:pre-wrap;
}

.btn-retry{
  width:100%;padding:13px;
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  background:var(--surface);
  color:var(--ink2);
  font-family:'Inter',sans-serif;font-size:13.5px;font-weight:500;
  cursor:pointer;min-height:48px;
  transition:all .15s;
  margin-top:4px;
}
.btn-retry:active{background:var(--surface2)}

/* ════════════════════════════
   BOTTOM TAB BAR
════════════════════════════ */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;
  z-index:100;
  height:calc(var(--tab-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;
  box-shadow:0 -2px 12px rgba(0,0,0,.06);
}
.tabitem{
  flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;
  border:none;background:transparent;
  cursor:pointer;padding:8px 4px;
  color:var(--ink3);
  font-family:'Inter',sans-serif;font-size:10px;font-weight:500;
  letter-spacing:.02em;
  transition:color .15s;
}
.tabitem.on{color:var(--green)}
.tabitem.on.amber{color:var(--amber)}
.tabitem-icon{font-size:22px;line-height:1}
.tabitem-label{line-height:1}

/* ════════════════════════════
   MODAL
════════════════════════════ */
.overlay{
  position:fixed;inset:0;z-index:200;
  display:none;align-items:flex-end;justify-content:center;
  background:rgba(26,25,22,.5);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  padding:0;
}
.overlay.show{display:flex;animation:fadeUp .2s ease both}
.modal{
  width:100%;
  background:var(--surface);
  border-radius:20px 20px 0 0;
  padding:20px 20px calc(20px + var(--safe-b));
  box-shadow:var(--shadow-md);
}
.modal-handle{
  width:36px;height:4px;border-radius:2px;
  background:var(--border2);margin:0 auto 20px;
}
.modal-title{
  font-family:'Noto Serif TC',serif;
  font-size:19px;font-weight:700;
  color:var(--ink);margin-bottom:6px;
}
.modal-desc{font-size:13px;color:var(--ink3);line-height:1.7;margin-bottom:16px}
.modal-input{
  width:100%;padding:13px 14px;
  background:var(--surface2);
  border:1px solid var(--border);border-radius:var(--r-sm);
  color:var(--ink);font-family:'Inter',sans-serif;font-size:15px;
  min-height:50px;transition:border-color .15s;
  -webkit-appearance:none;
}
.modal-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(42,102,68,.10)}
.modal-input::placeholder{color:var(--ink3)}
.modal-row{display:flex;gap:10px;margin-top:14px}
.modal-save{
  flex:1;padding:14px;border-radius:var(--r-sm);
  border:none;background:var(--green);color:#fff;
  font-family:'Inter',sans-serif;font-size:15px;font-weight:600;
  min-height:50px;cursor:pointer;
  transition:opacity .15s;
}
.modal-save:active{opacity:.85}
.modal-cancel{
  flex:1;padding:14px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:var(--surface2);
  color:var(--ink2);font-family:'Inter',sans-serif;font-size:15px;
  min-height:50px;cursor:pointer;
}
.modal-cancel:active{background:var(--border)}

/* ── Model selector in modal ── */
.modal-sec{
  font-size:12px;font-weight:600;color:var(--ink2);
  margin:18px 0 8px;letter-spacing:.04em;
}
.model-opts{display:flex;flex-direction:column;gap:8px}
.model-opt{
  display:flex;align-items:center;gap:12px;
  padding:13px 14px;
  border:1.5px solid var(--border);
  border-radius:var(--r-sm);
  background:var(--surface2);
  cursor:pointer;
  transition:border-color .15s,background .15s;
  text-align:left;width:100%;
  font-family:'Inter',sans-serif;
}
.model-opt.on{border-color:var(--green);background:var(--green-bg)}
.model-radio{
  width:18px;height:18px;border-radius:50%;flex:none;
  border:2px solid var(--border2);
  display:grid;place-items:center;
  transition:border-color .15s;
}
.model-opt.on .model-radio{border-color:var(--green)}
.model-radio::after{
  content:'';width:9px;height:9px;border-radius:50%;
  background:var(--green);transform:scale(0);
  transition:transform .15s var(--ease);
}
.model-opt.on .model-radio::after{transform:scale(1)}
.model-info{flex:1;min-width:0}
.model-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3}
.model-desc{font-size:11.5px;color:var(--ink3);line-height:1.5;margin-top:1px}
.model-tag{
  flex:none;font-size:10px;font-weight:600;
  padding:3px 8px;border-radius:6px;
  background:var(--green);color:#fff;
}
.model-tag.blue{background:#3B6FA8}

/* ════════════════════════════
   SAVED PAGE
════════════════════════════ */
.card-acts{display:flex;gap:6px;flex:none}
.saved-empty{
  padding:52px 16px;text-align:center;color:var(--ink3);
  font-size:13.5px;display:flex;flex-direction:column;gap:10px;align-items:center;
}
.saved-empty i{font-style:normal;font-size:36px;opacity:.55}
.saved-meta{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.saved-type{
  flex:none;font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;
  background:var(--green-bg);color:var(--green);
}
.saved-type.amber{background:var(--amber-bg);color:var(--amber)}
.saved-time{font-size:11px;color:var(--ink3);white-space:nowrap;flex:none}
.saved-label{
  font-size:12px;font-weight:600;color:var(--ink2);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;
}
.del-btn{
  padding:7px 12px;border-radius:99px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--ink3);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;min-height:34px;transition:all .15s;
}
.del-btn:active{background:var(--red-bg);color:var(--red);border-color:rgba(184,50,50,.25)}
#clearSaved{display:none}

::-webkit-scrollbar{display:none}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
</head>

<body>
<div class="app">

  <!-- Top Nav -->
  <nav class="topnav">
    <div class="topnav-brand">
      <div class="topnav-icon">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      </div>

<script>
(function(){
'use strict';
const $ = id => document.getElementById(id);
const K_KEY   = 'rai_key';
const K_MODEL = 'rai_model';
let imgData = null, imgMime = 'image/jpeg';

/* ══════════════════════════════════════════
   模型管理（4o mini / 5 mini 參數不同）
══════════════════════════════════════════ */
const MODELS = {
  'gpt-4o-mini': { label:'4o mini' },
  'gpt-5-mini':  { label:'5 mini'  },
};
function curModel(){
  const m = localStorage.getItem(K_MODEL);
  return MODELS[m] ? m : 'gpt-4o-mini';
}
function setModel(m){
  localStorage.setItem(K_MODEL, m);
  $('modelPillName').textContent = MODELS[m].label;
  $('modelOpts').querySelectorAll('.model-opt').forEach(o =>
    o.classList.toggle('on', o.dataset.model === m));
}
/* GPT-5 系列：用 max_completion_tokens、不支援自訂 temperature
   GPT-4o 系列：用 max_tokens + temperature                     */
function buildBody(model, sys, userContent, maxTok, temp){
  const body = {
    model,
    response_format: { type:'json_object' },
    messages: [
      { role:'system', content: sys },
      { role:'user',   content: userContent }
    ]
  };
  if (model.startsWith('gpt-5')) {
    body.max_completion_tokens = maxTok;
  } else {
    body.max_tokens = maxTok;
    body.temperature = temp;
  }
  return body;
}

/* ══════════════════════════════════════════
   語言模組 — 台灣口語核心（共用）
══════════════════════════════════════════ */
const LANG_CORE = `【語言規則 — 必須嚴格遵守】
你寫的每一個字都必須像台灣人在手機上打的訊息。

1. 用台灣日常口語與語助詞：欸、啦、耶、喔、蛤、齁、好喔、真的假的、笑死、傻眼、是說、對啊
2. 句子要短，像 LINE 訊息的節奏，可以省略主詞，一則回覆可拆成 1-3 個短句
3. 標點自然：可用空格代替逗號、結尾不一定要句號，「～」可偶爾出現
4. 禁用中國用語：視頻、立馬、給力、寶寶、閨蜜、走心、內卷、聊天記錄
5. 禁止 AI 腔：不說「當然可以！」「希望能幫到你」「以下是我的建議」，不用過多驚嘆號，不過度熱情
6. emoji 最多 1 個，能不用就不用
7. 不解釋、不加前後綴，直接就是那句要傳出去的話`;

/* 各語氣的細部指引 */
const TONE_GUIDE = {
  '幽默風趣':   '用自嘲或輕吐槽製造笑點，時機準、不尬。可以裝傻、可以反轉，但不酸人。',
  '溫柔體貼':   '先接住對方的情緒再回應內容。用字放軟，讓人感覺被在乎，但不肉麻。',
  '曖昧撩人':   '輕輕推進、留想像空間。半開玩笑半認真，讓對方心跳但抓不到把柄。絕對不油膩、不噁心、不直球到嚇人。',
  '正式得體':   '禮貌、清楚、有分寸，適合工作場合。友善但不裝熟，句子完整一點。',
  '高情商拒絕': '三步驟：先肯定對方或表達感謝 → 委婉說明無法配合 → 給台階或替代方案。讓對方完全不難堪。'
};

/* 各關係的分寸指引 */
const REL_GUIDE = {
  '朋友':   '可以損、可以鬧，講話直接沒關係，重點是自然。',
  '客戶':   '要穩、要專業，但不僵硬。讓對方感覺被重視。',
  '同事':   '友善中留餘地，不過度熟，也不冷淡。辦公室安全範圍。',
  '夫妻':   '要暖、要有生活感，可以撒嬌或互虧，是最親密的頻道。',
  '父母':   '語氣放軟、帶點孩子氣的親暱，報平安式的安心感。',
  '陌生人': '禮貌、簡潔、保持適當距離，不自來熟。'
};

/* ══════════════════════════════════════════
   頁面切換
══════════════════════════════════════════ */
document.querySelectorAll('.tabitem').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tabitem').forEach(x => x.classList.toggle('on', x === t));
    document.querySelectorAll('.page').forEach(p => p.classList.toggle('show', p.id === 'page-' + t.dataset.page));
    if(t.dataset.page === 'saved') renderSaved();
    $('scroll').scrollTo(0, 0);
  };
});
$('goBtn').onclick   = () => generateReply(false);
$('apprBtn').onclick = () => generateAppr(false);

/* ══════════════════════════════════════════
   設定面板
══════════════════════════════════════════ */
function openSettings(){
  $('keyIn').value = localStorage.getItem(K_KEY) || '';
  setModel(curModel());
  $('overlay').classList.add('show');
}
$('settingsBtn').onclick = openSettings;
$('modelPill').onclick   = openSettings;
$('closeModal').onclick  = () => $('overlay').classList.remove('show');
$('overlay').onclick     = e => { if(e.target === $('overlay')) $('overlay').classList.remove('show'); };
$('modelOpts').querySelectorAll('.model-opt').forEach(o => {
  o.onclick = () => setModel(o.dataset.model);
});
$('saveKey').onclick = () => {
  const v = $('keyIn').value.trim();
  if(v && !v.startsWith('sk-')){ alert('Key 格式不對，應以 sk- 開頭。'); return; }
  localStorage.setItem(K_KEY, v);
  $('overlay').classList.remove('show');
};
// init pill
setModel(curModel());

/* ══════════════════════════════════════════
   輸入 Tabs / Chips
══════════════════════════════════════════ */
document.querySelectorAll('.itab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.itab').forEach(x => x.classList.remove('on'));
    document.querySelectorAll('.ipane').forEach(x => x.classList.remove('show'));
    t.classList.add('on');
    $(t.dataset.ip).classList.add('show');
  };
});
['toneChips','relChips'].forEach(id => {
  $(id).querySelectorAll('.chip').forEach(c => {
    c.onclick = () => { $(id).querySelectorAll('.chip').forEach(x=>x.classList.remove('on')); c.classList.add('on'); };
  });
});
const picked = id => $(id).querySelector('.chip.on')?.dataset.v || '';

/* ══════════════════════════════════════════
   圖片上傳
══════════════════════════════════════════ */
const dz=$('dropZone'), fi=$('fileIn');
['dragenter','dragover'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.add('over')}));
['dragleave','drop'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.remove('over')}));
dz.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f)loadImg(f)});
fi.onchange=()=>{if(fi.files[0])loadImg(fi.files[0])};
$('rmImg').onclick=ev=>{ev.preventDefault();ev.stopPropagation();imgData=null;fi.value='';$('prevWrap').classList.remove('show')};

function loadImg(file){
  if(!file.type.startsWith('image/')) return showErr('請上傳 JPG、PNG 或 WEBP 圖片。');
  const r=new FileReader();
  r.onerror=()=>showErr('圖片讀取失敗。');
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1600;let{width:w,height:h}=img;
      if(w>MAX||h>MAX||file.size>3*1024*1024){
        const s=Math.min(MAX/w,MAX/h,1);w=Math.round(w*s);h=Math.round(h*s);
        const cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        const url=cv.toDataURL('image/jpeg',.88);
        imgData=url.split(',')[1];imgMime='image/jpeg';$('prevImg').src=url;
      }else{imgData=ev.target.result.split(',')[1];imgMime=file.type;$('prevImg').src=ev.target.result;}
      $('prevWrap').classList.add('show');clearErr();
    };
    img.onerror=()=>showErr('無法解析圖片。');
    img.src=ev.target.result;
  };
  r.readAsDataURL(file);
}

function showErr(msg){const b=$('errBox');b.textContent=msg;b.classList.add('show');b.scrollIntoView({behavior:'smooth',block:'nearest'})}
function clearErr(){$('errBox').classList.remove('show')}

/* ══════════════════════════════════════════
   共用 API 呼叫
══════════════════════════════════════════ */
async function callAPI(body, key){
  const res = await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
    body:JSON.stringify(body)
  });
  if(!res.ok){
    if(res.status===401) throw new Error('API Key 無效或過期，請重新輸入。');
    if(res.status===404) throw new Error(`你的帳號可能還沒有 ${body.model} 的使用權限，請到設定切換另一個模型。`);
    if(res.status===429) throw new Error('請求太頻繁或額度不足，請稍後再試。');
    const e=await res.json().catch(()=>null);
    throw new Error(e?.error?.message||`API 錯誤 ${res.status}`);
  }
  const data = await res.json();
  const raw = data.choices?.[0]?.message?.content || '';
  try{ return JSON.parse(raw.replace(/```json|```/g,'').trim()); }
  catch{ throw new Error('AI 回傳格式異常，請再試一次。'); }
}

/* ══════════════════════════════════════════
   生成回覆建議
══════════════════════════════════════════ */
async function generateReply(retry){
  clearErr();
  const key=localStorage.getItem(K_KEY);
  if(!key){ openSettings(); return showErr('請先設定 OpenAI API Key。'); }
  const usingImg=$('ip-img').classList.contains('show');
  const txt=$('txtIn').value.trim();
  if(usingImg&&!imgData) return showErr('請先上傳截圖，或切換到貼上文字。');
  if(!usingImg&&!txt) return showErr('請先貼上對話內容。');

  const tone=picked('toneChips'), rel=picked('relChips');
  const sys=`你是台灣人聊天回覆專家，回覆將直接複製傳送，所以必須像真人。

${LANG_CORE}

【這次的任務】
對方身分：${rel} — ${REL_GUIDE[rel]||''}
語氣要求：${tone} — ${TONE_GUIDE[tone]||''}

先讀懂對話脈絡與對方最後一句話的真正意圖（字面下的情緒或試探），再產出 3 個彼此有差異的回覆：
- 第 1 個：最安全自然的回法
- 第 2 個：更有記憶點、稍微大膽一點的回法
- 第 3 個：不同角度切入的回法（例如反問、轉移、或推進話題）

只輸出 JSON：{"replies":[{"style":"4-6字風格標籤","text":"回覆內容"},{"style":"...","text":"..."},{"style":"...","text":"..."}]}`;

  const content=usingImg
    ?[{type:'text',text:'對話截圖如下。請先辨識誰是我、誰是對方（我的訊息通常在右側），再給回覆建議。'},{type:'image_url',image_url:{url:`data:${imgMime};base64,${imgData}`}}]
    :[{type:'text',text:`對話：\n${txt}`}];

  const btn=$('goBtn');
  btn.disabled=true;
  $('loading').classList.add('show');
  if(!retry)$('results').innerHTML='';

  try{
    const parsed = await callAPI(buildBody(curModel(), sys, content, 1200, .9), key);
    if(!Array.isArray(parsed.replies)||!parsed.replies.length) throw new Error('沒有取得回覆，請重試。');
    renderReplies(parsed.replies);
  }catch(e){
    showErr(e.name==='TypeError'?'連不上 OpenAI，請確認網路。':e.message);
  }finally{
    btn.disabled=false;
    $('loading').classList.remove('show');
  }
}

function renderReplies(replies){
  const box=$('results');box.innerHTML='';
  replies.slice(0,3).forEach((r,i)=>{
    const card=document.createElement('div');card.className='reply-card';card.style.animationDelay=(i*.1)+'s';
    const head=document.createElement('div');head.className='reply-head';
    const lbl=document.createElement('span');lbl.className='reply-label';lbl.innerHTML=`<span class="reply-dot"></span>${r.style||'建議'+(i+1)}`;
    const cp=document.createElement('button');cp.className='copy-btn';cp.textContent='複製';
    const sv=document.createElement('button');sv.className='copy-btn';sv.textContent='☆ 儲存';
    sv.onclick=()=>{
      saveItem('reply', r.style||('建議'+(i+1)), r.text||'');
      sv.textContent='★ 已存';sv.classList.add('done');
      if(navigator.vibrate)navigator.vibrate(20);
      setTimeout(()=>{sv.textContent='☆ 儲存';sv.classList.remove('done')},1600);
    };
    const acts=document.createElement('div');acts.className='card-acts';acts.append(sv,cp);
    head.append(lbl,acts);
    const body=document.createElement('div');body.className='reply-body';body.textContent=r.text||'';
    cp.onclick=async()=>{
      try{await navigator.clipboard.writeText(body.textContent)}catch{const ta=document.createElement('textarea');ta.value=body.textContent;Object.assign(ta.style,{position:'fixed',top:'-9999px'});document.body.append(ta);ta.select();document.execCommand('copy');ta.remove();}
      cp.textContent='✓ 已複製';cp.classList.add('done');if(navigator.vibrate)navigator.vibrate(28);
      setTimeout(()=>{cp.textContent='複製';cp.classList.remove('done')},2000);
    };
    card.append(head,body);box.appendChild(card);
  });
  const rb=document.createElement('button');rb.className='btn-retry';rb.textContent='↻ 換一批說法';rb.onclick=()=>generateReply(true);box.appendChild(rb);
  setTimeout(()=>box.firstChild?.scrollIntoView({behavior:'smooth',block:'start'}),80);
}

/* ══════════════════════════════════════════
   生成點評感謝
══════════════════════════════════════════ */
async function generateAppr(retry){
  const errB=$('apprErr');
  errB.classList.remove('show');
  const key=localStorage.getItem(K_KEY);
  if(!key){ openSettings(); errB.textContent='請先設定 API Key。'; errB.classList.add('show'); return; }
  const q1=$('appr1').value.trim(),q2=$('appr2').value.trim(),q3=$('appr3').value.trim(),q4=$('appr4').value.trim();
  if(!q1||!q2||!q3){ errB.textContent='請至少填寫前三題。'; errB.classList.add('show'); return; }

  const sys=`你是最會用文字表達感謝的台灣寫手。你寫的文字會被本人直接傳給對方或發到社群，所以必須 100% 像本人親手寫的。

${LANG_CORE}

【寫作要求】
- 以第一人稱寫，收件人就是被感謝的那個人
- 具體事件是靈魂：把提供的那件事寫出畫面感（時間、動作、細節），不要只是抽象地說「你辛苦了」
- 情緒要真實有層次：可以有一點愧疚、心疼、說不出口的彆扭，最後落在感謝與愛
- 避免成語堆疊與八股感謝文的套路（「感恩的心」「沒有你就沒有我」這類陳腔濫調禁用）
- 結尾輕輕收，不要喊口號
- 長度 150-250 字，分 2-3 段

只輸出 JSON：{"title":"溫暖的標題，10字以內","text":"正文，段落之間用\\n\\n分隔"}`;

  const msg=`感謝對象：${q1}\n辛苦之處：${q2}\n具體事件：${q3}${q4?'\n當時感受：'+q4:''}`;

  const btn=$('apprBtn');
  btn.disabled=true;
  $('apprLoading').classList.add('show');
  if(!retry)$('apprResults').innerHTML='';

  try{
    const parsed = await callAPI(buildBody(curModel(), sys, [{type:'text',text:msg}], 900, .85), key);
    if(!parsed.text) throw new Error('沒有取得內容，請重試。');
    renderAppr(parsed);
  }catch(e){
    errB.textContent=e.name==='TypeError'?'連不上 OpenAI，請確認網路。':e.message;
    errB.classList.add('show');
  }finally{
    btn.disabled=false;
    $('apprLoading').classList.remove('show');
  }
}

function renderAppr(parsed){
  const box=$('apprResults');box.innerHTML='';
  const card=document.createElement('div');card.className='appr-card';
  const head=document.createElement('div');head.className='appr-head';
  const lbl=document.createElement('span');lbl.className='appr-label';lbl.textContent=`❤ ${parsed.title||'點評感謝'}`;
  const cp=document.createElement('button');cp.className='copy-btn';cp.textContent='複製';
  const sv=document.createElement('button');sv.className='copy-btn';sv.textContent='☆ 儲存';
  sv.onclick=()=>{
    saveItem('appr', parsed.title||'點評感謝', parsed.text||'');
    sv.textContent='★ 已存';sv.classList.add('done-amber');
    if(navigator.vibrate)navigator.vibrate(20);
    setTimeout(()=>{sv.textContent='☆ 儲存';sv.classList.remove('done-amber')},1600);
  };
  const acts=document.createElement('div');acts.className='card-acts';acts.append(sv,cp);
  head.append(lbl,acts);
  const body=document.createElement('div');body.className='appr-body';body.textContent=parsed.text||'';
  cp.onclick=async()=>{
    try{await navigator.clipboard.writeText(body.textContent)}catch{const ta=document.createElement('textarea');ta.value=body.textContent;Object.assign(ta.style,{position:'fixed',top:'-9999px'});document.body.append(ta);ta.select();document.execCommand('copy');ta.remove();}
    cp.textContent='✓ 已複製';cp.classList.add('done-amber');if(navigator.vibrate)navigator.vibrate(28);
    setTimeout(()=>{cp.textContent='複製';cp.classList.remove('done-amber')},2000);
  };
  card.append(head,body);
  const rb=document.createElement('button');rb.className='btn-retry';rb.textContent='↻ 換一個說法';rb.onclick=()=>generateAppr(true);
  box.append(card,rb);
  card.scrollIntoView({behavior:'smooth',block:'start'});
}

/* ══════════════════════════════════════════
   已儲存（localStorage）
══════════════════════════════════════════ */
const K_SAVED = 'rai_saved';

function loadSaved(){
  try{ return JSON.parse(localStorage.getItem(K_SAVED)) || []; }
  catch{ return []; }
}
function saveItem(type, label, text){
  const list = loadSaved();
  list.unshift({
    id: Date.now() + '' + Math.floor(Math.random()*1e4),
    type, label, text, ts: Date.now()
  });
  if(list.length > 100) list.length = 100; // 最多保留 100 筆
  localStorage.setItem(K_SAVED, JSON.stringify(list));
}
function delItem(id){
  localStorage.setItem(K_SAVED, JSON.stringify(loadSaved().filter(x => x.id !== id)));
  renderSaved();
}
function fmtTs(ts){
  return new Date(ts).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function copyText(t, btn, doneClass){
  return (async()=>{
    try{ await navigator.clipboard.writeText(t); }
    catch{
      const ta=document.createElement('textarea');
      ta.value=t;Object.assign(ta.style,{position:'fixed',top:'-9999px'});
      document.body.append(ta);ta.select();document.execCommand('copy');ta.remove();
    }
    btn.textContent='✓ 已複製';btn.classList.add(doneClass);
    if(navigator.vibrate)navigator.vibrate(28);
    setTimeout(()=>{btn.textContent='複製';btn.classList.remove(doneClass)},2000);
  })();
}

function renderSaved(){
  const box = $('savedList');
  const clearBtn = $('clearSaved');
  const list = loadSaved();
  box.innerHTML = '';

  if(!list.length){
    const empty = document.createElement('div');
    empty.className = 'saved-empty';
    empty.innerHTML = '<i>🔖</i>還沒有儲存任何內容<br>在生成結果按「☆ 儲存」就會出現在這裡';
    box.appendChild(empty);
    clearBtn.style.display = 'none';
    return;
  }
  clearBtn.style.display = 'block';

  list.forEach(item => {
    const isAppr = item.type === 'appr';
    const card = document.createElement('div');
    card.className = isAppr ? 'appr-card' : 'reply-card';

    const head = document.createElement('div');
    head.className = isAppr ? 'appr-head' : 'reply-head';

    const meta = document.createElement('div');
    meta.className = 'saved-meta';
    const typeTag = document.createElement('span');
    typeTag.className = 'saved-type' + (isAppr ? ' amber' : '');
    typeTag.textContent = isAppr ? '感謝' : '回覆';
    const label = document.createElement('span');
    label.className = 'saved-label';
    label.textContent = item.label;
    const time = document.createElement('span');
    time.className = 'saved-time';
    time.textContent = fmtTs(item.ts);
    meta.append(typeTag, label, time);

    const acts = document.createElement('div');
    acts.className = 'card-acts';
    const cp = document.createElement('button');
    cp.className = 'copy-btn'; cp.textContent = '複製';
    cp.onclick = () => copyText(item.text, cp, isAppr ? 'done-amber' : 'done');
    const del = document.createElement('button');
    del.className = 'del-btn'; del.textContent = '刪除';
    del.onclick = () => delItem(item.id);
    acts.append(cp, del);

    head.append(meta, acts);

    const body = document.createElement('div');
    body.className = isAppr ? 'appr-body' : 'reply-body';
    body.textContent = item.text;

    card.append(head, body);
    box.appendChild(card);
  });
}

$('clearSaved').onclick = () => {
  if(loadSaved().length && confirm('確定要清空所有儲存的內容嗎？此動作無法復原。')){
    localStorage.removeItem(K_SAVED);
    renderSaved();
  }
};

})();
</script>
