<!DOCTYPE html>
<html lang="zh-Hant" data-mode="mobile">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>回覆靈感</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#080808!important;color-scheme:dark}

/* ── Base ── */
body{
  min-height:100vh;min-height:100dvh;
  color:#F0F0F0;
  font-family:'Noto Sans TC',sans-serif;
  font-weight:300;font-size:15px;line-height:1.6;letter-spacing:0;
  overflow-x:hidden;
  transition:none;
}

/* ── Tokens ── */
:root{
  --bg:    #080808;
  --s1:    #111111;
  --s2:    #181818;
  --s3:    #222222;
  --w:     #F0F0F0;
  --w50:   rgba(240,240,240,.50);
  --w25:   rgba(240,240,240,.25);
  --w10:   rgba(240,240,240,.10);
  --w06:   rgba(240,240,240,.06);
  --gold:  #C9A55A;
  --ok:    #5DBB6A;
  --err:   #CC6060;
  --r:     14px;
  --ease:  cubic-bezier(.16,1,.3,1);
  --spr:   cubic-bezier(.34,1.56,.64,1);
}

/* ══ LAYOUT ══════════════════════════════════════════ */
.page{
  display:flex;flex-direction:column;
  min-height:100vh;min-height:100dvh;
  background:var(--bg);
}

/* ── Header ── */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(8,8,8,.92);
  border-bottom:1px solid var(--w10);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding:0 18px;
  display:flex;align-items:center;gap:12px;
  height:58px;
}
.brand{
  font-family:'Cormorant Garamond',serif;
  font-weight:600;font-size:22px;
  color:var(--gold);
  flex:1;
}
.brand span{font-size:10px;letter-spacing:.18em;color:var(--w25);display:block;line-height:1;margin-top:2px}

/* ── Device Toggle ── */
.dev-toggle{
  display:flex;
  background:var(--s2);
  border:1px solid var(--w10);
  border-radius:10px;padding:4px;gap:3px;
}
.dev-btn{
  display:flex;align-items:center;gap:5px;
  padding:7px 11px;border:none;border-radius:7px;
  background:transparent;color:var(--w50);
  font-family:inherit;font-size:12px;font-weight:400;
  cursor:pointer;white-space:nowrap;
  transition:background .2s,color .2s;
}
.dev-btn svg{width:13px;height:13px;flex:none;fill:currentColor}
.dev-btn.on{background:#F0F0F0;color:#000}

/* ── Settings icon ── */
.gear{
  width:42px;height:42px;border-radius:50%;flex:none;
  background:var(--s2);border:1px solid var(--w10);
  color:var(--w50);font-size:16px;cursor:pointer;
  display:grid;place-items:center;
  transition:border-color .25s,color .25s,transform .4s var(--spr);
}
.gear:hover{border-color:var(--w);color:var(--w);transform:rotate(80deg)}

/* ── Scroll area ── */
.scroll{flex:1;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}

/* ── Wrap: mobile default ── */
.wrap{
  max-width:480px;margin:0 auto;
  padding:22px 16px 90px;
  transition:max-width .35s var(--ease);
}

/* ── Two-column desktop ── */
html[data-mode="desktop"] .wrap{
  max-width:960px;
  padding-left:24px;padding-right:24px;
}
html[data-mode="desktop"] .layout{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  align-items:start;
}
html[data-mode="desktop"] .col-r{min-height:340px}
html[data-mode="desktop"] #results{margin-top:0}
html[data-mode="desktop"] .wrap-footer{padding-top:0}

/* ── Cards ── */
.card{
  background:var(--s1);
  border:1px solid var(--w10);
  border-radius:var(--r);
  padding:20px 18px;
  margin-bottom:12px;
  transition:border-color .25s;
}
.card:hover{border-color:var(--w25)}

/* ── Section label ── */
.sec{
  display:flex;align-items:center;gap:10px;
  font-size:10px;letter-spacing:.18em;color:var(--w25);
  text-transform:uppercase;margin-bottom:14px;
}
.sec b{color:var(--w);font-weight:500;font-size:11px}
.sec::after{content:'';flex:1;height:1px;background:var(--w10)}

/* ── Tabs ── */
.tabs{
  display:flex;gap:4px;
  background:var(--bg);border:1px solid var(--w10);
  border-radius:10px;padding:4px;margin-bottom:16px;
}
.tab{
  flex:1;padding:11px 6px;border:none;border-radius:8px;
  background:transparent;color:var(--w50);
  font-family:inherit;font-size:13.5px;font-weight:400;
  cursor:pointer;transition:background .2s,color .2s;
  min-height:44px;
}
.tab.on{background:var(--w);color:#080808;font-weight:500}

/* ── Pane ── */
.pane{display:none}
.pane.show{display:block;animation:fi .25s ease both}
@keyframes fi{from{opacity:0}to{opacity:1}}

/* ── Drop zone ── */
.drop{
  border:1.5px dashed var(--w25);border-radius:10px;
  padding:30px 14px;text-align:center;
  color:var(--w50);font-size:14px;line-height:1.6;
  cursor:pointer;
  transition:border-color .2s,color .2s,background .2s;
}
.drop:hover,.drop.over{border-color:var(--w);color:var(--w);background:var(--w06)}
.drop-ico{font-size:28px;display:block;margin-bottom:8px}
.drop input{display:none}

.prev{display:none;margin-top:12px;position:relative}
.prev.show{display:block}
.prev img{
  width:100%;max-height:280px;object-fit:contain;
  border-radius:10px;border:1px solid var(--w10);background:#000
}
.rm{
  position:absolute;top:8px;right:8px;
  width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,.8);border:1px solid var(--w25);
  color:var(--w);font-size:12px;cursor:pointer;
  display:grid;place-items:center;
}

/* ── Textarea ── */
textarea{
  width:100%;min-height:140px;
  background:var(--bg);border:1px solid var(--w10);border-radius:10px;
  color:var(--w);font-family:inherit;font-size:14px;font-weight:300;
  line-height:1.75;padding:14px;resize:vertical;
  transition:border-color .2s;
}
textarea:focus{outline:none;border-color:rgba(240,240,240,.55)}
textarea::placeholder{color:var(--w25)}

/* ── Chips ── */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  padding:9px 16px;border-radius:999px;
  border:1px solid var(--w25);background:transparent;
  color:var(--w50);font-family:inherit;font-size:13px;font-weight:300;
  cursor:pointer;min-height:44px;display:inline-flex;align-items:center;
  transition:border-color .2s,color .2s,background .2s,transform .25s var(--spr);
}
.chip:hover{border-color:var(--w);color:var(--w)}
.chip.on{border-color:var(--w);background:var(--w);color:#080808;font-weight:500}
.chip:active{transform:scale(.93)}
.gap{height:16px}

/* ── CTA ── */
.cta{
  position:relative;overflow:hidden;
  width:100%;margin-top:18px;padding:17px;
  border:none;border-radius:var(--r);cursor:pointer;
  font-family:inherit;font-size:15.5px;font-weight:500;
  background:#F0F0F0;color:#080808;
  box-shadow:0 4px 24px rgba(0,0,0,.5);
  transition:opacity .2s,transform .2s,box-shadow .25s;
  min-height:56px;
}
.cta::after{
  content:'';position:absolute;
  top:0;left:-80%;width:50%;height:100%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.6),transparent);
  transform:skewX(-20deg);transition:left .6s ease;
}
.cta:hover::after{left:140%}
.cta:hover{box-shadow:0 6px 32px rgba(0,0,0,.6);opacity:.92}
.cta:active{transform:scale(.98);opacity:.85}
.cta:disabled{opacity:.30;cursor:not-allowed;transform:none}

/* ── Loading ── */
.loading{
  display:none;margin-top:28px;
  justify-content:center;align-items:center;gap:10px;
  font-size:13.5px;color:var(--w50);
}
.loading.show{display:flex}
.dots{display:flex;gap:5px}
.dots i{
  width:6px;height:6px;border-radius:50%;
  background:var(--w);display:block;
  animation:dot 1.2s ease-in-out infinite;
}
.dots i:nth-child(2){animation-delay:.15s}
.dots i:nth-child(3){animation-delay:.30s}
@keyframes dot{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}

/* ── Error ── */
.err{
  display:none;margin-top:14px;
  padding:13px 15px;border-radius:10px;
  background:rgba(204,96,96,.08);border:1px solid rgba(204,96,96,.30);
  color:var(--err);font-size:13.5px;line-height:1.7;
}
.err.show{display:block}

/* ── Results ── */
#results{margin-top:24px;display:flex;flex-direction:column;gap:12px}

/* Desktop placeholder */
.r-placeholder{
  display:none;
  height:100%;min-height:280px;
  border:1.5px dashed var(--w10);border-radius:var(--r);
  align-items:center;justify-content:center;flex-direction:column;gap:10px;
  color:var(--w25);font-size:13.5px;
}
.r-placeholder svg{width:36px;height:36px;opacity:.25;fill:var(--w)}
html[data-mode="desktop"] .r-placeholder{display:flex}
html[data-mode="desktop"] .r-placeholder.hide{display:none}

@keyframes cin{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.rc{animation:cin .45s var(--ease) both}

.rh{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.rt{
  font-family:'Cormorant Garamond',serif;
  font-size:17px;font-weight:600;color:var(--w);
}
.cp{
  flex:none;padding:8px 16px;border-radius:999px;
  border:1px solid var(--w25);background:transparent;
  color:var(--w50);font-family:inherit;font-size:12px;
  cursor:pointer;min-height:36px;
  transition:border-color .2s,color .2s,background .2s,transform .25s var(--spr);
}
.cp:hover{border-color:var(--w);color:var(--w);background:var(--w06)}
.cp.done{background:var(--w);color:#080808;border-color:var(--w);animation:pop .4s var(--spr) both}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.12)}100%{transform:scale(1)}}

.rb{font-size:15px;line-height:1.9;color:var(--w);white-space:pre-wrap}

.again{
  width:100%;padding:14px;border-radius:var(--r);
  background:transparent;border:1px solid var(--w10);
  color:var(--w50);font-family:inherit;font-size:13.5px;
  cursor:pointer;min-height:48px;
  transition:border-color .2s,color .2s,background .2s;
}
.again:hover{border-color:var(--w);color:var(--w);background:var(--w06)}

/* ── Footer ── */
.wrap-footer{
  padding-top:16px;text-align:center;
  font-size:10px;letter-spacing:.16em;color:var(--w25);
}

/* ── Modal ── */
.overlay{
  position:fixed;inset:0;z-index:100;
  display:none;align-items:center;justify-content:center;padding:20px;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.overlay.show{display:flex;animation:fi .2s ease both}
.modal{
  width:100%;max-width:390px;
  background:var(--s1);border:1px solid var(--w10);
  border-radius:18px;padding:28px 22px;
  box-shadow:0 40px 100px rgba(0,0,0,.8);
}
.modal h2{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;font-weight:600;color:var(--w);margin-bottom:6px;
}
.modal p{font-size:13px;color:var(--w50);line-height:1.7;margin-bottom:16px}
.modal input{
  width:100%;padding:13px 14px;
  background:var(--bg);border:1px solid var(--w10);border-radius:10px;
  color:var(--w);font-family:inherit;font-size:14px;min-height:48px;
  transition:border-color .2s;
}
.modal input:focus{outline:none;border-color:rgba(240,240,240,.5)}
.ma{display:flex;gap:10px;margin-top:16px}
.ms{
  flex:1;padding:13px;border-none;border-radius:10px;cursor:pointer;
  background:var(--w);color:#080808;
  font-family:inherit;font-size:14px;font-weight:500;
  border:none;min-height:48px;
  transition:opacity .2s;
}
.ms:hover{opacity:.88}
.mg{
  flex:1;padding:13px;border-radius:10px;cursor:pointer;
  background:transparent;border:1px solid var(--w10);
  color:var(--w50);font-family:inherit;font-size:14px;min-height:48px;
  transition:border-color .2s,color .2s;
}
.mg:hover{border-color:var(--w25);color:var(--w)}

/* ── Divider ── */
.divider{height:1px;background:var(--w10);margin:0 0 16px}

/* ── Reduced motion ── */
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

/* ── Desktop typography boost ── */
html[data-mode="desktop"] .brand{font-size:20px}
html[data-mode="desktop"] .card{padding:24px 22px}
html[data-mode="desktop"] textarea{min-height:180px}
</style>
</head>
<body>
<div class="page">

  <!-- ── Top bar ── -->
  <header class="topbar">
    <div class="brand">
      回覆靈感
      <span>AI CHAT REPLY</span>
    </div>

    <!-- Device toggle -->
    <div class="dev-toggle" id="devToggle" role="group" aria-label="切換裝置版型">
      <button class="dev-btn on" data-m="mobile">
        <svg viewBox="0 0 24 24"><path d="M17 2H7C5.9 2 5 2.9 5 4v16c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H7V4h10v12zm-5 4c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg>
        手機
      </button>
      <button class="dev-btn" data-m="desktop">
        <svg viewBox="0 0 24 24"><path d="M20 3H4C2.9 3 2 3.9 2 5v11c0 1.1.9 2 2 2h7v2H9v2h6v-2h-2v-2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 13H4V5h16v11z"/></svg>
        電腦
      </button>
    </div>

    <button class="gear" id="settingsBtn" title="設定 API Key" aria-label="設定">⚙</button>
  </header>

  <!-- ── Main scroll ── -->
  <main class="scroll">
    <div class="wrap">
      <div class="layout">

        <!-- Left / single column -->
        <div class="col-l">

          <!-- Step 1 -->
          <div class="card">
            <div class="sec"><b>01</b> 提供對話</div>
            <div class="tabs" role="tablist">
              <button class="tab on" data-pane="pImg" role="tab">📷 上傳截圖</button>
              <button class="tab"    data-pane="pTxt" role="tab">📋 貼上文字</button>
            </div>

            <div class="pane show" id="pImg">
              <label class="drop" id="dropZone">
                <span class="drop-ico">🖼</span>
                拖曳對話截圖到這裡，或點擊選取<br>
                <span style="font-size:12px;opacity:.55">支援 JPG / PNG · 過大自動壓縮</span>
                <input type="file" id="fi" accept="image/*">
              </label>
              <div class="prev" id="prevBox">
                <img id="prevImg" alt="截圖預覽">
                <button class="rm" id="rmImg">✕</button>
              </div>
            </div>

            <div class="pane" id="pTxt">
              <textarea id="txtIn" placeholder="貼上對話內容，例如：&#10;&#10;對方：欸你週末有空嗎&#10;我：應該有 怎麼了&#10;對方：沒有啦 就想找你出來走走"></textarea>
            </div>
          </div>

          <!-- Step 2 -->
          <div class="card">
            <div class="sec"><b>02</b> 回覆語氣</div>
            <div class="chips" id="toneChips">
              <button class="chip on" data-v="幽默風趣">幽默</button>
              <button class="chip"    data-v="溫柔體貼">溫柔</button>
              <button class="chip"    data-v="曖昧撩人但不油膩">曖昧</button>
              <button class="chip"    data-v="正式得體">正式</button>
              <button class="chip"    data-v="高情商委婉拒絕">高情商拒絕</button>
            </div>
            <div class="gap"></div>
            <div class="divider"></div>
            <div class="sec"><b>03</b> 對方是誰</div>
            <div class="chips" id="relChips">
              <button class="chip on" data-v="朋友">朋友</button>
              <button class="chip"    data-v="曖昧對象">曖昧對象</button>
              <button class="chip"    data-v="客戶">客戶</button>
              <button class="chip"    data-v="同事">同事</button>
            </div>
          </div>

          <!-- CTA -->
          <button class="cta" id="goBtn">✦ &nbsp;生成回覆建議</button>

          <!-- Loading & Error -->
          <div class="loading" id="loading">
            <span>AI 正在思考中</span>
            <div class="dots"><i></i><i></i><i></i></div>
          </div>
          <div class="err" id="errBox"></div>

          <!-- Mobile results live here -->
          <div id="results-mobile"></div>
        </div>

        <!-- Right column (desktop) -->
        <div class="col-r">
          <div class="r-placeholder" id="placeholder">
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            <span>回覆建議會在這裡顯示</span>
          </div>
          <div id="results-desktop"></div>
        </div>

      </div>

      <div class="wrap-footer">POWERED BY GPT-4O-MINI &nbsp;·&nbsp; KEY 僅存於本機</div>
    </div>
  </main>
</div>

<!-- ── Modal ── -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>連接 OpenAI</h2>
    <p>輸入你的 OpenAI API Key（以 sk- 開頭）。Key 只存在這台裝置的瀏覽器，不會上傳到任何伺服器。</p>
    <input type="password" id="keyIn" placeholder="sk-...">
    <div class="ma">
      <button class="mg" id="closeModal">取消</button>
      <button class="ms" id="saveKey">儲存</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
const $ = id => document.getElementById(id);
const KEY = 'rai_v4';
let imgData = null, imgMime = 'image/jpeg';

/* ── Device Toggle ── */
let curMode = 'mobile';
$('devToggle').querySelectorAll('.dev-btn').forEach(b => {
  b.onclick = () => {
    curMode = b.dataset.m;
    document.documentElement.dataset.mode = curMode;
    $('devToggle').querySelectorAll('.dev-btn').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    // Move results to correct column
    syncResults();
  };
});

function syncResults(){
  const mBox = $('results-mobile');
  const dBox = $('results-desktop');
  const ph   = $('placeholder');
  if(curMode === 'desktop'){
    // Move all .rc cards to desktop col
    Array.from(mBox.children).forEach(c => dBox.appendChild(c));
    const hasResults = dBox.children.length > 0;
    ph.classList.toggle('hide', hasResults);
  } else {
    // Move back to mobile col
    Array.from(dBox.children).forEach(c => mBox.appendChild(c));
  }
}

/* ── Settings ── */
$('settingsBtn').onclick = () => { $('keyIn').value = localStorage.getItem(KEY)||''; $('overlay').classList.add('show'); };
$('closeModal').onclick  = () => $('overlay').classList.remove('show');
$('overlay').onclick     = e => { if(e.target===$('overlay')) $('overlay').classList.remove('show'); };
$('saveKey').onclick     = () => {
  const v = $('keyIn').value.trim();
  if(v && !v.startsWith('sk-')) return showErr('Key 格式不對，OpenAI 的 Key 以 sk- 開頭。');
  localStorage.setItem(KEY, v);
  $('overlay').classList.remove('show');
  clearErr();
};

/* ── Tabs ── */
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
    document.querySelectorAll('.pane').forEach(x => x.classList.remove('show'));
    t.classList.add('on');
    $(t.dataset.pane).classList.add('show');
  };
});

/* ── Chips ── */
['toneChips','relChips'].forEach(id => {
  $(id).querySelectorAll('.chip').forEach(c => {
    c.onclick = () => {
      $(id).querySelectorAll('.chip').forEach(x => x.classList.remove('on'));
      c.classList.add('on');
    };
  });
});
const picked = id => $(id).querySelector('.chip.on').dataset.v;

/* ── Image upload ── */
const dz = $('dropZone'), fi = $('fi');
['dragenter','dragover'].forEach(e => dz.addEventListener(e, ev => { ev.preventDefault(); dz.classList.add('over'); }));
['dragleave','drop'].forEach(e => dz.addEventListener(e, ev => { ev.preventDefault(); dz.classList.remove('over'); }));
dz.addEventListener('drop', e => { const f=e.dataTransfer.files[0]; if(f) loadImg(f); });
fi.onchange = () => { if(fi.files[0]) loadImg(fi.files[0]); };
$('rmImg').onclick = ev => {
  ev.preventDefault(); ev.stopPropagation();
  imgData=null; fi.value='';
  $('prevBox').classList.remove('show');
};

function loadImg(file){
  if(!file.type.startsWith('image/')) return showErr('請上傳 JPG 或 PNG 圖片。');
  const r=new FileReader();
  r.onerror=()=>showErr('圖片讀取失敗。');
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1600; let {width:w,height:h}=img;
      if(w>MAX||h>MAX||file.size>3*1024*1024){
        const s=Math.min(MAX/w,MAX/h,1); w=Math.round(w*s); h=Math.round(h*s);
        const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        const url=cv.toDataURL('image/jpeg',.88);
        imgData=url.split(',')[1]; imgMime='image/jpeg'; $('prevImg').src=url;
      } else {
        imgData=ev.target.result.split(',')[1]; imgMime=file.type; $('prevImg').src=ev.target.result;
      }
      $('prevBox').classList.add('show'); clearErr();
    };
    img.onerror=()=>showErr('無法解析圖片，請確認檔案完整。');
    img.src=ev.target.result;
  };
  r.readAsDataURL(file);
}

/* ── Error ── */
function showErr(msg){ const b=$('errBox'); b.textContent=msg; b.classList.add('show'); b.scrollIntoView({behavior:'smooth',block:'nearest'}); }
function clearErr(){ $('errBox').classList.remove('show'); }

/* ── Generate ── */
$('goBtn').onclick = ()=>go(false);

async function go(retry){
  clearErr();
  const key=localStorage.getItem(KEY);
  if(!key){ $('overlay').classList.add('show'); return showErr('請先設定 OpenAI API Key。'); }
  const usingImg=$('pImg').classList.contains('show');
  const txt=$('txtIn').value.trim();
  if(usingImg&&!imgData) return showErr('請先上傳對話截圖，或切換到「貼上文字」。');
  if(!usingImg&&!txt) return showErr('請先貼上對話內容。');

  const tone=picked('toneChips'), rel=picked('relChips');
  const sys=`你是頂尖聊天回覆顧問，熟悉台灣日常繁體中文口語。對方身分：${rel}，語氣要求：${tone}。\n分析對話脈絡後產出 3 個風格略有差異的回覆建議，要自然像真人打字，不要 AI 腔。\n只輸出 JSON：{"replies":[{"style":"標籤","text":"回覆"},...共3個]}，不含其他文字。`;
  const content=usingImg
    ?[{type:'text',text:'這是對話截圖，請辨識並給建議。'},{type:'image_url',image_url:{url:`data:${imgMime};base64,${imgData}`}}]
    :[{type:'text',text:`對話內容：\n${txt}`}];

  $('goBtn').disabled=true;
  $('loading').classList.add('show');
  if(!retry){ $('results-mobile').innerHTML=''; $('results-desktop').innerHTML=''; }
  $('placeholder') && $('placeholder').classList.remove('hide');

  try{
    const res=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
      body:JSON.stringify({model:'gpt-4o-mini',temperature:.9,max_tokens:900,
        response_format:{type:'json_object'},
        messages:[{role:'system',content:sys},{role:'user',content}]})
    });
    if(!res.ok){
      if(res.status===401) throw new Error('API Key 無效或過期，請重新輸入。');
      if(res.status===429) throw new Error('請求太頻繁或額度不足，請稍後再試。');
      const e=await res.json().catch(()=>null);
      throw new Error(e?.error?.message||`API 錯誤（HTTP ${res.status}）`);
    }
    const data=await res.json();
    const raw=data.choices?.[0]?.message?.content||'';
    let parsed;
    try{ parsed=JSON.parse(raw.replace(/```json|```/g,'').trim()); }
    catch{ throw new Error('AI 回傳格式異常，請重新生成。'); }
    const replies=parsed.replies;
    if(!Array.isArray(replies)||!replies.length) throw new Error('沒有有效回覆，請重新生成。');
    render(replies);
  }catch(e){
    showErr(e.name==='TypeError'?'連不上 OpenAI，請確認網路正常。':e.message);
  }finally{
    $('goBtn').disabled=false;
    $('loading').classList.remove('show');
  }
}

/* ── Render ── */
function render(replies){
  // Clear
  $('results-mobile').innerHTML='';
  $('results-desktop').innerHTML='';
  const ph=$('placeholder');
  if(ph) ph.classList.add('hide');

  const frag=document.createDocumentFragment();

  replies.slice(0,3).forEach((r,i)=>{
    const card=document.createElement('div');
    card.className='card rc';
    card.style.animationDelay=(i*.10)+'s';

    const head=document.createElement('div'); head.className='rh';
    const tag=document.createElement('span'); tag.className='rt'; tag.textContent=r.style||`建議 ${i+1}`;
    const cp=document.createElement('button'); cp.className='cp'; cp.textContent='複製';
    head.append(tag,cp);

    const body=document.createElement('p'); body.className='rb'; body.textContent=r.text||'';

    cp.onclick=async()=>{
      try{ await navigator.clipboard.writeText(body.textContent); }
      catch{
        const ta=document.createElement('textarea');
        ta.value=body.textContent;
        Object.assign(ta.style,{position:'fixed',top:'-9999px'});
        document.body.append(ta); ta.select(); document.execCommand('copy'); ta.remove();
      }
      cp.textContent='✓ 已複製'; cp.classList.add('done');
      if(navigator.vibrate) navigator.vibrate(28);
      setTimeout(()=>{ cp.textContent='複製'; cp.classList.remove('done'); },2000);
    };

    card.append(head,body);
    frag.appendChild(card);
  });

  const again=document.createElement('button'); again.className='again';
  again.textContent='↻ 換一批說法'; again.onclick=()=>go(true);
  frag.appendChild(again);

  // Put into correct box based on current mode
  const targetBox = curMode==='desktop' ? $('results-desktop') : $('results-mobile');
  targetBox.appendChild(frag);

  setTimeout(()=>targetBox.firstChild?.scrollIntoView({behavior:'smooth',block:'start'}),80);
}
})();
</script>
