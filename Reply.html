<!DOCTYPE html>
<html lang="zh-Hant" data-mode="mobile">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>回覆靈感 · AI Chat Reply</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#060E0C;color-scheme:dark}

/* ═══════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════ */
:root{
  --bg:       #060E0C;
  --s1:       #0E1C18;
  --s2:       #152720;
  --s3:       #1C3329;
  --border:   rgba(212,168,67,.16);
  --border2:  rgba(212,168,67,.32);
  --gold:     #D4A843;
  --gold-lt:  #F2DFA0;
  --mint:     #4ECFA8;
  --text:     #EDE8DC;
  --muted:    rgba(237,232,220,.45);
  --faint:    rgba(237,232,220,.10);
  --faintest: rgba(237,232,220,.05);
  --r:        16px;
  --ease:     cubic-bezier(.16,1,.3,1);
  --spr:      cubic-bezier(.34,1.56,.64,1);
}

/* ═══════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════ */
body{
  min-height:100vh;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-weight:300;
  font-size:14.5px;
  line-height:1.65;
  overflow-x:hidden;
}

/* ═══════════════════════════════════════════════
   AURORA BACKGROUND
═══════════════════════════════════════════════ */
.aurora{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}
.aurora-orb{
  position:absolute;
  border-radius:50%;
  filter:blur(120px);
  opacity:.28;
  will-change:transform;
}
.aurora-orb.a{
  width:700px;height:700px;
  top:-200px;left:-150px;
  background:radial-gradient(circle, #2A6E4E 0%, transparent 70%);
  animation:floatA 14s ease-in-out infinite;
}
.aurora-orb.b{
  width:600px;height:600px;
  top:30%;right:-200px;
  background:radial-gradient(circle, #8A6010 0%, transparent 70%);
  animation:floatB 18s ease-in-out infinite;
}
.aurora-orb.c{
  width:500px;height:500px;
  bottom:-100px;left:30%;
  background:radial-gradient(circle, #1A5240 0%, transparent 70%);
  animation:floatC 22s ease-in-out infinite;
}
.aurora-orb.d{
  width:350px;height:350px;
  top:50%;left:45%;
  background:radial-gradient(circle, #C47C10 0%, transparent 70%);
  animation:floatD 16s ease-in-out infinite;
  opacity:.20;
}
@keyframes floatA{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,80px) scale(1.1)}}
@keyframes floatB{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-80px,60px) scale(1.15)}}
@keyframes floatC{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-60px) scale(1.08)}}
@keyframes floatD{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-55%,-45%) scale(1.2)}}

/* ═══════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════ */
.page{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  min-height:100vh;min-height:100dvh;
}

/* ── Topbar ── */
.topbar{
  position:sticky;top:0;z-index:50;
  height:62px;
  padding:0 20px;
  display:flex;align-items:center;gap:14px;
  background:rgba(3,3,10,.72);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
}

/* Logo */
.brand{
  flex:1;
  display:flex;align-items:baseline;gap:10px;
}
.brand-name{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:700;
  background:linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 55%, var(--mint) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:-.02em;
}
.brand-tag{
  font-size:10px;letter-spacing:.22em;
  color:var(--muted);font-weight:400;
  text-transform:uppercase;
}

/* Device Toggle */
.dev-toggle{
  display:flex;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:12px;padding:4px;gap:3px;
}
.dev-btn{
  display:flex;align-items:center;gap:5px;
  padding:7px 13px;border:none;border-radius:9px;
  background:transparent;color:var(--muted);
  font-family:'Inter',sans-serif;font-size:12px;font-weight:400;
  cursor:pointer;white-space:nowrap;
  transition:all .2s;
}
.dev-btn svg{width:12px;height:12px;flex:none;fill:currentColor}
.dev-btn.on{
  background:linear-gradient(135deg,#B8872A,#D4A843);
  color:#060E0C;font-weight:600;
  box-shadow:0 2px 12px rgba(212,168,67,.4);
}

/* Settings */
.gear{
  width:40px;height:40px;
  border-radius:50%;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  color:var(--muted);font-size:15px;
  cursor:pointer;
  display:grid;place-items:center;
  transition:all .3s var(--spr);
}
.gear:hover{
  border-color:var(--gold);
  color:var(--gold-lt);
  background:rgba(212,168,67,.10);
  transform:rotate(90deg);
}

/* ── Scroll ── */
.scroll{flex:1;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}

/* ── Wrap ── */
.wrap{
  max-width:520px;margin:0 auto;
  padding:28px 18px 100px;
  transition:max-width .4s var(--ease);
}
html[data-mode="desktop"] .wrap{max-width:1020px;padding:32px 28px 60px}
html[data-mode="desktop"] .layout{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
  align-items:start;
}
html[data-mode="desktop"] #results{margin-top:0}

/* ═══════════════════════════════════════════════
   GLASS CARD
═══════════════════════════════════════════════ */
.card{
  position:relative;
  background:rgba(13,13,26,.7);
  border:1px solid var(--border);
  border-radius:20px;
  padding:22px 20px;
  margin-bottom:14px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  overflow:hidden;
  transition:border-color .3s, box-shadow .3s;
}
.card::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(212,168,67,.04) 0%,transparent 60%);
  pointer-events:none;
  border-radius:inherit;
}
.card:hover{
  border-color:var(--border2);
  box-shadow:0 8px 40px rgba(0,0,0,.4), 0 0 0 1px rgba(212,168,67,.06) inset;
}

/* ═══════════════════════════════════════════════
   SECTION LABEL
═══════════════════════════════════════════════ */
.sec{
  display:flex;align-items:center;gap:10px;
  font-size:10px;letter-spacing:.22em;
  color:var(--muted);text-transform:uppercase;
  margin-bottom:16px;
}
.sec-num{
  width:22px;height:22px;
  border-radius:6px;
  background:linear-gradient(135deg,#B8872A,#D4A843);
  display:grid;place-items:center;
  font-size:10px;font-weight:700;color:#060E0C;flex:none;
  box-shadow:0 2px 8px rgba(212,168,67,.4);
}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}

/* ═══════════════════════════════════════════════
   TABS
═══════════════════════════════════════════════ */
.tabs{
  display:flex;gap:4px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-radius:12px;padding:4px;
  margin-bottom:18px;
}
.tab{
  flex:1;padding:11px 8px;border:none;border-radius:9px;
  background:transparent;color:var(--muted);
  font-family:'Inter',sans-serif;font-size:13px;font-weight:400;
  cursor:pointer;min-height:44px;
  transition:all .2s;
}
.tab.on{
  background:linear-gradient(135deg,rgba(212,168,67,.20),rgba(212,168,67,.08));
  color:var(--gold-lt);font-weight:500;
  border:1px solid rgba(212,168,67,.28);
  box-shadow:0 2px 12px rgba(212,168,67,.15);
}

/* ── Pane ── */
.pane{display:none}
.pane.show{display:block;animation:fadeIn .25s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ═══════════════════════════════════════════════
   DROP ZONE
═══════════════════════════════════════════════ */
.drop{
  border:1.5px dashed rgba(212,168,67,.30);
  border-radius:12px;
  padding:32px 16px;text-align:center;
  color:var(--muted);font-size:14px;line-height:1.7;
  cursor:pointer;
  transition:all .25s;
  background:rgba(212,168,67,.02);
}
.drop:hover,.drop.over{
  border-color:var(--gold);
  color:var(--gold-lt);
  background:rgba(212,168,67,.07);
}
.drop-ico{
  font-size:30px;display:block;margin-bottom:10px;
  filter:drop-shadow(0 0 12px rgba(212,168,67,.45));
}
.drop input{display:none}

.prev{display:none;margin-top:14px;position:relative}
.prev.show{display:block}
.prev img{
  width:100%;max-height:280px;object-fit:contain;
  border-radius:12px;border:1px solid var(--border);background:#000;
}
.rm{
  position:absolute;top:10px;right:10px;
  width:30px;height:30px;border-radius:50%;
  background:rgba(3,3,10,.9);border:1px solid var(--border);
  color:var(--text);font-size:12px;cursor:pointer;
  display:grid;place-items:center;
  transition:all .2s;
}
.rm:hover{background:rgba(204,60,60,.3);border-color:rgba(204,60,60,.5)}

/* ═══════════════════════════════════════════════
   TEXTAREA
═══════════════════════════════════════════════ */
textarea{
  width:100%;min-height:148px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);border-radius:12px;
  color:var(--text);font-family:'Inter',sans-serif;
  font-size:14px;font-weight:300;line-height:1.8;
  padding:14px 16px;resize:vertical;
  transition:border-color .2s,box-shadow .2s;
}
textarea:focus{
  outline:none;
  border-color:rgba(212,168,67,.50);
  box-shadow:0 0 0 3px rgba(212,168,67,.08);
}
textarea::placeholder{color:rgba(247,240,232,.2)}

/* ═══════════════════════════════════════════════
   CHIPS
═══════════════════════════════════════════════ */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  padding:9px 18px;border-radius:999px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.03);
  color:var(--muted);
  font-family:'Inter',sans-serif;font-size:13px;font-weight:400;
  cursor:pointer;min-height:42px;
  display:inline-flex;align-items:center;
  transition:all .25s var(--spr);
}
.chip:hover{
  border-color:rgba(212,168,67,.45);
  color:var(--gold-lt);
  background:rgba(212,168,67,.07);
}
.chip.on{
  border-color:var(--gold);
  background:linear-gradient(135deg,rgba(212,168,67,.22),rgba(212,168,67,.08));
  color:var(--gold-lt);font-weight:500;
  box-shadow:0 2px 14px rgba(212,168,67,.20);
}
.chip:active{transform:scale(.93)}
.gap{height:18px}
.divider{height:1px;background:var(--border);margin:0 0 18px}

/* ═══════════════════════════════════════════════
   CTA BUTTON
═══════════════════════════════════════════════ */
.cta{
  position:relative;overflow:hidden;
  width:100%;margin-top:20px;padding:18px;
  border:none;border-radius:var(--r);cursor:pointer;
  font-family:'Inter',sans-serif;font-size:15px;font-weight:600;
  letter-spacing:.04em;
  color:#060E0C;
  background:linear-gradient(135deg, #C4922A 0%, #D4A843 45%, #E8C96A 100%);
  box-shadow:0 4px 32px rgba(212,168,67,.35), 0 1px 0 rgba(255,255,255,.20) inset;
  min-height:58px;
  transition:opacity .2s,transform .2s,box-shadow .3s;
}
.cta::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 50%);
  pointer-events:none;
}
.cta::after{
  content:'';position:absolute;
  top:0;left:-80%;width:50%;height:100%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.35),transparent);
  transform:skewX(-20deg);
  transition:left .7s ease;
}
.cta:hover::after{left:140%}
.cta:hover{box-shadow:0 8px 40px rgba(212,168,67,.55);opacity:.96}
.cta:active{transform:scale(.98)}
.cta:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}

/* ═══════════════════════════════════════════════
   LOADING
═══════════════════════════════════════════════ */
.loading{
  display:none;margin-top:28px;
  justify-content:center;align-items:center;gap:12px;
  font-size:13px;color:var(--muted);
  letter-spacing:.06em;
}
.loading.show{display:flex}
.dots{display:flex;gap:6px}
.dots i{
  width:7px;height:7px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--mint));
  display:block;
  animation:pulse 1.3s ease-in-out infinite;
}
.dots i:nth-child(2){animation-delay:.18s}
.dots i:nth-child(3){animation-delay:.36s}
@keyframes pulse{0%,100%{opacity:.2;transform:scale(.6)}50%{opacity:1;transform:scale(1)}}

/* ═══════════════════════════════════════════════
   ERROR
═══════════════════════════════════════════════ */
.err-box{
  display:none;margin-top:14px;
  padding:14px 16px;border-radius:12px;
  background:rgba(255,60,100,.07);
  border:1px solid rgba(255,60,100,.25);
  color:#FF7096;font-size:13px;line-height:1.7;
}
.err-box.show{display:block}

/* ═══════════════════════════════════════════════
   RESULTS
═══════════════════════════════════════════════ */
#results-mobile{margin-top:28px;display:flex;flex-direction:column;gap:14px}
#results-desktop{display:flex;flex-direction:column;gap:14px}

/* Desktop placeholder */
.r-placeholder{
  display:none;
  min-height:320px;
  border:1.5px dashed rgba(212,168,67,.16);
  border-radius:20px;
  flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  color:rgba(237,232,220,.2);font-size:13px;
  background:rgba(212,168,67,.015);
}
.r-placeholder svg{width:38px;height:38px;fill:rgba(212,168,67,.28)}
html[data-mode="desktop"] .r-placeholder{display:flex}
html[data-mode="desktop"] .r-placeholder.hide{display:none}

/* Result card */
.rc{
  position:relative;
  background:rgba(13,13,26,.75);
  border:1px solid var(--border);
  border-radius:20px;
  padding:22px 20px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  overflow:hidden;
  animation:slideUp .45s var(--ease) both;
  transition:border-color .3s,box-shadow .3s;
}
.rc::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(212,168,67,.05) 0%,transparent 55%);
  pointer-events:none;
}
.rc:hover{
  border-color:var(--border2);
  box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 0 1px rgba(212,168,67,.08) inset;
}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}

/* Result card — top accent line */
.rc::after{
  content:'';
  position:absolute;top:0;left:20px;right:20px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:.5;
}

.rh{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}

.rt{
  font-family:'Playfair Display',serif;
  font-size:16px;font-weight:500;
  color:var(--gold-lt);
  letter-spacing:-.01em;
}

.cp{
  flex:none;padding:8px 18px;border-radius:999px;
  border:1px solid var(--border);
  background:rgba(212,168,67,.06);
  color:var(--muted);
  font-family:'Inter',sans-serif;font-size:12px;font-weight:400;
  cursor:pointer;min-height:36px;
  transition:all .25s var(--spr);
}
.cp:hover{
  border-color:var(--gold);
  color:var(--gold-lt);
  background:rgba(212,168,67,.12);
}
.cp.done{
  background:linear-gradient(135deg,var(--mint),#3AB896);
  color:#060E0C;border-color:transparent;font-weight:600;
  animation:pop .4s var(--spr) both;
}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.1)}100%{transform:scale(1)}}

.rb{
  font-size:15px;line-height:1.95;
  color:var(--text);
  white-space:pre-wrap;
  font-family:'Inter',sans-serif;font-weight:300;
}

.again{
  width:100%;padding:15px;border-radius:var(--r);
  background:transparent;
  border:1px solid var(--border);
  color:var(--muted);
  font-family:'Inter',sans-serif;font-size:13.5px;font-weight:400;
  cursor:pointer;min-height:50px;
  transition:all .25s;
  letter-spacing:.04em;
}
.again:hover{
  border-color:rgba(212,168,67,.45);
  color:var(--gold-lt);
  background:rgba(212,168,67,.06);
}

/* ═══════════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════════ */
.wrap-footer{
  padding-top:20px;text-align:center;
  font-size:10px;letter-spacing:.2em;color:rgba(247,240,232,.18);
  text-transform:uppercase;
}

/* ═══════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════ */
.overlay{
  position:fixed;inset:0;z-index:200;
  display:none;align-items:center;justify-content:center;padding:20px;
  background:rgba(0,0,0,.88);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
.overlay.show{display:flex;animation:fadeIn .2s ease both}

.modal{
  width:100%;max-width:400px;
  background:rgba(13,13,26,.95);
  border:1px solid var(--border2);
  border-radius:24px;
  padding:32px 26px;
  box-shadow:0 40px 100px rgba(0,0,0,.9),0 0 60px rgba(124,106,247,.15);
  position:relative;overflow:hidden;
}
.modal::before{
  content:'';position:absolute;top:-80px;right:-80px;
  width:250px;height:250px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,168,67,.15) 0%,transparent 70%);
  pointer-events:none;
}

.modal h2{
  font-family:'Playfair Display',serif;
  font-size:24px;font-weight:700;
  color:var(--text);margin-bottom:8px;
  letter-spacing:-.02em;
}
.modal p{font-size:13px;color:var(--muted);line-height:1.75;margin-bottom:20px}

.modal input{
  width:100%;padding:14px 16px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);border-radius:12px;
  color:var(--text);font-family:'Inter',sans-serif;font-size:14px;
  min-height:50px;
  transition:all .2s;
}
.modal input:focus{
  outline:none;
  border-color:rgba(212,168,67,.55);
  box-shadow:0 0 0 3px rgba(212,168,67,.10);
}
.modal input::placeholder{color:rgba(247,240,232,.2)}

.ma{display:flex;gap:10px;margin-top:16px}
.ms{
  flex:1;padding:14px;border-radius:12px;cursor:pointer;
  background:linear-gradient(135deg,#C4922A,#D4A843);
  color:#060E0C;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;
  border:none;min-height:50px;
  box-shadow:0 4px 20px rgba(212,168,67,.35);
  transition:opacity .2s,box-shadow .2s;
}
.ms:hover{opacity:.9;box-shadow:0 6px 28px rgba(212,168,67,.5)}
.mg{
  flex:1;padding:14px;border-radius:12px;cursor:pointer;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--muted);font-family:'Inter',sans-serif;font-size:14px;
  min-height:50px;transition:all .2s;
}
.mg:hover{border-color:var(--border2);color:var(--text)}

/* ─── Scrollbar ─── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(212,168,67,.25);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(212,168,67,.45)}

/* ─── Reduced motion ─── */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
</style>
</head>

<body>
<!-- Aurora Background -->
<div class="aurora" aria-hidden="true">
  <div class="aurora-orb a"></div>
  <div class="aurora-orb b"></div>
  <div class="aurora-orb c"></div>
  <div class="aurora-orb d"></div>
</div>

<div class="page">

  <!-- Topbar -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-name">回覆靈感</div>
      <div class="brand-tag">AI Chat Reply</div>
    </div>

    <div class="dev-toggle" id="devToggle" role="group" aria-label="切換版型">
      <button class="dev-btn on" data-m="mobile">
        <svg viewBox="0 0 24 24"><path d="M17 2H7C5.9 2 5 2.9 5 4v16c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H7V4h10v12zm-5 4c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg>
        手機
      </button>
      <button class="dev-btn" data-m="desktop">
        <svg viewBox="0 0 24 24"><path d="M20 3H4C2.9 3 2 3.9 2 5v11c0 1.1.9 2 2 2h7v2H9v2h6v-2h-2v-2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 13H4V5h16v11z"/></svg>
        電腦
      </button>
    </div>

    <button class="gear" id="settingsBtn" title="設定 API Key" aria-label="設定">⚙</button>
  </header>

  <!-- Main -->
  <main class="scroll">
    <div class="wrap">
      <div class="layout">

        <!-- Left col -->
        <div class="col-l">

          <!-- Step 1 -->
          <div class="card">
            <div class="sec">
              <div class="sec-num">1</div>
              提供對話內容
            </div>

            <div class="tabs" role="tablist">
              <button class="tab on" data-pane="pImg" role="tab">📷 上傳截圖</button>
              <button class="tab"    data-pane="pTxt" role="tab">📋 貼上文字</button>
            </div>

            <div class="pane show" id="pImg">
              <label class="drop" id="dropZone">
                <span class="drop-ico">🖼</span>
                拖曳對話截圖，或點擊選取<br>
                <span style="font-size:12px;opacity:.5">JPG / PNG · 過大自動壓縮</span>
                <input type="file" id="fi" accept="image/*">
              </label>
              <div class="prev" id="prevBox">
                <img id="prevImg" alt="截圖預覽">
                <button class="rm" id="rmImg">✕</button>
              </div>
            </div>

            <div class="pane" id="pTxt">
              <textarea id="txtIn" placeholder="貼上對話，例如：&#10;&#10;對方：欸你週末有空嗎&#10;我：應該有 怎麼了&#10;對方：沒有啦 就想找你出來走走"></textarea>
            </div>
          </div>

          <!-- Step 2+3 -->
          <div class="card">
            <div class="sec">
              <div class="sec-num">2</div>
              回覆語氣
            </div>
            <div class="chips" id="toneChips">
              <button class="chip on" data-v="幽默風趣">幽默</button>
              <button class="chip"    data-v="溫柔體貼">溫柔</button>
              <button class="chip"    data-v="曖昧撩人但不油膩">曖昧</button>
              <button class="chip"    data-v="正式得體">正式</button>
              <button class="chip"    data-v="高情商委婉拒絕">高情商拒絕</button>
            </div>

            <div class="gap"></div>
            <div class="divider"></div>

            <div class="sec">
              <div class="sec-num">3</div>
              對方身分
            </div>
            <div class="chips" id="relChips">
              <button class="chip on" data-v="朋友">朋友</button>
              <button class="chip"    data-v="曖昧對象">曖昧對象</button>
              <button class="chip"    data-v="客戶">客戶</button>
              <button class="chip"    data-v="同事">同事</button>
            </div>
          </div>

          <!-- CTA -->
          <button class="cta" id="goBtn">✦ &nbsp;生成回覆建議</button>

          <!-- Loading & Error -->
          <div class="loading" id="loading">
            <span>AI 正在思考中</span>
            <div class="dots"><i></i><i></i><i></i></div>
          </div>
          <div class="err-box" id="errBox"></div>

          <!-- Mobile results -->
          <div id="results-mobile"></div>
        </div>

        <!-- Right col (desktop) -->
        <div class="col-r">
          <div class="r-placeholder" id="placeholder">
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            <span>回覆建議會顯示在這裡</span>
          </div>
          <div id="results-desktop"></div>
        </div>

      </div>

      <div class="wrap-footer">Powered by GPT-4o-mini &nbsp;·&nbsp; API Key 僅存於本機，不會上傳</div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>連接 OpenAI</h2>
    <p>輸入你的 OpenAI API Key（以 sk- 開頭）。Key 只存於你的瀏覽器，不會上傳到任何伺服器。</p>
    <input type="password" id="keyIn" placeholder="sk-...">
    <div class="ma">
      <button class="mg" id="closeModal">取消</button>
      <button class="ms" id="saveKey">儲存</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
const $ = id => document.getElementById(id);
const KEY = 'rai_v4';
let imgData = null, imgMime = 'image/jpeg';

/* ── Device Toggle ── */
let curMode = 'mobile';
$('devToggle').querySelectorAll('.dev-btn').forEach(b => {
  b.onclick = () => {
    curMode = b.dataset.m;
    document.documentElement.dataset.mode = curMode;
    $('devToggle').querySelectorAll('.dev-btn').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    syncResults();
  };
});

function syncResults(){
  const mBox = $('results-mobile');
  const dBox = $('results-desktop');
  const ph   = $('placeholder');
  if(curMode === 'desktop'){
    Array.from(mBox.children).forEach(c => dBox.appendChild(c));
    ph.classList.toggle('hide', dBox.children.length > 0);
  } else {
    Array.from(dBox.children).forEach(c => mBox.appendChild(c));
  }
}

/* ── Settings ── */
$('settingsBtn').onclick = () => {
  $('keyIn').value = localStorage.getItem(KEY)||'';
  $('overlay').classList.add('show');
};
$('closeModal').onclick = () => $('overlay').classList.remove('show');
$('overlay').onclick = e => { if(e.target===$('overlay')) $('overlay').classList.remove('show'); };
$('saveKey').onclick = () => {
  const v = $('keyIn').value.trim();
  if(v && !v.startsWith('sk-')) return showErr('Key 格式不對，OpenAI 的 Key 以 sk- 開頭。');
  localStorage.setItem(KEY, v);
  $('overlay').classList.remove('show');
  clearErr();
};

/* ── Tabs ── */
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
    document.querySelectorAll('.pane').forEach(x => x.classList.remove('show'));
    t.classList.add('on');
    $(t.dataset.pane).classList.add('show');
  };
});

/* ── Chips ── */
['toneChips','relChips'].forEach(id => {
  $(id).querySelectorAll('.chip').forEach(c => {
    c.onclick = () => {
      $(id).querySelectorAll('.chip').forEach(x => x.classList.remove('on'));
      c.classList.add('on');
    };
  });
});
const picked = id => $(id).querySelector('.chip.on').dataset.v;

/* ── Image Upload ── */
const dz = $('dropZone'), fi = $('fi');
['dragenter','dragover'].forEach(e => dz.addEventListener(e, ev => { ev.preventDefault(); dz.classList.add('over'); }));
['dragleave','drop'].forEach(e => dz.addEventListener(e, ev => { ev.preventDefault(); dz.classList.remove('over'); }));
dz.addEventListener('drop', e => { const f=e.dataTransfer.files[0]; if(f) loadImg(f); });
fi.onchange = () => { if(fi.files[0]) loadImg(fi.files[0]); };
$('rmImg').onclick = ev => {
  ev.preventDefault(); ev.stopPropagation();
  imgData = null; fi.value = '';
  $('prevBox').classList.remove('show');
};

function loadImg(file){
  if(!file.type.startsWith('image/')) return showErr('請上傳 JPG 或 PNG 圖片。');
  const r = new FileReader();
  r.onerror = () => showErr('圖片讀取失敗。');
  r.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1600;
      let {width:w, height:h} = img;
      if(w>MAX || h>MAX || file.size>3*1024*1024){
        const s = Math.min(MAX/w, MAX/h, 1);
        w = Math.round(w*s); h = Math.round(h*s);
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        const url = cv.toDataURL('image/jpeg',.88);
        imgData = url.split(',')[1]; imgMime = 'image/jpeg';
        $('prevImg').src = url;
      } else {
        imgData = ev.target.result.split(',')[1];
        imgMime = file.type;
        $('prevImg').src = ev.target.result;
      }
      $('prevBox').classList.add('show'); clearErr();
    };
    img.onerror = () => showErr('無法解析圖片。');
    img.src = ev.target.result;
  };
  r.readAsDataURL(file);
}

/* ── Error ── */
function showErr(msg){
  const b = $('errBox');
  b.textContent = msg;
  b.classList.add('show');
  b.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function clearErr(){ $('errBox').classList.remove('show'); }

/* ── Generate ── */
$('goBtn').onclick = () => go(false);

async function go(retry){
  clearErr();
  const key = localStorage.getItem(KEY);
  if(!key){ $('overlay').classList.add('show'); return showErr('請先設定 OpenAI API Key。'); }

  const usingImg = $('pImg').classList.contains('show');
  const txt = $('txtIn').value.trim();
  if(usingImg && !imgData) return showErr('請先上傳對話截圖，或切換到「貼上文字」。');
  if(!usingImg && !txt) return showErr('請先貼上對話內容。');

  const tone = picked('toneChips'), rel = picked('relChips');
  const sys = `你是頂尖聊天回覆顧問，熟悉台灣日常繁體中文口語。對方身分：${rel}，語氣要求：${tone}。\n分析對話脈絡後產出 3 個風格略有差異的回覆建議，要自然像真人打字，不要 AI 腔。\n只輸出 JSON：{"replies":[{"style":"標籤","text":"回覆"},...共3個]}，不含其他文字。`;
  const content = usingImg
    ? [{type:'text',text:'這是對話截圖，請辨識並給建議。'},{type:'image_url',image_url:{url:`data:${imgMime};base64,${imgData}`}}]
    : [{type:'text',text:`對話內容：\n${txt}`}];

  $('goBtn').disabled = true;
  $('loading').classList.add('show');
  if(!retry){
    $('results-mobile').innerHTML = '';
    $('results-desktop').innerHTML = '';
  }
  const ph = $('placeholder');
  if(ph) ph.classList.remove('hide');

  try{
    const res = await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
      body: JSON.stringify({
        model:'gpt-4o-mini',
        temperature:.9,
        max_tokens:900,
        response_format:{type:'json_object'},
        messages:[{role:'system',content:sys},{role:'user',content}]
      })
    });
    if(!res.ok){
      if(res.status===401) throw new Error('API Key 無效或過期，請重新輸入。');
      if(res.status===429) throw new Error('請求太頻繁或額度不足，請稍後再試。');
      const e = await res.json().catch(()=>null);
      throw new Error(e?.error?.message || `API 錯誤（HTTP ${res.status}）`);
    }
    const data = await res.json();
    const raw = data.choices?.[0]?.message?.content || '';
    let parsed;
    try{ parsed = JSON.parse(raw.replace(/```json|```/g,'').trim()); }
    catch{ throw new Error('AI 回傳格式異常，請重新生成。'); }
    const replies = parsed.replies;
    if(!Array.isArray(replies)||!replies.length) throw new Error('沒有有效回覆，請重新生成。');
    render(replies);
  } catch(e){
    showErr(e.name==='TypeError' ? '連不上 OpenAI，請確認網路正常。' : e.message);
  } finally{
    $('goBtn').disabled = false;
    $('loading').classList.remove('show');
  }
}

/* ── Render ── */
function render(replies){
  $('results-mobile').innerHTML = '';
  $('results-desktop').innerHTML = '';
  const ph = $('placeholder');
  if(ph) ph.classList.add('hide');

  const frag = document.createDocumentFragment();

  replies.slice(0,3).forEach((r,i) => {
    const card = document.createElement('div');
    card.className = 'rc';
    card.style.animationDelay = (i * .12) + 's';

    const head = document.createElement('div');
    head.className = 'rh';

    const tag = document.createElement('span');
    tag.className = 'rt';
    tag.textContent = r.style || `建議 ${i+1}`;

    const cp = document.createElement('button');
    cp.className = 'cp';
    cp.textContent = '複製';

    head.append(tag, cp);

    const body = document.createElement('p');
    body.className = 'rb';
    body.textContent = r.text || '';

    cp.onclick = async () => {
      try{ await navigator.clipboard.writeText(body.textContent); }
      catch{
        const ta = document.createElement('textarea');
        ta.value = body.textContent;
        Object.assign(ta.style,{position:'fixed',top:'-9999px'});
        document.body.append(ta); ta.select(); document.execCommand('copy'); ta.remove();
      }
      cp.textContent = '✓ 已複製';
      cp.classList.add('done');
      if(navigator.vibrate) navigator.vibrate(28);
      setTimeout(() => { cp.textContent = '複製'; cp.classList.remove('done'); }, 2000);
    };

    card.append(head, body);
    frag.appendChild(card);
  });

  const again = document.createElement('button');
  again.className = 'again';
  again.textContent = '↻ 換一批說法';
  again.onclick = () => go(true);
  frag.appendChild(again);

  const targetBox = curMode === 'desktop' ? $('results-desktop') : $('results-mobile');
  targetBox.appendChild(frag);
  setTimeout(() => targetBox.firstChild?.scrollIntoView({behavior:'smooth',block:'start'}), 80);
}
})();
</script>
</body>
</html>
