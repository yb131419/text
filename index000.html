<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>草本產品購買明細表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", "PingFang TC", "Heiti TC", sans-serif;
        }

        :root {
            --primary: #2A5F48;
            --secondary: #6B9F8A;
            --accent: #C85C6E;
            --light: #F8FAF9;
            --gray: #E9ECEB;
            --dark: #333333;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 8px;
        }

        body {
            background-color: #F3F5F4;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* 头部标题 */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 16px 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
        }

        /* 基本资料 */
        .info-card {
            padding: 20px 24px;
            border-bottom: 1px solid var(--gray);
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-item label {
            font-weight: 600;
            color: var(--primary);
        }

        .info-item input {
            border: 1px solid var(--gray);
            border-radius: 4px;
            padding: 6px 8px;
            outline: none;
            transition: 0.2s;
        }

        .info-item input:focus {
            border-color: var(--secondary);
        }

        /* 产品快捷选择区 */
        .product-panel {
            padding: 16px 24px;
            background: var(--light);
            border-bottom: 1px solid var(--gray);
        }

        .panel-title {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 14px;
        }

        .product-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 160px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .product-tag {
            padding: 5px 10px;
            background: white;
            border: 1px solid var(--secondary);
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .product-tag:hover {
            background: var(--secondary);
            color: white;
        }

        /* 操作按钮区 */
        .action-bar {
            padding: 12px 24px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--gray);
        }

        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-accent {
            background: var(--accent);
            color: white;
        }

        .btn-light {
            background: white;
            border: 1px solid var(--gray);
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* 直式高质感表格 */
        .table-wrapper {
            padding: 16px 24px 24px;
            overflow-x: auto;
        }

        .nutrition-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        .nutrition-table thead {
            background: var(--primary);
            color: white;
        }

        .nutrition-table th {
            padding: 12px 8px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            border-right: 1px solid rgba(255,255,255,0.2);
        }

        .nutrition-table th:last-child {
            border-right: none;
        }

        .nutrition-table tbody tr {
            border-bottom: 1px solid var(--gray);
            transition: 0.2s;
        }

        .nutrition-table tbody tr:hover {
            background: var(--light);
        }

        .nutrition-table td {
            padding: 10px 6px;
            text-align: center;
            font-size: 13px;
            vertical-align: middle;
        }

        .edit-input {
            width: 80px;
            text-align: center;
            border: 1px solid var(--gray);
            border-radius: 4px;
            padding: 4px;
            outline: none;
        }

        .month-select {
            width: 90px;
            padding: 4px;
            border: 1px solid var(--gray);
            border-radius: 4px;
            outline: none;
        }

        .check-btn {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            border: 1px solid var(--secondary);
            background: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--accent);
        }

        .check-btn.active {
            background: #FFF0F3;
        }

        /* 备注区 */
        .notes {
            padding: 20px 24px;
            background: var(--light);
            border-top: 1px solid var(--gray);
            font-size: 13px;
            line-height: 1.6;
        }

        .note-item {
            margin-bottom: 6px;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--secondary);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>草本產品購買明細表</h1>
        </div>

        <!-- 基本资料 -->
        <div class="info-card">
            <div class="info-item">
                <label>日期：</label>
                <input type="text" id="date" value="115.5.9(六)金門">
            </div>
            <div class="info-item">
                <label>姓名：</label>
                <input type="text" id="name" placeholder="請輸入姓名">
            </div>
            <div class="info-item">
                <label>介紹人：</label>
                <input type="text" id="introducer" placeholder="請輸入介紹人">
            </div>
            <div class="info-item">
                <label>基本保養：</label>
                <input type="text" id="basicNutrition" value="211、300、299A各3顆">
            </div>
            <div class="info-item">
                <label>火山甘露：</label>
                <input type="text" id="volcanoTea" value="每天3包">
            </div>
        </div>

        <!-- 产品快捷选择区 -->
        <div class="product-panel">
            <div class="panel-title">🔘 快捷選擇產品（點擊添加到選中行）</div>
            <div class="product-tags" id="productTags"></div>
        </div>

        <!-- 操作栏 -->
        <div class="action-bar">
            <button class="btn btn-primary" onclick="addRow()">➕ 新增行</button>
            <button class="btn btn-light" onclick="delRow()">➖ 刪除選中行</button>
            <button class="btn btn-secondary" onclick="copyToAllMonth()">📋 一鍵同步所有月份</button>
            <button class="btn btn-light" onclick="clearTable()">🧹 清空表格</button>
        </div>

        <!-- 直式表格 -->
        <div class="table-wrapper">
            <table class="nutrition-table" id="mainTable">
                <thead>
                    <tr>
                        <th>選擇</th>
                        <th>分類</th>
                        <th>產品編號</th>
                        <th>服用月份</th>
                        <th>顆數</th>
                        <th>早</th>
                        <th>中</th>
                        <th>晚</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td><input type="checkbox" class="row-check"></td>
                        <td><input type="text" class="edit-input" placeholder="分類"></td>
                        <td><input type="text" class="edit-input prod-name" placeholder="點擊產品添加"></td>
                        <td>
                            <select class="month-select">
                                <option value="1">第一個月</option>
                                <option value="2">第二個月</option>
                                <option value="3">第三個月</option>
                                <option value="4">保養</option>
                            </select>
                        </td>
                        <td><input type="number" class="edit-input" value="3"></td>
                        <td><button class="check-btn" onclick="toggleCheck(this)">√</button></td>
                        <td><button class="check-btn" onclick="toggleCheck(this)">√</button></td>
                        <td><button class="check-btn" onclick="toggleCheck(this)">√</button></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 备注 -->
        <div class="notes">
            <div class="note-item">☐220～飯後服用。</div>
            <div class="note-item">◇晚上睡覺前6小時，不能吃澱粉類食物。</div>
            <div class="note-item">○705～月經來時不能服用。</div>
            <div class="note-item">金色果：每天____包　復甦精華露：每次____管　海神泥：每週數____次</div>
            <div class="note-item">一氧化氮：早、晚各____顆　循清蔘：早、晚各____顆</div>
            <div class="note-item">○205 兩顆加211A一顆～拆殼後，粉倒入口中含著。</div>
        </div>
    </div>

    <script>
        // ===================== 產品列表 =====================
        const productList = [
            "新入會(9號）","新入會(草本）男","新入會(草本）女","2711AB(1)限4盒","限入會2711AB(4)限1組",
            "211","300","299A","火山甘露_限4盒","200","201","202","205","209","210","211A","220","222",
            "233","240","255A","260","266","268","270","280","286","288","289","290","295","299",
            "701","702","703","705","706","707","708","747AB","777Q","777Q(4)限2組",
            "大女王","極樂鳥","101","111","168","金色果(2）","海神泥","復甦精華露"
        ];

        // 渲染產品標籤
        function renderProductTags() {
            const container = document.getElementById('productTags');
            productList.forEach(item => {
                const tag = document.createElement('div');
                tag.className = 'product-tag';
                tag.textContent = item;
                tag.onclick = () => addProductToRow(item);
                container.appendChild(tag);
            });
        }

        // 點擊產品添加到選中行
        function addProductToRow(product) {
            const checks = document.querySelectorAll('.row-check:checked');
            if(checks.length === 0) {
                alert('請先勾選要添加產品的行！');
                return;
            }
            checks.forEach(checkbox => {
                const row = checkbox.closest('tr');
                const prodInput = row.querySelector('.prod-name');
                prodInput.value = product;
            });
        }

        // ===================== 表格操作 =====================
        // 新增行
        function addRow() {
            const tbody = document.getElementById('tableBody');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="checkbox" class="row-check"></td>
                <td><input type="text" class="edit-input" placeholder="分類"></td>
                <td><input type="text" class="edit-input prod-name" placeholder="點擊產品添加"></td>
                <td>
                    <select class="month-select">
                        <option value="1">第一個月</option>
                        <option value="2">第二個月</option>
                        <option value="3">第三個月</option>
                        <option value="4">保養</option>
                    </select>
                </td>
                <td><input type="number" class="edit-input" value="3"></td>
                <td><button class="check-btn" onclick="toggleCheck(this)">√</button></td>
                <td><button class="check-btn" onclick="toggleCheck(this)">√</button></td>
                <td><button class="check-btn" onclick="toggleCheck(this)">√</button></td>
            `;
            tbody.appendChild(tr);
        }

        // 刪除選中行
        function delRow() {
            document.querySelectorAll('.row-check:checked').forEach(cb => {
                cb.closest('tr').remove();
            });
        }

        // 切換勾選狀態
        function toggleCheck(btn) {
            btn.classList.toggle('active');
        }

        // 一鍵同步：將第一個月數據複製到所有月份（直式專用）
        function copyToAllMonth() {
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach(row => {
                const select = row.querySelector('.month-select');
                const count = row.querySelector('input[type="number"]');
                const btns = row.querySelectorAll('.check-btn');
                
                // 強制設置為所有月份通用數據
                select.value = 1;
                count.value = 3;
                btns.forEach(btn => btn.classList.add('active'));
            });
            alert('已同步所有月份為默認服用狀態！');
        }

        // 清空表格
        function clearTable() {
            if(confirm('確定清空所有數據？')) {
                document.getElementById('tableBody').innerHTML = '';
                addRow();
            }
        }

        // ===================== 初始化 =====================
        window.onload = function() {
            renderProductTags();
        };
    </script>
</body>
</html>
