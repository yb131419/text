<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>草本產品購買明細表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", "PingFang TC", "Heiti TC", sans-serif;
        }

        :root {
            --primary: #2A5F48;
            --secondary: #6B9F8A;
            --accent: #C85C6E;
            --light: #F8FAF9;
            --gray: #E9ECEB;
            --dark: #333333;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 8px;
        }

        body {
            background-color: #F3F5F4;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* 头部标题 */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 16px 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
        }

        /* 基本资料 */
        .info-card {
            padding: 20px 24px;
            border-bottom: 1px solid var(--gray);
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-item label {
            font-weight: 600;
            color: var(--primary);
        }

        .info-item input, .info-item select {
            border: 1px solid var(--gray);
            border-radius: 4px;
            padding: 6px 8px;
            outline: none;
            transition: 0.2s;
        }

        .info-item input:focus, .info-item select:focus {
            border-color: var(--secondary);
        }

        /* 月份模块容器 */
        .month-section {
            padding: 16px 24px;
            border-bottom: 2px solid var(--gray);
        }

        .month-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 4px solid var(--accent);
        }

        /* 折叠面板 */
        .collapse-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--light);
            border-radius: var(--radius);
            cursor: pointer;
            margin-bottom: 8px;
        }

        .collapse-content {
            display: none;
            padding: 8px 12px;
            background: var(--light);
            border-radius: var(--radius);
        }

        .collapse-content.show {
            display: block;
        }

        .collapse-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 14px;
            cursor: pointer;
        }

        /* 产品快捷选择区 */
        .product-panel {
            margin-bottom: 12px;
        }

        .panel-title {
            font-weight: 600;
            color: var(--primary);
            font-size: 13px;
        }

        .product-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 120px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .product-tag {
            padding: 5px 10px;
            background: white;
            border: 1px solid var(--secondary);
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .product-tag:hover {
            background: var(--secondary);
            color: white;
        }

        /* 操作按钮区 */
        .action-bar {
            padding: 8px 0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-light {
            background: white;
            border: 1px solid var(--gray);
        }

        .btn-accent {
            background: var(--accent);
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        /* 直式高质感表格 */
        .table-wrapper {
            overflow-x: auto;
        }

        .nutrition-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 650px;
        }

        .nutrition-table thead {
            background: var(--primary);
            color: white;
        }

        .nutrition-table th {
            padding: 10px 8px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            border-right: 1px solid rgba(255,255,255,0.2);
        }

        .nutrition-table th:last-child {
            border-right: none;
        }

        .nutrition-table tbody tr {
            border-bottom: 1px solid var(--gray);
            transition: 0.2s;
        }

        .nutrition-table tbody tr:hover {
            background: var(--light);
        }

        .nutrition-table td {
            padding: 8px 6px;
            text-align: center;
            font-size: 13px;
            vertical-align: middle;
        }

        .edit-input {
            width: 100px;
            text-align: center;
            border: 1px solid var(--gray);
            border-radius: 4px;
            padding: 4px;
            outline: none;
        }

        .check-btn {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            border: 1px solid var(--secondary);
            background: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--accent);
        }

        /* 勾選樣式 */
        .check-btn.active {
            background: #FFF0F3;
        }

        /* 單行刪除按鈕 */
        .del-single-btn {
            padding: 4px 8px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        /* 分享按鈕區 */
        .share-section {
            padding: 16px 24px;
            text-align: center;
            border-top: 1px solid var(--gray);
        }

        /* 备注区 */
        .notes {
            padding: 20px 24px;
            background: var(--light);
            font-size: 13px;
            line-height: 1.6;
        }

        .note-item {
            margin-bottom: 6px;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--secondary);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>草本產品購買明細表</h1>
        </div>

        <!-- 基本资料 -->
        <div class="info-card">
            <div class="info-item">
                <label>日期：</label>
                <input type="text" id="date" readonly>
            </div>
            <div class="info-item">
                <label>姓名：</label>
                <input type="text" id="name" placeholder="請輸入姓名">
            </div>
            <div class="info-item">
                <label>介紹人：</label>
                <input type="text" id="introducer" placeholder="請輸入介紹人">
            </div>
            <!-- 新增：入會下拉欄位 -->
            <div class="info-item">
                <label>入會：</label>
                <select id="memberType">
                    <option value="">請選擇</option>
                    <option value="新入會草本（男）">新入會草本（男）</option>
                    <option value="新入會草本（女）">新入會草本（女）</option>
                    <option value="新入會命運九號">新入會命運九號</option>
                </select>
            </div>
            <div class="info-item">
                <label>基本保養：</label>
                <input type="text" id="basicNutrition" value="211、300、299A各3顆">
            </div>
            <div class="info-item">
                <label>火山甘露：</label>
                <input type="text" id="volcanoTea" value="每天3包">
            </div>
        </div>

        <!-- 第一個月 -->
        <div class="month-section">
            <div class="month-title">第一個月</div>
            <!-- 折疊產品面板 -->
            <div class="product-panel">
                <div class="collapse-header" onclick="toggleCollapse(1)">
                    <div class="panel-title">🔘 快捷選擇產品（雙擊添加）</div>
                    <button class="collapse-btn" id="collapseBtn1">展開 ▼</button>
                </div>
                <div class="collapse-content" id="collapseContent1">
                    <div class="product-tags" id="tags1"></div>
                </div>
            </div>
            <div class="action-bar">
                <button class="btn btn-primary" onclick="addRow(1)">➕ 新增行</button>
                <button class="btn btn-light" onclick="clearTable(1)">🧹 清空</button>
            </div>
            <div class="table-wrapper">
                <table class="nutrition-table">
                    <thead>
                        <tr>
                            <th>產品編號</th>
                            <th>顆數</th>
                            <th>早</th>
                            <th>中</th>
                            <th>晚</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="body1"></tbody>
                </table>
            </div>
        </div>

        <!-- 第二個月 -->
        <div class="month-section">
            <div class="month-title">第二個月</div>
            <div class="product-panel">
                <div class="collapse-header" onclick="toggleCollapse(2)">
                    <div class="panel-title">🔘 快捷選擇產品（雙擊添加）</div>
                    <button class="collapse-btn" id="collapseBtn2">展開 ▼</button>
                </div>
                <div class="collapse-content" id="collapseContent2">
                    <div class="product-tags" id="tags2"></div>
                </div>
            </div>
            <div class="action-bar">
                <button class="btn btn-primary" onclick="addRow(2)">➕ 新增行</button>
                <button class="btn btn-light" onclick="clearTable(2)">🧹 清空</button>
            </div>
            <div class="table-wrapper">
                <table class="nutrition-table">
                    <thead>
                        <tr>
                            <th>產品編號</th>
                            <th>顆數</th>
                            <th>早</th>
                            <th>中</th>
                            <th>晚</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="body2"></tbody>
                </table>
            </div>
        </div>

        <!-- 第三個月 -->
        <div class="month-section">
            <div class="month-title">第三個月</div>
            <div class="product-panel">
                <div class="collapse-header" onclick="toggleCollapse(3)">
                    <div class="panel-title">🔘 快捷選擇產品（雙擊添加）</div>
                    <button class="collapse-btn" id="collapseBtn3">展開 ▼</button>
                </div>
                <div class="collapse-content" id="collapseContent3">
                    <div class="product-tags" id="tags3"></div>
                </div>
            </div>
            <div class="action-bar">
                <button class="btn btn-primary" onclick="addRow(3)">➕ 新增行</button>
                <button class="btn btn-light" onclick="clearTable(3)">🧹 清空</button>
            </div>
            <div class="table-wrapper">
                <table class="nutrition-table">
                    <thead>
                        <tr>
                            <th>產品編號</th>
                            <th>顆數</th>
                            <th>早</th>
                            <th>中</th>
                            <th>晚</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="body3"></tbody>
                </table>
            </div>
        </div>

        <!-- 备注 -->
        <div class="notes">
            <div class="note-item">☐220～飯後服用。</div>
            <div class="note-item">◇晚上睡覺前6小時，不能吃澱粉類食物。</div>
            <div class="note-item">○705～月經來時不能服用。</div>
            <div class="note-item">金色果：每天____包　復甦精華露：每次____管　海神泥：每週數____次</div>
            <div class="note-item">一氧化氮：早、晚各____顆　循清蔘：早、晚各____顆</div>
            <div class="note-item">○205 兩顆加211A一顆～拆殼後，粉倒入口中含著。</div>
        </div>

        <!-- 原生分享按鈕 -->
        <div class="share-section">
            <button class="btn btn-accent" onclick="nativeShare()">📤 原生分享報表資訊</button>
        </div>
    </div>

    <script>
        // ===================== 產品列表 =====================
        const productList = [
            "新入會(9號）","新入會(草本）男","新入會(草本）女","2711AB(1)限4盒","限入會2711AB(4)限1組",
            "211","300","299A","火山甘露_限4盒","200","201","202","205","209","210","211A","220","222",
            "233","240","255A","260","266","268","270","280","286","288","289","290","295","299",
            "701","702","703","705","706","707","708","747AB","777Q","777Q(4)限2組",
            "大女王","極樂鳥","101","111","168","金色果(2）","海神泥","復甦精華露"
        ];

        // 默認產品配置
        const defaultProducts = {
            1: ["211", "300", "299A", "211A"],
            2: ["211", "300", "299A"],
            3: ["211", "300", "299A"]
        };

        // ===================== 自動加載今日日期 =====================
        function loadTodayDate() {
            const now = new Date();
            const year = now.getFullYear() - 1911;
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const week = ['日','一','二','三','四','五','六'][now.getDay()];
            document.getElementById('date').value = `${year}.${month}.${day}(${week})金門`;
        }

        // ===================== 折疊面板切換 =====================
        function toggleCollapse(month) {
            const content = document.getElementById(`collapseContent${month}`);
            const btn = document.getElementById(`collapseBtn${month}`);
            content.classList.toggle('show');
            btn.textContent = content.classList.contains('show') ? '收起 ▲' : '展開 ▼';
        }

        // ===================== 渲染產品標籤 =====================
        function renderAllTags() {
            [1,2,3].forEach(month => {
                const container = document.getElementById(`tags${month}`);
                productList.forEach(item => {
                    const tag = document.createElement('div');
                    tag.className = 'product-tag';
                    tag.textContent = item;
                    tag.ondblclick = () => addProductWithRow(month, item);
                    container.appendChild(tag);
                });
            });
        }

        // ===================== 雙擊產品：自動新增行+填入產品 =====================
        function addProductWithRow(month, product) {
            const tbody = document.getElementById(`body${month}`);
            const tr = document.createElement('tr');
            // 早、晚默認勾選，中午空白
            tr.innerHTML = `
                <td><input type="text" class="edit-input prod-name" value="${product}"></td>
                <td><input type="number" class="edit-input" value="3"></td>
                <td><button class="check-btn active" ondblclick="toggleCheck(this)">√</button></td>
                <td><button class="check-btn" ondblclick="toggleCheck(this)"></button></td>
                <td><button class="check-btn active" ondblclick="toggleCheck(this)">√</button></td>
                <td><button class="del-single-btn" onclick="delSingleRow(this)">刪除</button></td>
            `;
            tbody.appendChild(tr);
        }

        // ===================== 表格操作 =====================
        // 新增空白行
        function addRow(month) {
            const tbody = document.getElementById(`body${month}`);
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" class="edit-input prod-name" placeholder="雙擊產品添加"></td>
                <td><input type="number" class="edit-input" value="3"></td>
                <td><button class="check-btn active" ondblclick="toggleCheck(this)">√</button></td>
                <td><button class="check-btn" ondblclick="toggleCheck(this)"></button></td>
                <td><button class="check-btn active" ondblclick="toggleCheck(this)">√</button></td>
                <td><button class="del-single-btn" onclick="delSingleRow(this)">刪除</button></td>
            `;
            tbody.appendChild(tr);
        }

        // 單行刪除
        function delSingleRow(btn) {
            btn.closest('tr').remove();
        }

        // 清空表格
        function clearTable(month) {
            if(confirm('確定清空？')) {
                document.getElementById(`body${month}`).innerHTML = '';
            }
        }

        // 加載默認產品
        function loadDefaultProducts() {
            for (let month in defaultProducts) {
                const products = defaultProducts[month];
                products.forEach(p => addProductWithRow(month, p));
            }
        }

        // ===================== 雙擊切換勾選 =====================
        function toggleCheck(btn) {
            btn.classList.toggle('active');
            btn.textContent = btn.classList.contains('active') ? '√' : '';
        }

        // ===================== 瀏覽器原生分享 =====================
        function nativeShare() {
            const name = document.getElementById('name').value || '未填寫';
            const introducer = document.getElementById('introducer').value || '未填寫';
            const member = document.getElementById('memberType').value || '未選擇';
            const date = document.getElementById('date').value;

            const shareData = {
                title: '草本產品購買明細表',
                text: `日期：${date}\n姓名：${name}\n介紹人：${introducer}\n入會類型：${member}\n產品：211/300/299A/211A`
            };

            if (navigator.share) {
                navigator.share(shareData).catch(err => console.log('分享取消', err));
            } else {
                alert('您的瀏覽器不支援原生分享，請手動截圖分享');
            }
        }

        // ===================== 初始化 =====================
        window.onload = function() {
            loadTodayDate();
            renderAllTags();
            loadDefaultProducts();
        };
    </script>
</body>
</html>
