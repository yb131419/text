<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>30年資深交易員 智能狙擊系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#07080f',
            darker: '#0d1018',
            card: '#111520',
            border: '#1a1e2e',
            green: '#1db954',
            red: '#e03e3e',
            blue: '#38bdf8',
            yellow: '#f59e0b',
            indigo: '#6366f1',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
    }
  </style>
</head>
<body class="bg-dark text-gray-100 font-sans min-h-screen pb-24 relative">
  <!-- 頂部風險警告 -->
  <div id="riskWarning" class="hidden px-4 py-2 text-center text-sm font-bold border-b"></div>

  <!-- 頂部標題 -->
  <div class="bg-darker border-b border-border p-4 text-center">
    <div class="text-xs text-gray-500 tracking-widest mb-1">30年資深交易員 智能系統</div>
    <div class="text-xl font-bold">⚡ 全品種精準狙擊</div>
  </div>

  <!-- 主內容區 -->
  <div id="content" class="max-w-sm mx-auto p-4 space-y-4"></div>

  <!-- 浮動AI看盤按鈕 -->
  <button id="aiButton" class="fixed right-4 bottom-24 w-14 h-14 rounded-full bg-indigo shadow-lg flex items-center justify-center text-2xl z-40">
    🤖
  </button>

  <!-- AI看盤彈窗模態框 -->
  <div id="aiModal" class="fixed inset-0 bg-black/80 z-50 flex items-end sm:items-center justify-center hidden">
    <div class="bg-card w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-5 max-h-[85vh] overflow-y-auto scrollbar-hide">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-white">🧙‍♂️ 30年資深交易員分析</h3>
        <button id="closeAiModal" class="text-gray-300 text-xl">✕</button>
      </div>
      <input id="fileInput" type="file" accept="image/*" hidden />
      <button id="uploadButton" class="w-full border border-dashed border-indigo/50 rounded-xl py-6 text-indigo-300 mb-3">
        上傳任何金融產品K線截圖
        <div class="text-xs mt-1 text-gray-400">支持NQ/ES/YM/黃金/原油/外匯/股票</div>
      </button>
      <div id="imagePreview" class="mb-3 hidden">
        <img id="previewImg" src="" alt="chart preview" class="w-full rounded-lg object-contain max-h-52" />
      </div>
      <div id="aiError" class="text-red text-sm mb-3 p-3 bg-red/15 rounded border border-red/30 whitespace-pre-line hidden"></div>
      <div id="aiDebug" class="text-blue text-sm mb-3 p-3 bg-blue/15 rounded border border-blue/30 whitespace-pre-line hidden"></div>
      <button id="analyzeButton" class="w-full py-3 rounded-lg bg-indigo font-bold mb-3">
        開始深度分析
      </button>
      
      <!-- AI智能分析結果區域 -->
      <div id="aiResult" class="space-y-4 hidden">
        <!-- 趨勢判斷卡片 -->
        <div id="trendCard" class="rounded-xl p-4 border">
          <div class="text-lg font-bold text-center mb-2" id="trendTitle"></div>
          <div class="text-center text-sm text-gray-300" id="trendAdvice"></div>
        </div>
        
        <!-- 精確點位卡片 -->
        <div class="bg-darker rounded-xl p-4 border border-gray-600">
          <div class="text-sm font-bold text-white mb-3">📊 精確進出點位</div>
          <div class="grid grid-cols-2 gap-3 text-sm">
            <div class="bg-black/30 p-2 rounded text-center">
              <div class="text-gray-400 text-xs">進場價</div>
              <div class="text-lg font-bold" id="entryPrice"></div>
            </div>
            <div class="bg-black/30 p-2 rounded text-center">
              <div class="text-gray-400 text-xs">止損價</div>
              <div class="text-lg font-bold text-red" id="stopLoss"></div>
            </div>
            <div class="bg-black/30 p-2 rounded text-center">
              <div class="text-gray-400 text-xs">止盈1 (3R)</div>
              <div class="text-lg font-bold text-yellow" id="takeProfit1"></div>
            </div>
            <div class="bg-black/30 p-2 rounded text-center">
              <div class="text-gray-400 text-xs">止盈2 (5R)</div>
              <div class="text-lg font-bold text-green" id="takeProfit2"></div>
            </div>
          </div>
          <div class="mt-3 text-center text-sm">
            <span class="text-gray-400">風險收益比：</span>
            <span class="font-bold" id="riskReward"></span>
          </div>
        </div>
        
        <!-- 技術分析卡片 -->
        <div class="bg-darker rounded-xl p-4 border border-gray-600">
          <div class="text-sm font-bold text-white mb-3">📈 多周期技術分析</div>
          <div class="space-y-2">
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">大周期趨勢</span>
              <span id="tf15Result" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">中周期訊號</span>
              <span id="tf5Result" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">短周期進場點</span>
              <span id="tf1Result" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">RSI動能</span>
              <span id="rsiStatus" class="text-lg"></span>
            </div>
          </div>
        </div>
        
        <!-- 風險管理卡片 -->
        <div class="bg-darker rounded-xl p-4 border border-gray-600">
          <div class="text-sm font-bold text-white mb-2">🛡️ 嚴格風險管理</div>
          <div class="text-sm text-gray-300 whitespace-pre-line" id="riskManagement"></div>
        </div>
        
        <!-- 操作建議卡片 -->
        <div class="bg-darker rounded-xl p-4 border border-gray-600">
          <div class="text-sm font-bold text-white mb-2">💡 詳細操作步驟</div>
          <div class="text-sm text-gray-300 whitespace-pre-line" id="detailedAdvice"></div>
        </div>
        
        <!-- 一鍵執行按鈕 -->
        <button id="executeTradeButton" class="w-full py-3 rounded-lg font-bold text-lg">
          一鍵執行交易
        </button>
      </div>
      
      <button id="resetAiButton" class="w-full mt-3 py-2 border border-gray-600 rounded-lg text-gray-300 text-sm">
        重新上傳圖片
      </button>
    </div>
  </div>

  <!-- 底部導航 -->
  <div class="fixed bottom-0 left-0 right-0 bg-darker border-t border-border pb-3 pt-2 z-30">
    <div class="max-w-sm mx-auto grid grid-cols-4 text-xs text-center">
      <button data-tab="home" class="tab-button pt-1 pb-1 rounded-lg text-indigo">
        <div class="text-lg mb-1">🏠</div>首頁
      </button>
      <button data-tab="log" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📓</div>日誌
      </button>
      <button data-tab="stats" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📈</div>統計
      </button>
      <button data-tab="settings" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">⚙️</div>設定
      </button>
    </div>
  </div>

  <script>
    // 工具函式
    const num = (v) => parseFloat(v) || 0;
    const fmt = (n, d = 1) =>
      !n || isNaN(n) || !isFinite(n) ? "—" : Number(n).toFixed(d);

    // 本地存儲持久化
    const saveData = (key, data) => {
      try {
        localStorage.setItem(`sniper_${key}`, JSON.stringify(data));
      } catch (e) {
        console.error("保存失敗:", e);
      }
    };

    const loadData = (key, defaultValue) => {
      try {
        const data = localStorage.getItem(`sniper_${key}`);
        return data ? JSON.parse(data) : defaultValue;
      } catch (e) {
        console.error("讀取失敗:", e);
        return defaultValue;
      }
    };

    // 全局狀態
    let state = {
      tab: "home",
      capital: loadData("capital", "10000"),
      position: loadData("position", null),
      trades: loadData("trades", []),
      todayLoss: loadData("todayLoss", 0),
      winRate: loadData("winRate", 0),
      loseStreak: loadData("loseStreak", 0),
      apiKey: loadData("apiKey", ""),
      proxyUrl: loadData("proxyUrl", "https://api.openai.com/v1/chat/completions"),
      aiAnalysis: null,
      aiImage: null,
      aiBase64: "",
      aiLoading: false,
      aiError: ""
    };

    // 計算屬性
    const getComputed = () => {
      const cap = num(state.capital);
      const risk = cap * 0.02;
      
      const warn1 = state.loseStreak >= 2;
      const warn2 = state.loseStreak >= 3;
      const warn3 = state.todayLoss >= cap * 0.05;
      const locked = warn2 || warn3;

      return { cap, risk, warn1, warn2, warn3, locked };
    };

    // 保存狀態
    const saveState = () => {
      saveData("capital", state.capital);
      saveData("position", state.position);
      saveData("trades", state.trades);
      saveData("todayLoss", state.todayLoss);
      saveData("winRate", state.winRate);
      saveData("loseStreak", state.loseStreak);
      saveData("apiKey", state.apiKey);
      saveData("proxyUrl", state.proxyUrl);
    };

    // 顯示調試信息
    const showDebug = (message) => {
      const debugEl = document.getElementById('aiDebug');
      debugEl.textContent = message;
      debugEl.classList.remove('hidden');
      console.log("DEBUG:", message);
    };

    // 隱藏調試信息
    const hideDebug = () => {
      document.getElementById('aiDebug').classList.add('hidden');
    };

    // 渲染風險警告
    const renderRiskWarning = () => {
      const { warn1, warn2, warn3 } = getComputed();
      const el = document.getElementById('riskWarning');
      
      if (!warn1 && !warn2 && !warn3) {
        el.classList.add('hidden');
        return;
      }

      el.classList.remove('hidden');
      
      if (warn3) {
        el.className = "px-4 py-2 text-center text-sm font-bold bg-red/20 text-red border-red/30 border-b";
        el.textContent = "🛑 當日虧損已達 5%｜系統強制鎖定｜絕對不能再交易";
      } else if (warn2) {
        el.className = "px-4 py-2 text-center text-sm font-bold bg-red/20 text-red border-b";
        el.textContent = "🔴 連輸3筆｜今天絕對停止交易｜明天再來";
      } else {
        el.className = "px-4 py-2 text-center text-sm font-bold bg-yellow/20 text-yellow border-b";
        el.textContent = "🟠 連輸2筆｜強制休息60分鐘｜冷靜後再交易";
      }
    };

    // 渲染首頁
    const renderHome = () => {
      const { cap, locked } = getComputed();
      
      return `
        <!-- 即時戰情 -->
        <div class="bg-card border border-border rounded-2xl p-4">
          <div class="text-xs font-bold text-gray-400 mb-2">🏠 帳戶狀態</div>
          <div class="grid grid-cols-2 gap-3 text-sm">
            <div class="bg-black/20 rounded-lg p-2">
              今日盈虧 <span class="font-bold ${state.todayLoss > 0 ? 'text-red' : 'text-green'}">
                ${state.todayLoss > 0 ? '-$' : '+$'}${fmt(Math.abs(state.todayLoss), 0)}
              </span>
            </div>
            <div class="bg-black/20 rounded-lg p-2">
              歷史勝率 <span class="font-bold">${state.winRate}%</span>
            </div>
            <div class="bg-black/20 rounded-lg p-2">
              連續虧損 <span class="font-bold">${state.loseStreak} 筆</span>
            </div>
            <div class="bg-black/20 rounded-lg p-2">
              剩餘風險額度 <span class="text-green">${fmt(100 - (state.todayLoss/cap*100), 0)}%</span>
            </div>
          </div>
        </div>

        <!-- AI最新分析 -->
        ${state.aiAnalysis ? `
          <div class="bg-card border border-border rounded-2xl p-4">
            <div class="text-xs font-bold text-gray-400 mb-2">🧙‍♂️ 30年資深交易員最新分析</div>
            <div class="text-center mb-3">
              <div class="text-2xl font-bold ${state.aiAnalysis.direction === 'long' ? 'text-green' : state.aiAnalysis.direction === 'short' ? 'text-red' : 'text-yellow'}">
                ${state.aiAnalysis.direction === 'long' ? '🟢 做多' : state.aiAnalysis.direction === 'short' ? '🔴 做空' : '🟡 觀望'}
              </div>
              <div class="text-sm text-gray-300">${state.aiAnalysis.advice}</div>
            </div>
            <div class="grid grid-cols-2 gap-2 text-xs">
              <div class="bg-black/20 p-2 rounded text-center">
                建議進場 <span class="font-bold">${fmt(state.aiAnalysis.entry)}</span>
              </div>
              <div class="bg-black/20 p-2 rounded text-center">
                嚴格止損 <span class="font-bold text-red">${fmt(state.aiAnalysis.stopLoss)}</span>
              </div>
            </div>
          </div>
        ` : `
          <div class="bg-card border border-border rounded-2xl p-4 text-center">
            <div class="text-gray-400 mb-2">還沒有分析</div>
            <div class="text-sm text-gray-500">點擊右下角🤖按鈕上傳任何金融產品K線截圖</div>
          </div>
        `}

        ${!state.position && state.aiAnalysis && state.aiAnalysis.direction !== 'neutral' ? `
          <button 
            id="executeTradeButton" 
            class="w-full py-4 rounded-xl text-lg font-bold ${state.aiAnalysis.direction === 'long' ? 'bg-green' : 'bg-red'} text-white ${locked ? 'opacity-40 cursor-not-allowed' : ''}"
            ${locked ? 'disabled' : ''}
          >
            [ 一鍵${state.aiAnalysis.direction === 'long' ? '做多' : '做空'} ]
          </button>
        ` : ''}

        <!-- 持倉管理 -->
        ${state.position ? `
          <div class="bg-card border border-gray-700 rounded-2xl p-4">
            <div class="text-center font-bold mb-2">持倉中</div>
            <div class="text-center text-2xl font-bold ${state.position.direction === 'long' ? 'text-green' : 'text-red'}">
              ${state.position.direction === 'long' ? '多頭倉位' : '空頭倉位'}
            </div>
            <div class="text-center text-xs text-gray-400 mt-1">
              進場價: ${fmt(state.position.entry)}
            </div>
            <div class="mt-3 grid grid-cols-3 gap-2 text-xs text-center">
              <div class="text-red">STOP ${fmt(state.position.stopLoss)}</div>
              <div class="text-yellow">TP1 ${fmt(state.position.takeProfit1)}</div>
              <div class="text-green">TP2 ${fmt(state.position.takeProfit2)}</div>
            </div>
            <div class="mt-3 grid grid-cols-2 gap-2">
              <button data-close="tp1" class="close-position-button bg-yellow/20 text-yellow py-2 rounded-lg font-bold text-sm">止盈1 (平半)</button>
              <button data-close="tp2" class="close-position-button bg-green/20 text-green py-2 rounded-lg font-bold text-sm">止盈2 (全平)</button>
              <button data-close="stop" class="close-position-button bg-red/20 text-red py-2 rounded-lg font-bold text-sm">堅決止損</button>
              <button data-close="now" class="close-position-button bg-gray-500/20 text-gray-300 py-2 rounded-lg font-bold text-sm">立即平倉</button>
            </div>
          </div>
        ` : ''}

        <!-- 帳戶設定 -->
        <div class="bg-card border border-border rounded-2xl p-4 space-y-3">
          <div class="font-bold text-sm">🧮 帳戶設定</div>
          <div class="grid grid-cols-1 gap-2">
            <input 
              id="capitalInput" 
              value="${state.capital}" 
              class="bg-black/40 border border-gray-700 rounded-lg p-2 text-sm" 
              placeholder="帳戶總資金" 
            />
          </div>
          <div class="text-xs text-gray-400">
            每筆最大風險: 2% 帳戶資金 | 風險收益比: 1:3 / 1:5
          </div>
        </div>
      `;
    };

    // 渲染日誌頁
    const renderLog = () => {
      return `
        <div class="flex justify-between items-center mb-2">
          <div class="text-lg font-bold">📓 交易日誌</div>
          <button id="resetDailyButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded">重置今日</button>
        </div>
        ${state.trades.length === 0 
          ? '<div class="text-center text-gray-500 py-10">還沒有交易記錄</div>' 
          : state.trades.map(t => `
            <div class="bg-card border border-border rounded-xl p-3 text-sm mb-3">
              <div class="flex justify-between">
                <span>${t.date}</span>
                <span class="font-bold ${t.direction === 'long' ? 'text-green' : 'text-red'}">${t.direction === 'long' ? '做多' : '做空'}</span>
              </div>
              <div class="text-gray-400 text-xs">進場 ${fmt(t.entry)} | 出場 ${fmt(t.exit)}</div>
              <div class="font-bold mt-1 ${t.result.startsWith('+') ? 'text-green' : 'text-red'}">
                ${t.result} ($${t.profit})
              </div>
            </div>
          `).join('')}
      `;
    };

    // 渲染統計頁
    const renderStats = () => {
      const totalProfit = state.trades.reduce((sum, t) => sum + parseFloat(t.profit || 0), 0);
      
      return `
        <div class="text-lg font-bold mb-2">📈 交易統計</div>
        <div class="bg-card border border-border rounded-xl p-4 space-y-2 text-sm">
          <div class="flex justify-between"><span>總交易次數</span><span>${state.trades.length}</span></div>
          <div class="flex justify-between"><span>歷史勝率</span><span>${state.winRate}%</span></div>
          <div class="flex justify-between"><span>平均獲利</span><span>4R</span></div>
          <div class="flex justify-between"><span>平均虧損</span><span>1R</span></div>
          <div class="flex justify-between"><span>期望收益</span><span>+2.2R/筆</span></div>
          <div class="flex justify-between font-bold ${totalProfit > 0 ? 'text-green' : 'text-red'}">
            <span>累計淨收益</span>
            <span>${totalProfit > 0 ? '+' : ''}${fmt(totalProfit, 1)} USD</span>
          </div>
        </div>
      `;
    };

    // 渲染設定頁
    const renderSettings = () => {
      return `
        <div class="text-lg font-bold mb-2">⚙️ 系統設定</div>
        
        <div class="bg-card border border-border rounded-xl p-4 space-y-3 mb-4">
          <div class="font-bold text-sm">OpenAI API 設定</div>
          <input 
            id="apiKeyInput"
            value="${state.apiKey}"
            placeholder="sk-xxxxxxxxxxxxxxxx"
            class="w-full bg-black/40 border border-gray-700 rounded-lg p-2 text-sm"
            type="password"
          />
          <div class="text-xs text-gray-500">
            API Key 只存在你的瀏覽器本地，不會上傳到任何伺服器
          </div>
          ${state.apiKey ? '<div class="text-xs text-green">✅ API Key 已設置</div>' : '<div class="text-xs text-yellow">⚠️ 請先輸入API Key才能使用AI功能</div>'}
        </div>

        <div class="bg-card border border-border rounded-xl p-4 space-y-3 mb-4">
          <div class="font-bold text-sm">代理伺服器設定（必須！）</div>
          <input 
            id="proxyUrlInput"
            value="${state.proxyUrl}"
            placeholder="https://your-worker.your-name.workers.dev"
            class="w-full bg-black/40 border border-gray-700 rounded-lg p-2 text-sm"
          />
          <div class="text-xs text-red-500 font-bold">
            ⚠️ 在GitHub Pages上必須使用代理伺服器才能正常工作！
          </div>
          <div class="text-xs text-gray-500">
            直接連接OpenAI API會被Safari的CORS安全策略攔截
          </div>
          <a 
            href="https://deploy.workers.cloudflare.com/?url=https://github.com/cloudflare/worker-openai-proxy"
            target="_blank"
            class="block text-xs text-indigo-400 underline mt-2"
          >
            👉 一鍵部署免費Cloudflare代理（30秒完成）
          </a>
        </div>

        <button id="clearDataButton" class="w-full py-2 border border-red/30 text-red rounded-lg text-sm">
          清除所有數據
        </button>
      `;
    };

    // 渲染AI結果
    const renderAiResult = () => {
      if (!state.aiAnalysis) return;
      
      const trendCard = document.getElementById('trendCard');
      const trendTitle = document.getElementById('trendTitle');
      const trendAdvice = document.getElementById('trendAdvice');
      
      if (state.aiAnalysis.direction === 'long') {
        trendCard.className = "rounded-xl p-4 border bg-green/10 border-green/30";
        trendTitle.className = "text-lg font-bold text-center mb-2 text-green";
        trendTitle.textContent = "🟢 確認多頭趨勢 建議做多";
      } else if (state.aiAnalysis.direction === 'short') {
        trendCard.className = "rounded-xl p-4 border bg-red/10 border-red/30";
        trendTitle.className = "text-lg font-bold text-center mb-2 text-red";
        trendTitle.textContent = "🔴 確認空頭趨勢 建議做空";
      } else {
        trendCard.className = "rounded-xl p-4 border bg-yellow/10 border-yellow/30";
        trendTitle.className = "text-lg font-bold text-center mb-2 text-yellow";
        trendTitle.textContent = "🟡 震盪不明 建議觀望";
      }
      
      trendAdvice.textContent = state.aiAnalysis.advice;
      
      document.getElementById('entryPrice').textContent = fmt(state.aiAnalysis.entry);
      document.getElementById('stopLoss').textContent = fmt(state.aiAnalysis.stopLoss);
      document.getElementById('takeProfit1').textContent = fmt(state.aiAnalysis.takeProfit1);
      document.getElementById('takeProfit2').textContent = fmt(state.aiAnalysis.takeProfit2);
      document.getElementById('riskReward').textContent = state.aiAnalysis.riskReward;
      
      document.getElementById('tf15Result').textContent = state.aiAnalysis.tf15;
      document.getElementById('tf5Result').textContent = state.aiAnalysis.tf5;
      document.getElementById('tf1Result').textContent = state.aiAnalysis.tf1;
      document.getElementById('rsiStatus').textContent = state.aiAnalysis.rsi;
      
      document.getElementById('riskManagement').textContent = state.aiAnalysis.riskManagement;
      document.getElementById('detailedAdvice').textContent = state.aiAnalysis.detailedAdvice;
      
      const executeButton = document.getElementById('executeTradeButton');
      if (state.aiAnalysis.direction === 'long') {
        executeButton.className = "w-full py-3 rounded-lg font-bold text-lg bg-green text-white";
        executeButton.textContent = "一鍵做多";
      } else if (state.aiAnalysis.direction === 'short') {
        executeButton.className = "w-full py-3 rounded-lg font-bold text-lg bg-red text-white";
        executeButton.textContent = "一鍵做空";
      } else {
        executeButton.className = "w-full py-3 rounded-lg font-bold text-lg bg-gray-600 text-white opacity-50 cursor-not-allowed";
        executeButton.textContent = "觀望 絕對不要交易";
        executeButton.disabled = true;
      }
      
      document.getElementById('aiResult').classList.remove('hidden');
    };

    // 主渲染函數
    const render = () => {
      const content = document.getElementById('content');
      
      switch(state.tab) {
        case 'home':
          content.innerHTML = renderHome();
          bindHomeEvents();
          break;
        case 'log':
          content.innerHTML = renderLog();
          bindLogEvents();
          break;
        case 'stats':
          content.innerHTML = renderStats();
          break;
        case 'settings':
          content.innerHTML = renderSettings();
          bindSettingsEvents();
          break;
      }

      renderRiskWarning();
    };

    // 綁定首頁事件
    const bindHomeEvents = () => {
      document.getElementById('capitalInput')?.addEventListener('input', (e) => {
        state.capital = e.target.value;
        saveState();
        render();
      });

      document.getElementById('executeTradeButton')?.addEventListener('click', () => {
        const { locked } = getComputed();
        if (!state.aiAnalysis || locked) return;
        
        state.position = { 
          direction: state.aiAnalysis.direction,
          entry: state.aiAnalysis.entry, 
          stopLoss: state.aiAnalysis.stopLoss, 
          takeProfit1: state.aiAnalysis.takeProfit1, 
          takeProfit2: state.aiAnalysis.takeProfit2, 
          now: state.aiAnalysis.entry,
          time: new Date().toISOString()
        };
        saveState();
        render();
      });

      document.querySelectorAll('.close-position-button').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const type = e.target.dataset.close;
          if (!state.position) return;
          
          let exitPrice, profit;
          if (type === "tp1") {
            exitPrice = state.position.takeProfit1;
            profit = state.position.direction === 'long' 
              ? state.position.takeProfit1 - state.position.entry 
              : state.position.entry - state.position.takeProfit1;
          } else if (type === "tp2") {
            exitPrice = state.position.takeProfit2;
            profit = state.position.direction === 'long' 
              ? state.position.takeProfit2 - state.position.entry 
              : state.position.entry - state.position.takeProfit2;
          } else if (type === "stop") {
            exitPrice = state.position.stopLoss;
            profit = state.position.direction === 'long' 
              ? state.position.stopLoss - state.position.entry 
              : state.position.entry - state.position.stopLoss;
          } else {
            exitPrice = state.position.now;
            profit = state.position.direction === 'long' 
              ? state.position.now - state.position.entry 
              : state.position.entry - state.position.now;
          }
          
          const isWin = profit > 0;
          const result = isWin ? (type === "tp1" ? "+1.5R" : "+5R") : "-1R";
          
          const newTrade = {
            id: Date.now(),
            date: new Date().toLocaleDateString(),
            direction: state.position.direction,
            entry: state.position.entry,
            exit: exitPrice,
            result,
            profit: profit.toFixed(2)
          };
          
          state.trades = [newTrade, ...state.trades];
          
          // 更新統計
          const wins = state.trades.filter(t => t.result.startsWith("+")).length;
          const total = state.trades.length;
          state.winRate = total > 0 ? Math.round((wins / total) * 100) : 0;
          
          if (isWin) {
            state.loseStreak = 0;
          } else {
            state.loseStreak = state.loseStreak + 1;
            state.todayLoss = state.todayLoss + Math.abs(profit);
          }
          
          state.position = null;
          saveState();
          render();
        });
      });
    };

    // 綁定日誌頁事件
    const bindLogEvents = () => {
      document.getElementById('resetDailyButton')?.addEventListener('click', () => {
        state.todayLoss = 0;
        state.loseStreak = 0;
        saveState();
        render();
      });
    };

    // 綁定設定頁事件
    const bindSettingsEvents = () => {
      document.getElementById('apiKeyInput')?.addEventListener('input', (e) => {
        state.apiKey = e.target.value;
        saveState();
      });

      document.getElementById('proxyUrlInput')?.addEventListener('input', (e) => {
        state.proxyUrl = e.target.value;
        saveState();
      });

      document.getElementById('clearDataButton')?.addEventListener('click', () => {
        if (confirm("確定要清除所有數據嗎？")) {
          localStorage.clear();
          window.location.reload();
        }
      });
    };

    // ✅ 超強JSON修復與解析函數
    const safeParseJson = (rawContent) => {
      let attempts = [];
      
      // 嘗試1: 直接解析
      try {
        return JSON.parse(rawContent);
      } catch (e) {
        attempts.push("直接解析失敗: " + e.message);
      }
      
      // 嘗試2: 移除所有markdown標籤
      try {
        let cleaned = rawContent
          .replace(/^```(json)?\s*/gi, "")
          .replace(/\s*```$/g, "")
          .trim();
        return JSON.parse(cleaned);
      } catch (e) {
        attempts.push("移除markdown失敗: " + e.message);
      }
      
      // 嘗試3: 提取第一個{和最後一個}之間的內容
      try {
        const start = rawContent.indexOf('{');
        const end = rawContent.lastIndexOf('}');
        if (start !== -1 && end !== -1 && end > start) {
          let cleaned = rawContent.substring(start, end + 1);
          return JSON.parse(cleaned);
        }
      } catch (e) {
        attempts.push("提取大括號失敗: " + e.message);
      }
      
      // 嘗試4: 修復常見的JSON語法錯誤
      try {
        let cleaned = rawContent
          .replace(/^```(json)?\s*/gi, "")
          .replace(/\s*```$/g, "")
          .replace(/^[^{]*/, "")
          .replace(/[^}]*$/, "")
          .replace(/,\s*}/g, "}") // 移除尾隨逗號
          .replace(/,\s*]/g, "]") // 移除尾隨逗號
          .replace(/'/g, '"') // 替換單引號為雙引號
          .replace(/(\w+):/g, '"$1":') // 給未加引號的鍵加上引號
          .trim();
        return JSON.parse(cleaned);
      } catch (e) {
        attempts.push("修復語法失敗: " + e.message);
      }
      
      // 嘗試5: 正則表達式提取所有鍵值對
      try {
        const directionMatch = rawContent.match(/"direction"\s*:\s*"([^"]+)"/);
        const entryMatch = rawContent.match(/"entry"\s*:\s*(\d+\.?\d*)/);
        const stopLossMatch = rawContent.match(/"stopLoss"\s*:\s*(\d+\.?\d*)/);
        
        if (directionMatch && entryMatch && stopLossMatch) {
          const direction = directionMatch[1];
          const entry = parseFloat(entryMatch[1]);
          const stopLoss = parseFloat(stopLossMatch[1]);
          
          let takeProfit1, takeProfit2;
          if (direction === 'long') {
            const diff = entry - stopLoss;
            takeProfit1 = entry + diff * 3;
            takeProfit2 = entry + diff * 5;
          } else {
            const diff = stopLoss - entry;
            takeProfit1 = entry - diff * 3;
            takeProfit2 = entry - diff * 5;
          }
          
          return {
            direction,
            advice: `建議在${entry.toFixed(1)}附近${direction === 'long' ? '做多' : '做空'}`,
            entry,
            stopLoss,
            takeProfit1,
            takeProfit2,
            riskReward: "1:3 / 1:5",
            tf15: direction === 'long' ? "多頭確認" : "空頭確認",
            tf5: "訊號確認",
            tf1: "進場點出現",
            rsi: "正常",
            riskManagement: "使用2%帳戶資金風險，嚴格執行止損，絕不重倉",
            detailedAdvice: `1. 在${entry.toFixed(0)}-${(entry+5).toFixed(0)}區間分批進場\n2. 止損嚴格設在${stopLoss.toFixed(1)}\n3. 第一止盈${takeProfit1.toFixed(1)}，平倉一半\n4. 第二止盈${takeProfit2.toFixed(1)}，平倉全部\n5. 如果觸及止損，堅決離場，不要加倉`
          };
        }
      } catch (e) {
        attempts.push("提取關鍵值失敗: " + e.message);
      }
      
      // 所有嘗試都失敗
      throw new Error("JSON解析失敗，所有嘗試都失敗了\n" + attempts.join("\n"));
    };

    // ✅ 30年資深交易員AI分析函數
    const runAiAnalyze = async () => {
      showDebug("開始深度分析...");
      
      if (!state.aiBase64) {
        state.aiError = "❌ 請先上傳K線截圖";
        document.getElementById('aiError').textContent = state.aiError;
        document.getElementById('aiError').classList.remove('hidden');
        hideDebug();
        return;
      }
      
      if (!state.apiKey) {
        state.aiError = "❌ 請先在設定頁面輸入你的OpenAI API Key";
        document.getElementById('aiError').textContent = state.aiError;
        document.getElementById('aiError').classList.remove('hidden');
        hideDebug();
        return;
      }
      
      state.aiLoading = true;
      state.aiError = "";
      state.aiAnalysis = null;
      
      document.getElementById('analyzeButton').textContent = "⏳ 30年資深交易員分析中...";
      document.getElementById('analyzeButton').disabled = true;
      document.getElementById('aiError').classList.add('hidden');
      document.getElementById('aiResult').classList.add('hidden');

      showDebug("正在分析K線圖...");

      // ✅ 最嚴格的JSON格式要求Prompt
      const sniperPrompt = `
絕對只輸出標準JSON格式，絕對不要加任何其他文字、解釋、說明、註解或markdown標籤。
開頭直接輸入{，結尾直接輸入}，不要任何其他內容。

你是一位有30年華爾街交易經驗的資深交易員，交易過所有金融產品。
你把每一筆交易都當成自己的錢一樣重視，極度謹慎，寧可錯過也不做沒有把握的交易。
你的風控極其嚴格，永遠把保住本金放在第一位。
你從不預測市場，只跟隨趨勢，只做高勝率的交易。

請分析我上傳的任何金融產品K線圖（可以是NQ/ES/YM/黃金/原油/外匯/股票等）。

圖表指標說明：
- EMA5: 黃色線
- EMA20: 紫色/粉紅色線
- RSI(14): 下方紫色RSI指標
- 圖表頂部顯示當前價格

分析規則：
1. 首先判斷大周期整體趨勢，只有大周期明確才考慮交易
2. 然後判斷中周期是否確認大周期趨勢
3. 最後尋找短周期的精確進場點
4. 只有三個周期都指向同一方向時才給出交易建議
5. 任何一個周期不確認，就建議觀望
6. 止損距離設置為當前價格的0.15%，根據波動性微調
7. 止盈1 = 進場價 ± 3×止損距離（平倉一半，移動止損到進場價）
8. 止盈2 = 進場價 ± 5×止損距離（平倉全部）
9. 風險收益比固定為1:3 / 1:5
10. 必須給出嚴格的風險管理建議
11. 必須給出詳細的分步操作建議

輸出格式必須嚴格按照以下JSON結構：
{
  "direction": "long",
  "advice": "建議在29620附近做多",
  "entry": 29620,
  "stopLoss": 29575,
  "takeProfit1": 29755,
  "takeProfit2": 29845,
  "riskReward": "1:3 / 1:5",
  "tf15": "多頭確認",
  "tf5": "訊號確認",
  "tf1": "進場點出現",
  "rsi": "正常",
  "riskManagement": "使用2%帳戶資金風險，嚴格執行止損，絕不重倉",
  "detailedAdvice": "1. 在29615-29625區間分批進場\n2. 止損嚴格設在29575\n3. 第一止盈29755，平倉一半\n4. 第二止盈29845，平倉全部\n5. 如果觸及止損，堅決離場，不要加倉"
}

重要提醒：
- 如果你對趨勢有任何一點懷疑，就返回"direction": "neutral"，建議觀望
- 永遠不要給出模稜兩可的建議
- 永遠強調嚴格執行止損
- 永遠提醒不要重倉交易
- 永遠把風險放在第一位

現在只輸出JSON，不要任何其他內容。
`;
      
      try {
        showDebug("發送分析請求...");
        
        const res = await fetch(state.proxyUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${state.apiKey}`,
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [
              {
                role: "user",
                content: [
                  { type: "text", text: sniperPrompt },
                  { 
                    type: "image_url", 
                    image_url: { 
                      url: state.aiBase64,
                      detail: "high"
                    } 
                  },
                ],
              },
            ],
            temperature: 0.01, // 極低溫度，保證一致性
            max_tokens: 1000,
            response_format: { type: "json_object" } // 強制JSON格式
          }),
        });
        
        showDebug(`收到分析結果，狀態碼: ${res.status}`);
        
        if (!res.ok) {
          if (res.status === 401) throw new Error("401 未授權：API Key 無效，請檢查是否正確");
          if (res.status === 403) throw new Error("403 禁止訪問：API Key 沒有權限，請檢查額度和地區");
          if (res.status === 429) throw new Error("429 請求過多：請求過於頻繁，請稍後再試");
          if (res.status === 0) throw new Error("0 網絡錯誤：CORS 跨域錯誤，請使用代理伺服器");
          throw new Error(`API錯誤: ${res.status} ${res.statusText}`);
        }
        
        const data = await res.json();
        showDebug("分析結果解析成功");
        
        let rawContent = data.choices[0].message.content.trim();
        showDebug(`原始回應: ${rawContent.substring(0, 200)}...`);
        
        // 使用超強JSON修復函數
        let parseRes = safeParseJson(rawContent);
        showDebug("JSON解析成功");
        
        // 驗證並修復所有必填字段
        if (!parseRes.direction) parseRes.direction = "neutral";
        if (!parseRes.advice) parseRes.advice = "建議觀望";
        if (!parseRes.entry) parseRes.entry = 0;
        if (!parseRes.stopLoss) parseRes.stopLoss = 0;
        
        // 自動計算止盈點位（如果AI沒有返回）
        if (!parseRes.takeProfit1 || !parseRes.takeProfit2) {
          if (parseRes.direction === 'long') {
            const diff = parseRes.entry - parseRes.stopLoss;
            parseRes.takeProfit1 = parseRes.entry + diff * 3;
            parseRes.takeProfit2 = parseRes.entry + diff * 5;
          } else if (parseRes.direction === 'short') {
            const diff = parseRes.stopLoss - parseRes.entry;
            parseRes.takeProfit1 = parseRes.entry - diff * 3;
            parseRes.takeProfit2 = parseRes.entry - diff * 5;
          } else {
            parseRes.takeProfit1 = parseRes.entry;
            parseRes.takeProfit2 = parseRes.entry;
          }
        }
        
        // 強制設置風險收益比
        parseRes.riskReward = "1:3 / 1:5";
        
        // 設置默認值
        if (!parseRes.tf15) parseRes.tf15 = "震盪";
        if (!parseRes.tf5) parseRes.tf5 = "無訊號";
        if (!parseRes.tf1) parseRes.tf1 = "等待進場";
        if (!parseRes.rsi) parseRes.rsi = "正常";
        if (!parseRes.riskManagement) parseRes.riskManagement = "使用2%帳戶資金風險，嚴格執行止損，絕不重倉";
        if (!parseRes.detailedAdvice) parseRes.detailedAdvice = "1. 觀望等待更明確的訊號\n2. 不要貿然進場\n3. 耐心等待高勝率機會";
        
        state.aiAnalysis = parseRes;
        saveState();
        
        // 渲染AI結果
        renderAiResult();
        
        showDebug("✅ 分析完成，結果已更新");
        setTimeout(hideDebug, 2000);
        
      } catch (err) {
        console.error("AI解析錯誤:", err);
        state.aiError = `❌ 錯誤: ${err.message}\n\n⚠️ 請確保你已經正確部署並設置了Cloudflare代理伺服器！\n如果問題持續，請嘗試重新上傳截圖或檢查你的API Key`;
        document.getElementById('aiError').textContent = state.aiError;
        document.getElementById('aiError').classList.remove('hidden');
        showDebug(`錯誤詳情: ${err.stack}`);
      } finally {
        state.aiLoading = false;
        document.getElementById('analyzeButton').textContent = "開始深度分析";
        document.getElementById('analyzeButton').disabled = false;
        render(); // 更新首頁顯示
      }
    };

    // 初始化事件
    const initEvents = () => {
      console.log("系統初始化中...");
      
      // 底部導航
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const tab = e.currentTarget.dataset.tab;
          state.tab = tab;
          
          document.querySelectorAll('.tab-button').forEach(b => {
            b.classList.remove('text-indigo');
            b.classList.add('text-gray-400');
          });
          e.currentTarget.classList.remove('text-gray-400');
          e.currentTarget.classList.add('text-indigo');
          
          render();
        });
      });

      // AI按鈕
      document.getElementById('aiButton').addEventListener('click', () => {
        console.log("打開AI分析模態框");
        document.getElementById('aiModal').classList.remove('hidden');
      });

      document.getElementById('closeAiModal').addEventListener('click', () => {
        console.log("關閉AI分析模態框");
        document.getElementById('aiModal').classList.add('hidden');
      });

      // 上傳按鈕
      document.getElementById('uploadButton').addEventListener('click', () => {
        console.log("點擊上傳按鈕");
        document.getElementById('fileInput').click();
      });

      // 文件選擇
      document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        console.log("選擇文件:", file.name, file.size, file.type);
        
        state.aiError = "";
        state.aiAnalysis = null;
        document.getElementById('aiError').classList.add('hidden');
        document.getElementById('aiResult').classList.add('hidden');
        hideDebug();
        
        const previewImg = document.getElementById('previewImg');
        previewImg.src = URL.createObjectURL(file);
        document.getElementById('imagePreview').classList.remove('hidden');
        document.getElementById('analyzeButton').disabled = false;
        
        const reader = new FileReader();
        reader.onload = (ev) => {
          state.aiBase64 = ev.target.result;
          console.log("圖片轉換為Base64完成");
        };
        reader.readAsDataURL(file);
      });

      // 分析按鈕
      document.getElementById('analyzeButton').addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        runAiAnalyze();
      });

      // 一鍵執行交易按鈕
      document.getElementById('executeTradeButton')?.addEventListener('click', () => {
        if (!state.aiAnalysis || state.aiAnalysis.direction === 'neutral') return;
        
        state.position = { 
          direction: state.aiAnalysis.direction,
          entry: state.aiAnalysis.entry, 
          stopLoss: state.aiAnalysis.stopLoss, 
          takeProfit1: state.aiAnalysis.takeProfit1, 
          takeProfit2: state.aiAnalysis.takeProfit2, 
          now: state.aiAnalysis.entry,
          time: new Date().toISOString()
        };
        saveState();
        document.getElementById('aiModal').classList.add('hidden');
        render();
      });

      // 重置AI按鈕
      document.getElementById('resetAiButton').addEventListener('click', () => {
        console.log("重置AI面板");
        state.aiImage = null;
        state.aiBase64 = "";
        state.aiAnalysis = null;
        state.aiError = "";
        
        document.getElementById('imagePreview').classList.add('hidden');
        document.getElementById('aiError').classList.add('hidden');
        document.getElementById('aiResult').classList.add('hidden');
        document.getElementById('aiDebug').classList.add('hidden');
        document.getElementById('analyzeButton').disabled = false;
        document.getElementById('fileInput').value = "";
      });

      console.log("系統初始化完成");
    };

    // 頁面加載完成後初始化
    document.addEventListener('DOMContentLoaded', () => {
      initEvents();
      render();
    });
  </script>
