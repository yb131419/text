<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全品種AI智能偵測系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#07080f',
            darker: '#0d1018',
            card: '#111520',
            border: '#1a1e2e',
            green: '#1db954', // 下跌/做空
            red: '#e03e3e',   // 上漲/做多
            blue: '#38bdf8',
            yellow: '#f59e0b',
            indigo: '#6366f1',
            purple: '#a855f7',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
    }
  </style>
</head>
<body class="bg-dark text-gray-100 font-sans min-h-screen pb-24 relative">
  <!-- 頂部標題 -->
  <div class="bg-darker border-b border-border p-4 text-center">
    <div class="text-xs text-gray-500 tracking-widest mb-1">全品種AI智能偵測系統</div>
    <div class="text-xl font-bold">⚡ 產品自適應精準進出點位</div>
  </div>

  <!-- 主內容區 -->
  <div id="content" class="max-w-sm mx-auto p-4 space-y-4"></div>

  <!-- 浮動AI看盤按鈕 -->
  <button id="aiButton" class="fixed right-4 bottom-24 w-14 h-14 rounded-full bg-indigo shadow-lg flex items-center justify-center text-2xl z-40">
    🤖
  </button>

  <!-- AI看盤彈窗模態框 -->
  <div id="aiModal" class="fixed inset-0 bg-black/80 z-50 flex items-end sm:items-center justify-center hidden">
    <div class="bg-card w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-5 max-h-[85vh] overflow-y-auto scrollbar-hide">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-white">📊 AI 智能偵測</h3>
        <button id="closeAiModal" class="text-gray-300 text-xl">✕</button>
      </div>
      <input id="fileInput" type="file" accept="image/*" hidden />
      <button id="uploadButton" class="w-full border border-dashed border-indigo/50 rounded-xl py-6 text-indigo-300 mb-3">
        上傳任何產品K線截圖
        <div class="text-xs mt-1 text-gray-400">✅ 期貨 ✅ 外匯 ✅ 加密貨幣 ✅ 台股 ✅ 美股</div>
      </button>
      <div id="imagePreview" class="mb-3 hidden">
        <img id="previewImg" src="" alt="chart preview" class="w-full rounded-lg object-contain max-h-52" />
      </div>
      <div id="aiError" class="text-red text-sm mb-3 p-3 bg-red/15 rounded border border-red/30 whitespace-pre-line hidden"></div>
      <div id="aiDebug" class="text-blue text-sm mb-3 p-3 bg-blue/15 rounded border border-blue/30 whitespace-pre-line hidden"></div>
      <button id="analyzeButton" class="w-full py-3 rounded-lg bg-indigo font-bold mb-3">
        生成產品自適應交易點位
      </button>
      
      <!-- 雙向實盤點位區域 -->
      <div id="aiResult" class="space-y-4 hidden">
        <!-- 產品與趨勢判斷 -->
        <div id="trendCard" class="rounded-xl p-4 border">
          <div class="text-lg font-bold text-center mb-2" id="productTitle"></div>
          <div class="text-center text-sm text-gray-300" id="trendAdvice"></div>
          <div class="text-center text-xs text-gray-400 mt-1" id="productTypeLabel"></div>
        </div>
        
        <!-- 策略卡片容器 (動態排序) -->
        <div id="strategyContainer"></div>
        
        <!-- 技術分析卡片 -->
        <div class="bg-darker rounded-xl p-4 border border-gray-600">
          <div class="text-sm font-bold text-white mb-3">📈 技術分析</div>
          <div class="space-y-2">
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">產品類型</span>
              <span id="productType" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">EMA狀態</span>
              <span id="emaStatus" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">RSI動能</span>
              <span id="rsiStatus" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">當前價格</span>
              <span id="currentPrice" class="text-lg"></span>
            </div>
          </div>
        </div>
      </div>
      
      <button id="resetAiButton" class="w-full mt-3 py-2 border border-gray-600 rounded-lg text-gray-300 text-sm">
        重新上傳截圖
      </button>
    </div>
  </div>

  <!-- 底部導航 -->
  <div class="fixed bottom-0 left-0 right-0 bg-darker border-t border-border pb-3 pt-2 z-30">
    <div class="max-w-sm mx-auto grid grid-cols-4 text-xs text-center">
      <button data-tab="home" class="tab-button pt-1 pb-1 rounded-lg text-indigo">
        <div class="text-lg mb-1">🏠</div>最新
      </button>
      <button data-tab="log" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📓</div>歷史
      </button>
      <button data-tab="stats" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📈</div>統計
      </button>
      <button data-tab="settings" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">⚙️</div>設定
      </button>
    </div>
  </div>

  <script>
    // 工具函式
    const num = (v) => parseFloat(v) || 0;
    const fmt = (n, d = 2) =>
      !n || isNaN(n) || !isFinite(n) ? "—" : Number(n).toFixed(d);

    // 優先級權重
    const priorityWeight = { "高": 3, "中": 2, "低": 1 };

    // 產品類型定義
    const PRODUCT_TYPES = {
      FUTURES: "期貨/指數",
      STOCK: "股票",
      CRYPTO: "加密貨幣",
      FOREX: "外匯",
      UNKNOWN: "未知"
    };

    // 本地存儲持久化
    const saveData = (key, data) => {
      try {
        localStorage.setItem(`sniper_${key}`, JSON.stringify(data));
      } catch (e) {
        console.error("保存失敗:", e);
      }
    };

    const loadData = (key, defaultValue) => {
      try {
        const data = localStorage.getItem(`sniper_${key}`);
        return data ? JSON.parse(data) : defaultValue;
      } catch (e) {
        console.error("讀取失敗:", e);
        return defaultValue;
      }
    };

    // 全局狀態
    let state = {
      tab: "home",
      apiKey: loadData("apiKey", ""),
      proxyUrl: loadData("proxyUrl", "https://api.openai.com/v1/chat/completions"),
      aiAnalysis: loadData("aiAnalysis", null),
      aiHistory: loadData("aiHistory", []),
      aiImage: null,
      aiBase64: "",
      aiLoading: false,
      aiError: ""
    };

    // 保存狀態
    const saveState = () => {
      saveData("apiKey", state.apiKey);
      saveData("proxyUrl", state.proxyUrl);
      saveData("aiAnalysis", state.aiAnalysis);
      saveData("aiHistory", state.aiHistory);
    };

    // 顯示調試信息
    const showDebug = (message) => {
      const debugEl = document.getElementById('aiDebug');
      debugEl.textContent = message;
      debugEl.classList.remove('hidden');
      console.log("DEBUG:", message);
    };

    // 隱藏調試信息
    const hideDebug = () => {
      document.getElementById('aiDebug').classList.add('hidden');
    };

    // 獲取出場策略文本
    const getExitStrategy = (isStock) => {
      return isStock 
        ? '短期到達減倉30%，中期到達減倉40%，長期到達清倉剩餘30%；觸及止損立即全平' 
        : '止盈1平50%，移動止損到進場價；止盈2全平；觸及止損立即離場';
    };

    // 渲染首頁 (最新AI偵測結果 - 完整顯示進場理由+出場策略)
    const renderHome = () => {
      return `
        ${state.aiAnalysis ? `
          <div class="bg-card border border-border rounded-2xl p-4">
            <div class="flex justify-between items-center mb-3">
              <div class="text-xs font-bold text-gray-400">🤖 最新AI偵測結果</div>
              <button id="resetCurrentButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded">重置</button>
            </div>
            <div class="text-center mb-4">
              <div class="text-lg font-bold text-indigo">${state.aiAnalysis.product}</div>
              <div class="text-xs text-gray-400">${state.aiAnalysis.productType || PRODUCT_TYPES.UNKNOWN}</div>
              <div class="text-xl font-bold ${state.aiAnalysis.trend === 'long' ? 'text-red' : state.aiAnalysis.trend === 'short' ? 'text-green' : 'text-yellow'}">
                ${state.aiAnalysis.trend === 'long' ? '🔴 偏多趨勢' : state.aiAnalysis.trend === 'short' ? '🟢 偏空趨勢' : '🟡 震盪趨勢'}
              </div>
              <div class="text-sm text-gray-300">${state.aiAnalysis.advice}</div>
              <div class="text-xs text-gray-500 mt-1">偵測時間: ${state.aiAnalysis.time}</div>
            </div>
            
            ${(() => {
              const longWeight = priorityWeight[state.aiAnalysis.longPriority] || 1;
              const shortWeight = priorityWeight[state.aiAnalysis.shortPriority] || 1;
              const decimals = state.aiAnalysis.decimals || 2;
              const isStock = state.aiAnalysis.productType === PRODUCT_TYPES.STOCK;
              const exitStrategy = getExitStrategy(isStock);
              
              let longCard = `
                <div class="bg-darker rounded-xl p-3 border border-red/30 mb-3">
                  <div class="text-sm font-bold text-red mb-2">🔴 做多 (優先級: ${state.aiAnalysis.longPriority})</div>
                  <div class="grid ${isStock ? 'grid-cols-4' : 'grid-cols-3'} gap-2 text-xs mb-2">
                    <div class="bg-black/30 p-2 rounded text-center">
                      <div class="text-gray-400">進場</div>
                      <div class="font-bold text-red">${fmt(state.aiAnalysis.longEntry, decimals)}</div>
                    </div>
                    ${isStock ? `
                      <div class="bg-black/30 p-2 rounded text-center">
                        <div class="text-gray-400">短期</div>
                        <div class="font-bold text-yellow">${fmt(state.aiAnalysis.longTpShort, decimals)}</div>
                      </div>
                      <div class="bg-black/30 p-2 rounded text-center">
                        <div class="text-gray-400">中期</div>
                        <div class="font-bold text-blue">${fmt(state.aiAnalysis.longTpMedium, decimals)}</div>
                      </div>
                      <div class="bg-black/30 p-2 rounded text-center">
                        <div class="text-gray-400">長期</div>
                        <div class="font-bold text-purple">${fmt(state.aiAnalysis.longTpLong, decimals)}</div>
                      </div>
                    ` : `
                      <div class="bg-black/30 p-2 rounded text-center">
                        <div class="text-gray-400">止盈1</div>
                        <div class="font-bold text-yellow">${fmt(state.aiAnalysis.longTp1, decimals)}</div>
                      </div>
                      <div class="bg-black/30 p-2 rounded text-center">
                        <div class="text-gray-400">止盈2</div>
                        <div class="font-bold text-green">${fmt(state.aiAnalysis.longTp2, decimals)}</div>
                      </div>
                    `}
                  </div>
                  <div class="text-xs text-gray-400 mb-1">⛔ 止損: ${fmt(state.aiAnalysis.longStopLoss, decimals)}</div>
                  <div class="text-xs text-white bg-black/40 p-2 rounded border border-red/20 mb-1">
                    📌 進場理由：${state.aiAnalysis.longReason || '基於技術指標綜合判斷'}
                  </div>
                  <div class="text-xs text-yellow-400 bg-yellow/10 p-2 rounded border border-yellow/20">
                    📌 出場策略：${exitStrategy}
                  </div>
                </div>
              `;
              
              let shortCard = `
                <div class="bg-darker rounded-xl p-3 border border-green/30">
                  <div class="text-sm font-bold text-green mb-2">🟢 做空 (優先級: ${state.aiAnalysis.shortPriority})</div>
                  <div class="grid ${isStock ? 'grid-cols-4' : 'grid-cols-3'} gap-2 text-xs mb-2">
                    <div class="bg-black/30 p-2 rounded text-center">
                      <div class="text-gray-400">進場</div>
                      <div class="font-bold text-green">${fmt(state.aiAnalysis.shortEntry, decimals)}</div>
                    </div>
                    ${isStock ? `
                      <div class="bg-black/30 p-2 rounded text-center">
                        <div class="text-gray-400">短期</div>
                        <div class="font-bold text-yellow">${fmt(state.aiAnalysis.shortTpShort, decimals)}</div>
                      </div>
                      <div class="bg-black/30 p-2 rounded text-center">
                        <div class="text-gray-400">中期</div>
                        <div class="font-bold text-blue">${fmt(state.aiAnalysis.shortTpMedium, decimals)}</div>
                      </div>
                      <div class="bg-black/30 p-2 rounded text-center">
                        <div class="text-gray-400">長期</div>
                        <div class="font-bold text-purple">${fmt(state.aiAnalysis.shortTpLong, decimals)}</div>
                      </div>
                    ` : `
                      <div class="bg-black/30 p-2 rounded text-center">
                        <div class="text-gray-400">止盈1</div>
                        <div class="font-bold text-yellow">${fmt(state.aiAnalysis.shortTp1, decimals)}</div>
                      </div>
                      <div class="bg-black/30 p-2 rounded text-center">
                        <div class="text-gray-400">止盈2</div>
                        <div class="font-bold text-green">${fmt(state.aiAnalysis.shortTp2, decimals)}</div>
                      </div>
                    `}
                  </div>
                  <div class="text-xs text-gray-400 mb-1">⛔ 止損: ${fmt(state.aiAnalysis.shortStopLoss, decimals)}</div>
                  <div class="text-xs text-white bg-black/40 p-2 rounded border border-green/20 mb-1">
                    📌 進場理由：${state.aiAnalysis.shortReason || '基於技術指標綜合判斷'}
                  </div>
                  <div class="text-xs text-yellow-400 bg-yellow/10 p-2 rounded border border-yellow/20">
                    📌 出場策略：${exitStrategy}
                  </div>
                </div>
              `;
              
              // 優先級高的在上
              return longWeight >= shortWeight ? longCard + shortCard : shortCard + longCard;
            })()}
          </div>
        ` : `
          <div class="bg-card border border-border rounded-2xl p-4 text-center">
            <div class="text-gray-400 mb-2">還沒有偵測結果</div>
            <div class="text-sm text-gray-500">點擊右下角🤖按鈕上傳任何產品截圖</div>
          </div>
        `}
      `;
    };

    // 渲染歷史頁 (AI偵測記錄 - 完整顯示進場理由+出場策略)
    const renderLog = () => {
      return `
        <div class="flex justify-between items-center mb-2">
          <div class="text-lg font-bold">📓 AI偵測歷史</div>
          <button id="resetAllHistoryButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded">重置全部</button>
        </div>
        ${state.aiHistory.length === 0 
          ? '<div class="text-center text-gray-500 py-10">還沒有偵測記錄</div>' 
          : state.aiHistory.map((record, index) => `
            <div class="bg-card border border-border rounded-xl p-3 text-sm mb-3">
              <div class="flex justify-between mb-2">
                <span class="text-indigo font-bold">${record.product}</span>
                <span class="text-gray-400 text-xs">${record.time}</span>
              </div>
              <div class="flex justify-between mb-2">
                <span class="font-bold ${record.trend === 'long' ? 'text-red' : record.trend === 'short' ? 'text-green' : 'text-yellow'}">
                  ${record.trend === 'long' ? '🔴 偏多' : record.trend === 'short' ? '🟢 偏空' : '🟡 震盪'}
                </span>
                <span class="text-xs text-gray-400">${record.productType || PRODUCT_TYPES.UNKNOWN}</span>
              </div>
              
              ${(() => {
                const longWeight = priorityWeight[record.longPriority] || 1;
                const shortWeight = priorityWeight[record.shortPriority] || 1;
                const decimals = record.decimals || 2;
                const isStock = record.productType === PRODUCT_TYPES.STOCK;
                const exitStrategy = getExitStrategy(isStock);
                
                let longCard = `
                  <div class="bg-red/5 rounded-lg p-2 mb-2 border border-red/20">
                    <div class="text-xs font-bold text-red mb-1">
                      做多 (${record.longPriority}) | 進場: ${fmt(record.longEntry, decimals)}
                    </div>
                    <div class="text-xs text-gray-400 mb-1">
                      ${isStock ? 
                        `短: ${fmt(record.longTpShort, decimals)} | 中: ${fmt(record.longTpMedium, decimals)} | 長: ${fmt(record.longTpLong, decimals)}` : 
                        `止盈: ${fmt(record.longTp1, decimals)} / ${fmt(record.longTp2, decimals)}`}
                      | 止損: ${fmt(record.longStopLoss, decimals)}
                    </div>
                    <div class="text-xs text-white bg-black/40 p-1 rounded mb-1">
                      📌 理由：${record.longReason || '基於技術指標綜合判斷'}
                    </div>
                    <div class="text-xs text-yellow-400">
                      📌 出場：${exitStrategy}
                    </div>
                  </div>
                `;
                
                let shortCard = `
                  <div class="bg-green/5 rounded-lg p-2 border border-green/20">
                    <div class="text-xs font-bold text-green mb-1">
                      做空 (${record.shortPriority}) | 進場: ${fmt(record.shortEntry, decimals)}
                    </div>
                    <div class="text-xs text-gray-400 mb-1">
                      ${isStock ? 
                        `短: ${fmt(record.shortTpShort, decimals)} | 中: ${fmt(record.shortTpMedium, decimals)} | 長: ${fmt(record.shortTpLong, decimals)}` : 
                        `止盈: ${fmt(record.shortTp1, decimals)} / ${fmt(record.shortTp2, decimals)}`}
                      | 止損: ${fmt(record.shortStopLoss, decimals)}
                    </div>
                    <div class="text-xs text-white bg-black/40 p-1 rounded mb-1">
                      📌 理由：${record.shortReason || '基於技術指標綜合判斷'}
                    </div>
                    <div class="text-xs text-yellow-400">
                      📌 出場：${exitStrategy}
                    </div>
                  </div>
                `;
                
                // 優先級高的在上
                return longWeight >= shortWeight ? longCard + shortCard : shortCard + longCard;
              })()}
            </div>
          `).join('')}
      `;
    };

    // 渲染統計頁 (AI偵測統計)
    const renderStats = () => {
      const total = state.aiHistory.length;
      const productCounts = {};
      const typeCounts = {};
      
      state.aiHistory.forEach(r => {
        productCounts[r.product] = (productCounts[r.product] || 0) + 1;
        typeCounts[r.productType || PRODUCT_TYPES.UNKNOWN] = (typeCounts[r.productType || PRODUCT_TYPES.UNKNOWN] || 0) + 1;
      });
      
      return `
        <div class="flex justify-between items-center mb-2">
          <div class="text-lg font-bold">📈 AI偵測統計</div>
          <button id="resetStatsButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded">重置統計</button>
        </div>
        <div class="bg-card border border-border rounded-xl p-4 space-y-2 text-sm mb-4">
          <div class="flex justify-between font-bold"><span>總偵測次數</span><span>${total}</span></div>
        </div>
        
        <div class="bg-card border border-border rounded-xl p-4 space-y-2 text-sm mb-4">
          <div class="font-bold mb-2">📊 產品類型分佈</div>
          ${Object.entries(typeCounts).map(([type, count]) => `
            <div class="flex justify-between"><span>${type}</span><span>${count} 次</span></div>
          `).join('')}
        </div>
        
        <div class="bg-card border border-border rounded-xl p-4 space-y-2 text-sm">
          <div class="font-bold mb-2">🏷️ 產品名稱分佈</div>
          ${Object.entries(productCounts).map(([product, count]) => `
            <div class="flex justify-between"><span>${product}</span><span>${count} 次</span></div>
          `).join('')}
        </div>
      `;
    };

    // 渲染設定頁
    const renderSettings = () => {
      return `
        <div class="text-lg font-bold mb-2">⚙️ 系統設定</div>
        
        <div class="bg-card border border-border rounded-xl p-4 space-y-3 mb-4">
          <div class="font-bold text-sm">OpenAI API 設定</div>
          <input 
            id="apiKeyInput"
            value="${state.apiKey}"
            placeholder="sk-xxxxxxxxxxxxxxxx"
            class="w-full bg-black/40 border border-gray-700 rounded-lg p-2 text-sm"
            type="password"
          />
          <div class="text-xs text-gray-500">
            API Key 只存在你的瀏覽器本地，不會上傳到任何伺服器
          </div>
          ${state.apiKey ? '<div class="text-xs text-red">✅ API Key 已設置</div>' : '<div class="text-xs text-yellow">⚠️ 請先輸入API Key才能使用AI功能</div>'}
        </div>

        <div class="bg-card border border-border rounded-xl p-4 space-y-3 mb-4">
          <div class="font-bold text-sm">代理伺服器設定（必須！）</div>
          <input 
            id="proxyUrlInput"
            value="${state.proxyUrl}"
            placeholder="https://your-worker.your-name.workers.dev"
            class="w-full bg-black/40 border border-gray-700 rounded-lg p-2 text-sm"
          />
          <div class="text-xs text-red-500 font-bold">
            ⚠️ 在GitHub Pages上必須使用代理伺服器才能正常工作！
          </div>
          <div class="text-xs text-gray-500">
            直接連接OpenAI API會被Safari的CORS安全策略攔截
          </div>
          <a 
            href="https://deploy.workers.cloudflare.com/?url=https://github.com/cloudflare/worker-openai-proxy"
            target="_blank"
            class="block text-xs text-indigo-400 underline mt-2"
          >

      try {
        return JSON.parse(rawContent);

        attempts.push("直接解析失敗: " + e.message);

      // 嘗試2: 移除所有markdown標籤
      try {
        let cleaned = rawContent
          .replace(/^```(json)?\s*/gi, "")
          .replace(/\s*```$/g, "")
          .trim();
        return JSON.parse(cleaned);
      } catch (e) {
        attempts.push("移除markdown失敗: " + e.message);
      }
      
      // 嘗試3: 提取第一個{和最後一個}之間的內容
      try {
        const start = rawContent.indexOf('{');
        const end = rawContent.lastIndexOf('}');
        if (start !== -1 && end !== -1 && end > start) {
          let cleaned = rawContent.substring(start, end + 1);
          return JSON.parse(cleaned);
        }
      } catch (e) {
        attempts.push("提取大括號失敗: " + e.message);
      }
      
      // 嘗試4: 修復常見的JSON語法錯誤
      try {
        let cleaned = rawContent
          .replace(/^```(json)?\s*/gi, "")
          .replace(/\s*```$/g, "")
          .replace(/^[^{]*/, "")
          .replace(/[^}]*$/, "")
          .replace(/,\s*}/g, "}")
          .replace(/,\s*]/g, "]")
          .replace(/'/g, '"')
          .replace(/(\w+):/g, '"$1":')
          .trim();
        return JSON.parse(cleaned);
      } catch (e) {
        attempts.push("修復語法失敗: " + e.message);
      }
      
      // 所有嘗試都失敗

          // 股票類補全短中長期止盈
          if (!parseRes.longTpShort && parseRes.longTp1) parseRes.longTpShort = parseRes.longTp1;
          if (!parseRes.longTpMedium && parseRes.longTp2) parseRes.longTpMedium = parseRes.longTp2;
          if (!parseRes.longTpLong && parseRes.longTp2) parseRes.longTpLong = Number((parseRes.longTp2 * 1.6).toFixed(parseRes.decimals));
          
          if (!parseRes.shortTpShort && parseRes.shortTp1) parseRes.shortTpShort = parseRes.shortTp1;
          if (!parseRes.shortTpMedium && parseRes.shortTp2) parseRes.shortTpMedium = parseRes.shortTp2;
          if (!parseRes.shortTpLong && parseRes.shortTp2) parseRes.shortTpLong = Number((parseRes.shortTp2 * 0.625).toFixed(parseRes.decimals));
        } else {
          // 期貨類補全標準止盈
          if (!parseRes.longTp1 && parseRes.longTpShort) parseRes.longTp1 = parseRes.longTpShort;
          if (!parseRes.longTp2 && parseRes.longTpMedium) parseRes.longTp2 = parseRes.longTpMedium;
          
          if (!parseRes.shortTp1 && parseRes.shortTpShort) parseRes.shortTp1 = parseRes.shortTpShort;
          if (!parseRes.shortTp2 && parseRes.shortTpMedium) parseRes.shortTp2 = parseRes.shortTpMedium;
        }
        
        // 添加偵測時間
        parseRes.time = new Date().toLocaleString();
        
        // 保存當前分析結果
        state.aiAnalysis = parseRes;
        
        // 添加到歷史記錄
        state.aiHistory.unshift(parseRes);
        
        // 限制歷史記錄最多保存50條
        if (state.aiHistory.length > 50) {
          state.aiHistory = state.aiHistory.slice(0, 50);
        }
        
        saveState();
        
        // 渲染AI結果
        renderAiResult();
        
        showDebug(`✅ ${parseRes.product} (${parseRes.productType}) 自適應交易點位生成完成`);
        setTimeout(hideDebug, 2000);
        
      } catch (err) {
        console.error("AI解析錯誤:", err);
        state.aiError = `❌ 錯誤: ${err.message}\n\n⚠️ 請確保你已經正確部署並設置了Cloudflare代理伺服器！\n如果問題持續，請嘗試重新上傳截圖或檢查你的API Key`;
        document.getElementById('aiError').textContent = state.aiError;
        document.getElementById('aiError').classList.remove('hidden');
        showDebug(`錯誤詳情: ${err.stack}`);
      } finally {
        state.aiLoading = false;
        document.getElementById('analyzeButton').textContent = "生成產品自適應交易點位";
        document.getElementById('analyzeButton').disabled = false;
        render(); // 更新首頁顯示
      }
    };

    // 初始化事件
    const initEvents = () => {
      console.log("系統初始化中...");
      
      // 底部導航
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const tab = e.currentTarget.dataset.tab;
          state.tab = tab;
          
          document.querySelectorAll('.tab-button').forEach(b => {
            b.classList.remove('text-indigo');
            b.classList.add('text-gray-400');
          });
          e.currentTarget.classList.remove('text-gray-400');
          e.currentTarget.classList.add('text-indigo');
          
          render();
        });
      });

      // AI按鈕
      document.getElementById('aiButton').addEventListener('click', () => {
        console.log("打開AI分析模態框");
        document.getElementById('aiModal').classList.remove('hidden');
      });

      document.getElementById('closeAiModal').addEventListener('click', () => {
        console.log("關閉AI分析模態框");
        document.getElementById('aiModal').classList.add('hidden');
      });

      // 上傳按鈕
      document.getElementById('uploadButton').addEventListener('click', () => {
        console.log("點擊上傳按鈕");
        document.getElementById('fileInput').click();
      });

      // 文件選擇
      document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        console.log("選擇文件:", file.name, file.size, file.type);
        
        state.aiError = "";
        state.aiAnalysis = null;
        document.getElementById('aiError').classList.add('hidden');
        document.getElementById('aiResult').classList.add('hidden');
        hideDebug();
        
        const previewImg = document.getElementById('previewImg');
        previewImg.src = URL.createObjectURL(file);
        document.getElementById('imagePreview').classList.remove('hidden');
        document.getElementById('analyzeButton').disabled = false;
        
        const reader = new FileReader();
        reader.onload = (ev) => {
          state.aiBase64 = ev.target.result;
          console.log("圖片轉換為Base64完成");
        };
        reader.readAsDataURL(file);
      });

      // 分析按鈕
      document.getElementById('analyzeButton').addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        runAiAnalyze();
      });

      // 重置AI按鈕
      document.getElementById('resetAiButton').addEventListener('click', () => {
        console.log("重置AI面板");
        state.aiImage = null;
        state.aiBase64 = "";
        state.aiAnalysis = null;
        state.aiError = "";
        
        document.getElementById('imagePreview').classList.add('hidden');
        document.getElementById('aiError').classList.add('hidden');
        document.getElementById('aiResult').classList.add('hidden');
        document.getElementById('aiDebug').classList.add('hidden');
        document.getElementById('analyzeButton').disabled = false;
        document.getElementById('fileInput').value = "";
      });

      console.log("系統初始化完成");
    };

    // 頁面加載完成後初始化
    document.addEventListener('DOMContentLoaded', () => {
      initEvents();
      render();
    });
  </script>
</body>
</html>
