<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全品種AI智能偵測系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#07080f',
            darker: '#0d1018',
            card: '#111520',
            border: '#1a1e2e',
            green: '#1db954',
            red: '#e03e3e',
            blue: '#38bdf8',
            yellow: '#f59e0b',
            indigo: '#6366f1',
            purple: '#a855f7',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .draggable {
        cursor: move !important;
        user-select: none !important;
      }
      .float-btn {
        pointer-events: auto !important;
        cursor: pointer !important;
      }
    }
  </style>
</head>
<body class="bg-dark text-gray-100 font-sans min-h-screen pb-24 relative">
  <div id="floatWindow" class="fixed z-[999999] hidden w-[300px] bg-card rounded-xl shadow-2xl border border-indigo/50 overflow-hidden pointer-events-auto">
    <div id="floatDrag" class="draggable bg-indigo/20 px-3 py-2 flex justify-between items-center">
      <div class="text-xs font-bold text-white">📊 雙周期浮窗</div>
      <div class="flex gap-3">
        <button id="floatMin" class="float-btn text-xs text-white w-5 h-5 flex items-center justify-center">−</button>
        <button id="floatClose" class="float-btn text-xs text-white w-5 h-5 flex items-center justify-center">✕</button>
      </div>
    </div>
    <div id="floatContent" class="p-3 text-xs space-y-2 pointer-events-none">
      <div class="text-center font-bold text-indigo text-sm mb-1">暫無分析</div>
      <div id="floatData" class="space-y-1.5 text-[11px]"></div>
    </div>
  </div>

  <div class="bg-darker border-b border-border p-4 text-center">
    <div class="text-xs text-gray-500 tracking-widest mb-1">全品種AI智能偵測系統</div>
    <div class="text-xl font-bold">⚡ 5分看趨勢 · 1分找買點</div>
  </div>

  <div id="content" class="max-w-sm mx-auto p-4 space-y-4"></div>

  <button id="floatButton" class="fixed right-4 bottom-44 w-14 h-14 rounded-full bg-purple shadow-lg flex items-center justify-center text-2xl z-50 pointer-events-auto text-2xl z-50 pointer-events-auto">
    📌
  </button>
  
  <button id="aiButton" class="fixed right-4 bottom-24 w-14 h-14 rounded-full bg-indigo shadow-lg flex items-center justify-center text-2xl z-50 pointer-events-auto">
    🤖
  </button>

  <div id="aiModal" class="fixed inset-0 bg-black/80 z-[9999] flex items-end sm:items-center justify-center hidden pointer-events-auto">
    <div class="bg-card w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-5 max-h-[85vh] overflow-y-auto scrollbar-hide">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-white">📊 雙周期AI智能偵測</h3>
        <button id="closeAiModal" class="text-gray-300 text-xl">✕</button>
      </div>
      <input id="fileInput" type="file" accept="image/*" multiple hidden />
      <button id="uploadButton" class="w-full border border-dashed border-indigo/50 rounded-xl py-6 text-indigo-300 mb-3">
        上傳K線截圖
        <div class="text-xs mt-1 text-gray-400">✅ 同時上傳5分+1分兩張獲得最佳效果 | 單張也可分析</div>
      </button>
      <div id="imagePreview" class="mb-3 hidden grid grid-cols-2 gap-2">
        <img id="previewImg1" src="" alt="K線1" class="w-full rounded-lg object-contain max-h-40" />
        <img id="previewImg2" src="" alt="K線2" class="w-full rounded-lg object-contain max-h-40" />
      </div>
      <div id="aiError" class="text-red text-sm mb-3 p-3 bg-red/15 rounded border border-red/30 whitespace-pre-line hidden"></div>
      <div id="aiDebug" class="text-blue text-sm mb-3 p-3 bg-blue/15 rounded border border-blue/30 whitespace-pre-line hidden"></div>
      <button id="analyzeButton" class="w-full py-3 rounded-lg bg-indigo font-bold mb-3">
        🔍 雙周期精准批判點位
      </button>
      
      <div id="aiResult" class="space-y-4 hidden">
        <div id="trendCard" class="rounded-xl p-4 border">
          <div class="text-lg font-bold text-center mb-2" id="productTitle"></div>
          <div class="text-center text-sm text-gray-300" id="trendAdvice"></div>
          <div class="text-center text-xs text-gray-400 mt-1" id="productTypeLabel"></div>
          <div class="text-center text-xs text-green mt-1">✅ 基於K線100%精准批判</div>
        </div>
        
        <div id="trend5mCard" class="rounded-xl p-4 border border-indigo/30 bg-indigo/5">
          <div class="text-sm font-bold text-indigo mb-2">📈 大趨勢判斷</div>
          <div id="trend5mContent"></div>
        </div>
        
        <div id="entry1mCard" class="rounded-xl p-4 border border-green/30 bg-green/5">
          <div class="text-sm font-bold text-green mb-2">🎯 精準買點</div>
          <div id="entry1mContent"></div>
        </div>
        
        <div id="levelsCard" class="rounded-xl p-4 border border-yellow/30 bg-yellow/5">
          <div class="text-sm font-bold text-yellow mb-2">📊 關鍵支撐/阻力位</div>
          <div id="levelsContent"></div>
        </div>
        
        <div class="bg-darker rounded-xl p-4 border border-gray-600" id="indicatorCard">
          <div class="text-sm font-bold text-white mb-3">📊 技術指標詳情</div>
          <div class="space-y-2">
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">產品類型</span>
              <span id="productType" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">EMA角度</span>
              <span id="emaAngle" class="text-lg font-bold"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">交易適配</span>
              <span id="emaSuitable" class="text-lg font-bold"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">RSI詳細分析</span>
              <span id="rsiStatus" class="text-lg font-bold text-blue"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">當前價格</span>
              <span id="currentPrice" class="text-lg"></span>
            </div>
          </div>
        </div>
      </div>
      
      <button id="resetAiButton" class="w-full mt-3 py-2 border border-gray-600 rounded-lg text-gray-300 text-sm">
        重新上傳截圖
      </button>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 bg-darker border-t border-border pb-3 pt-2 z-30">
    <div class="max-w-sm mx-auto grid grid-cols-4 text-xs text-center">
      <button data-tab="home" class="tab-button pt-1 pb-1 rounded-lg text-indigo">
        <div class="text-lg mb-1">🏠</div>最新
      </button>
      <button data-tab="log" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📓</div>歷史
      </button>
      <button data-tab="stats" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📈</div>統計
      </button>
      <button data-tab="settings" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">⚙️</div>設定
      </button>
    </div>
  </div>

  <script>
    const getAngleDescription = (angle) => {
      const absAngle = Math.abs(angle);
      if (absAngle < 15) return `${angle}° (平緩)`;
      if (absAngle < 30) return `${angle}° (傾斜)`;
      if (absAngle < 60) return `${angle}° (陡峭)`;
      return `${angle}° (極陡)`;
    };

    const getSuitabilityDescription = (angle) => {
      const absAngle = Math.abs(angle);
      if (absAngle >= 30) return "非常適合交易";
      if (absAngle >= 15) return "適合交易";
      if (absAngle >= 10) return "尚可交易";
      return "不適合交易";
    };

    const getNeutralAdvice = (trend, emaAngle, support, resistance) => {
      const advices = [];
      
      if (Math.abs(emaAngle) < 10) {
        advices.push("📌 目前處於狹幅震盪區間，建議等待突破後再進場");
        advices.push(`📌 上方阻力位: ${resistance} | 下方支撐位: ${support}`);
        advices.push("📌 可設置上下軌掛單，突破確認後加倉");
      } else if (trend === 'long') {
        advices.push("📌 大趨勢偏多，短線盤整，等待回調入場");
        advices.push(`📌 可在關鍵支撐位 ${support} 等待做多信號`);
        advices.push(`📌 突破阻力位 ${resistance} 確認後可加倉`);
      } else if (trend === 'short') {
        advices.push("📌 大趨勢偏空，短線盤整，等待反彈入場");
        advices.push(`📌 可在關鍵阻力位 ${resistance} 等待做空信號`);
        advices.push(`📌 跌破支撐位 ${support} 確認後可加倉`);
      } else {
        advices.push("📌 趨勢不明確，建議觀望");
        advices.push(`📌 上方阻力位: ${resistance} | 下方支撐位: ${support}`);
        advices.push("📌 等待15分鐘後重新分析，確認趨勢方向");
      }
      
      advices.push("📌 觀望期間可關聯品種尋找交易機會");
      return advices.join("<br>");
    };

    let floatWindow, floatDrag, floatClose, floatMin, floatButton, floatData;
    let isDragging = false, offsetX, offsetY;

    const initFloatWindow = () => {
      floatWindow = document.getElementById('floatWindow');
      floatDrag = document.getElementById('floatDrag');
      floatClose = document.getElementById('floatClose');
      floatMin = document.getElementById('floatMin');
      floatButton = document.getElementById('floatButton');
      floatData = document.getElementById('floatData');

      floatButton.addEventListener('click', () => {
        floatWindow.classList.toggle('hidden');
        if(!floatWindow.classList.contains('hidden')) {
          syncFloatData();
          floatWindow.style.right = '10px';
          floatWindow.style.top = '100px';
          floatWindow.style.left = 'auto';
        }
      });

      floatClose.addEventListener('click', () => {
        floatWindow.classList.add('hidden');
      });
      
      floatMin.addEventListener('click', () => {
        const content = document.getElementById('floatContent');
        content.classList.toggle('hidden');
      });

      floatDrag.addEventListener('mousedown', (e) => {
        isDragging = true;
        const rect = floatWindow.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        floatWindow.style.cursor = 'grabbing';
        e.stopPropagation();
      });

      document.addEventListener('mousemove', (e) => {
        if(!isDragging) return;
        let x = e.clientX - offsetX;
        let y = e.clientY - offsetY;
        
        x = Math.max(0, Math.min(x, window.innerWidth - floatWindow.offsetWidth));
        y = Math.max(0, Math.min(y, window.innerHeight - floatWindow.offsetHeight));
        
        floatWindow.style.left = x + 'px';
        floatWindow.style.right = 'auto';
        floatWindow.style.top = y + 'px';
      });

      document.addEventListener('mouseup', () => {
        isDragging = false;
        if(floatDrag) floatDrag.style.cursor = 'move';
      });

      floatDrag.addEventListener('touchstart', (e) => {
        isDragging = true;
        const touch = e.touches[0];
        const rect = floatWindow.getBoundingClientRect();
        offsetX = touch.clientX - rect.left;
        offsetY = touch.clientY - rect.top;
        e.stopPropagation();
      });

      document.addEventListener('touchmove', (e) => {
        if(!isDragging) return;
        const touch = e.touches[0];
        let x = touch.clientX - offsetX;
        let y = touch.clientY - offsetY;
        x = Math.max(0, Math.min(x, window.innerWidth - floatWindow.offsetWidth));
        y = Math.max(0, Math.min(y, window.innerHeight - floatWindow.offsetHeight));
        floatWindow.style.left = x + 'px';
        floatWindow.style.right = 'auto';
        floatWindow.style.top = y + 'px';
        e.preventDefault();
      });

      document.addEventListener('touchend', () => {
        isDragging = false;
      });
    };

    const syncFloatData = () => {
      if(!state.aiAnalysis || !floatData) return;
      const a = state.aiAnalysis;
      const d = a.decimals || 0;
      
      floatData.innerHTML = `
        <div class="text-center font-bold text-white">${a.product}</div>
        <div class="border-t border-border pt-1 mb-1">
          <div class="text-center font-bold text-indigo">📈 大趨勢</div>
          <div class="flex justify-between ${a.trend==='long'?'text-red':a.trend==='short'?'text-green':'text-yellow'}">
            <span>方向</span><span>${a.trend==='long'?'多頭':a.trend==='short'?'空頭':'盤整盤'}</span>
          </div>
          <div class="flex justify-between text-white">
            <span>EMA角度</span><span>${getAngleDescription(a.emaAngle || 0)}</span>
          </div>
          <div class="flex justify-between text-white">
            <span>交易適配</span><span>${getSuitabilityDescription(a.emaAngle || 0)}</span>
          </div>
        </div>
        <div class="border-t border-border pt-1">
          <div class="text-center font-bold text-green">🎯 精準買點</div>
          <div class="flex justify-between ${a.trend==='long'?'text-red':a.trend==='short'?'text-green':'text-yellow'}">
            <span>方向</span><span>${a.trend==='long'?'多頭':a.trend==='short'?'空頭':'盤整盤'}</span>
          </div>
          <div class="flex justify-between text-white">
            <span>精準入場</span><span>${fmt(a.entry, d)}</span>
          </div>
          <div class="flex justify-between text-white">
            <span>支撐位</span><span>${fmt(a.support, d)}</span>
          </div>
          <div class="flex justify-between text-white">
            <span>阻力位</span><span>${fmt(a.resistance, d)}</span>
          </div>
        </div>
        <div class="text-[10px] border-t border-border pt-1 mt-1">
          <div class="flex justify-between text-red">🔴 多: ${fmt(a.longEntry, d)}</div>
          <div class="flex justify-between text-green">🟢 空: ${fmt(a.shortEntry, d)}</div>
          <div class="flex justify-between text-yellow">🎯 止盈: ${fmt(a.longTp1, d)}/${fmt(a.shortTp1, d)}</div>
        </div>
      `;
    };

    const num = (v) => parseFloat(v) || 0;
    const fmt = (n, d = 0) =>
     !n || isNaN(n) || !isFinite(n) ? "—" : Number(n).toFixed(d);

    const priorityWeight = { "高": 3, "中": 2, "低": 1 };

    const getWinRate = (priority) => {
      switch(priority) {
        case "高": return "75%";
        case "中": return "60%";
        case "低": return "50%";
        default: return "55%";
      }
    };

    const PRODUCT_TYPES = {
      FUTURES: "期貨/指數",
      UNSUPPORTED: "不支援產品"
    };

    const saveData = (key, data) => {
      try {
        localStorage.setItem(`sniper_${key}`, JSON.stringify(data));
      } catch (e) {
        console.error("保存失敗:", e);
      }
    };

    const loadData = (key, defaultValue) => {
      try {
        const data = localStorage.getItem(`sniper_${key}`);
        return data ? JSON.parse(data) : defaultValue;
      } catch (e) {
        console.error("讀取失敗:", e);
        return defaultValue;
      }
    };

    let state = {
      tab: "home",
      apiKey: loadData("apiKey", ""),
      proxyUrl: loadData("proxyUrl", "https://api.openai.com/v1/chat/completions"),
      aiAnalysis: loadData("aiAnalysis", null),
      aiHistory: loadData("aiHistory", []),
      aiImages: [],
      aiBase64s: [],
      aiLoading: false,
      aiError: ""
    };

    const saveState = () => {
      saveData("apiKey", state.apiKey);
      saveData("proxyUrl", state.proxyUrl);
      saveData("aiAnalysis", state.aiAnalysis);
      saveData("aiHistory", state.aiHistory);
    };

    const showDebug = (message) => {
      const debugEl = document.getElementById('aiDebug');
      debugEl.textContent = message;
      debugEl.classList.remove('hidden');
      console.log("DEBUG:", message);
    };

    const hideDebug = () => {
      document.getElementById('aiDebug').classList.add('hidden');
    };

    const calculateProfit = (entry, target, isLong, decimals) => {
      const diff = isLong ? target - entry : entry - target;
      const percentage = (diff / entry * 100).toFixed(2);
      return `${fmt(diff, decimals)} (+${percentage}%)`;
    };

    const calculateLoss = (entry, stopLoss, isLong, decimals) => {
      const diff = isLong ? entry - stopLoss : stopLoss - entry;
      const percentage = (diff / entry * 100).toFixed(2);
      return `${fmt(diff, decimals)} (-${percentage}%)`;
    };

    const optimizePrice = (price) => {
      return Math.round(price);
    };

    const calculateTakeProfit = (entry, stopLoss, isLong, decimals) => {
      const risk = Math.abs(entry - stopLoss);
      const tp1 = optimizePrice(entry + (isLong ? risk * 2 : -risk * 2));
      const tp2 = optimizePrice(entry + (isLong ? risk * 3 : -risk * 3));
      
      return { tp1, tp2 };
    };

    const renderHome = () => {
      return `
        ${state.aiAnalysis ? `
          <div class="bg-card border border-border rounded-2xl p-4">
            <div class="flex justify-between items-center mb-3">
              <div class="text-xs font-bold text-gray-400">🤖 最新AI偵測結果</div>
              <button id="resetCurrentButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded">重置</button>
            </div>
            <div class="text-center mb-4">
              <div class="text-lg font-bold text-indigo">${state.aiAnalysis.product}</div>
              <div class="text-xs text-gray-400">${state.aiAnalysis.productType || PRODUCT_TYPES.FUTURES}</div>
              <div class="text-sm text-green mt-1">✅ 100%匹配K線批判</div>
              <div class="text-xs text-gray-500 mt-1">偵測時間: ${state.aiAnalysis.time}</div>
            </div>
            
            <div class="bg-indigo/10 rounded-xl p-3 border border-indigo/30 mb-3">
              <div class="text-sm font-bold text-indigo mb-2">📈 大趨勢判斷</div>
              <div class="text-center text-xl font-bold ${state.aiAnalysis.trend === 'long' ? 'text-red' : state.aiAnalysis.trend === 'short' ? 'text-green' : 'text-yellow'}">
                ${state.aiAnalysis.trend === 'long' ? '🔴 偏多趨勢' : state.aiAnalysis.trend === 'short' ? '🟢 偏空趨勢' : '🟡 盤整盤'}
              </div>
              <div class="text-sm text-gray-300 mt-1">EMA角度：${getAngleDescription(state.aiAnalysis.emaAngle || 0)}</div>
              <div class="text-sm text-gray-300">交易適配：${getSuitabilityDescription(state.aiAnalysis.emaAngle || 0)}</div>
              <div class="text-sm text-gray-300">${state.aiAnalysis.advice || ''}</div>
            </div>
            
            <div class="bg-yellow/10 rounded-xl p-3 border border-yellow/30 mb-3">
              <div class="text-sm font-bold text-yellow mb-2">📊 關鍵支撐/阻力位</div>
              <div class="grid grid-cols-2 gap-2 text-xs">
                <div class="bg-black/30 p-2 rounded text-center">
                  <div class="text-gray-400">上方阻力位</div>
                  <div class="font-bold text-red">${fmt(state.aiAnalysis.resistance, state.aiAnalysis.decimals || 0)}</div>
                </div>
                <div class="bg-black/30 p-2 rounded text-center">
                  <div class="text-gray-400">下方支撐位</div>
                  <div class="font-bold text-green">${fmt(state.aiAnalysis.support, state.aiAnalysis.decimals || 0)}</div>
                </div>
              </div>
            </div>
            
            <div class="bg-green/10 rounded-xl p-3 border border-green/30">
              <div class="text-sm font-bold text-green mb-2">🎯 精準買點</div>
              <div class="text-center text-xl font-bold ${state.aiAnalysis.trend === 'long' ? 'text-red' : state.aiAnalysis.trend === 'short' ? 'text-green' : 'text-yellow'}">
                ${state.aiAnalysis.trend === 'long' ? '🔴 做多入場' : state.aiAnalysis.trend === 'short' ? '🟢 做空入場' : '🟡 觀望等待'}
              </div>
              <div class="text-sm text-gray-300 mt-1">精準入場點：${fmt(state.aiAnalysis.entry, state.aiAnalysis.decimals || 0)}</div>
            </div>
            
            ${(() => {
              const decimals = state.aiAnalysis.decimals || 0;
              const a = state.aiAnalysis;
              let html = '';

              if(a.longPriority === '高'){
                html += `
                  <div class="bg-darker rounded-xl p-3 border border-red/30 mt-3">
                    <div class="text-sm font-bold text-red mb-2">🔴 做多策略 (優先級: ${a.longPriority} | 勝率: ${getWinRate(a.longPriority)})</div>
                    <div class="grid grid-cols-2 gap-2 text-xs mb-2">
                      <div class="bg-black/30 p-2 rounded text-center">
                        <div class="text-gray-400">精準買點</div>
                        <div class="font-bold text-yellow">${fmt(a.longEntry, decimals)}</div>
                      </div>
                      <div class="bg-black/30 p-2 rounded text-center">
                        <div class="text-gray-400">止損</div>
                        <div class="font-bold text-white">${fmt(a.longStopLoss, decimals)}</div>
                      </div>
                      <div class="bg-black/30 p-2 rounded text-center">
                        <div class="text-gray-400">目標1(2R)</div>
                        <div class="font-bold text-green">${fmt(a.longTp1, decimals)}</div>
                        <div class="text-xs text-green">${calculateProfit(a.longEntry, a.longTp1, true, decimals)}</div>
                      </div>

          support(支撐位), resistance(阻力位), entry(最佳入場點),

          shortPriority, shortEntry, shortStopLoss, shortTp1, shortTp2, shortReason,
          rsi`
        }
      ];
      
      base64Images.forEach((img, index) => {
        content.push({
          type: 'image_url',
          image_url: { url: img }

          'Authorization': `Bearer ${state.apiKey}`

          messages: [

              role: 'user',

          temperature: 0.1

      });

      if (!response.ok) throw new Error(`API調用失敗: ${response.status}`);

      const jsonMatch = data.choices[0].message.content.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("AI返回格式錯誤");
      return JSON.parse(jsonMatch[0]);

        res.longTp2 = longTP.tp2;
        res.shortTp1 = shortTP.tp1;
        res.shortTp2 = shortTP.tp2;
        
        res.time = new Date().toLocaleString();
        state.aiAnalysis = res;
        state.aiHistory.unshift(res);
        if (state.aiHistory.length > 50) state.aiHistory = state.aiHistory.slice(0,50);
        saveState();
        renderAiResult();
        showDebug("✅ AI分析完成");
        setTimeout(hideDebug, 2000);
      } catch (err) {
        state.aiError = `❌ 錯誤: ${err.message}`;
        document.getElementById('aiError').textContent = state.aiError;
        document.getElementById('aiError').classList.remove('hidden');
      } finally {
        state.aiLoading = false;
        document.getElementById('analyzeButton').textContent = "🔍 雙周期精准批判點位";
        document.getElementById('analyzeButton').disabled = false;
        render();
      }
    };

    const initEvents = () => {
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.addEventListener('click', (e) => {
          state.tab = e.currentTarget.dataset.tab;
          document.querySelectorAll('.tab-button').forEach(b => {
            b.classList.remove('text-indigo');
            b.classList.add('text-gray-400');
          });
          e.currentTarget.classList.add('text-indigo');
          render();
        });
      });

      document.getElementById('aiButton').addEventListener('click', () => {
        document.getElementById('aiModal').classList.remove('hidden');
      });

      document.getElementById('closeAiModal').addEventListener('click', () => {
        document.getElementById('aiModal').classList.add('hidden');
      });

      document.getElementById('uploadButton').addEventListener('click', () => {
        document.getElementById('fileInput').click();
      });

      document.getElementById('fileInput').addEventListener('change', (e) => {
        const files = e.target.files;
        if (files.length === 0) return;
        
        state.aiBase64s = [];
        let loadedCount = 0;
        
        Array.from(files).forEach((file, index) => {
          const reader = new FileReader();
          reader.onload = (ev) => {
            state.aiBase64s.push(ev.target.result);
            loadedCount++;
            
            if (index === 0) {
              document.getElementById('previewImg1').src = ev.target.result;
            } else if (index === 1) {
              document.getElementById('previewImg2').src = ev.target.result;
            }
            
            if (loadedCount === files.length) {
              document.getElementById('imagePreview').classList.remove('hidden');
              // 隱藏第二張預覽如果只有一張圖
              if (files.length === 1) {
                document.getElementById('previewImg2').style.display = 'none';
              } else {
                document.getElementById('previewImg2').style.display = 'block';
              }
            }
          };
          reader.readAsDataURL(file);
        });
      });

      document.getElementById('analyzeButton').addEventListener('click', runAiAnalyze);
      document.getElementById('resetAiButton').addEventListener('click', () => {
        state.aiBase64s = [];
        document.getElementById('fileInput').value = "";
        document.getElementById('imagePreview').classList.add('hidden');
        document.getElementById('aiResult').classList.add('hidden');
        hideDebug();
      });
    };

    window.addEventListener('DOMContentLoaded', () => {
      initFloatWindow();
      initEvents();
      render();
    });
  </script>
</body>
</html>
