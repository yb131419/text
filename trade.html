" class="text-lg font-bold text-blue"></span></div><div class="flex justify-between items-center bg-black/30 p-2 rounded"><span class="text-gray-200">EMA5 / EMA20</span><span id="emaValues" class="text-sm"></span></div><div class="flex justify-between items-center bg-black/30 p-2 rounded"><span class="text-gray-200">當前價格</span><span id="currentPrice" class="text-lg font-medium"></span></div><div class="flex justify-between items-center bg-black/30 p-2 border border-green/30"><span class="text-gray-200 font-medium">預期目標獲利空間</span><span id="profitSpace" class="text-lg font-bold text-green"></span></div></div></div></div><button id="resetAiButton" class="w-full mt-3 py-2 border border-gray-600 rounded-lg text-gray-300 text-sm">重新上傳截圖</button></div></div><div class="fixed bottom-0 left-0 right-0 bg-darker border-t border-border pb-3 pt-2 z-30"><div class="max-w-sm mx-auto grid grid-cols-4 text-xs text-center"><button data-tab="home" class="tab-button pt-1 pb-1 rounded-lg text-indigo"><div class="text-lg mb-1">🏠</div>最新</button><button data-tab="log" class="tab-button pt-1 pb-1 rounded-lg text-gray-400"><div class="text-lg mb-1">📓</div>歷史</button><button data-tab="stats" class="tab-button pt-1 pb-1 rounded-lg text-gray-400"><div class="text-lg mb-1">📈</div>統計</button><button data-tab="settings" class="tab-button pt-1 pb-1 rounded-lg text-gray-400"><div class="text-lg mb-1">⚙️</div>設定</button></div></div><script>const STAGE1_SL_POINTS=20;const STAGE2_SL_POINTS=50;const MIN_TREND_PROFIT=50;const TREND_ANGLE_THRESHOLD=25;const DOW_EMA5_ANGLE_THRESHOLD=15;const PULLBACK_TOLERANCE=0.002;const CONSOLIDATION_WAIT_MINUTES=15;const calculateMergedEmaAngle=(ema5,ema20,currentPrice)=>{const emaDiff=ema5-ema20;const priceRatio=emaDiff/currentPrice*10000;return Math.round(priceRatio*2.75)};const calculateMergedLevels=(currentPrice,atr14,is5mChart)=>{const multiplier=is5mChart?1.35:0.9;return{support:Math.round(currentPrice-atr14*multiplier),resistance:Math.round(currentPrice+atr14*multiplier)}};const calculateMergedEntryBaseSL=(currentPrice,trend,atr14,emaAngle)=>{const absAngle=Math.abs(emaAngle);const atrMultiplier=absAngle>=20?0.8:0.65;const entryOffset=absAngle>=20?1.5:4;return{longEntry:Math.round(currentPrice+(trend==='long'?entryOffset:entryOffset+2)),longBaseSL:Math.round(currentPrice-atr14*atrMultiplier),shortEntry:Math.round(currentPrice-(trend==='short'?entryOffset:entryOffset+2)),shortBaseSL:Math.round(currentPrice+atr14*atrMultiplier)}};const calculateTwoStageSL=(entry,baseSL,isLong)=>{const baseRisk=Math.abs(entry-baseSL);const stage1SL=isLong?Math.round(entry-Math.min(STAGE1_SL_POINTS,baseRisk*0.6)):Math.round(entry+Math.min(STAGE1_SL_POINTS,baseRisk*0.6));const stage2SL=isLong?Math.round(entry-Math.max(STAGE2_SL_POINTS,baseRisk)):Math.round(entry+Math.max(STAGE2_SL_POINTS,baseRisk));return{stage1SL,stage2SL,baseRisk}};const calculateTakeProfit=(entry,stage2SL,isLong,isTrend)=>{const maxRisk=Math.abs(entry-stage2SL);let tp1=Math.round(entry+(isLong?maxRisk*1.75:-maxRisk*1.75));let tp2=Math.round(entry+(isLong?maxRisk*2.5:-maxRisk*2.5));if(isTrend){const profit2=Math.abs(tp2-entry);if(profit2<MIN_TREND_PROFIT){const expandRatio=MIN_TREND_PROFIT/profit2;tp2=Math.round(entry+(isLong?maxRisk*2.5*expandRatio:-maxRisk*2.5*expandRatio));tp1=Math.round(entry+(isLong?maxRisk*1.75*expandRatio:-maxRisk*1.75*expandRatio))}}return{tp1,tp2}};const calculateDowTrend=(highs,lows)=>{if(highs.length<3||lows.length<3)return{trend:'insufficient',structure:'資料不足無法判斷結構',strength:'unknown'};const higherHigh=highs[highs.length-1]>highs[highs.length-2]&&highs[highs.length-2]>highs[highs.length-3];const higherLow=lows[lows.length-1]>lows[lows.length-2]&&lows[lows.length-2]>lows[lows.length-3];const lowerLow=lows[lows.length-1]<lows[lows.length-2]&&lows[lows.length-2]<lows[lows.length-3];const lowerHigh=highs[highs.length-1]<highs[highs.length-2]&&highs[highs.length-2]<highs[highs.length-3];if(higherHigh&&higherLow)return{trend:'uptrend',structure:'上升趨勢（高點更高、低點更高）',strength:'strong'};if(lowerLow&&lowerHigh)return{trend:'downtrend',structure:'下降趨勢（低點更低、高點更低）',strength:'strong'};return{trend:'consolidation',structure:'盤整結構（高低點無明確方向）',strength:'weak'}};const checkEma5Pullback=(currentPrice,ema5,trend)=>{const diff=Math.abs(currentPrice-ema5)/ema5;const isNearEma5=diff<=PULLBACK_TOLERANCE;let isPullbackValid=false;if(trend==='uptrend')isPullbackValid=currentPrice>=ema5;else if(trend==='downtrend')isPullbackValid=currentPrice<=ema5;return{isNearEma5,isPullbackValid,diffPercent:(diff*100).toFixed(2)}};const getDowEntrySignal=(dowTrend,emaAngle,pullbackResult,trend)=>{const angleValid=Math.abs(emaAngle)>=DOW_EMA5_ANGLE_THRESHOLD;const structureValid=dowTrend.strength==='strong';const pullbackValid=pullbackResult.isPullbackValid;const trendMatch=(trend==='long'&&dowTrend.trend==='uptrend')||(trend==='short'&&dowTrend.trend==='downtrend');let level=0,advice='';if(trendMatch)level++;if(structureValid)level++;if(angleValid)level++;if(pullbackValid)level++;if(level===4)advice='強力進場信號，四項條件全數滿足';else if(level===3)advice='穩健進場信號，三項條件滿足，可輕倉試單';else if(level===2)advice='觀望為主，僅兩項條件滿足，等待更明確信號';else advice='不建議進場，信號不足，耐心等待機會';if(dowTrend.trend==='consolidation')advice+=`，盤整行情建議等待${CONSOLIDATION_WAIT_MINUTES}分鐘再確認`;return{level,maxLevel:4,advice,angleValid,structureValid,pullbackValid,trendMatch}};const getSuitabilityDescription=(angle)=>{const absAngle=Math.abs(angle);if(absAngle>=28)return"極適合交易";if(absAngle>=18)return"適合交易";if(absAngle>=10)return"尚可交易";return"不適合交易"};const getWinRateBySuitability=(suitability,hasTimeVerify)=>{const rates={"極適合交易":"85%","適合交易":"78%","尚可交易":"65%","不適合交易":"48%"};const baseRate=rates[suitability]||"50%";if(hasTimeVerify){const num=parseInt(baseRate);return Math.min(num+3,92)+"%"}return baseRate};const isNoVolatility=(atrValue,emaAngle)=>{const absAngle=Math.abs(emaAngle);return atrValue<9||absAngle<9};const isStrongTrend=(emaAngle)=>{return Math.abs(emaAngle)>=TREND_ANGLE_THRESHOLD};const num=(v)=>parseFloat(v)||0;const fmt=(n,d=0)=>!n||isNaN(n)||!isFinite(n)?"—":Number(n).toFixed(d);const PRODUCT_TYPES={FUTURES:"期貨/指數",UNSUPPORTED:"不支援產品"};const saveData=(key,data)=>{try{localStorage.setItem(`sniper_${key}`,JSON.stringify(data))}catch(e){}};const loadData=(key,defaultValue)=>{try{const data=localStorage.getItem(`sniper_${key}`);return data?JSON.parse(data):defaultValue}catch(e){return defaultValue}};let state={tab:"home",apiKey:loadData("apiKey",""),proxyUrl:loadData("proxyUrl","https://api.openai.com/v1/chat/completions"),aiAnalysis:loadData("aiAnalysis",null),aiHistory:loadData("aiHistory",[]),aiBase64s:[],aiLoading:false,aiError:"",logFilter:"all",slStage1:loadData("slStage1",STAGE1_SL_POINTS),slStage2:loadData("slStage2",STAGE2_SL_POINTS),minTrendProfit:loadData("minTrendProfit",MIN_TREND_PROFIT)};const saveState=()=>{saveData("apiKey",state.apiKey);saveData("proxyUrl",state.proxyUrl);saveData("aiAnalysis",state.aiAnalysis);saveData("aiHistory",state.aiHistory);saveData("slStage1",state.slStage1);saveData("slStage2",state.slStage2);saveData("minTrendProfit",state.minTrendProfit)};window.toggleTradeResult=(index,result)=>{if(!state.aiHistory[index])return;if(state.aiHistory[index].result===result){state.aiHistory[index].result=null}else{state.aiHistory[index].result=result}saveState();render()};const showDebug=(msg)=>{const el=document.getElementById('aiDebug');el.textContent=msg;el.classList.remove('hidden')};const hideDebug=()=>document.getElementById('aiDebug').classList.add('hidden');const showError=(msg)=>{const el=document.getElementById('aiError');el.textContent=msg;el.classList.remove('hidden')};const hideError=()=>document.getElementById('aiError').classList.add('hidden');const renderHome=()=>{if(!state.aiAnalysis){return`<div class="bg-card border border-border rounded-2xl p-4 text-center"><div class="text-gray-400 mb-2">還沒有偵測結果</div><div class="text-xs text-gray-500">點擊右下角🤖按鈕上傳K線截圖開始分析</div><div class="text-xs text-cyan/70 mt-2">💡 支援單張 / 多張圖片，內建道氏+EMA sage.content;let jsonStr=null;const codeBlockMatch=rawContent.match(/```(?:json)?\s*([\s\S]*?)\s*```/i);if(codeBlockMatch){jsonStr=codeBlockMatch[1].trim()}else{const braceMatch=rawContent.match(/\{[\s\S]*\}/);if(braceMatch){jsonStr=braceMatch[0].trim()}}if(!jsonStr){throw new Error("AI 回應內容無法解析為標準格式，請重新上傳更清晰的K線截圖")}jsonStr=jsonStr.replace(/,\s*([}\]])/g,'$1').replace(/\/\/.*$/gm,'').replace(/\/\*[\s\S]*?\*\//g,'');let parsedData;try{parsedData=JSON.parse(jsonStr)}catch(parseErr){try{const fallbackMatch=jsonStr.match(/^\s*(\{[\s\S]*?\})\s*$/);if(fallbackMatch){parsedData=JSON.parse(fallbackMatch[1])}else{throw new Error()}}catch(e){throw new Error(`JSON 解析失敗，AI 回傳格式不正確\n\n原始內容片段：\n${jsonStr.slice(0,200)}${jsonStr.length>200?'...':''}\n\n請重新上傳截圖重試，或確認圖片包含清晰的K線與數值`)}}parsedData.result=null;parsedData.emaAngle=calculateMergedEmaAngle(num(parsedData.ema5),num(parsedData.ema20),num(parsedData.currentPrice));const levels=calculateMergedLevels(num(parsedData.currentPrice),num(parsedData.atr14),false);parsedData.support=levels.support;parsedData.resistance=levels.resistance;const entryBase=calculateMergedEntryBaseSL(num(parsedData.currentPrice),parsedData.trend,num(parsedData.atr14),parsedData.emaAngle);Object.assign(parsedData,entryBase);const longSL=calculateTwoStageSL(parsedData.longEntry,parsedData.longBaseSL,true);const shortSL=calculateTwoStageSL(parsedData.shortEntry,parsedData.shortBaseSL,false);parsedData.longStage1SL=longSL.stage1SL;parsedData.longStage2SL=longSL.stage2SL;parsedData.shortStage1SL=shortSL.stage1SL;parsedData.shortStage2SL=shortSL.stage2SL;const isTrend=isStrongTrend(parsedData.emaAngle);const longTP=calculateTakeProfit(parsedData.longEntry,parsedData.longStage2SL,true,isTrend);const shortTP=calculateTakeProfit(parsedData.shortEntry,parsedData.shortStage2SL,false,isTrend);parsedData.longTp1=longTP.tp1;parsedData.longTp2=longTP.tp2;parsedData.shortTp1=shortTP.tp1;parsedData.shortTp2=shortTP.tp2;const dowTrend=calculateDowTrend(parsedData.recentHighs| l('.tab-button').forEach(b=>{b.classList.remove('text-indigo');b.classList.add('text-gray-400')});e.currentTarget.classList.remove('text-gray-400');e.currentTarget.classList.add('text-indigo');render()})})};const aiButton=document.getElementById('aiButton');const aiModal=document.getElementById('aiModal');const closeAiModal=document.getElementById('closeAiModal');const fileInput=document.getElementById('fileInput');const uploadButton=document.getElementById('uploadButton');const analyzeButton=document.getElementById('analyzeButton');const resetAiButton=document.getElementById('resetAiButton');aiButton.addEventListener('click',()=>{aiModal.classList.remove('hidden')});closeAiModal.addEventListener('click',()=>{aiModal.classList.add('hidden')});aiModal.addEventListener('click',(e)=>{if(e.target===aiModal){aiModal.classList.add('hidden')}});uploadButton.addEventListener('click',()=>{fileInput.click()});fileInput.addEventListener('change',(e)=>{handleFileSelect(e.target.files)});analyzeButton.addEventListener('click',runAiAnalyze);resetAiButton.addEventListener('click',()=>{state.aiBase64s=[];document.getElementById('imagePreview').classList.add('hidden');document.getElementById('aiResult').classList.add('hidden');hideError();hideDebug();fileInput.value=''});window.addEventListener('DOMContentLoaded',init);</script></body></html>
