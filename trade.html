<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全品種AI智能偵測系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:w@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#07080f',
            darker: '#0d1018',
            card: '#111520',
            border: '#1a1e2e',
            green: '#1db954',
            red: '#e03e3e',
            blue: '#38bdf8',
            yellow: '#f59e0b',
            indigo: '#6366f1',
            purple: '#a855f7',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .draggable {
        cursor: move !important;
        user-select: none !important;
      }
      .float-btn {
        pointer-events: auto !important;
        cursor: pointer !important;
      }
    }
  </style>
</head>
<body class="bg-dark text-gray-100 font-sans min-h-screen pb-24 relative">
  <div id="floatWindow" class="fixed z-[999999] hidden w-[300px] bg-card rounded-xl shadow-2xl border border-indigo/50 overflow-hidden pointer-events-auto">
    <div id="floatDrag" class="draggable bg-indigo/20 px-3 py-2 flex justify-between items-center">
      <div class="text-xs font-bold text-white">📊 雙周期浮窗</div>
      <div class="flex gap-3">
        <button id="floatMin" class="float-btn text-xs text-white w-5 h-5 flex items-center justify-center">−</button>
        <button id="floatClose" class="float-btn text-xs text-white w-5 h-5 flex items-center justify-center">✕</button>
      </div>
    </div>
    <div id="floatContent" class="p-3 text-xs space-y-2 pointer-events-none">
      <div class="text-center font-bold text-indigo text-sm mb-1">暫無分析</div>
      <div id="floatData" class="space-y-1.5 text-[11px]"></div>
    </div>
  </div>

  <div class="bg-darker border-b border-border p-4 text-center">
    <div class="text-xs text-gray-500 tracking-widest mb-1">全品種AI智能偵測系統</div>
    <div class="text-xl font-bold">⚡ 5分看趨勢 · 1分找買點</div>
  </div>

  <div id="content" class="max-w-sm mx-auto p-4 space-y-4"></div>

  <button id="floatButton" class="fixed right-4 bottom-44 w-14 h-14 rounded-full bg-purple shadow-lg flex items-center justify-center text-2xl z-50 pointer-events-auto">
    📌
  </button>
  
  <button id="aiButton" class="fixed right-4 bottom-24 w-14 h-14 rounded-full bg-indigo shadow-lg flex items-center justify-center text-2xl z-50 pointer-events-auto">
    🤖
  </button>

  <div id="aiModal" class="fixed inset-0 bg-black/80 z-[9999] flex items-end sm:items-center justify-center hidden pointer-events-auto">
    <div class="bg-card w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-5 max-h-[85vh] overflow-y-auto scrollbar-hide">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-white">📊 雙周期AI智能偵測</h3>
        <button id="closeAiModal" class="text-gray-300 text-xl">✕</button>
      </div>
      <input id="fileInput" type="file" accept="image/*" multiple hidden />
      <button id="uploadButton" class="w-full border border-dashed border-indigo/50 rounded-xl py-6 text-indigo-300 mb-3">
        上傳K線截圖
        <div class="text-xs mt-1 text-gray-400">✅ 同時上傳5分+1分兩張獲得最佳效果 | 單張也可分析</div>
      </button>
      <div id="imagePreview" class="mb-3 hidden grid grid-cols-2 gap-2">
        <img id="previewImg1" src="" alt="K線1" class="w-full rounded-lg object-contain max-h-40" />
        <img id="previewImg2" src="" alt="K線2" class="w-full rounded-lg object-contain max-h-40" />
      </div>
      <div id="aiError" class="text-red text-sm mb-3 p-3 bg-red/15 rounded border border-red/30 whitespace-pre-line hidden"></div>
      <div id="aiDebug" class="text-blue text-sm mb-3 p-3 bg-blue/15 rounded border border-blue/30 whitespace-pre-line hidden"></div>
      <button id="analyzeButton" class="w-full py-3 rounded-lg bg-indigo font-bold mb-3">
        🔍 雙周期精准批判點位
      </button>
      
      <div id="aiResult" class="space-y-4 hidden">
        <div id="trendCard" class="rounded-xl p-4 border">
          <div class="text-lg font-bold text-center mb-2" id="productTitle"></div>
          <div class="text-center text-sm text-gray-300" id="trendAdvice"></div>
          <div class="text-center text-xs text-gray-400 mt-1" id="productTypeLabel"></div>
          <div class="text-center text-xs font-bold text-green mt-1" id="finalSuitability"></div>
          <div class="text-center text-xs text-green mt-1" id="finalWinRate"></div>
        </div>
        
        <div id="trend5mCard" class="rounded-xl p-4 border border-indigo/30 bg-indigo/5">
          <div class="text-sm font-bold text-indigo mb-2">📈 大趨勢判斷</div>
          <div id="trend5mContent"></div>
        </div>
        
        <div id="entry1mCard" class="rounded-xl p-4 border border-green/30 bg-green/5">
          <div class="text-sm font-bold text-green mb-2">🎯 精準買點</div>
          <div id="entry1mContent"></div>
        </div>
        
        <div id="levelsCard" class="rounded-xl p-4 border border-yellow/30 bg-yellow/5">
          <div class="text-sm font-bold text-yellow mb-2">📊 關鍵支撐/阻力位</div>
          <div id="levelsContent"></div>
        </div>
        
        <div class="bg-darker rounded-xl p-4 border border-gray-600" id="indicatorCard">
          <div class="text-sm font-bold text-white mb-3">📊 技術指標詳情</div>
          <div class="space-y-2">
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">產品類型</span>
              <span id="productType" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">EMA角度</span>
              <span id="emaAngle" class="text-lg font-bold"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">交易適配</span>
              <span id="emaSuitable" class="text-lg font-bold"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">ATR(14)</span>
              <span id="atrValue" class="text-lg font-bold text-blue"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">當前價格</span>
              <span id="currentPrice" class="text-lg"></span>
            </div>
          </div>
        </div>
      </div>
      
      <button id="resetAiButton" class="w-full mt-3 py-2 border border-gray-600 rounded-lg text-gray-300 text-sm">
        重新上傳截圖
      </button>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 bg-darker border-t border-border pb-3 pt-2 z-30">
    <div class="max-w-sm mx-auto grid grid-cols-4 text-xs text-center">
      <button data-tab="home" class="tab-button pt-1 pb-1 rounded-lg text-indigo">
        <div class="text-lg mb-1">🏠</div>最新
      </button>
      <button data-tab="log" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📓</div>歷史
      </button>
      <button data-tab="stats" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📈</div>統計
      </button>
      <button data-tab="settings" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">⚙️</div>設定
      </button>
    </div>
  </div>

  <script>
    const getSuitabilityDescription = (angle) => {
      const absAngle = Math.abs(angle);
      if (absAngle >= 30) return "非常適合交易";
      if (absAngle >= 15) return "適合交易";
      if (absAngle >= 10) return "尚可交易";
      return "不適合交易";
    };

    const getWinRateBySuitability = (suitability) => {
      switch(suitability) {
        case "非常適合交易": return "82%";
        case "適合交易": return "75%";
        case "尚可交易": return "60%";
        case "不適合交易": return "45%";
        default: return "50%";
      }
    };

    const isNoVolatility = (atrValue, emaAngle) => {
      const absAngle = Math.abs(emaAngle);
      return atrValue < 5 || absAngle < 8;
    };

    const getNeutralAdvice = (trend, emaAngle, support, resistance) => {
      const advices = [];
      if (Math.abs(emaAngle) < 10) {
        advices.push("📌 目前處於狹幅震盪區間，建議等待突破後再進場");
      } else if (trend === 'long') {
        advices.push("📌 大趨勢偏多，短線盤整，等待回調入場");
      } else if (trend === 'short') {
        advices.push("📌 大趨勢偏空，短線盤整，等待反彈入場");
      } else {
        advices.push("📌 趨勢不明確，建議觀望");
      }
      advices.push(`📌 支撐: ${support} | 阻力: ${resistance}`);
      return advices.join("<br>");
    };

    let floatWindow, floatDrag, floatClose, floatMin, floatButton, floatData;
    let isDragging = false, offsetX, offsetY;

    const initFloatWindow = () => {
      floatWindow = document.getElementById('floatWindow');
      floatDrag = document.getElementById('floatDrag');
      floatClose = document.getElementById('floatClose');
      floatMin = document.getElementById('floatMin');
      floatButton = document.getElementById('floatButton');
      floatData = document.getElementById('floatData');

      floatButton.addEventListener('click', () => {
        floatWindow.classList.toggle('hidden');
        if(!floatWindow.classList.contains('hidden')) {
          syncFloatData();
          floatWindow.style.right = '10px';
          floatWindow.style.top = '100px';
          floatWindow.style.left = 'auto';
        }
      });

      floatClose.addEventListener('click', () => {
        floatWindow.classList.add('hidden');
      });
      
      floatMin.addEventListener('click', () => {
        const content = document.getElementById('floatContent');
        content.classList.toggle('hidden');
      });

      floatDrag.addEventListener('mousedown', (e) => {
        isDragging = true;
        const rect = floatWindow.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        floatWindow.style.cursor = 'grabbing';
        e.stopPropagation();
      });

      document.addEventListener('mousemove', (e) => {
        if(!isDragging) return;
        let x = e.clientX - offsetX;
        let y = e.clientY - offsetY;
        x = Math.max(0, Math.min(x, window.innerWidth - floatWindow.offsetWidth));
        y = Math.max(0, Math.min(y, window.innerHeight - floatWindow.offsetHeight));
        floatWindow.style.left = x + 'px';
        floatWindow.style.right = 'auto';
        floatWindow.style.top = y + 'px';
      });

      document.addEventListener('mouseup', () => {
        isDragging = false;
      });

      floatDrag.addEventListener('touchstart', (e) => {
        isDragging = true;
        const touch = e.touches[0];
        const rect = floatWindow.getBoundingClientRect();
        offsetX = touch.clientX - rect.left;
        offsetY = touch.clientY - rect.top;
        e.stopPropagation();
      });

      document.addEventListener('touchmove', (e) => {
        if(!isDragging) return;
        const touch = e.touches[0];
        let x = touch.clientX - offsetX;
        let y = touch.clientY - offsetY;
        x = Math.max(0, Math.min(x, window.innerWidth - floatWindow.offsetWidth));
        y = Math.max(0, Math.min(y, window.innerHeight - floatWindow.offsetHeight));
        floatWindow.style.left = x + 'px';
        floatWindow.style.right = 'auto';
        floatWindow.style.top = y + 'px';
        e.preventDefault();
      });

      document.addEventListener('touchend', () => {
        isDragging = false;
      });
    };

    const syncFloatData = () => {
      if(!state.aiAnalysis || !floatData) return;
      const a = state.aiAnalysis;
      const d = a.decimals || 0;
      const suitability = getSuitabilityDescription(a.emaAngle || 0);
      const winRate = getWinRateBySuitability(suitability);
      const noVol = isNoVolatility(a.atr14, a.emaAngle);
      
      floatData.innerHTML = `
        <div class="text-center font-bold text-white">${a.product}</div>
        <div class="border-t border-border pt-1 mb-1">
          <div class="text-center font-bold text-indigo">📈 大趨勢</div>
          <div class="flex justify-between ${a.trend==='long'?'text-red':a.trend==='short'?'text-green':'text-yellow'}">
            <span>方向</span><span>${a.trend==='long'?'多頭':a.trend==='short'?'空頭':'盤整盤'}</span>
          </div>
          <div class="flex justify-between text-white">
            <span>交易適配</span><span>${suitability}</span>
          </div>
          <div class="flex justify-between text-white">
            <span>預期勝率</span><span>${winRate}</span>
          </div>
        </div>
        <div class="border-t border-border pt-1">
          <div class="text-center font-bold text-green">🎯 精準買點</div>
          <div class="flex justify-between text-white">
            <span>入場</span><span>${fmt(a.entry, d)}</span>
          </div>
          <div class="flex justify-between text-white">
            <span>支撐</span><span>${fmt(a.support, d)}</span>
          </div>
          <div class="flex justify-between text-white">
            <span>阻力</span><span>${fmt(a.resistance, d)}</span>
          </div>
        </div>
      `;
    };

    const num = (v) => parseFloat(v) || 0;
    const fmt = (n, d = 0) => !n || isNaN(n) || !isFinite(n) ? "—" : Number(n).toFixed(d);
    const priorityWeight = { "高": 3, "中": 2, "低": 1 };

    const PRODUCT_TYPES = {
      FUTURES: "期貨/指數",
      UNSUPPORTED: "不支援產品"
    };

    const saveData = (key, data) => {
      try { localStorage.setItem(`sniper_${key}`, JSON.stringify(data)); } catch(e) {}
    };

    const loadData = (key, defaultValue) => {
      try {
        const data = localStorage.getItem(`sniper_${key}`);
        return data ? JSON.parse(data) : defaultValue;
      } catch(e) { return defaultValue; }
    };

    let state = {
      tab: "home",
      apiKey: loadData("apiKey", ""),
      proxyUrl: loadData("proxyUrl", "https://api.openai.com/v1/chat/completions"),
      aiAnalysis: loadData("aiAnalysis", null),
      aiHistory: loadData("aiHistory", []),
      aiBase64s: [],
      aiLoading: false,
      aiError: ""
    };

    const saveState = () => {
      saveData("apiKey", state.apiKey);
      saveData("proxyUrl", state.proxyUrl);
      saveData("aiAnalysis", state.aiAnalysis);
      saveData("aiHistory", state.aiHistory);
    };

    const showDebug = (msg) => {
      const el = document.getElementById('aiDebug');
      el.textContent = msg;
      el.classList.remove('hidden');
    };

    const hideDebug = () => document.getElementById('aiDebug').classList.add('hidden');

    const optimizePrice = (p) => Math.round(p);

    const calculateTakeProfit = (entry, sl, isLong) => {
      const risk = Math.abs(entry - sl);
      const tp1 = optimizePrice(entry + (isLong ? risk*2 : -risk*2));
      const tp2 = optimizePrice(entry + (isLong ? risk*3 : -risk*3));
      return { tp1, tp2 };
    };

    const renderHome = () => {
      if (!state.aiAnalysis) {
        return `
          <div class="bg-card border border-border rounded-2xl p-4 text-center">
            <div class="text-gray-400 mb-2">還沒有偵測結果</div>
            <div class="text-sm text-gray-500">點擊右下角🤖按鈕上傳K線截圖</div>
          </div>
        `;
      }

      const a = state.aiAnalysis;
      const suitability = getSuitabilityDescription(a.emaAngle);
      const winRate = getWinRateBySuitability(suitability);
      const noVol = isNoVolatility(a.atr14, a.emaAngle);
      const finalStatus = noVol ? "⚠️ 無波動盤 → 觀望" : suitability;
      const finalColor = noVol ? "text-yellow" : "text-green";

      return `
        <div class="bg-card border border-border rounded-2xl p-4">
          <div class="flex justify-between items-center mb-3">
            <div class="text-xs font-bold text-gray-400">🤖 最新AI偵測結果</div>
            <button id="resetCurrentButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded">重置</button>
          </div>
          <div class="text-center mb-4">
            <div class="text-lg font-bold text-indigo">${a.product}</div>
            <div class="text-xs text-gray-400">${a.productType || PRODUCT_TYPES.FUTURES}</div>
            <div class="text-sm font-bold ${finalColor} mt-1">${finalStatus}</div>
            <div class="text-sm font-bold text-green mt-1">預期勝率：${winRate}</div>
            <div class="text-xs text-gray-500 mt-1">偵測時間: ${a.time}</div>
          </div>
          
          <div class="bg-indigo/10 rounded-xl p-3 border border-indigo/30 mb-3">
            <div class="text-sm font-bold text-indigo mb-2">📈 大趨勢判斷</div>
            <div class="text-center text-xl font-bold ${a.trend === 'long' ? 'text-red' : a.trend === 'short' ? 'text-green' : 'text-yellow'}">
              ${a.trend === 'long' ? '🔴 偏多趨勢' : a.trend === 'short' ? '🟢 偏空趨勢' : '🟡 盤整盤'}
            </div>
            <div class="text-sm text-gray-300 mt-1">交易適配：${suitability}</div>
          </div>
          
          <div class="bg-yellow/10 rounded-xl p-3 border border-yellow/30 mb-3">
            <div class="text-sm font-bold text-yellow mb-2">📊 關鍵支撐/阻力位</div>
            <div class="grid grid-cols-2 gap-2 text-xs">
              <div class="bg-black/30 p-2 rounded text-center">
                <div class="text-gray-400">阻力位</div>
                <div class="font-bold text-red">${fmt(a.resistance, a.decimals)}</div>
              </div>
              <div class="bg-black/30 p-2 rounded text-center">
                <div class="text-gray-400">支撐位</div>
                <div class="font-bold text-green">${fmt(a.support, a.decimals)}</div>
              </div>
            </div>
          </div>
          
          <div class="bg-green/10 rounded-xl p-3 border border-green/30">
            <div class="text-sm font-bold text-green mb-2">🎯 精準買點</div>
            <div class="text-center text-xl font-bold ${noVol ? 'text-yellow' : a.trend === 'long' ? 'text-red' : 'text-green'}">
              ${noVol ? '🟡 觀望等待' : a.trend === 'long' ? '🔴 做多入場' : '🟢 做空入場'}
            </div>
            <div class="text-sm text-gray-300 mt-1">入場點：${fmt(a.entry, a.decimals)}</div>
          </div>
        </div>
      `;
    };

    const renderLog = () => {
      return `
        <div class="flex justify-between items-center mb-2">
          <div class="text-lg font-bold">📓 AI偵測歷史</div>
          <button id="resetAllHistoryButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded">重置全部</button>
        </div>
        ${state.aiHistory.length === 0 
          ? '<div class="text-center text-gray-500 py-10">還沒有偵測記錄</div>' 
          : state.aiHistory.map((r) => {
              const s = getSuitabilityDescription(r.emaAngle);
              const wr = getWinRateBySuitability(s);
              const nv = isNoVolatility(r.atr14, r.emaAngle);
              return `
            <div class="bg-card border border-border rounded-xl p-3 text-sm mb-3">
              <div class="flex justify-between mb-2">
                <span class="text-indigo font-bold">${r.product}</span>
                <span class="text-gray-400 text-xs">${r.time}</span>
              </div>
              <div class="text-xs font-bold text-green mb-1">${nv ? "觀望" : s} | 勝率 ${wr}</div>
              <div class="text-xs ${r.trend === 'long' ? 'text-red' : r.trend === 'short' ? 'text-green' : 'text-yellow'}">
                ${r.trend === 'long' ? '🔴 多頭' : r.trend === 'short' ? '🟢 空頭' : '🟡 盤整'}
              </div>
              <div class="text-xs text-gray-400">入場 ${fmt(r.entry, r.decimals)} | 支 ${fmt(r.support, r.decimals)} | 阻 ${fmt(r.resistance, r.decimals)}</div>
            </div>
          `}).join('')}
      `;
    };

    const renderStats = () => {
      const total = state.aiHistory.length;
      const angleCounts = { "非常適合交易":0, "適合交易":0, "尚可交易":0, "不適合交易":0 };
      state.aiHistory.forEach(r => {
        const s = getSuitabilityDescription(r.emaAngle);
        angleCounts[s]++;
      });

      return `
        <div class="flex justify-between items-center mb-2">
          <div class="text-lg font-bold">📈 AI偵測統計</div>
          <button id="resetStatsButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded">重置統計</button>
        </div>
        <div class="bg-card border border-border rounded-xl p-4 space-y-2 text-sm mb-4">
          <div class="flex justify-between font-bold"><span>總偵測次數</span><span>${total}</span></div>
        </div>
        
        <div class="bg-card border border-border rounded-xl p-4 space-y-2 text-sm mb-4">
          <div class="font-bold mb-2">📐 EMA角度適配統計</div>
          <div class="flex justify-between text-green"><span>✅ 非常適合交易</span><span>${angleCounts["非常適合交易"]} 次</span></div>
          <div class="flex justify-between text-green"><span>✅ 適合交易</span><span>${angleCounts["適合交易"]} 次</span></div>
          <div class="flex justify-between text-yellow"><span>⚠️ 尚可交易</span><span>${angleCounts["尚可交易"]} 次</span></div>
          <div class="flex justify-between text-yellow"><span>⚠️ 不適合交易</span><span>${angleCounts["不適合交易"]} 次</span></div>
        </div>
      `;
    };

    const renderSettings = () => {
      return `
        <div class="text-lg font-bold mb-2">⚙️ 系統設定</div>
        <div class="bg-card border border-border rounded-xl p-4 space-y-3 mb-4">
          <div class="font-bold text-sm">OpenAI API 設定</div>
          <input id="apiKeyInput" value="${state.apiKey}" placeholder="sk-xxxxxxxx" class="w-full bg-black/40 border border-gray-700 rounded-lg p-2 text-sm" type="password" />
        </div>
        <div class="bg-card border border-border rounded-xl p-4 space-y-3 mb-4">
          <div class="font-bold text-sm">代理伺服器</div>
          <input id="proxyUrlInput" value="${state.proxyUrl}" class="w-full bg-black/40 border border-gray-700 rounded-lg p-2 text-sm" />
        </div>
        <button id="clearAllDataButton" class="w-full py-2 border border-red/30 text-red rounded-lg text-sm">清除所有數據</button>
      `;
    };

    const renderAiResult = () => {
      if (!state.aiAnalysis) return;
      const a = state.aiAnalysis;
      const suitability = getSuitabilityDescription(a.emaAngle);
      const winRate = getWinRateBySuitability(suitability);
      const noVol = isNoVolatility(a.atr14, a.emaAngle);
      
      document.getElementById('productTitle').textContent = `📊 ${a.product}`;
      document.getElementById('productTypeLabel').textContent = a.productType || PRODUCT_TYPES.FUTURES;
      document.getElementById('finalSuitability').textContent = noVol ? "⚠️ 無波動盤 → 觀望" : suitability;
      document.getElementById('finalWinRate').textContent = `預期勝率：${winRate}`;
      document.getElementById('emaAngle').textContent = suitability;
      document.getElementById('emaSuitable').textContent = suitability;
      document.getElementById('atrValue').textContent = a.atr14 || "—";
      document.getElementById('currentPrice').textContent = fmt(a.currentPrice, a.decimals);

      document.getElementById('aiResult').classList.remove('hidden');
      syncFloatData();
    };

    const render = () => {
      const c = document.getElementById('content');
      switch(state.tab) {
        case "home": c.innerHTML = renderHome(); bindHomeEvents(); break;
        case "log": c.innerHTML = renderLog(); bindLogEvents(); break;
        case "stats": c.innerHTML = renderStats(); bindStatsEvents(); break;
        case "settings": c.innerHTML = renderSettings(); bindSettingsEvents(); break;
      }
    };

    const bindHomeEvents = () => {
      document.getElementById('resetCurrentButton')?.addEventListener('click', () => {
        if (confirm("確定重置？")) { state.aiAnalysis = null; saveState(); render(); }
      });
    };

    const bindLogEvents = () => {
      document.getElementById('resetAllHistoryButton')?.addEventListener('click', () => {
        if (confirm("確定清空歷史？")) { state.aiHistory = []; saveState(); render(); }
      });
    };

    const bindStatsEvents = () => {
      document.getElementById('resetStatsButton')?.addEventListener('click', () => {
        if (confirm("確定重置統計？")) { state.aiHistory = []; saveState(); render(); }
      });
    };

    const bindSettingsEvents = () => {
      document.getElementById('apiKeyInput')?.addEventListener('input', e=>{ state.apiKey=e.target.value; saveState(); });
      document.getElementById('proxyUrlInput')?.addEventListener('input', e=>{ state.proxyUrl=e.target.value; saveState(); });
      document.getElementById('clearAllDataButton')?.addEventListener('click', ()=>{
        if(confirm("確定清除全部？")){ localStorage.clear(); location.reload(); }
      });
    };

    const callOpenAI = async (imgs) => {
      const content = [{
        type: 'text',
        text: `你是專業期貨分析師。
        分析K線與ATR(14)，只回傳JSON。
        欄位：product, productType, currentPrice, decimals, trend, advice, emaAngle, support, resistance, entry, longPriority, longEntry, longStopLoss, shortPriority, shortEntry, shortStopLoss, atr14`
      }];
      imgs.forEach(img => content.push({ type: 'image_url', image_url: { url: img } }));

      const res = await fetch(state.proxyUrl, {
        method: 'POST',
        headers: { 'Content-Type':'application/json', Authorization:`Bearer ${state.apiKey}` },
        body: JSON.stringify({ model:'gpt-4o', messages:[{role:'user',content}], temperature:0.1 })
      });

      const data = await res.json();
      const match = data.choices[0].message.content.match(/\{[\s\S]*\}/);
      return JSON.parse(match[0]);
    };

    const runAiAnalyze = async () => {
      showDebug("分析中...");
      if (!state.apiKey) { document.getElementById('aiError').textContent="❌ 請輸入API Key"; document.getElementById('aiError').classList.remove('hidden'); return; }
      if (state.aiBase64s.length===0) { document.getElementById('aiError').textContent="❌ 請上傳圖片"; document.getElementById('aiError').classList.remove('hidden'); return; }
      
      document.getElementById('analyzeButton').textContent="⏳ 分析中...";
      document.getElementById('analyzeButton').disabled=true;

      try {
        const r = await callOpenAI(state.aiBase64s);
        r.longEntry = optimizePrice(r.longEntry);
        r.longStopLoss = optimizePrice(r.longStopLoss);
        r.shortEntry = optimizePrice(r.shortEntry);
        r.shortStopLoss = optimizePrice(r.shortStopLoss);
        r.support = optimizePrice(r.support);
        r.resistance = optimizePrice(r.resistance);
        r.entry = optimizePrice(r.entry);
        
        const ltp = calculateTakeProfit(r.longEntry, r.longStopLoss, true);
        const stp = calculateTakeProfit(r.shortEntry, r.shortStopLoss, false);
        r.longTp1 = ltp.tp1; r.longTp2 = ltp.tp2;
        r.shortTp1 = stp.tp1; r.shortTp2 = stp.tp2;
        
        r.time = new Date().toLocaleString();
        state.aiAnalysis = r;
        state.aiHistory.unshift(r);
        if (state.aiHistory.length>50) state.aiHistory=state.aiHistory.slice(0,50);
        saveState();
        renderAiResult();
        showDebug("✅ 分析完成");
        setTimeout(hideDebug, 2000);
      } catch (e) {
        document.getElementById('aiError').textContent=`❌ 錯誤：${e.message}`;
        document.getElementById('aiError').classList.remove('hidden');
      } finally {
        document.getElementById('analyzeButton').textContent="🔍 雙周期精准批判點位";
        document.getElementById('analyzeButton').disabled=false;
        render();
      }
    };

    const initEvents = () => {
      document.querySelectorAll('.tab-button').forEach(btn=>{
        btn.addEventListener('click', e=>{
          state.tab = e.currentTarget.dataset.tab;
          document.querySelectorAll('.tab-button').forEach(b=>{ b.classList.remove('text-indigo'); b.classList.add('text-gray-400'); });
          e.currentTarget.classList.add('text-indigo');
          render();
        });
      });

      document.getElementById('aiButton').addEventListener('click', ()=>{
        document.getElementById('aiModal').classList.remove('hidden');
      });
      document.getElementById('closeAiModal').addEventListener('click', ()=>{
        document.getElementById('aiModal').classList.add('hidden');
      });
      document.getElementById('uploadButton').addEventListener('click', ()=>{
        document.getElementById('fileInput').click();
      });
      document.getElementById('fileInput').addEventListener('change', e=>{
        const files = e.target.files;
        if (!files.length) return;
        state.aiBase64s=[];
        let count=0;
        Array.from(files).forEach((f,i)=>{
          const r=new FileReader();
          r.onload=ev=>{
            state.aiBase64s.push(ev.target.result);
            count++;
            if (i===0) document.getElementById('previewImg1').src=ev.target.result;
            if (i===1) document.getElementById('previewImg2').src=ev.target.result;
            if (count===files.length) {
              document.getElementById('imagePreview').classList.remove('hidden');
              if (files.length===1) document.getElementById('previewImg2').style.display='none';
              else document.getElementById('previewImg2').style.display='block';
            }
          };
          r.readAsDataURL(f);
        });
      });

      document.getElementById('analyzeButton').addEventListener('click', runAiAnalyze);
      document.getElementById('resetAiButton').addEventListener('click', ()=>{
        state.aiBase64s=[];
        document.getElementById('fileInput').value="";
        document.getElementById('imagePreview').classList.add('hidden');
        document.getElementById('aiResult').classList.add('hidden');
        hideDebug();
      });
    };

    window.addEventListener('DOMContentLoaded', () => {
      initFloatWindow();
      initEvents();
      render();
    });
  </script>
</body>
</html>
