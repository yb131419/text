<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全品種AI智能偵測系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#07080f',
            darker: '#0d1018',
            card: 'rgba(17, 21, 32, 0.7)',
            border: 'rgba(26, 30, 46, 0.5)',
            green: '#1db954',
            red: '#e03e3e',
            blue: '#38bdf8',
            yellow: '#f59e0b',
            indigo: '#6366f1',
            purple: '#a855f7',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          boxShadow: {
            'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.37)',
            'card': '0 4px 15px rgba(0, 0, 0, 0.2)',
            'button': '0 4px 12px rgba(99, 102, 241, 0.3)',
          }
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .glass {
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .card-hover {
        transition: all 0.3s ease;
      }
      .card-hover:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      }
    }
  </style>
</head>
<body class="bg-dark text-gray-100 font-sans min-h-screen pb-24 relative">
  <!-- 背景漸變 -->
  <div class="fixed inset-0 bg-gradient-to-br from-dark via-darker to-black/90 -z-10"></div>

  <!-- 頂部標題 -->
  <div class="bg-card glass border-b border-border p-4 text-center shadow-card">
    <div class="text-xs text-gray-500 tracking-widest mb-1">全品種AI智能偵測系統</div>
    <div class="text-xl font-bold bg-gradient-to-r from-indigo to-purple bg-clip-text text-transparent">⚡ 真實交易員波段進出點位</div>
  </div>

  <!-- 主內容區 -->
  <div id="content" class="max-w-sm mx-auto p-4 space-y-4"></div>

  <!-- 浮動AI看盤按鈕 -->
  <button id="aiButton" class="fixed right-4 bottom-24 w-14 h-14 rounded-full bg-gradient-to-r from-indigo to-purple shadow-button flex items-center justify-center text-2xl z-40 transition-all hover:scale-105 hover:shadow-lg">
    🤖
  </button>

  <!-- AI看盤彈窗模態框 -->
  <div id="aiModal" class="fixed inset-0 bg-black/70 z-50 flex items-end sm:items-center justify-center hidden">
    <div class="bg-card glass w-full sm:max-w-sm rounded-2xl p-5 max-h-[85vh] overflow-y-auto scrollbar-hide shadow-glass border border-border">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold bg-gradient-to-r from-indigo to-purple bg-clip-text text-transparent">📊 AI 智能偵測</h3>
        <button id="closeAiModal" class="text-gray-300 text-xl hover:text-white transition-colors">✕</button>
      </div>
      <input id="fileInput" type="file" accept="image/*" hidden />
      <button id="uploadButton" class="w-full border border-dashed border-indigo/50 rounded-xl py-6 text-indigo-300 mb-3 transition-all hover:border-indigo/70 hover:bg-indigo/5">
        上傳任何產品K線截圖
        <div class="text-xs mt-1 text-gray-400">✅ 期貨 ✅ 外匯 ✅ 加密貨幣 ✅ 台股 ✅ 美股</div>
      </button>
      <div id="imagePreview" class="mb-3 hidden">
        <img id="previewImg" src="" alt="chart preview" class="w-full rounded-lg object-contain max-h-52 shadow-card" />
      </div>
      <div id="aiError" class="text-red text-sm mb-3 p-3 bg-red/15 rounded border border-red/30 whitespace-pre-line hidden"></div>
      <div id="aiDebug" class="text-blue text-sm mb-3 p-3 bg-blue/15 rounded border border-blue/30 whitespace-pre-line hidden"></div>
      <button id="analyzeButton" class="w-full py-3 rounded-lg bg-gradient-to-r from-indigo to-purple font-bold mb-3 shadow-button transition-all hover:shadow-lg hover:scale-[1.02]">
        生成真實波段交易點位
      </button>
      
      <!-- 實盤點位區域 -->
      <div id="aiResult" class="space-y-4 hidden">
        <!-- 產品與趨勢判斷 -->
        <div id="trendCard" class="rounded-xl p-4 border shadow-card card-hover"></div>
        
        <!-- 策略卡片容器 -->
        <div id="strategyContainer"></div>
        
        <!-- 技術分析卡片 -->
        <div class="bg-darker/80 rounded-xl p-4 border border-gray-600/50 shadow-card card-hover">
          <div class="text-sm font-bold text-white mb-3">📈 技術指標詳情</div>
          <div class="space-y-2">
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">產品類型</span>
              <span id="productType" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">EMA狀態</span>
              <span id="emaStatus" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">RSI詳細分析</span>
              <span id="rsiStatus" class="text-lg font-bold text-blue"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">當前價格</span>
              <span id="currentPrice" class="text-lg"></span>
            </div>
          </div>
        </div>
      </div>
      
      <button id="resetAiButton" class="w-full mt-3 py-2 border border-gray-600/50 rounded-lg text-gray-300 text-sm transition-all hover:border-gray-500 hover:bg-gray-800/30">
        重新上傳截圖
      </button>
    </div>
  </div>

  <!-- 底部導航 -->
  <div class="fixed bottom-0 left-0 right-0 bg-card glass border-t border-border pb-3 pt-2 z-30 shadow-card">
    <div class="max-w-sm mx-auto grid grid-cols-4 text-xs text-center">
      <button data-tab="home" class="tab-button pt-1 pb-1 rounded-lg text-indigo transition-all hover:bg-indigo/10">
        <div class="text-lg mb-1">🏠</div>最新
      </button>
      <button data-tab="log" class="tab-button pt-1 pb-1 rounded-lg text-gray-400 transition-all hover:bg-gray-800/30">
        <div class="text-lg mb-1">📓</div>歷史
      </button>
      <button data-tab="stats" class="tab-button pt-1 pb-1 rounded-lg text-gray-400 transition-all hover:bg-gray-800/30">
        <div class="text-lg mb-1">📈</div>統計
      </button>
      <button data-tab="settings" class="tab-button pt-1 pb-1 rounded-lg text-gray-400 transition-all hover:bg-gray-800/30">
        <div class="text-lg mb-1">⚙️</div>設定
      </button>
    </div>
  </div>

  <script>
    const num = (v) => parseFloat(v) || 0;
    const fmt = (n, d = 2) =>
     !n || isNaN(n) || !isFinite(n) ? "—" : Number(n).toFixed(d);

    const priorityWeight = { "高": 3, "中": 2, "低": 1 };

    // ✅ 真實交易員勝率標準 (基於職業波段交易員數據)
    const getWinRate = (priority) => {
      switch(priority) {
        case "高": return 70;
        case "中": return 60;
        case "低": return 50;
        default: return 55;
      }
    };

    const PRODUCT_TYPES = {
      FUTURES: "期貨/指數",
      STOCK: "股票",
      CRYPTO: "加密貨幣",
      FOREX: "外匯",
      UNKNOWN: "未知"
    };

    const saveData = (key, data) => {
      try {
        localStorage.setItem(`sniper_${key}`, JSON.stringify(data));
      } catch (e) {
        console.error("保存失敗:", e);
      }
    };

    const loadData = (key, defaultValue) => {
      try {
        const data = localStorage.getItem(`sniper_${key}`);
        return data ? JSON.parse(data) : defaultValue;
      } catch (e) {
        console.error("讀取失敗:", e);
        return defaultValue;
      }
    };

    let state = {
      tab: "home",
      apiKey: loadData("apiKey", ""),
      proxyUrl: loadData("proxyUrl", "https://api.openai.com/v1/chat/completions"),
      aiAnalysis: loadData("aiAnalysis", null),
      aiHistory: loadData("aiHistory", []),
      aiImage: null,
      aiBase64: "",
      aiLoading: false,
      aiError: ""
    };

    const saveState = () => {
      saveData("apiKey", state.apiKey);
      saveData("proxyUrl", state.proxyUrl);
      saveData("aiAnalysis", state.aiAnalysis);
      saveData("aiHistory", state.aiHistory);
    };

    const showDebug = (message) => {
      const debugEl = document.getElementById('aiDebug');
      debugEl.textContent = message;
      debugEl.classList.remove('hidden');
      console.log("DEBUG:", message);
    };

    const hideDebug = () => {
      document.getElementById('aiDebug').classList.add('hidden');
    };

    const calculateProfit = (entry, target, isLong, decimals) => {
      const diff = isLong ? target - entry : entry - target;
      const percentage = (diff / entry * 100).toFixed(2);
      return `${fmt(diff, decimals)} (+${percentage}%)`;
    };

    const calculateLoss = (entry, stopLoss, isLong, decimals) => {
      const diff = isLong ? entry - stopLoss : stopLoss - entry;
      const percentage = (diff / entry * 100).toFixed(2);
      return `${fmt(diff, decimals)} (-${percentage}%)`;
    };

    // ✅ 真實交易員關鍵價格優化：優先整五/整十，其次整數
    const optimizePrice = (price, decimals, productType) => {
      if (decimals === 0) {
        // 台股等整數價格產品：強制整五/整十
        const p = Math.round(price);
        if (p % 10 === 0) return p;
        if (p % 5 === 0) return p;
        // 向上取最近的整五
        return Math.ceil(p / 5) * 5;
      } else if (decimals === 1) {
        // NQ等一位小數產品：優先整數
        return Math.round(price);
      } else {
        // 黃金等兩位小數產品：優先整數或0.5
        const p = Math.round(price * 2) / 2;
        return p;
      }
    };

    // ✅ 渲染策略卡片（按勝率排序）
    const renderStrategyCards = (analysis) => {
      const decimals = analysis.decimals || 2;
      const isStock = analysis.productType === PRODUCT_TYPES.STOCK;
      
      // 計算勝率
      const longWinRate = getWinRate(analysis.longPriority);
      const shortWinRate = getWinRate(analysis.shortPriority);
      
      // 按勝率排序
      const strategies = [];
      
      // 做多策略
      strategies.push({
        type: 'long',
        winRate: longWinRate,
        priority: analysis.longPriority,
        entry: analysis.longEntry,
        stopLoss: analysis.longStopLoss,
        tp1: analysis.longTp1,
        tp2: analysis.longTp2,
        tpShort: analysis.longTpShort,
        tpMedium: analysis.longTpMedium,
        tpLong: analysis.longTpLong,
        reason: analysis.longReason
      });
      
      // 做空策略
      strategies.push({
        type: 'short',
        winRate: shortWinRate,
        priority: analysis.shortPriority,
        entry: analysis.shortEntry,
        stopLoss: analysis.shortStopLoss,
        tp1: analysis.shortTp1,
        tp2: analysis.shortTp2,
        tpShort: analysis.shortTpShort,
        tpMedium: analysis.shortTpMedium,
        tpLong: analysis.shortTpLong,
        reason: analysis.shortReason
      });
      
      // 勝率高的放前面
      strategies.sort((a, b) => b.winRate - a.winRate);
      
      return strategies.map(strategy => {
        const isLong = strategy.type === 'long';
        const colorClass = isLong ? 'red' : 'green';
        const icon = isLong ? '🔴' : '🟢';
        const direction = isLong ? '做多' : '做空';
        
        return `
          <div class="bg-darker/80 rounded-xl p-4 border border-${colorClass}/30 shadow-card card-hover mb-3">
            <div class="text-sm font-bold text-${colorClass} mb-3">${icon} ${direction}進場策略 (優先級: ${strategy.priority} | 勝率: ${strategy.winRate}%)</div>
            <div class="grid ${isStock ? 'grid-cols-4' : 'grid-cols-2'} gap-2 text-sm">
              <div class="bg-black/30 p-2 rounded text-center border border-${colorClass}/50">
                <div class="text-gray-400 text-xs">進場價</div>
                <div class="text-xl font-bold text-${colorClass}">${fmt(strategy.entry, decimals)}</div>
              </div>
              <div class="bg-black/30 p-2 rounded text-center border border-${isLong ? 'green' : 'red'}/50">
                <div class="text-gray-400 text-xs">⛔ 止損</div>
                <div class="text-xl font-bold text-white">${fmt(strategy.stopLoss, decimals)}</div>
                <div class="text-xs text-red">${calculateLoss(strategy.entry, strategy.stopLoss, isLong strategy.stopLoss, isLong, decimals)}</div>
              </div>
              ${isStock ? `
                <div class="bg-black/30 p-2 rounded text-center">
                  <div class="text-gray-400 text-xs">✅ 短期 (2.5R)</div>
                  <div class="text-xl font-bold text-yellow">${fmt(strategy.tpShort, decimals)}</div>
                  <div class="text-xs text-green">${calculateProfit(strategy.entry, strategy.tpShort, isLong, decimals)}</div>
                </div>
                <div class="bg-black/30 p-2 rounded text-center">
                  <div class="text-gray-400 text-xs">✅ 中期 (4R)</div>
                  <div class="text-xl font-bold text-blue">${fmt(strategy.tpMedium, decimals)}</div>
                  <div class="text-xs text-green">${calculateProfit(strategy.entry, strategy.tpMedium, isLong, decimals)}</div>
                </div>
                <div class="bg-black/30 p-2 rounded text-center col-span-2">
                  <div class="text-gray-400 text-xs">✅ 長期 (6R)</div>
                  <div class="text-xl font-bold text-purple">${fmt(strategy.tpLong, decimals)}</div>
                  <div class="text-xs text-green">${calculateProfit(strategy.entry, strategy.tpLong, isLong, decimals)}</div>
                </div>
              ` : `
                <div class="bg-black/30 p-2 rounded text-center">
                  <div class="text-gray-400 text-xs">✅ 目標1 (3R)</div>
                  <div class="text-xl font-bold text-yellow">${fmt(strategy.tp1, decimals)}</div>
                  <div class="text-xs text-green">${calculateProfit(strategy.entry, strategy.tp1, isLong, decimals)}</div>
                </div>
                <div class="bg-black/30 p-2 rounded text-center">
                  <div class="text-gray-400 text-xs">✅ 目標2 (5R)</div>
                  <div class="text-xl font-bold text-${colorClass}">${fmt(strategy.tp2, decimals)}</div>
                  <div class="text-xs text-green">${calculateProfit(strategy.entry, strategy.tp2, isLong, decimals)}</div>
                </div>
              `}
            </div>
            <div class="mt-2 text-xs text-white bg-black/40 p-2 rounded border border-${colorClass}/20">
              📌 進場理由：${strategy.reason || '基於技術指標綜合判斷'}
            </div>
          </div>
        `;
      }).join('');
    };

    const renderHome = () => {
      return `
        ${state.aiAnalysis ? `
          <div class="bg-card glass border border-border rounded-2xl p-4 shadow-glass card-hover">
            <div class="flex justify-between items-center mb-3">
              <div class="text-xs font-bold text-gray-400">🤖 最新AI偵測結果</div>
              <button id="resetCurrentButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded transition-all hover:border-gray-500 hover:bg-gray-800/30">重置</button>
            </div>
            <div class="text-center mb-4">
              <div class="text-lg font-bold text-indigo">${state.aiAnalysis.product}</div>
              <div class="text-xs text-gray-400">${state.aiAnalysis.productType || PRODUCT_TYPES.UNKNOWN}</div>
              
              ${state.aiAnalysis.trend === 'neutral' ? `
                <div class="text-xl font-bold text-yellow mt-2">🟡 震盪盤</div>
                <div class="text-sm text-red-400 font-bold mt-1">⚠️ 禁止交易，觀望為主</div>
                <div class="text-xs text-gray-400 mt-1">震盪行情勝率低，建議等待明確方向</div>
              ` : `
                <div class="text-xl font-bold ${state.aiAnalysis.trend === 'long' ? 'text-red' : 'text-green'} mt-2">
                  ${state.aiAnalysis.trend === 'long' ? '🔴 偏多趨勢' : '🟢 偏空趨勢'}
                </div>
                <div class="text-sm text-gray-300">${state.aiAnalysis.advice}</div>
              `}
              
              <div class="text-xs text-gray-500 mt-1">偵測時間: ${state.aiAnalysis.time}</div>
            </div>
            
            ${state.aiAnalysis.trend !== 'neutral' ? renderStrategyCards(state.aiAnalysis) : ''}
          </div>
        ` : `
          <div class="bg-card glass border border-border rounded-2xl p-4 text-center shadow-glass">
            <div class="text-gray-400 mb-2">還沒有偵測結果</div>
            <div class="text-sm text-gray-500">點擊右下角🤖按鈕上傳任何產品截圖</div>
          </div>
        `}
      `;
    };

    const renderLog = () => {
      return `
        <div class="flex justify-between items-center mb-2">
          <div class="text-lg font-bold bg-gradient-to-r from-indigo to-purple bg-clip-text text-transparent">📓 AI偵測歷史</div>
          <button id="resetAllHistoryButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded transition-all hover:border-gray-500 hover:bg-gray-800/30">重置全部</button>
        </div>
        ${state.aiHistory.length === 0 
          ? '<div class="bg-card glass border border-border rounded-2xl p-4 text-center shadow-glass text-gray-500 py-10">還沒有偵測記錄</div>' 
          : state.aiHistory.map((record, index) => `
            <div class="bg-card glass border border-border rounded-xl p-3 text-sm mb-3 shadow-card card-hover">
              <div class="flex justify-between mb-2">
                <span class="text-indigo font-bold">${record.product}</span>
                <span class="text-gray-400 text-xs">${record.time}</span>
              </div>
              <div class="flex justify-between mb-2">
                <span class="font-bold ${record.trend === 'long' ? 'text-red' : record.trend === 'short' ? 'text-green' : 'text-yellow'}">
                  ${record.trend === 'long' ? '🔴 偏多' : record.trend === 'short' ? '🟢 偏空' : '🟡 震盪'}
                </span>
                <span class="text-xs text-gray-400">${record.productType || PRODUCT_TYPES.UNKNOWN}</span>
              </div>
              
              ${record.trend === 'neutral' ? `
                <div class="bg-yellow/10 rounded-lg p-2 border border-yellow/20 text-center">
                  <div class="text-xs font-bold text-yellow">⚠️ 震盪盤 禁止交易</div>
                </div>
              ` : `
                ${(() => {
                  const decimals = record.decimals || 2;
                  const isStock = record.productType === PRODUCT_TYPES.STOCK;
                  const longWinRate = getWinRate(record.longPriority);
                  const shortWinRate = getWinRate(record.shortPriority);
                  
                  // 只顯示勝率高的那個
                  if (longWinRate >= shortWinRate) {
                    return `
                      <div class="bg-red/5 rounded-lg p-2 border border-red/20">
                        <div class="text-xs font-bold text-red mb-1">
                          做多進場 (${record.longPriority} | ${longWinRate}%) | 進場: ${fmt(record.longEntry, decimals)}
                        </div>
                        <div class="text-xs text-gray-400 mb-1">
                          ${isStock ? 
                            `短: ${fmt(record.longTpShort, decimals)} | 中: ${fmt(record.longTpMedium, decimals)} | 長: ${fmt(record.longTpLong, decimals)}` : 
                            `獲利: ${fmt(record.longTp1, decimals)} / ${fmt(record.longTp2, decimals)}`}
                          | 止損: ${fmt(record.longStopLoss, decimals)}
                        </div>
                      </div>
                    `;
                  } else {
                    return `
                      <div class="bg-green/5 rounded-lg p-2 border border-green/20">
                        <div class="text-xs font-bold text-green mb-1">
                          做空進場 (${record.shortPriority} | ${shortWinRate}%) | 進場: ${fmt(record.shortEntry, decimals)}
                        </div>
                        <div class="text-xs text-gray-400 mb-1">
                          ${isStock ? 
                            `短: ${fmt(record.shortTpShort, decimals)} | 中: ${fmt(record.shortTpMedium, decimals)} | 長: ${fmt(record.shortTpLong, decimals)}` : 
                            `獲利: ${fmt(record.shortTp1, decimals)} / ${fmt(record.shortTp2, decimals)}`}
                          | 止損: ${fmt(record.shortStopLoss, decimals)}
                        </div>
                      </div>
                    `;
                  }
                })()}
              `}
            </div>
          `).join('')}
      `;
    };

    const renderStats = () => {
      const total = state.aiHistory.length;
      const productCounts = {};
      const typeCounts = {};
      const directionCounts = { "做多": 0, "做空": 0, "震盪": 0 };
      let totalWinRate = 0;
      const priorityWinRates = { "高": 0, "中": 0, "低": 0 };
      const priorityCounts = { "高": 0, "中": 0, "低": 0 };
      
      state.aiHistory.forEach(r => {
        productCounts[r.product] = (productCounts[r.product] || 0) + 1;
        typeCounts[r.productType || PRODUCT_TYPES.UNKNOWN] = (typeCounts[r.productType || PRODUCT_TYPES.UNKNOWN] || 0) + 1;
        
        if (r.trend === 'long') {
          directionCounts["做多"]++;
        } else if (r.trend === 'short') {
          directionCounts["做空"]++;
        } else {
          directionCounts["震盪"]++;
        }

        // 計算平均勝率
        totalWinRate += getWinRate(r.longPriority) + getWinRate(r.shortPriority);
        priorityCounts[r.longPriority]++;
        priorityCounts[r.shortPriority]++;
      });

      const avgWinRate = total > 0 ? (totalWinRate / (total * 2)).toFixed(0) + "%" : "—";
      
      return `
        <div class="flex justify-between items-center mb-2">
          <div class="text-lg font-bold bg-gradient-to-r from-indigo to-purple bg-clip-text text-transparent">📈 AI偵測統計</div>
          <button id="resetStatsButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded transition-all hover:border-gray-500 hover:bg-gray-800/30">重置統計</button>
        </div>

    const safeParseJson = (rawContent) => {
      let attempts = [];
      
      try {
        return JSON.parse(rawContent);
      } catch (e) {
        attempts.push("直接解析失敗: " + e.message);
      }
      
      try {
        let cleaned = rawContent
          .replace(/^```(json)?\s*/gi, "")
          .replace(/\s*```$/g, "")
          .trim();
        return JSON.parse(cleaned);
      } catch (e) {
        attempts.push("移除markdown失敗: " + e.message);
      }
      
      try {
        const start = rawContent.indexOf('{');
        const end = rawContent.lastIndexOf('}');
        if (start !== -1 && end !== -1 && end > start) {
          let cleaned = rawContent.substring(start, end + 1);
          return JSON.parse(cleaned);
        }
      } catch (e) {
        attempts.push("提取大括號失敗: " + e.message);
      }
      
      try {
        let cleaned = rawContent
          .replace(/^```(json)?\s*/gi, "")
          .replace(/\s*```$/g, "")
          .replace(/^[^{]*/, "")
          .replace(/[^}]*$/, "")
          .replace(/,\s*}/g, "}")
          .replace(/,\s*]/g, "]")
          .replace(/'/g, '"')
          .replace(/(\w+):/g, '"$1":')
          .trim();
        return JSON.parse(cleaned);
      } catch (e) {
        attempts.push("修復語法失敗: " + e.message);
      }
      
      throw new Error("JSON解析失敗，所有嘗試都失敗了\n" + attempts.join("\n"));
    };

      const sniperPrompt = `
你是一位有15年實盤經驗的波段交易員，**只給真實可達成的點位**，絕對不要誇張。
同時提供做多和做空雙向策略，每個策略標明優先級和真實勝率。

⚠️ 重要規則：

2. 期貨/指數/外匯：

   - 止盈2 = 進場 ± 止損 × 5
3. 加密貨幣：

   - 止盈2 = 進場 ± 止損 × 6

✅ 真實勝率標準：

- 低優先級：勝率50%

✅ RSI絕對詳細規則（強制遵守）：
1. 輸出精確數值：RSI(14)=XX
2. 嚴格區間+方向：

   - 30~45：偏弱 → 優先做多，謹慎做空
   - 45~55：中性 → 觀望，無方向
   - 55~70：偏強 → 優先做空，謹慎做多
   - >70：嚴重超買 → 僅適合做空，禁止做多
3. 說明RSI走勢+背離

輸出標準JSON，無多餘文字：
{
  "product": "產品名",
  "productType": "類型",
  "currentPrice": 數字,

}
`;
      
      try {

        }
        
        const data = await res.json();
        showDebug("分析結果解析成功");
        
        let rawContent = data.choices[0].message.content.trim();
        let parseRes = safeParseJson(rawContent);
        
        if (!parseRes.product) parseRes.product = "未知產品";
        if (!parseRes.productType) parseRes.productType = PRODUCT_TYPES.UNKNOWN;
        if (!parseRes.longReason) parseRes.longReason = "指標符合真實波段進場條件";
        if (!parseRes.shortReason) parseRes.shortReason = "指標符合真實波段進場條件";
        if (!parseRes.rsi) parseRes.rsi = "RSI(14)=50，中性，觀望為主";
        
        const isStock = parseRes.productType === PRODUCT_TYPES.STOCK;

        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (event) => {
          state.aiBase64 = event.target.result;
          document.getElementById('previewImg').src = state.aiBase64;
          document.getElementById('imagePreview').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      });

      document.getElementById('analyzeButton').addEventListener('click', runAiAnalyze);

      document.getElementById('resetAiButton').addEventListener('click', () => {
        state.aiBase64 = "";
        state.aiImage = null;
        document.getElementById('fileInput').value = "";
        document.getElementById('imagePreview').classList.add('hidden');
        document.getElementById('aiResult').classList.add('hidden');
        document.getElementById('aiError').classList.add('hidden');
        hideDebug();
      });
    };

    window.addEventListener('DOMContentLoaded', () => {
      initEvents();
      render();
    });
  </script>
</body>
</html>
