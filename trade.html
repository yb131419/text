<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全品種AI智能偵測系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#07080f',
            darker: '#0d1018',
            card: '#111520',
            border: '#1a1e2e',
            green: '#1db954',
            red: '#e03e3e',
            blue: '#38bdf8',
            yellow: '#f59e0b',
            indigo: '#6366f1',
            purple: '#a855f7',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .draggable {
        cursor: move !important;
        user-select: none !important;
      }
      .float-btn {
        pointer-events: auto !important;
        cursor: pointer !important;
      }
    }
  </style>
</head>
<body class="bg-dark text-gray-100 font-sans min-h-screen pb-24 relative">
  <!-- 修复版悬浮窗【Mitrade专用】 -->
  <div id="floatWindow" class="fixed z-[999999] hidden w-[280px] bg-card rounded-xl shadow-2xl border border-indigo/50 overflow-hidden pointer-events-auto">
    <!-- 悬浮窗拖动栏 -->
    <div id="floatDrag" class="draggable bg-indigo/20 px-3 py-2 flex justify-between items-center">
      <div class="text-xs font-bold text-white">📊 Mitrade 浮窗</div>
      <div class="flex gap-3">
        <button id="floatMin" class="float-btn text-xs text-white w-5 h-5 flex items-center justify-center">−</button>
        <button id="floatClose" class="float-btn text-xs text-white w-5 h-5 flex items-center justify-center">✕</button>
      </div>
    </div>
    <!-- 悬浮窗核心内容 -->
    <div id="floatContent" class="p-3 text-xs space-y-2 pointer-events-none">
      <div class="text-center font-bold text-indigo text-sm mb-1">暂无分析</div>
      <div id="floatData" class="space-y-1.5 text-[11px]"></div>
    </div>
  </div>

  <div class="bg-darker border-b border-border p-4 text-center">
    <div class="text-xs text-gray-500 tracking-widest mb-1">全品種AI智能偵測系統</div>
    <div class="text-xl font-bold">⚡ 真實交易員波段進出點位</div>
  </div>

  <div id="content" class="max-w-sm mx-auto p-4 space-y-4"></div>

  <!-- 悬浮窗开关按钮 -->
  <button id="floatButton" class="fixed right-4 bottom-44 w-14 h-14 rounded-full bg-purple shadow-lg flex items-center justify-center text-2xl z-50 pointer-events-auto">
    📌
  </button>
  
  <button id="aiButton" class="fixed right-4 bottom-24 w-14 h-14 rounded-full bg-indigo shadow-lg flex items-center justify-center text-2xl z-50 pointer-events-auto">
    🤖
  </button>

  <div id="aiModal" class="fixed inset-0 bg-black/80 z-[9999] flex items-end sm:items-center justify-center hidden pointer-events-auto">
    <div class="bg-card w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-5 max-h-[85vh] overflow-y-auto scrollbar-hide">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-white">📊 AI 智能偵測</h3>
        <button id="closeAiModal" class="text-gray-300 text-xl">✕</button>
      </div>
      <input id="fileInput" type="file" accept="image/*" hidden />
      <button id="uploadButton" class="w-full border border-dashed border-indigo/50 rounded-xl py-6 text-indigo-300 mb-3">
        上傳任何期指K線截圖
        <div class="text-xs mt-1 text-gray-400">✅ 全球期指 ✅ 各國指數期貨</div>
      </button>
      <div id="imagePreview" class="mb-3 hidden">
        <img id="previewImg" src="" alt="chart preview" class="w-full rounded-lg object-contain max-h-52" />
      </div>
      <div id="aiError" class="text-red text-sm mb-3 p-3 bg-red/15 rounded border border-red/30 whitespace-pre-line hidden"></div>
      <div id="aiDebug" class="text-blue text-sm mb-3 p-3 bg-blue/15 rounded border border-blue/30 whitespace-pre-line hidden"></div>
      <button id="analyzeButton" class="w-full py-3 rounded-lg bg-indigo font-bold mb-3">
        🔍 嚴格匹配圖片批判點位/進出場
      </button>
      
      <div id="aiResult" class="space-y-4 hidden">
        <div id="trendCard" class="rounded-xl p-4 border">
          <div class="text-lg font-bold text-center mb-2" id="productTitle"></div>
          <div class="text-center text-sm text-gray-300" id="trendAdvice"></div>
          <div class="text-center text-xs text-gray-400 mt-1" id="productTypeLabel"></div>
          <div class="text-center text-xs text-green mt-1">✅ 基於圖片K線100%精准批判</div>
        </div>
        
        <div id="strategyContainer"></div>
        
        <div class="bg-darker rounded-xl p-4 border border-gray-600" id="indicatorCard">
          <div class="text-sm font-bold text-white mb-3">📈 技術指標詳情</div>
          <div class="space-y-2">
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">產品類型</span>
              <span id="productType" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">EMA狀態</span>
              <span id="emaStatus" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">EMA角度</span>
              <span id="emaAngle" class="text-lg font-bold"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">交易適配</span>
              <span id="emaSuitable" class="text-lg font-bold"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">RSI詳細分析</span>
              <span id="rsiStatus" class="text-lg font-bold text-blue"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">當前價格</span>
              <span id="currentPrice" class="text-lg"></span>
            </div>
          </div>
        </div>
      </div>
      
      <button id="resetAiButton" class="w-full mt-3 py-2 border border-gray-600 rounded-lg text-gray-300 text-sm">
        重新上傳截圖
      </button>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 bg-darker border-t border-border pb-3 pt-2 z-30">
    <div class="max-w-sm mx-auto grid grid-cols-4 text-xs text-center">
      <button data-tab="home" class="tab-button pt-1 pb-1 rounded-lg text-indigo">
        <div class="text-lg mb-1">🏠</div>最新
      </button>
      <button data-tab="log" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📓</div>歷史
      </button>
      <button data-tab="stats" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📈</div>統計
      </button>
      <button data-tab="settings" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">⚙️</div>設定
      </button>
    </div>
  </div>

  <script>
    // ==================== 修复版悬浮窗核心功能 ====================
    let floatWindow, floatDrag, floatClose, floatMin, floatButton, floatData;
    let isDragging = false, offsetX, offsetY;

    // 初始化悬浮窗元素
    const initFloatWindow = () => {
      floatWindow = document.getElementById('floatWindow');
      floatDrag = document.getElementById('floatDrag');
      floatClose = document.getElementById('floatClose');
      floatMin = document.getElementById('floatMin');
      floatButton = document.getElementById('floatButton');
      floatData = document.getElementById('floatData');

      // 开关浮窗
      floatButton.addEventListener('click', () => {
        floatWindow.classList.toggle('hidden');
        if(!floatWindow.classList.contains('hidden')) {
          syncFloatData();
          floatWindow.style.right = '10px';
          floatWindow.style.top = '100px';
          floatWindow.style.left = 'auto';
        }
      });

      // 关闭浮窗
      floatClose.addEventListener('click', () => {
        floatWindow.classList.add('hidden');
      });
      
      // 最小化浮窗
      floatMin.addEventListener('click', () => {
        const content = document.getElementById('floatContent');
        content.classList.toggle('hidden');
      });

      // 拖动逻辑
      floatDrag.addEventListener('mousedown', (e) => {
        isDragging = true;
        const rect = floatWindow.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        floatWindow.style.cursor = 'grabbing';
        e.stopPropagation();
      });

      document.addEventListener('mousemove', (e) => {
        if(!isDragging) return;
        let x = e.clientX - offsetX;
        let y = e.clientY - offsetY;
        
        x = Math.max(0, Math.min(x, window.innerWidth - floatWindow.offsetWidth));
        y = Math.max(0, Math.min(y, window.innerHeight - floatWindow.offsetHeight));
        
        floatWindow.style.left = x + 'px';
        floatWindow.style.right = 'auto';
        floatWindow.style.top = y + 'px';
      });

      document.addEventListener('mouseup', () => {
        isDragging = false;
        if(floatDrag) floatDrag.style.cursor = 'move';
      });

      // 移动端触摸拖动
      floatDrag.addEventListener('touchstart', (e) => {
        isDragging = true;
        const touch = e.touches[0];
        const rect = floatWindow.getBoundingClientRect();
        offsetX = touch.clientX - rect.left;
        offsetY = touch.clientY - rect.top;
        e.stopPropagation();
      });

      document.addEventListener('touchmove', (e) => {
        if(!isDragging) return;
        const touch = e.touches[0];
        let x = touch.clientX - offsetX;
        let y = touch.clientY - offsetY;
        x = Math.max(0, Math.min(x, window.innerWidth - floatWindow.offsetWidth));
        y = Math.max(0, Math.min(y, window.innerHeight - floatWindow.offsetHeight));
        floatWindow.style.left = x + 'px';
        floatWindow.style.right = 'auto';
        floatWindow.style.top = y + 'px';
        e.preventDefault();
      });

      document.addEventListener('touchend', () => {
        isDragging = false;
      });
    };

    // 同步AI分析数据到悬浮窗
    const syncFloatData = () => {
      if(!state.aiAnalysis || !floatData) return;
      const a = state.aiAnalysis;
      const d = a.decimals || 0;
      
      if(a.trend === 'neutral'){
        floatData.innerHTML = `
          <div class="text-center font-bold text-white">${a.product}</div>
          <div class="text-center font-bold text-yellow mt-1">📊 盤整盤，無明確趨勢</div>
          <div class="text-center text-xs mt-1">EMA角度：${a.emaAngle || 0}° ${a.emaSuitable || ''}</div>
          <div class="text-center text-xs text-green mt-1">✅ 圖片精准批判</div>
        `;
        return;
      }

      floatData.innerHTML = `
        <div class="text-center font-bold text-white">${a.product}</div>
        <div class="flex justify-between ${a.trend==='long'?'text-red':a.trend==='short'?'text-green':'text-yellow'}">
          <span>趨勢</span><span>${a.trend==='long'?'多頭':a.trend==='short'?'空頭':'盤整盤'}</span>
        </div>
        <div class="flex justify-between text-white">
          <span>EMA角度</span><span>${a.emaAngle || 0}° ${a.emaSuitable || ''}</span>
        </div>
        <div class="flex justify-between text-white">
          <span>現價</span><span>${fmt(a.currentPrice, d)}</span>
        </div>
        <div class="text-[10px] border-t border-border pt-1">
          <div class="flex justify-between text-red">🔴 多: ${fmt(a.longEntry, d)}</div>
          <div class="flex justify-between text-green">🟢 空: ${fmt(a.shortEntry, d)}</div>
          <div class="flex justify-between text-yellow">🎯 止盈: ${fmt(a.longTp1, d)}/${fmt(a.shortTp1, d)}</div>
        </div>
      `;
    };
    // ======================================================

    const num = (v) => parseFloat(v) || 0;
    const fmt = (n, d = 0) =>
     !n || isNaN(n) || !isFinite(n) ? "—" : Number(n).toFixed(d);

    const priorityWeight = { "高": 3, "中": 2, "低": 1 };

    // 真實交易員勝率標準
    const getWinRate = (priority) => {
      switch(priority) {
        case "高": return "70%";
        case "中": return "60%";
        case "低": return "50%";
        default: return "55%";
      }
    };

    const PRODUCT_TYPES = {
      FUTURES: "期貨/指數",
      UNSUPPORTED: "不支援產品"
    };

    const saveData = (key, data) => {
      try {
        localStorage.setItem(`sniper_${key}`, JSON.stringify(data));
      } catch (e) {
        console.error("保存失敗:", e);
      }
    };

    const loadData = (key, defaultValue) => {
      try {
        const data = localStorage.getItem(`sniper_${key}`);
        return data ? JSON.parse(data) : defaultValue;
      } catch (e) {
        console.error("讀取失敗:", e);
        return defaultValue;
      }
    };

    // 全局狀態
    let state = {
      tab: "home",
      apiKey: loadData("apiKey", ""),
      proxyUrl: loadData("proxyUrl", "https://api.openai.com/v1/chat/completions"),
      aiAnalysis: loadData("aiAnalysis", null),
      aiHistory: loadData("aiHistory", []),
      aiImage: null,
      aiBase64: "",
      aiLoading: false,
      aiError: ""
    };

    const saveState = () => {
      saveData("apiKey", state.apiKey);
      saveData("proxyUrl", state.proxyUrl);
      saveData("aiAnalysis", state.aiAnalysis);
      saveData("aiHistory", state.aiHistory);
    };

    const showDebug = (message) => {
      const debugEl = document.getElementById('aiDebug');
      debugEl.textContent = message;
      debugEl.classList.remove('hidden');
      console.log("DEBUG:", message);
    };

    const hideDebug = () => {
      document.getElementById('aiDebug').classList.add('hidden');
    };

    const calculateProfit = (entry, target, isLong, decimals) => {
      const diff = isLong ? target - entry : entry - target;
      const percentage = (diff / entry * 100).toFixed(2);
      return `${fmt(diff, decimals)} (+${percentage}%)`;
    };

    const calculateLoss = (entry, stopLoss, isLong, decimals) => {
      const diff = isLong ? entry - stopLoss : stopLoss - entry;
      const percentage = (diff / entry * 100).toFixed(2);
      return `${fmt(diff, decimals)} (-${percentage}%)`;
    };

    // ==================== 核心修复：价格优化 + 自动计算止盈 ====================
    const optimizePrice = (price) => {
      return Math.round(price);
    };

    // 自动计算止盈点位（3R / 5R），彻底解决目标1、2相近问题
    const calculateTakeProfit = (entry, stopLoss, isLong, decimals) => {
      const risk = Math.abs(entry - stopLoss);
      let tp1, tp2;
      
      if (isLong) {
        tp1 = optimizePrice(entry + risk * 3);
        tp2 = optimizePrice(entry + risk * 5);
      } else {
        tp1 = optimizePrice(entry - risk * 3);
        tp2 = optimizePrice(entry - risk * 5);
      }
      
      return { tp1, tp2 };
    };
    // ========================================================================

    const renderHome = () => {
      return `
        ${state.aiAnalysis ? `
          <div class="bg-card border border-border rounded-2xl p-4">
            <div class="flex justify-between items-center mb-3">
              <div class="text-xs font-bold text-gray-400">🤖 最新AI偵測結果</div>
              <button id="resetCurrentButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded">重置</button>
            </div>
            <div class="text-center mb-4">
              <div class="text-lg font-bold text-indigo">${state.aiAnalysis.product}</div>
              <div class="text-xs text-gray-400">${state.aiAnalysis.productType || PRODUCT_TYPES.FUTURES}</div>
              <div class="text-xl font-bold ${state.aiAnalysis.trend === 'long' ? 'text-red' : state.aiAnalysis.trend === 'short' ? 'text-green' : 'text-yellow'}">
                ${state.aiAnalysis.trend === 'long' ? '🔴 偏多趨勢' : state.aiAnalysis.trend === 'short' ? '🟢 偏空趨勢' : '🟡 盤整盤'}
              </div>
              <div class="text-sm text-green mt-1">✅ 100%匹配圖片K線批判</div>
              <div class="text-sm text-gray-300 mt-1">EMA角度：${state.aiAnalysis.emaAngle || 0}° | ${state.aiAnalysis.emaSuitable || ''}</div>
              <div class="text-sm text-gray-300">${state.aiAnalysis.advice}</div>
              <div class="text-xs text-gray-500 mt-1">偵測時間: ${state.aiAnalysis.time}</div>
            </div>
            
            ${(() => {
              const decimals = state.aiAnalysis.decimals || 0;
              
              return `
                <div class="bg-darker rounded-xl p-3 border border-red/30 mb-3">
                  <div class="text-sm font-bold text-red mb-2">🔴 做多進場 (優先級: ${state.aiAnalysis.longPriority} | 勝率: ${getWinRate(state.aiAnalysis.longPriority)})</div>
                  <div class="grid grid-cols-3 gap-2 text-xs mb-2">
                    <div class="bg-black/30 p-2 rounded text-center">
                      <div class="text-gray-400">進場價</div>
                      <div class="font-bold text-red">${fmt(state.aiAnalysis.longEntry, decimals)}</div>
                    </div>
                    <div class="bg-black/30 p-2 rounded text-center">
                      <div class="text-gray-400">獲利目標1</div>
                      <div class="font-bold text-yellow">${fmt(state.aiAnalysis.longTp1, decimals)}</div>
                      <div class="text-xs text-green">${calculateProfit(state.aiAnalysis.longEntry, state.aiAnalysis.longTp1, true, decimals)}</div>
                    </div>
                    <div class="bg-black/30 p-2 rounded text-center">
                      <div class="text-gray-400">獲利目標2</div>
                      <div class="font-bold text-green">${fmt(state.aiAnalysis.longTp2, decimals)}</div>
                      <div class="text-xs text-green">${calculateProfit(state.aiAnalysis.longEntry, state.aiAnalysis.longTp2, true, decimals)}</div>
                    </div>
                  </div>
                  <div class="text-xs text-gray-400 mb-1">⛔ 止損: ${fmt(state.aiAnalysis.longStopLoss, decimals)} ${calculateLoss(state.aiAnalysis.longEntry, state.aiAnalysis.longStopLoss, true, decimals)}</div>
                  <div class="text-xs text-white bg-black/40 p-2 rounded border border-red/20">
                    📌 進場理由：${state.aiAnalysis.longReason || '基於圖片K線精准判斷'}
                  </div>
                </div>

                <div class="bg-darker rounded-xl p-3 border border-green/30">
                  <div class="text-sm font-bold text-green mb-2">🟢 做空進場 (優先級: ${state.aiAnalysis.shortPriority} | 勝率: ${getWinRate(state.aiAnalysis.shortPriority)})</div>
                  <div class="grid grid-cols-3 gap-2 text-xs mb-2">
                    <div class="bg-black/30 p-2 rounded text-center">
                      <div class="text-gray-400">進場價</div>
                      <div class="font-bold text-green">${fmt(state.aiAnalysis.shortEntry, decimals)}</div>
                    </div>
                    <div class="bg-black/30 p-2 rounded text-center">
                      <div class="text-gray-400">獲利目標1</div>
                      <div class="font-bold text-yellow">${fmt(state.aiAnalysis.shortTp1, decimals)}</div>
                      <div class="text-xs text-green">${calculateProfit(state.aiAnalysis.shortEntry, state.aiAnalysis.shortTp1, false, decimals)}</div>
                    </div>
                    <div class="bg-black/30 p-2 rounded text-center">
                      <div class="text-gray-400">獲利目標2</div>
                      <div class="font-bold text-green">${fmt(state.aiAnalysis.shortTp2, decimals)}</div>
                      <div class="text-xs text-green">${calculateProfit(state.aiAnalysis.shortEntry, state.aiAnalysis.shortTp2, false, decimals)}</div>
                    </div>
                  </div>
                  <div class="text-xs text-gray-400 mb-1">⛔ 止損: ${fmt(state.aiAnalysis.shortStopLoss, decimals)} ${calculateLoss(state.aiAnalysis.shortEntry, state.aiAnalysis.shortStopLoss, false, decimals)}</div>
                  <div class="text-xs text-white bg-black/40 p-2 rounded border border-green/20">
                    📌 進場理由：${state.aiAnalysis.shortReason || '基於圖片K線精准判斷'}
                  </div>
                </div>
              `;
            })()}
          </div>
        ` : `
          <div class="bg-card border border-border rounded-2xl p-4 text-center">
            <div class="text-gray-400 mb-2">還沒有偵測結果</div>
            <div class="text-sm text-gray-500">點擊右下角🤖按鈕上傳K線截圖</div>
          </div>
        `}
      `;
    };

    const renderLog = () => {
      return `
        <div class="flex justify-between items-center mb-2">
          <div class="text-lg font-bold">📓 AI偵測歷史</div>
          <button id="resetAllHistoryButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded">重置全部</button>
        </div>
        ${state.aiHistory.length === 0 
          ? '<div class="text-center text-gray-500 py-10">還沒有偵測記錄</div>' 
          : state.aiHistory.map((record, index) => `
            <div class="bg-card border border-border rounded-xl p-3 text-sm mb-3">
              <div class="flex justify-between mb-2">
                <span class="text-indigo font-bold">${record.product}</span>
                <span class="text-gray-400 text-xs">${record.time}</span>
              </div>
              <div class="flex justify-between mb-2">
                <span class="font-bold ${record.trend === 'long' ? 'text-red' : record.trend === 'short' ? 'text-green' : 'text-yellow'}">
                  ${record.trend === 'long' ? '🔴 偏多' : record.trend === 'short' ? '🟢 偏空' : '🟡 盤整盤'}
                </span>
                <span class="text-xs text-gray-400">EMA角度：${record.emaAngle || 0}°</span>
              </div>
              <div class="text-xs text-green mb-2">✅ 圖片K線精准批判</div>
              <div class="text-xs mb-2 ${record.emaSuitable?.includes('適合') ? 'text-green' : 'text-yellow'}">
                ${record.emaSuitable || ''}
              </div>
              
              ${(() => {
                const decimals = record.decimals || 0;

    // ==================== 核心修正：AI嚴格匹配圖片 + 强制止盈间距 ====================
    const callOpenAI = async (base64Image) => {
      const response = await fetch(state.proxyUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${state.apiKey}`
        },
        body: JSON.stringify({
          model: 'gpt-4o',
          messages: [
            {
              role: 'user',
              content: [
                {
                  type: 'text',
                  text: `【嚴格指令】你是專業期貨分析師，必須100%匹配上傳的K線圖片，嚴格批判點位、進出場，禁止捏造數據！
                  分析規則：
                  1. 完全根據圖片K線的價格、支撐阻力、EMA形態、RSI位置判斷
                  2. 進場/止損點位必須對應圖片真實價格
                  3. 止盈1嚴格=3倍風險(3R)，止盈2嚴格=5倍風險(5R)，禁止兩個目標點位相近！
                  4. 趨勢、EMA角度、交易適配性完全匹配圖片
                  5. 只返回標準JSON格式，無多餘文字
                  
                  返回JSON字段：
                  product: 產品名稱
                  productType: FUTURES
                  currentPrice: 圖片真實當前價格(數字)
                  decimals: 小數位數(0/1/2)
                  trend: long/short/neutral
                  advice: 基於圖片的簡短建議
                  longPriority: 高/中/低
                  longEntry: 圖片匹配的做多進場價
                  longStopLoss: 圖片匹配的做多止損
                  longTp1: 做多止盈1
                  longTp2: 做多止盈2
                  longReason: 基於圖片的做多批判理由
                  shortPriority: 高/中/低
                  shortEntry: 圖片匹配的做空進場價
                  shortStopLoss: 圖片匹配的做空止損
                  shortTp1: 做空止盈1
                  shortTp2: 做空止盈2
                  shortReason: 基於圖片的做空批判理由
                  emaStatus: EMA真實狀態
                  emaAngle: EMA真實角度(數字)
                  emaSuitable: 適合交易/不適合交易
                  rsi: RSI真實狀態`
                },
                {
                  type: 'image_url',
                  image_url: {
                    url: base64Image
                  }
                }
              ]
            }
          ],
          temperature: 0.1
        })
      });

      if (!response.ok) {
        throw new Error(`API調用失敗: ${response.status} ${response.statusText}`);
      }

      const data = await response.json();
      const content = data.choices[0].message.content;
      const jsonMatch = content.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("AI返回格式錯誤，無法解析");
      return JSON.parse(jsonMatch[0]);
    };

    const runAiAnalyze = async () => {
      showDebug("🔍 正在嚴格匹配圖片K線批判點位/進出場...");
      
      if (!state.apiKey) {
        state.aiError = "❌ 請先在設定頁面輸入你的OpenAI API Key";

      document.getElementById('analyzeButton').disabled = true;

      document.getElementById('aiResult').classList.add('hidden');

      try {
        let parseRes = await callOpenAI(state.aiBase64);
        
        // 价格优化
        parseRes.longEntry = optimizePrice(parseRes.longEntry);
        parseRes.longStopLoss = optimizePrice(parseRes.longStopLoss);
        parseRes.shortEntry = optimizePrice(parseRes.shortEntry);
        parseRes.shortStopLoss = optimizePrice(parseRes.shortStopLoss);

        // ==================== 关键修复：自动计算止盈，彻底解决点位相近 ====================
        const longTP = calculateTakeProfit(parseRes.longEntry, parseRes.longStopLoss, true, parseRes.decimals);
        const shortTP = calculateTakeProfit(parseRes.shortEntry, parseRes.shortStopLoss, false, parseRes.decimals);
        
        parseRes.longTp1 = longTP.tp1;
        parseRes.longTp2 = longTP.tp2;
        parseRes.shortTp1 = shortTP.tp1;
        parseRes.shortTp2 = shortTP.tp2;
        // ================================================================================
        
        parseRes.time = new Date().toLocaleString();
        state.aiAnalysis = parseRes;
        state.aiHistory.unshift(parseRes);
        if (state.aiHistory.length > 50) state.aiHistory = state.aiHistory.slice(0, 50);

        showDebug(`✅ 圖片K線精准批判完成`);
        setTimeout(hideDebug, 2000);

        state.aiError = `❌ 錯誤: ${err.message}`;
        document.getElementById('aiError').textContent = state.aiError;
        document.getElementById('aiError').classList.remove('hidden');

        document.getElementById('analyzeButton').textContent = "🔍 嚴格匹配圖片批判點位/進出場";
        document.getElementById('analyzeButton').disabled = false;
        render();
      }

      document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (event) => {
          state.aiBase64 = event.target.result;
          document.getElementById('previewImg').src = state.aiBase64;
          document.getElementById('imagePreview').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      });

      document.getElementById('analyzeButton').addEventListener('click', runAiAnalyze);

      document.getElementById('resetAiButton').addEventListener('click', () => {
        state.aiBase64 = "";
        state.aiImage = null;
        document.getElementById('fileInput').value = "";
        document.getElementById('imagePreview').classList.add('hidden');
        document.getElementById('aiResult').classList.add('hidden');
        document.getElementById('aiError').classList.add('hidden');
        hideDebug();
      });
    };

    window.addEventListener('DOMContentLoaded', () => {
      initFloatWindow();
      initEvents();
      render();
    });
  </script>
</body>
</html>
