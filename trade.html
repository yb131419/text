<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全品種AI智能偵測系統 | 整合中值版 · 趨勢50點獲利保證</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#07080f',
            darker: '#0d1018',
            card: '#111520',
            border: '#1a1e2e',
            green: '#1db954',
            red: '#e03e3e',
            blue: '#38bdf8',
            yellow: '#f59e0b',
            indigo: '#6366f1',
            purple: '#a855f7',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .tab-active {
        @apply bg-indigo/20 text-indigo;
      }
      .result-btn {
        @apply px-2 py-0.5 rounded text-[10px] font-bold border transition-all;
      }
      .result-win {
        @apply bg-green/20 text-green border-green/50;
      }
      .result-loss {
        @apply bg-red/20 text-red border-red/50;
      }
      .result-pending {
        @apply bg-gray-700/50 text-gray-400 border-gray-600;
      }
      .sl-stage-1 {
        @apply bg-yellow/20 text-yellow border-yellow/50;
      }
      .sl-stage-2 {
        @apply bg-red/20 text-red border-red/50;
      }
    }
  </style>
</head>
<body class="bg-dark text-gray-100 font-sans min-h-screen pb-24 relative">
  <!-- 頁頭 -->
  <div class="bg-darker border-b border-border p-4 text-center">
    <div class="text-xs text-gray-500 tracking-widest mb-1">全品種AI智能偵測系統</div>
    <div class="text-xl font-bold">⚡ 整合中值版 · 趨勢50點獲利保證</div>
    <div class="text-xs text-gray-400 mt-1">雙模型參數取中值計算 | 兩階段彈性停損 | 趨勢盤保證最低50點獲利空間</div>
  </div>

  <!-- 主要內容 -->
  <div id="content" class="max-w-sm mx-auto p-4 space-y-4"></div>

  <!-- AI分析按鈕 -->
  <button id="aiButton" class="fixed right-4 bottom-24 w-14 h-14 rounded-full bg-indigo shadow-lg flex items-center justify-center text-2xl z-50 pointer-events-auto">
    🤖
  </button>

  <!-- AI分析模態框 -->
  <div id="aiModal" class="fixed inset-0 bg-black/80 z-[9999] flex items-end sm:items-center justify-center hidden pointer-events-auto">
    <div class="bg-card w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-5 max-h-[85vh] overflow-y-auto scrollbar-hide">
      <div class="flex justify-between items-center mb-4">
        <h3 id="modalTitle" class="text-lg font-bold text-white">📊 整合中值AI智能偵測</h3>
        <button id="closeAiModal" class="text-gray-300 text-xl">✕</button>
      </div>
      <input id="fileInput" type="file" accept="image/*" multiple hidden />
      <button id="uploadButton" class="w-full border border-dashed border-indigo/50 rounded-xl py-6 text-indigo-300 mb-3">
        上傳K線截圖
        <div class="text-xs mt-1 text-gray-400">✅ 同時上傳5分+1分兩張獲得最佳效果 | 單張也可分析</div>
      </button>
      <div id="imagePreview" class="mb-3 hidden grid grid-cols-2 gap-2">
        <img id="previewImg1" src="" alt="K線1" class="w-full rounded-lg object-contain max-h-40" />
        <img id="previewImg2" src="" alt="K線2" class="w-full rounded-lg object-contain max-h-40" />
      </div>
      <div id="aiError" class="text-red text-sm mb-3 p-3 bg-red/15 rounded border border-red/30 whitespace-pre-line hidden"></div>
      <div id="aiDebug" class="text-blue text-sm mb-3 p-3 bg-blue/15 rounded border border-blue/30 whitespace-pre-line hidden"></div>
      <button id="analyzeButton" class="w-full py-3 rounded-lg bg-indigo font-bold mb-3">
        🔍 整合中值精準批判點位
      </button>
      
      <!-- AI分析結果 -->
      <div id="aiResult" class="space-y-4 hidden">
        <!-- 產品與總結卡片 -->
        <div id="trendCard" class="rounded-xl p-4 border">
          <div class="text-lg font-bold text-center mb-2" id="productTitle"></div>
          <div class="text-center text-sm text-gray-300 mb-1" id="productTypeLabel"></div>
          <div class="text-center text-base font-bold mb-1" id="trendAdvice"></div>
          <div class="text-center text-xs font-bold text-green mb-1" id="finalSuitability"></div>
          <div class="text-center text-xs text-green mb-1" id="finalWinRate"></div>
          <div class="text-center text-xs font-bold text-yellow" id="profitGuarantee"></div>
        </div>
        
        <!-- 5分K趨勢卡片 -->
        <div id="trend5mCard" class="rounded-xl p-4 border border-indigo/30 bg-indigo/5">
          <div class="text-sm font-bold text-indigo mb-2">📈 大趨勢判斷 (5分K週期)</div>
          <div id="trend5mContent"></div>
        </div>
        
        <!-- 1分K買點卡片 -->
        <div id="entry1mCard" class="rounded-xl p-4 border border-green/30 bg-green/5">
          <div class="text-sm font-bold text-green mb-2">🎯 精準進場點位 (1分K週期)</div>
          <div id="entry1mContent"></div>
        </div>

        <!-- 兩階段停損卡片 -->
        <div id="slCard" class="rounded-xl p-4 border border-yellow/30 bg-yellow/5">
          <div class="text-sm font-bold text-yellow mb-2">🛡️ 兩階段停損機制</div>
          <div id="slContent"></div>
        </div>
        
        <!-- 支撐阻力卡片 -->
        <div id="levelsCard" class="rounded-xl p-4 border border-purple/30 bg-purple/5">
          <div class="text-sm font-bold text-purple mb-2">📊 關鍵支撐/阻力位</div>
          <div id="levelsContent"></div>
        </div>
        
        <!-- 技術指標詳情 -->
        <div class="bg-darker rounded-xl p-4 border border-gray-600" id="indicatorCard">
          <div class="text-sm font-bold text-white mb-3">📋 技術指標詳細數據</div>
          <div class="space-y-2">
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">產品類型</span>
              <span id="productType" class="text-lg font-medium"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">整合EMA角度</span>
              <span id="emaAngle" class="text-lg font-bold text-indigo"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">交易適配度</span>
              <span id="emaSuitable" class="text-lg font-bold"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">ATR(14)波動率</span>
              <span id="atrValue" class="text-lg font-bold text-blue"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">EMA5 / EMA20</span>
              <span id="emaValues" class="text-sm"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">當前價格</span>
              <span id="currentPrice" class="text-lg font-medium"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded border border-green/30">
              <span class="text-gray-200 font-medium">預期目標獲利空間</span>
              <span id="profitSpace" class="text-lg font-bold text-green"></span>
            </div>
          </div>
        </div>
      </div>
      
      <button id="resetAiButton" class="w-full mt-3 py-2 border border-gray-600 rounded-lg text-gray-300 text-sm">
        重新上傳截圖
      </button>
    </div>
  </div>

  <!-- 底部導航 -->
  <div class="fixed bottom-0 left-0 right-0 bg-darker border-t border-border pb-3 pt-2 z-30">
    <div class="max-w-sm mx-auto grid grid-cols-4 text-xs text-center">
      <button data-tab="home" class="tab-button pt-1 pb-1 rounded-lg text-indigo">
        <div class="text-lg mb-1">🏠</div>最新
      </button>
      <button data-tab="log" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📓</div>歷史
      </button>
      <button data-tab="stats" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📈</div>統計
      </button>
      <button data-tab="settings" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">⚙️</div>設定
      </button>
    </div>
  </div>

  <script>
    // ========== 整合中值核心演算法 ==========
    const STAGE1_SL_POINTS = 20;   // 第一階段：防守停損 20點
    const STAGE2_SL_POINTS = 50;   // 第二階段：壓力位終極停損 50點
    const MIN_TREND_PROFIT = 50;   // 趨勢盤保證最低獲利 50點
    const TREND_ANGLE_THRESHOLD = 25; // 判定為強趨勢的角度門檻

    // 整合EMA角度：通用(2.5倍) + Mitrade(3.0倍) 取中值 = 2.75倍
    const calculateMergedEmaAngle = (ema5, ema20, currentPrice) => {
      const emaDiff = ema5 - ema20;
      const priceRatio = emaDiff / currentPrice * 10000;
      return Math.round(priceRatio * 2.75);
    };

    // 整合支撐阻力：5分K(1.5+1.2)/2=1.35倍ATR，1分K(1.0+0.8)/2=0.9倍ATR
    const calculateMergedLevels = (currentPrice, atr14, is5mChart) => {
      const multiplier = is5mChart ? 1.35 : 0.9;
      return {
        support: Math.round(currentPrice - atr14 * multiplier),
        resistance: Math.round(currentPrice + atr14 * multiplier)
      };
    };

    // 整合入場與基礎停損：ATR乘數取中值
    const calculateMergedEntryBaseSL = (currentPrice, trend, atr14, emaAngle) => {
      const absAngle = Math.abs(emaAngle);
      const atrMultiplier = absAngle >= 20 ? 0.8 : 0.65; // 強趨勢0.8，盤整0.65
      
      const entryOffset = absAngle >= 20 ? 1.5 : 4;
      return {
        longEntry: Math.round(currentPrice + (trend === 'long' ? entryOffset : entryOffset + 2)),
        longBaseSL: Math.round(currentPrice - atr14 * atrMultiplier),
        shortEntry: Math.round(currentPrice - (trend === 'short' ? entryOffset : entryOffset + 2)),
        shortBaseSL: Math.round(currentPrice + atr14 * atrMultiplier)
      };
    };

    // 兩階段停損計算
    const calculateTwoStageSL = (entry, baseSL, isLong) => {
      const baseRisk = Math.abs(entry - baseSL);
      
      // 第一階段：固定20點防守停損（若基礎停損比20點小則以基礎為準）
      const stage1SL = isLong 
        ? Math.round(entry - Math.min(STAGE1_SL_POINTS, baseRisk * 0.6))
        : Math.round(entry + Math.min(STAGE1_SL_POINTS, baseRisk * 0.6));
      
      // 第二階段：50點壓力位終極停損（若基礎停損更大則以基礎為準）
      const stage2SL = isLong
        ? Math.round(entry - Math.max(STAGE2_SL_POINTS, baseRisk))
        : Math.round(entry + Math.max(STAGE2_SL_POINTS, baseRisk));

      return { stage1SL, stage2SL, baseRisk };
    };

    // 止盈計算：趨勢盤強制保證50點以上獲利
    const calculateTakeProfit = (entry, stage2SL, isLong, isTrend) => {
      const maxRisk = Math.abs(entry - stage2SL);
      
      let tp1 = Math.round(entry + (isLong ? maxRisk * 1.75 : -maxRisk * 1.75));
      let tp2 = Math.round(entry + (isLong ? maxRisk * 2.5 : -maxRisk * 2.5));
      
      // 強趨勢盤：強制TP2獲利空間 ≥ 50點
      if (isTrend) {
        const profit2 = Math.abs(tp2 - entry);
        if (profit2 < MIN_TREND_PROFIT) {
          const expandRatio = MIN_TREND_PROFIT / profit2;
          tp2 = Math.round(entry + (isLong ? maxRisk * 2.5 * expandRatio : -maxRisk * 2.5 * expandRatio));
          tp1 = Math.round(entry + (isLong ? maxRisk * 1.75 * expandRatio : -maxRisk * 1.75 * expandRatio));
        }
      }

      return { tp1, tp2 };
    };

    // ========== 適配性與勝率評估 ==========
    const getSuitabilityDescription = (angle) => {
      const absAngle = Math.abs(angle);
      if (absAngle >= 28) return "極適合交易";
      if (absAngle >= 18) return "適合交易";
      if (absAngle >= 10) return "尚可交易";
      return "不適合交易";
    };

    const getWinRateBySuitability = (suitability) => {
      const rates = {
        "極適合交易": "85%",
        "適合交易": "78%",
        "尚可交易": "65%",
        "不適合交易": "48%"
      };
      return rates[suitability] || "50%";
    };

    const isNoVolatility = (atrValue, emaAngle) => {
      const absAngle = Math.abs(emaAngle);
      return atrValue < 9 || absAngle < 9;
    };

    const isStrongTrend = (emaAngle) => {
      return Math.abs(emaAngle) >= TREND_ANGLE_THRESHOLD;
    };

    // ========== 工具函數 ==========
    const num = (v) => parseFloat(v) || 0;
    const fmt = (n, d = 0) => !n || isNaN(n) || !isFinite(n) ? "—" : Number(n).toFixed(d);

    const PRODUCT_TYPES = {
      FUTURES: "期貨/指數",
      UNSUPPORTED: "不支援產品"
    };

    // ========== 本地存儲 ==========
    const saveData = (key, data) => {
      try { localStorage.setItem(`sniper_${key}`, JSON.stringify(data)); } catch(e) {}
    };

    const loadData = (key, defaultValue) => {
      try {
        const data = localStorage.getItem(`sniper_${key}`);
        return data ? JSON.parse(data) : defaultValue;
      } catch(e) { return defaultValue; }
    };

    // ========== 全局狀態 ==========
    let state = {
      tab: "home",
      apiKey: loadData("apiKey", ""),
      proxyUrl: loadData("proxyUrl", "https://api.openai.com/v1/chat/completions"),
      aiAnalysis: loadData("aiAnalysis", null),
      aiHistory: loadData("aiHistory", []),
      aiBase64s: [],
      aiLoading: false,
      aiError: "",
      logFilter: "all",
      slStage1: loadData("slStage1", STAGE1_SL_POINTS),
      slStage2: loadData("slStage2", STAGE2_SL_POINTS),
      minTrendProfit: loadData("minTrendProfit", MIN_TREND_PROFIT)
    };

    const saveState = () => {
      saveData("apiKey", state.apiKey);
      saveData("proxyUrl", state.proxyUrl);
      saveData("aiAnalysis", state.aiAnalysis);
      saveData("aiHistory", state.aiHistory);
      saveData("slStage1", state.slStage1);
      saveData("slStage2", state.slStage2);
      saveData("minTrendProfit", state.minTrendProfit);
    };

    // ========== 交易結果標記功能 ==========
    const toggleTradeResult = (index, result) => {
      if (!state.aiHistory[index]) return;
      if (state.aiHistory[index].result === result) {
        state.aiHistory[index].result = null;
      } else {
        state.aiHistory[index].result = result;
      }
      saveState();
      render();
    };

    // ========== UI輔助函數 ==========
    const showDebug = (msg) => {
      const el = document.getElementById('aiDebug');
      el.textContent = msg;
      el.classList.remove('hidden');
    };

    const hideDebug = () => document.getElementById('aiDebug').classList.add('hidden');

    const showError = (msg) => {
      const el = document.getElementById('aiError');
      el.textContent = msg;
      el.classList.remove('hidden');
    };

    const hideError = () => document.getElementById('aiError').classList.add('hidden');

    // ========== 頁面渲染函數 ==========
    const renderHome = () => {
      if (!state.aiAnalysis) {
        return `
          <div class="bg-card border border-border rounded-2xl p-4 text-center">
            <div class="text-gray-400 mb-2">還沒有偵測結果</div>
            <div class="text-sm text-gray-500">點擊右下角🤖按鈕上傳K線截圖開始分析</div>
          </div>
        `;
      }

      const a = state.aiAnalysis;
      const suitability = getSuitabilityDescription(a.emaAngle);
      const winRate = getWinRateBySuitability(suitability);
      const noVol = isNoVolatility(a.atr14, a.emaAngle);
      const strongTrend = isStrongTrend(a.emaAngle);
      const finalStatus = noVol ? "⚠️ 無波動盤 → 建議觀望" : suitability;
      const finalColor = noVol ? "text-yellow" : "text-green";
      
      // 動態計算獲利空間（依據方向對應TP2）
      const profitSpace = a.trend === 'long' 
        ? Math.abs(a.longTp2 - a.longEntry) 
        : Math.abs(a.shortTp2 - a.shortEntry);
      
      // 方向對應文字與顏色
      const trendText = a.trend === 'long' ? '🔴 偏多多頭趨勢' : a.trend === 'short' ? '🟢 偏空空頭趨勢' : '🟡 震盪盤整';
      const trendColor = a.trend === 'long' ? 'text-red' : a.trend === 'short' ? 'text-green' : 'text-yellow';
      const orderTypeText = a.trend === 'long' ? '做多單' : '做空單';
      const orderEntry = a.trend === 'long' ? a.longEntry : a.shortEntry;

      return `
        <div class="bg-card border border-border rounded-2xl p-4">
          <div class="flex justify-between items-center mb-3">
            <div class="text-xs font-bold text-gray-400">🤖 最新AI偵測結果 (整合中值演算法)</div>
            <button id="resetCurrentButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded">重置</button>
          </div>
          
          <!-- 產品與方向總結 -->
          <div class="text-center mb-4 pb-3 border-b border-gray-700">
            <div class="text-lg font-bold text-indigo mb-1">${a.product}</div>
            <div class="text-xs text-gray-400 mb-2">${a.productType || PRODUCT_TYPES.FUTURES}</div>
            <div class="text-xl font-bold ${trendColor} mb-2">${trendText}</div>
            <div class="text-base font-bold ${finalColor} mb-1">${finalStatus}</div>
            <div class="text-sm text-green font-medium mb-1">預期勝率：${winRate}</div>
            ${strongTrend ? `<div class="text-sm font-bold text-yellow">🏆 強趨勢盤認證 · 保證獲利 ≥ ${state.minTrendProfit} 點</div>` : ''}
            <div class="text-xs text-gray-500 mt-2">偵測時間：${a.time}</div>
          </div>
          
          <!-- 趨勢判斷 -->
          <div class="bg-indigo/10 rounded-xl p-3 border border-indigo/30 mb-3">
            <div class="text-sm font-bold text-indigo mb-2">📈 大趨勢判斷 (5分K週期)</div>
            <div class="text-sm text-gray-300">
              整合EMA角度：<span class="font-bold text-white">${a.emaAngle}°</span><br>
              ATR(14)波動率：<span class="font-bold text-blue">${a.atr14}</span><br>
              操作建議：<span class="font-medium">${a.trend === 'long' ? '逢低佈局做多單' : a.trend === 'short' ? '逢高佈局做空單' : '觀望為主，等待方向明確'}</span>
            </div>
          </div>

          <!-- 兩階段停損 -->
          <div class="bg-yellow/10 rounded-xl p-3 border border-yellow/30 mb-3">
            <div class="text-sm font-bold text-yellow mb-2">🛡️ 兩階段風控停損</div>
            <div class="grid grid-cols-2 gap-2 text-xs">
              <div class="bg-black/30 p-2 rounded text-center border border-yellow/40">
                <div class="text-yellow font-medium mb-1">第一階段 防守</div>
                <div class="font-bold text-white text-base">${fmt(a.trend === 'long' ? a.longStage1SL : a.shortStage1SL, a.decimals)}</div>
                <div class="text-gray-400 mt-1">約 ${state.slStage1} 點風險</div>
              </div>
              <div class="bg-black/30 p-2 rounded text-center border border-red/40">
                <div class="text-red font-medium mb-1">第二階段 終極</div>
                <div class="font-bold text-white text-base">${fmt(a.trend === 'long' ? a.longStage2SL : a.shortStage2SL, a.decimals)}</div>
                <div class="text-gray-400 mt-1">約 ${state.slStage2} 點風險</div>
              </div>
            </div>
          </div>
          
          <!-- 支撐阻力 -->
          <div class="bg-purple/10 rounded-xl p-3 border border-purple/30 mb-3">
            <div class="text-sm font-bold text-purple mb-2">📊 關鍵支撐 / 阻力位</div>
            <div class="grid grid-cols-2 gap-2 text-xs">
              <div class="bg-black/30 p-2 rounded text-center">
                <div class="text-gray-400 mb-1">支撐位</div>
                <div class="font-bold text-green text-base">${fmt(a.support, a.decimals)}</div>
              </div>
              <div class="bg-black/30 p-2 rounded text-center">
                <div class="text-gray-400 mb-1">阻力位</div>
                <div class="font-bold text-red text-base">${fmt(a.resistance, a.decimals)}</div>
              </div>
            </div>
          </div>
          
          <!-- 精準買點 -->
          <div class="bg-green/10 rounded-xl p-3 border border-green/30">

1. 從圖中提取當前價格、EMA5均線、EMA20均線、ATR(14)數值
2. 識別產品名稱、小數位數
3. 判斷趨勢：EMA5在EMA20上方且角度向上為long(多頭)；EMA5在EMA20下方且角度向下為short(空頭)；否則盤整
4. 只返回標準JSON格式，欄位：product(產品名), productType(產品類型), currentPrice(當前價格), decimals(小數位數), trend(long/short/sideways), advice(操作建議), ema5(EMA5數值), ema20(EMA20數值), atr14(ATR14數值)
5. 數值請精準，不要胡亂編造，若圖中無法識別的數值請合理估算`;

      const content = [{ type: 'text', text: systemPrompt }];
      imgs.forEach(img => {
        content.push({ 
          type: 'image_url', 
          image_url: { url: img, detail: "high" } 
        });
      });

      let res;
      try {
        res = await fetch(state.proxyUrl, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json', 
            'Authorization': `Bearer ${state.apiKey}` 
          },
          body: JSON.stringify({ 
            model: 'gpt-4o', 
            messages: [{ role: 'user', content }], 
            temperature: 0.1,
            max_tokens: 1000
          })
        });
      } catch (networkErr) {
        throw new Error(`網路連線失敗 (Load Error)

可能原因：
1. 代理伺服器位址無效或不支援CORS跨域
2. 網路連線不穩定或防火牆攔截
3. API代理服務暫時無法存取

建議：
• 更換可用的API代理位址後重試
• 檢查網路連線是否正常
• 確認API金鑰是否正確輸入`);
      }

      // 處理HTTP錯誤
      if (!res.ok) {
        let errMsg = `API 請求錯誤 (HTTP ${res.status})`;
        try {
          const errData = await res.json();
          if (errData.error) {
            errMsg += `\n\n錯誤類型：${errData.error.type || '未知錯誤'}\n詳細說明：${errData.error.message || '無詳細資訊'}`;
          }
        } catch(e) {}
        
        if (res.status === 401) {
          errMsg += "\n\n💡 請檢查 API 金鑰是否正確，或是否已過期";
        } else if (res.status === 429) {
          errMsg += "\n\n💡 請求過於頻繁，請稍後再試；或檢查帳號額度是否不足";
        } else if (res.status === 404) {
          errMsg += "\n\n💡 代理位址路徑錯誤，請確認代理URL是否正確";
        } else if (res.status >= 500) {
          errMsg += "\n\n💡 伺服器端錯誤，請稍後重試或更換代理位址";
        }
        
        throw new Error(errMsg);
      }

      const data = await res.json();
      
      if (!data.choices || !data.choices[0] || !data.choices[0].message) {
        throw new Error("API 返回格式異常，無法解析分析結果，請重試");
      }

      // 提取JSON
      const match = data.choices[0].message.content.match(/\{[\s\S]*\}/);
      if (!match) {
        throw new Error("AI 回應內容無法解析為標準格式，請重新上傳更清晰的K線截圖");
      }

      let parsedData;
      try {
        parsedData = JSON.parse(match[0]);
      } catch (parseErr) {
        throw new Error("JSON 解析失敗，AI 回傳格式不正確，請重試");
      }
      
      // ===== 整合中值後處理 =====
      parsedData.result = null;
      
      // 計算整合EMA角度
      parsedData.emaAngle = calculateMergedEmaAngle(
        num(parsedData.ema5), 
        num(parsedData.ema20), 
        num(parsedData.currentPrice)
      );
      
      // 計算支撐阻力 (1分K級別)
      const levels = calculateMergedLevels(
        num(parsedData.currentPrice), 
        num(parsedData.atr14), 
        false
      );
      parsedData.support = levels.support;
      parsedData.resistance = levels.resistance;
      
      // 計算入場點與基礎停損
      const entryBase = calculateMergedEntryBaseSL(
        num(parsedData.currentPrice), 
        parsedData.trend, 
        num(parsedData.atr14), 
        parsedData.emaAngle
      );
      Object.assign(parsedData, entryBase);
      
      // 計算兩階段停損
      const longSL = calculateTwoStageSL(parsedData.longEntry, parsedData.longBaseSL, true);
      const shortSL = calculateTwoStageSL(parsedData.shortEntry, parsedData.shortBaseSL, false);
      parsedData.longStage1SL = longSL.stage1SL;
      parsedData.longStage2SL = longSL.stage2SL;
      parsedData.shortStage1SL = shortSL.stage1SL;
      parsedData.shortStage2SL = shortSL.stage2SL;
      
      // 計算止盈 (含趨勢盤獲利保證)
      const isTrend = isStrongTrend(parsedData.emaAngle);
      const longTP = calculateTakeProfit(parsedData.longEntry, parsedData.longStage2SL, true, isTrend);
      const shortTP = calculateTakeProfit(parsedData.shortEntry, parsedData.shortStage2SL, false, isTrend);
      parsedData.longTp1 = longTP.tp1;
      parsedData.longTp2 = longTP.tp2;
      parsedData.shortTp1 = shortTP.tp1;
      parsedData.shortTp2 = shortTP.tp2;
      
      // 補充時間戳
      parsedData.time = new Date().toLocaleString('zh-TW');
      
      return parsedData;
    };

    // ========== 分析按鈕事件 ==========
    const runAiAnalyze = async () => {
      hideError();
      showDebug("正在進行整合中值分析，請稍候...");
      
      // 驗證
      if (!state.apiKey || !state.apiKey.trim()) { 
        hideDebug();
        showError("❌ 請先在設定頁面輸入有效的 OpenAI API 金鑰"); 
        return; 
      }
      if (state.aiBase64s.length === 0) { 
        hideDebug();
        showError("❌ 請先上傳至少一張 K 線截圖再進行分析"); 
        return; 
      }
      
      const analyzeBtn = document.getElementById('analyzeButton');
      const originalText = analyzeBtn.textContent;
      analyzeBtn.textContent = "⏳ 分析中，請稍候...";
      analyzeBtn.disabled = true;

      try {
        const result = await callOpenAI(state.aiBase64s);
        
        // 保存結果
        state.aiAnalysis = result;
        state.aiHistory.unshift(result);
        
        // 限制歷史紀錄數量
        if (state.aiHistory.length > 200) {
          state.aiHistory = state.aiHistory.slice(0, 200);
        }
        
        saveState();
        
        // 更新UI
        renderAiResult();
        render(); // 更新首頁
        
        showDebug("✅ 分析完成！");
        setTimeout(hideDebug, 1500);
        
      } catch (err) {
        showError(err.message || "分析過程發生未知錯誤，請重試");
        hideDebug();
      } finally {
        analyzeBtn.textContent = originalText;
        analyzeBtn.disabled = false;
      }
    };

    // ========== 全域初始化 ==========
    const initApp = () => {
      // AI模態框相關
      document.getElementById('aiButton').addEventListener('click', () => {
        document.getElementById('aiModal').classList.remove('hidden');
        // 如果已有分析結果，直接顯示
        if (state.aiAnalysis) {
          renderAiResult();
        }
      });
      
      document.getElementById('closeAiModal').addEventListener('click', () => {
        document.getElementById('aiModal').classList.add('hidden');
      });
      
      // 點擊背景關閉
      document.getElementById('aiModal').addEventListener('click', (e) => {
        if (e.target.id === 'aiModal') {
          document.getElementById('aiModal').classList.add('hidden');
        }
      });
      
      // 上傳圖片
      document.getElementById('uploadButton').addEventListener('click', () => {
        document.getElementById('fileInput').click();
      });
      
      document.getElementById('fileInput').addEventListener('change', e => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        
        state.aiBase64s = [];
        let loadedCount = 0;
        
        files.forEach((file, index) => {
          const reader = new FileReader();
          reader.onload = ev => {
            state.aiBase64s.push(ev.target.result);
            loadedCount++;
            
            // 顯示預覽
            if (index === 0) {
              document.getElementById('previewImg1').src = ev.target.result;
            }
            if (index === 1) {
              document.getElementById('previewImg2').src = ev.target.result;
            }
            
            // 全部載入完成
            if (loadedCount === files.length) {
              document.getElementById('imagePreview').classList.remove('hidden');
              // 只有一張時隱藏第二個預覽
              document.getElementById('previewImg2').style.display = files.length < 2 ? 'none' : 'block';
            }
          };
          reader.readAsDataURL(file);
        });
      });

      // 分析按鈕
      document.getElementById('analyzeButton').addEventListener('click', runAiAnalyze);
      
      // 重置分析
      document.getElementById('resetAiButton').addEventListener('click', () => {
        state.aiBase64s = [];
        document.getElementById('fileInput').value = "";
        document.getElementById('imagePreview').classList.add('hidden');
        document.getElementById('aiResult').classList.add('hidden');
        hideError();
        hideDebug();
      });
      
      // 底部導航切換
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.addEventListener('click', e => {
          const tab = e.currentTarget.dataset.tab;
          state.tab = tab;
          
          // 更新按鈕樣式
          document.querySelectorAll('.tab-button').forEach(b => {
            b.classList.remove('text-indigo');
            b.classList.add('text-gray-400');
          });
          e.currentTarget.classList.remove('text-gray-400');
          e.currentTarget.classList.add('text-indigo');
          
          render();
        });
      });
      
      // 首次渲染
      render();
    };

    // 頁面載入完成後初始化
    document.addEventListener('DOMContentLoaded', initApp);
    
    // 暴露全域函數給onclick使用
    window.toggleTradeResult = toggleTradeResult;
  </script>
