<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全品種AI智能偵測系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#07080f',
            darker: '#0d1018',
            card: '#111520',
            border: '#1a1e2e',
            green: '#1db954', // 下跌/做空
            red: '#e03e3e',   // 上漲/做多
            blue: '#38bdf8',
            yellow: '#f59e0b',
            indigo: '#6366f1',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
    }
  </style>
</head>
<body class="bg-dark text-gray-100 font-sans min-h-screen pb-24 relative">
  <!-- 頂部標題 -->
  <div class="bg-darker border-b border-border p-4 text-center">
    <div class="text-xs text-gray-500 tracking-widest mb-1">全品種AI智能偵測系統</div>
    <div class="text-xl font-bold">⚡ 產品專屬精準進出點位</div>
  </div>

  <!-- 主內容區 -->
  <div id="content" class="max-w-sm mx-auto p-4 space-y-4"></div>

  <!-- 浮動AI看盤按鈕 -->
  <button id="aiButton" class="fixed right-4 bottom-24 w-14 h-14 rounded-full bg-indigo shadow-lg flex items-center justify-center text-2xl z-40">
    🤖
  </button>

  <!-- AI看盤彈窗模態框 -->
  <div id="aiModal" class="fixed inset-0 bg-black/80 z-50 flex items-end sm:items-center justify-center hidden">
    <div class="bg-card w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-5 max-h-[85vh] overflow-y-auto scrollbar-hide">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-white">📊 AI 智能偵測</h3>
        <button id="closeAiModal" class="text-gray-300 text-xl">✕</button>
      </div>
      <input id="fileInput" type="file" accept="image/*" hidden />
      <button id="uploadButton" class="w-full border border-dashed border-indigo/50 rounded-xl py-6 text-indigo-300 mb-3">
        上傳任何產品K線截圖
        <div class="text-xs mt-1 text-gray-400">✅ NQ ✅ 黃金 ✅ 原油 ✅ 比特幣</div>
      </button>
      <div id="imagePreview" class="mb-3 hidden">
        <img id="previewImg" src="" alt="chart preview" class="w-full rounded-lg object-contain max-h-52" />
      </div>
      <div id="aiError" class="text-red text-sm mb-3 p-3 bg-red/15 rounded border border-red/30 whitespace-pre-line hidden"></div>
      <div id="aiDebug" class="text-blue text-sm mb-3 p-3 bg-blue/15 rounded border border-blue/30 whitespace-pre-line hidden"></div>
      <button id="analyzeButton" class="w-full py-3 rounded-lg bg-indigo font-bold mb-3">
        生成產品專屬交易點位
      </button>
      
      <!-- 雙向實盤點位區域 -->
      <div id="aiResult" class="space-y-4 hidden">
        <!-- 產品與趨勢判斷 -->
        <div id="trendCard" class="rounded-xl p-4 border">
          <div class="text-lg font-bold text-center mb-2" id="productTitle"></div>
          <div class="text-center text-sm text-gray-300" id="trendAdvice"></div>
        </div>
        
        <!-- 🔴 做多策略卡片 (紅漲) -->
        <div class="bg-darker rounded-xl p-4 border border-red/30">
          <div class="text-sm font-bold text-red mb-3">🔴 做多策略 (優先級: <span id="longPriority"></span>)</div>
          <div class="grid grid-cols-2 gap-2 text-sm">
            <div class="bg-black/30 p-2 rounded text-center border border-red/50">
              <div class="text-gray-400 text-xs">進場價</div>
              <div class="text-xl font-bold text-red" id="longEntry"></div>
            </div>
            <div class="bg-black/30 p-2 rounded text-center border border-green/50">
              <div class="text-gray-400 text-xs">⛔ 絕對止損</div>
              <div class="text-xl font-bold text-green" id="longStopLoss"></div>
            </div>
            <div class="bg-black/30 p-2 rounded text-center">
              <div class="text-gray-400 text-xs">✅ 止盈1 (3R)</div>
              <div class="text-xl font-bold text-yellow" id="longTp1"></div>
            </div>
            <div class="bg-black/30 p-2 rounded text-center">
              <div class="text-gray-400 text-xs">✅ 止盈2 (5R)</div>
              <div class="text-xl font-bold text-red" id="longTp2"></div>
            </div>
          </div>
          <div class="mt-2 text-xs text-gray-400" id="longCondition"></div>
          <div class="mt-2 text-xs text-white bg-black/40 p-2 rounded border border-red/20" id="longReason">
            📌 進場理由：
          </div>
          <div class="mt-2 text-xs text-yellow-400 bg-yellow/10 p-2 rounded border border-yellow/20" id="longExit">
            📌 出場策略：止盈1平50%倉位，移動止損到進場價；止盈2平剩餘50%；觸及止損立即全平
          </div>
          <div class="mt-1 text-xs text-yellow-400" id="longProfit"></div>
        </div>
        
        <!-- 🟢 做空策略卡片 (綠跌) -->
        <div class="bg-darker rounded-xl p-4 border border-green/30">
          <div class="text-sm font-bold text-green mb-3">🟢 做空策略 (優先級: <span id="shortPriority"></span>)</div>
          <div class="grid grid-cols-2 gap-2 text-sm">
            <div class="bg-black/30 p-2 rounded text-center border border-green/50">
              <div class="text-gray-400 text-xs">進場價</div>
              <div class="text-xl font-bold text-green" id="shortEntry"></div>
            </div>
            <div class="bg-black/30 p-2 rounded text-center border border-red/50">
              <div class="text-gray-400 text-xs">⛔ 絕對止損</div>
              <div class="text-xl font-bold text-red" id="shortStopLoss"></div>
            </div>
            <div class="bg-black/30 p-2 rounded text-center">
              <div class="text-gray-400 text-xs">✅ 止盈1 (3R)</div>
              <div class="text-xl font-bold text-yellow" id="shortTp1"></div>
            </div>
            <div class="bg-black/30 p-2 rounded text-center">
              <div class="text-gray-400 text-xs">✅ 止盈2 (5R)</div>
              <div class="text-xl font-bold text-green" id="shortTp2"></div>
            </div>
          </div>
          <div class="mt-2 text-xs text-gray-400" id="shortCondition"></div>
          <div class="mt-2 text-xs text-white bg-black/40 p-2 rounded border border-green/20" id="shortReason">
            📌 進場理由：
          </div>
          <div class="mt-2 text-xs text-yellow-400 bg-yellow/10 p-2 rounded border border-yellow/20" id="shortExit">
            📌 出場策略：止盈1平50%倉位，移動止損到進場價；止盈2平剩餘50%；觸及止損立即全平
          </div>
          <div class="mt-1 text-xs text-yellow-400" id="shortProfit"></div>
        </div>
        
        <!-- 技術分析卡片 -->
        <div class="bg-darker rounded-xl p-4 border border-gray-600">
          <div class="text-sm font-bold text-white mb-3">📈 技術分析</div>
          <div class="space-y-2">
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">產品類型</span>
              <span id="productType" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">EMA狀態</span>
              <span id="emaStatus" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">RSI動能</span>
              <span id="rsiStatus" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">當前價格</span>
              <span id="currentPrice" class="text-lg"></span>
            </div>
          </div>
        </div>
      </div>
      
      <button id="resetAiButton" class="w-full mt-3 py-2 border border-gray-600 rounded-lg text-gray-300 text-sm">
        重新上傳截圖
      </button>
    </div>
  </div>

  <!-- 底部導航 -->
  <div class="fixed bottom-0 left-0 right-0 bg-darker border-t border-border pb-3 pt-2 z-30">
    <div class="max-w-sm mx-auto grid grid-cols-4 text-xs text-center">
      <button data-tab="home" class="tab-button pt-1 pb-1 rounded-lg text-indigo">
        <div class="text-lg mb-1">🏠</div>最新
      </button>
      <button data-tab="log" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📓</div>歷史
      </button>
      <button data-tab="stats" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📈</div>統計
      </button>
      <button data-tab="settings" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">⚙️</div>設定
      </button>
    </div>
  </div>

  <script>
    // 工具函式
    const num = (v) => parseFloat(v) || 0;
    const fmt = (n, d = 2) =>
      !n || isNaN(n) || !isFinite(n) ? "—" : Number(n).toFixed(d);

    // 產品參數配置 (15分鐘周期標準波動)
    const PRODUCT_PARAMS = {
      "NQ": { stopLoss: 30, tp1: 90, tp2: 150, unit: "點", decimals: 1 },
      "黃金": { stopLoss: 5, tp1: 15, tp2: 25, unit: "美元", decimals: 2 },
      "原油": { stopLoss: 0.5, tp1: 1.5, tp2: 2.5, unit: "美元", decimals: 2 },
      "比特幣": { stopLoss: 300, tp1: 900, tp2: 1500, unit: "美元", decimals: 2 },
      "未知": { stopLoss: 30, tp1: 90, tp2: 150, unit: "點", decimals: 1 }
    };

    // 本地存儲持久化
    const saveData = (key, data) => {
      try {
        localStorage.setItem(`sniper_${key}`, JSON.stringify(data));
      } catch (e) {
        console.error("保存失敗:", e);
      }
    };

    const loadData = (key, defaultValue) => {
      try {
        const data = localStorage.getItem(`sniper_${key}`);
        return data ? JSON.parse(data) : defaultValue;
      } catch (e) {
        console.error("讀取失敗:", e);
        return defaultValue;
      }
    };

    // 全局狀態
    let state = {
      tab: "home",
      apiKey: loadData("apiKey", ""),
      proxyUrl: loadData("proxyUrl", "https://api.openai.com/v1/chat/completions"),
      aiAnalysis: loadData("aiAnalysis", null),
      aiHistory: loadData("aiHistory", []),
      aiImage: null,
      aiBase64: "",
      aiLoading: false,
      aiError: ""
    };

    // 保存狀態
    const saveState = () => {
      saveData("apiKey", state.apiKey);
      saveData("proxyUrl", state.proxyUrl);
      saveData("aiAnalysis", state.aiAnalysis);
      saveData("aiHistory", state.aiHistory);
    };

    // 顯示調試信息
    const showDebug = (message) => {
      const debugEl = document.getElementById('aiDebug');
      debugEl.textContent = message;
      debugEl.classList.remove('hidden');
      console.log("DEBUG:", message);
    };

    // 隱藏調試信息
    const hideDebug = () => {
      document.getElementById('aiDebug').classList.add('hidden');
    };

    // 渲染首頁 (最新AI偵測結果 - 完整顯示)
    const renderHome = () => {
      return `
        ${state.aiAnalysis ? `
          <div class="bg-card border border-border rounded-2xl p-4">
            <div class="flex justify-between items-center mb-3">
              <div class="text-xs font-bold text-gray-400">🤖 最新AI偵測結果</div>
              <button id="resetCurrentButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded">重置</button>
            </div>
            <div class="text-center mb-4">
              <div class="text-lg font-bold text-indigo">${state.aiAnalysis.product}</div>
              <div class="text-xl font-bold ${state.aiAnalysis.trend === 'long' ? 'text-red' : state.aiAnalysis.trend === 'short' ? 'text-green' : 'text-yellow'}">
                ${state.aiAnalysis.trend === 'long' ? '🔴 偏多趨勢' : state.aiAnalysis.trend === 'short' ? '🟢 偏空趨勢' : '🟡 震盪趨勢'}
              </div>
              <div class="text-sm text-gray-300">${state.aiAnalysis.advice}</div>
              <div class="text-xs text-gray-500 mt-1">偵測時間: ${state.aiAnalysis.time}</div>
            </div>
            
            <!-- 完整做多策略 -->
            <div class="bg-darker rounded-xl p-3 border border-red/30 mb-3">
              <div class="text-sm font-bold text-red mb-2">🔴 做多 (優先級: ${state.aiAnalysis.longPriority})</div>
              <div class="grid grid-cols-3 gap-2 text-xs mb-2">
                <div class="bg-black/30 p-2 rounded text-center">
                  <div class="text-gray-400">進場</div>
                  <div class="font-bold text-red">${fmt(state.aiAnalysis.longEntry, PRODUCT_PARAMS[state.aiAnalysis.product]?.decimals || 1)}</div>
                </div>
                <div class="bg-black/30 p-2 rounded text-center">
                  <div class="text-gray-400">止盈1</div>
                  <div class="font-bold text-yellow">${fmt(state.aiAnalysis.longTp1, PRODUCT_PARAMS[state.aiAnalysis.product]?.decimals || 1)}</div>
                </div>
                <div class="bg-black/30 p-2 rounded text-center">
                  <div class="text-gray-400">止盈2</div>
                  <div class="font-bold text-green">${fmt(state.aiAnalysis.longTp2, PRODUCT_PARAMS[state.aiAnalysis.product]?.decimals || 1)}</div>
                </div>
              </div>
              <div class="text-xs text-gray-400 mb-1">⛔ 止損: ${fmt(state.aiAnalysis.longStopLoss, PRODUCT_PARAMS[state.aiAnalysis.product]?.decimals || 1)}</div>
              <div class="text-xs text-yellow-400">📌 出場: 止盈1平50%，移動止損到進場價；止盈2全平</div>
            </div>
            
            <!-- 完整做空策略 -->
            <div class="bg-darker rounded-xl p-3 border border-green/30">
              <div class="text-sm font-bold text-green mb-2">🟢 做空 (優先級: ${state.aiAnalysis.shortPriority})</div>
              <div class="grid grid-cols-3 gap-2 text-xs mb-2">
                <div class="bg-black/30 p-2 rounded text-center">
                  <div class="text-gray-400">進場</div>
                  <div class="font-bold text-green">${fmt(state.aiAnalysis.shortEntry, PRODUCT_PARAMS[state.aiAnalysis.product]?.decimals || 1)}</div>
                </div>
                <div class="bg-black/30 p-2 rounded text-center">
                  <div class="text-gray-400">止盈1</div>
                  <div class="font-bold text-yellow">${fmt(state.aiAnalysis.shortTp1, PRODUCT_PARAMS[state.aiAnalysis.product]?.decimals || 1)}</div>
                </div>
                <div class="bg-black/30 p-2 rounded text-center">
                  <div class="text-gray-400">止盈2</div>
                  <div class="font-bold text-green">${fmt(state.aiAnalysis.shortTp2, PRODUCT_PARAMS[state.aiAnalysis.product]?.decimals || 1)}</div>
                </div>
              </div>
              <div class="text-xs text-gray-400 mb-1">⛔ 止損: ${fmt(state.aiAnalysis.shortStopLoss, PRODUCT_PARAMS[state.aiAnalysis.product]?.decimals || 1)}</div>
              <div class="text-xs text-yellow-400">📌 出場: 止盈1平50%，移動止損到進場價；止盈2全平</div>
            </div>
          </div>
        ` : `
          <div class="bg-card border border-border rounded-2xl p-4 text-center">
            <div class="text-gray-400 mb-2">還沒有偵測結果</div>
            <div class="text-sm text-gray-500">點擊右下角🤖按鈕上傳任何產品截圖</div>
          </div>
        `}
      `;
    };

    // 渲染歷史頁 (AI偵測記錄 - 完整顯示)
    const renderLog = () => {
      return `
        <div class="flex justify-between items-center mb-2">
          <div class="text-lg font-bold">📓 AI偵測歷史</div>
          <button id="resetAllHistoryButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded">重置全部</button>
        </div>
        ${state.aiHistory.length === 0 
          ? '<div class="text-center text-gray-500 py-10">還沒有偵測記錄</div>' 
          : state.aiHistory.map((record, index) => `
            <div class="bg-card border border-border rounded-xl p-3 text-sm mb-3">
              <div class="flex justify-between mb-2">
                <span class="text-indigo font-bold">${record.product}</span>
                <span class="text-gray-400 text-xs">${record.time}</span>
              </div>
              <div class="flex justify-between mb-2">
                <span class="font-bold ${record.trend === 'long' ? 'text-red' : record.trend === 'short' ? 'text-green' : 'text-yellow'}">
                  ${record.trend === 'long' ? '🔴 偏多' : record.trend === 'short' ? '🟢 偏空' : '🟡 震盪'}
                </span>
                <span class="text-xs text-gray-400">${record.advice}</span>
              </div>
              
              <!-- 歷史做多記錄 -->
              <div class="bg-red/5 rounded-lg p-2 mb-2 border border-red/20">
                <div class="text-xs font-bold text-red mb-1">
                  做多 (${record.longPriority}) | 進場: ${fmt(record.longEntry, PRODUCT_PARAMS[record.product]?.decimals || 1)}
                </div>
                <div class="text-xs text-gray-400">
                  止盈: ${fmt(record.longTp1, PRODUCT_PARAMS[record.product]?.decimals || 1)} / ${fmt(record.longTp2, PRODUCT_PARAMS[record.product]?.decimals || 1)} 
                  | 止損: ${fmt(record.longStopLoss, PRODUCT_PARAMS[record.product]?.decimals || 1)}
                </div>
              </div>
              
              <!-- 歷史做空記錄 -->
              <div class="bg-green/5 rounded-lg p-2 border border-green/20">
                <div class="text-xs font-bold text-green mb-1">
                  做空 (${record.shortPriority}) | 進場: ${fmt(record.shortEntry, PRODUCT_PARAMS[record.product]?.decimals || 1)}
                </div>
                <div class="text-xs text-gray-400">
                  止盈: ${fmt(record.shortTp1, PRODUCT_PARAMS[record.product]?.decimals || 1)} / ${fmt(record.shortTp2, PRODUCT_PARAMS[record.product]?.decimals || 1)} 
                  | 止損: ${fmt(record.shortStopLoss, PRODUCT_PARAMS[record.product]?.decimals || 1)}
                </div>
              </div>
            </div>
          `).join('')}
      `;
    };

    // 渲染統計頁 (AI偵測統計)
    const renderStats = () => {
      const total = state.aiHistory.length;
      const productCounts = {};
      state.aiHistory.forEach(r => {
        productCounts[r.product] = (productCounts[r.product] || 0) + 1;
      });
      
      return `
        <div class="flex justify-between items-center mb-2">
          <div class="text-lg font-bold">📈 AI偵測統計</div>
          <button id="resetStatsButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded">重置統計</button>
        </div>
        <div class="bg-card border border-border rounded-xl p-4 space-y-2 text-sm">
          <div class="flex justify-between"><span>總偵測次數</span><span>${total}</span></div>
          ${Object.entries(productCounts).map(([product, count]) => `
            <div class="flex justify-between"><span>${product}</span><span>${count} 次</span></div>
          `).join('')}
        </div>
      `;
    };

    // 渲染設定頁
    const renderSettings = () => {
      return `
        <div class="text-lg font-bold mb-2">⚙️ 系統設定</div>
        
        <div class="bg-card border border-border rounded-xl p-4 space-y-3 mb-4">
          <div class="font-bold text-sm">OpenAI API 設定</div>
          <input 
            id="apiKeyInput"
            value="${state.apiKey}"
            placeholder="sk-xxxxxxxxxxxxxxxx"
            class="w-full bg-black/40 border border-gray-700 rounded-lg p-2 text-sm"
            type="password"
          />
          <div class="text-xs text-gray-500">
            API Key 只存在你的瀏覽器本地，不會上傳到任何伺服器
          </div>
          ${state.apiKey ? '<div class="text-xs text-red">✅ API Key 已設置</div>' : '<div class="text-xs text-yellow">⚠️ 請先輸入API Key才能使用AI功能</div>'}
        </div>

        <div class="bg-card border border-border rounded-xl p-4 space-y-3 mb-4">
          <div class="font-bold text-sm">代理伺服器設定（必須！）</div>
          <input 
            id="proxyUrlInput"
            value="${state.proxyUrl}"
            placeholder="https://your-worker.your-name.workers.dev"
            class="w-full bg-black/40 border border-gray-700 rounded-lg p-2 text-sm"
          />
          <div class="text-xs text-red-500 font-bold">
            ⚠️ 在GitHub Pages上必須使用代理伺服器才能正常工作！
          </div>
          <div class="text-xs text-gray-500">
            直接連接OpenAI API會被Safari的CORS安全策略攔截
          </div>
          <a 
            href="https://deploy.workers.cloudflare.com/?url=https://github.com/cloudflare/worker-openai-proxy"
            target="_blank"
            class="block text-xs text-indigo-400 underline mt-2"
          >
            👉 一鍵部署免費Cloudflare代理（30秒完成）
          </a>
        </div>

        <div class="bg-card border border-border rounded-xl p-4 space-y-3 mb-4">
          <div class="font-bold text-sm">產品參數配置 (15分鐘周期)</div>
          <div class="text-xs text-gray-400 space-y-1">
            <div>🔹 NQ: 止損30點 | 止盈90/150點</div>
            <div>🔹 黃金: 止損5美元 | 止盈15/25美元</div>
            <div>🔹 原油: 止損0.5美元 | 止盈1.5/2.5美元</div>
            <div>🔹 比特幣: 止損300美元 | 止盈900/1500美元</div>
          </div>
        </div>

        <button id="clearAllDataButton" class="w-full py-2 border border-red/30 text-red rounded-lg text-sm">
          清除所有數據
        </button>
      `;
    };

    // 渲染AI結果
    const renderAiResult = () => {
      if (!state.aiAnalysis) return;
      
      const params = PRODUCT_PARAMS[state.aiAnalysis.product] || PRODUCT_PARAMS["未知"];
      const decimals = params.decimals;
      
      const trendCard = document.getElementById('trendCard');
      const productTitle = document.getElementById('productTitle');
      const trendAdvice = document.getElementById('trendAdvice');
      
      productTitle.textContent = `📊 ${state.aiAnalysis.product}`;
      
      if (state.aiAnalysis.trend === 'long') {
        trendCard.className = "rounded-xl p-4 border bg-red/10 border-red/30";
        trendAdvice.className = "text-center text-sm text-gray-300";
        trendAdvice.textContent = `當前趨勢：偏多 | ${state.aiAnalysis.advice}`;
      } else if (state.aiAnalysis.trend === 'short') {
        trendCard.className = "rounded-xl p-4 border bg-green/10 border-green/30";
        trendAdvice.className = "text-center text-sm text-gray-300";
        trendAdvice.textContent = `當前趨勢：偏空 | ${state.aiAnalysis.advice}`;
      } else {
        trendCard.className = "rounded-xl p-4 border bg-yellow/10 border-yellow/30";
        trendAdvice.className = "text-center text-sm text-gray-300";
        trendAdvice.textContent = `當前趨勢：震盪 | ${state.aiAnalysis.advice}`;
      }
      
      // 做多點位
      document.getElementById('longPriority').textContent = state.aiAnalysis.longPriority;
      document.getElementById('longEntry').textContent = fmt(state.aiAnalysis.longEntry, decimals);
      document.getElementById('longStopLoss').textContent = fmt(state.aiAnalysis.longStopLoss, decimals);
      document.getElementById('longTp1').textContent = fmt(state.aiAnalysis.longTp1, decimals);
      document.getElementById('longTp2').textContent = fmt(state.aiAnalysis.longTp2, decimals);
      document.getElementById('longCondition').textContent = state.aiAnalysis.longCondition;
      document.getElementById('longReason').textContent = `📌 進場理由：${state.aiAnalysis.longReason || '基於技術指標綜合判斷'}`;
      document.getElementById('longProfit').textContent = 
        `預期獲利: ${fmt(state.aiAnalysis.longTp1 - state.aiAnalysis.longEntry, decimals)}-${fmt(state.aiAnalysis.longTp2 - state.aiAnalysis.longEntry, decimals)} ${params.unit}/手 | 風險收益比: 1:3 / 1:5`;
      
      // 做空點位
      document.getElementById('shortPriority').textContent = state.aiAnalysis.shortPriority;
      document.getElementById('shortEntry').textContent = fmt(state.aiAnalysis.shortEntry, decimals);
      document.getElementById('shortStopLoss').textContent = fmt(state.aiAnalysis.shortStopLoss, decimals);
      document.getElementById('shortTp1').textContent = fmt(state.aiAnalysis.shortTp1, decimals);
      document.getElementById('shortTp2').textContent = fmt(state.aiAnalysis.shortTp2, decimals);
      document.getElementById('shortCondition').textContent = state.aiAnalysis.shortCondition;
      document.getElementById('shortReason').textContent = `📌 進場理由：${state.aiAnalysis.shortReason || '基於技術指標綜合判斷'}`;
      document.getElementById('shortProfit').textContent = 
        `預期獲利: ${fmt(state.aiAnalysis.shortEntry - state.aiAnalysis.shortTp1, decimals)}-${fmt(state.aiAnalysis.shortEntry - state.aiAnalysis.shortTp2, decimals)} ${params.unit}/手 | 風險收益比: 1:3 / 1:5`;
      
      // 技術分析
      document.getElementById('productType').textContent = state.aiAnalysis.product;
      document.getElementById('emaStatus').textContent = state.aiAnalysis.emaStatus;
      document.getElementById('rsiStatus').textContent = state.aiAnalysis.rsi;
      document.getElementById('currentPrice').textContent = fmt(state.aiAnalysis.currentPrice, decimals);
      
      document.getElementById('aiResult').classList.remove('hidden');
    };

    // 主渲染函數
    const render = () => {
      const content = document.getElementById('content');
      
      switch(state.tab) {
        case 'home':
          content.innerHTML = renderHome();
          bindHomeEvents();
          break;
        case 'log':
          content.innerHTML = renderLog();
          bindLogEvents();
          break;
        case 'stats':
          content.innerHTML = renderStats();
          bindStatsEvents();
          break;
        case 'settings':
          content.innerHTML = renderSettings();
          bindSettingsEvents();
          break;
      }
    };

    // 綁定首頁事件
    const bindHomeEvents = () => {
      document.getElementById('resetCurrentButton')?.addEventListener('click', () => {
        if (confirm("確定要重置當前AI偵測結果嗎？")) {
          state.aiAnalysis = null;
          saveState();
          render();
        }
      });
    };

    // 綁定歷史頁事件
    const bindLogEvents = () => {
      document.getElementById('resetAllHistoryButton')?.addEventListener('click', () => {
        if (confirm("確定要重置所有AI偵測歷史嗎？")) {
          state.aiHistory = [];
          saveState();
          render();
        }
      });
    };

    // 綁定統計頁事件
    const bindStatsEvents = () => {
      document.getElementById('resetStatsButton')?.addEventListener('click', () => {
        if (confirm("確定要重置AI偵測統計嗎？")) {
          state.aiHistory = [];
          saveState();
          render();
        }
      });
    };

    // 綁定設定頁事件
    const bindSettingsEvents = () => {
      document.getElementById('apiKeyInput')?.addEventListener('input', (e) => {
        state.apiKey = e.target.value;
        saveState();
      });

      document.getElementById('proxyUrlInput')?.addEventListener('input', (e) => {
        state.proxyUrl = e.target.value;
        saveState();
      });

      document.getElementById('clearAllDataButton')?.addEventListener('click', () => {
        if (confirm("確定要清除所有數據嗎？這將刪除所有設定和歷史記錄")) {
          localStorage.clear();
          window.location.reload();
        }
      });
    };

    // ✅ 超強JSON修復與解析函數
    const safeParseJson = (rawContent) => {
      let attempts = [];
      
      // 嘗試1: 直接解析
      try {
        return JSON.parse(rawContent);
      } catch (e) {
        attempts.push("直接解析失敗: " + e.message);
      }
      
      // 嘗試2: 移除所有markdown標籤
      try {
        let cleaned = rawContent
          .replace(/^```(json)?\s*/gi, "")
          .replace(/\s*```$/g, "")
          .trim();
        return JSON.parse(cleaned);
      } catch (e) {
        attempts.push("移除markdown失敗: " + e.message);
      }
      
      // 嘗試3: 提取第一個{和最後一個}之間的內容
      try {
        const start = rawContent.indexOf('{');
        const end = rawContent.lastIndexOf('}');
        if (start !== -1 && end !== -1 && end > start) {
          let cleaned = rawContent.substring(start, end + 1);
          return JSON.parse(cleaned);
        }
      } catch (e) {
        attempts.push("提取大括號失敗: " + e.message);
      }
      
      // 嘗試4: 修復常見的JSON語法錯誤
      try {
        let cleaned = rawContent
          .replace(/^```(json)?\s*/gi, "")
          .replace(/\s*```$/g, "")
          .replace(/^[^{]*/, "")
          .replace(/[^}]*$/, "")
          .replace(/,\s*}/g, "}")
          .replace(/,\s*]/g, "]")
          .replace(/'/g, '"')
          .replace(/(\w+):/g, '"$1":')
          .trim();
        return JSON.parse(cleaned);
      } catch (e) {
        attempts.push("修復語法失敗: " + e.message);
      }
      
      // 所有嘗試都失敗
      throw new Error("JSON解析失敗，所有嘗試都失敗了\n" + attempts.join("\n"));
    };

    // ✅ 全品種智能點位AI分析函數
    const runAiAnalyze = async () => {
      showDebug("開始識別產品並生成專屬點位...");
      
      if (!state.aiBase64) {
        state.aiError = "❌ 請先上傳K線/分時截圖";
        document.getElementById('aiError').textContent = state.aiError;
        document.getElementById('aiError').classList.remove('hidden');
        hideDebug();
        return;
      }
      
      if (!state.apiKey) {
        state.aiError = "❌ 請先在設定頁面輸入你的OpenAI API Key";
        document.getElementById('aiError').textContent = state.aiError;
        document.getElementById('aiError').classList.remove('hidden');
        hideDebug();
        return;
      }
      
      state.aiLoading = true;
      state.aiError = "";
      state.aiAnalysis = null;
      
      document.getElementById('analyzeButton').textContent = "⏳ 生成專屬點位中...";
      document.getElementById('analyzeButton').disabled = true;
      document.getElementById('aiError').classList.add('hidden');
      document.getElementById('aiResult').classList.add('hidden');

      showDebug("正在識別產品類型...");

      // ✅ 全品種智能識別+進場理由Prompt
      const sniperPrompt = `
你是一位有15年日內交易經驗的實盤交易員，精通NQ、黃金、原油、比特幣四個品種。
你必須首先識別我上傳的截圖是哪個產品，然後根據該產品的波動特性生成相應的交易點位。
最重要的是：你必須詳細說明做多和做空的進場理由與依據，理由必須基於截圖中的實際技術指標和價格走勢。

⚠️ 產品識別規則：
- 如果截圖顯示"美國科技股100指數"或"NAS100"或"NQ" → 產品：NQ
- 如果截圖顯示"黃金"或"XAU/USD" → 產品：黃金
- 如果截圖顯示"布倫特原油"或"UKOIL" → 產品：原油
- 如果截圖顯示"比特幣"或"BTC/USD" → 產品：比特幣

⚠️ 產品參數規則（嚴格執行）：
- NQ: 止損30點，止盈1=進場+90點，止盈2=進場+150點
- 黃金: 止損5美元，止盈1=進場+15美元，止盈2=進場+25美元
- 原油: 止損0.5美元，止盈1=進場+1.5美元，止盈2=進場+2.5美元
- 比特幣: 止損300美元，止盈1=進場+900美元，止盈2=進場+1500美元
- 做空時止損和止盈方向相反
- 風險收益比永遠保持1:3 / 1:5

⚠️ 進場理由寫作規則（必須嚴格遵守）：
理由必須包含以下至少2項，基於截圖中的真實數據：
1. EMA指標狀態（金叉/死叉/價格與均線的位置關係）
2. RSI指標數值和狀態（超買/超賣/中性/上升/下降）
3. 價格走勢結構（突破/回踩/反轉/震盪）
4. 關鍵支撐壓力位（今日高低點/近期結構高低點）

請分析我上傳的截圖，只回傳標準JSON格式，絕對不要加任何其他文字。
開頭直接輸入{，結尾直接輸入}，不要任何其他內容。

分析規則：
1. 首先識別產品類型
2. 讀取截圖中的當前價格
3. 判斷當前整體趨勢（偏多/偏空/震盪）
4. 給出做多策略的優先級（高/中/低）
5. 做多進場價：當前價格附近
6. 根據產品類型自動計算做多止損和止盈
7. 給出做多的進場條件
8. 詳細寫出做多的進場理由與依據
9. 給出做空策略的優先級（高/中/低）
10. 做空進場價：當前價格附近
11. 根據產品類型自動計算做空止損和止盈
12. 給出做空的進場條件
13. 詳細寫出做空的進場理由與依據

輸出格式必須嚴格按照以下JSON結構：
{
  "product": "NQ/黃金/原油/比特幣",
  "currentPrice": 數字,
  "trend": "long/short/neutral",
  "advice": "簡短的核心建議",
  "longPriority": "高/中/低",
  "longEntry": 數字,
  "longStopLoss": 數字,
  "longTp1": 數字,
  "longTp2": 數字,
  "longCondition": "做多進場條件",
  "longReason": "詳細的做多進場理由與依據",
  "shortPriority": "高/中/低",
  "shortEntry": 數字,
  "shortStopLoss": 數字,
  "shortTp1": 數字,
  "shortTp2": 數字,
  "shortCondition": "做空進場條件",
  "shortReason": "詳細的做空進場理由與依據",
  "emaStatus": "金叉向上/死叉向下/糾纏",
  "rsi": "多頭動能/空頭動能/中性"
}

現在只輸出JSON，不要任何其他內容。
`;
      
      try {
        showDebug("發送分析請求...");
        
        const res = await fetch(state.proxyUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${state.apiKey}`,
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [
              {
                role: "user",
                content: [
                  { type: "text", text: sniperPrompt },
                  { 
                    type: "image_url", 
                    image_url: { 
                      url: state.aiBase64,
                      detail: "high"
                    } 
                  },
                ],
              },
            ],
            temperature: 0.01,
            max_tokens: 1500,
            response_format: { type: "json_object" }
          }),
        });
        
        showDebug(`收到分析結果，狀態碼: ${res.status}`);
        
        if (!res.ok) {
          if (res.status === 401) throw new Error("401 未授權：API Key 無效，請檢查是否正確");
          if (res.status === 403) throw new Error("403 禁止訪問：API Key 沒有權限，請檢查額度和地區");
          if (res.status === 429) throw new Error("429 請求過多：請求過於頻繁，請稍後再試");
          if (res.status === 0) throw new Error("0 網絡錯誤：CORS 跨域錯誤，請使用代理伺服器");
          throw new Error(`API錯誤: ${res.status} ${res.statusText}`);
        }
        
        const data = await res.json();
        showDebug("分析結果解析成功");
        
        let rawContent = data.choices[0].message.content.trim();
        showDebug(`原始回應: ${rawContent.substring(0, 400)}...`);
        
        // 使用超強JSON修復函數
        let parseRes = safeParseJson(rawContent);
        showDebug("JSON解析成功");
        
        // ✅ 強制校驗和修正所有點位（根據產品類型）
        if (!parseRes.product) parseRes.product = "未知";
        if (!parseRes.currentPrice) parseRes.currentPrice = 0;
        if (!parseRes.trend) parseRes.trend = "neutral";
        if (!parseRes.advice) parseRes.advice = "觀望等待更好機會";
        if (!parseRes.longPriority) parseRes.longPriority = "中";
        if (!parseRes.shortPriority) parseRes.shortPriority = "中";
        if (!parseRes.longReason) parseRes.longReason = "EMA指標呈現多頭排列，RSI處於多頭區間，價格回踩關鍵支撐位";
        if (!parseRes.shortReason) parseRes.shortReason = "EMA指標呈現空頭排列，RSI處於空頭區間，價格反彈遇阻關鍵壓力位";
        
        // 獲取產品專屬參數
        const params = PRODUCT_PARAMS[parseRes.product] || PRODUCT_PARAMS["未知"];
        
        // 強制修正做多點位
        if (parseRes.longEntry && parseRes.longEntry > 0) {
          parseRes.longStopLoss = Number((parseRes.longEntry - params.stopLoss).toFixed(params.decimals));
          parseRes.longTp1 = Number((parseRes.longEntry + params.tp1).toFixed(params.decimals));
          parseRes.longTp2 = Number((parseRes.longEntry + params.tp2).toFixed(params.decimals));
        }
        
        // 強制修正做空點位
        if (parseRes.shortEntry && parseRes.shortEntry > 0) {
          parseRes.shortStopLoss = Number((parseRes.shortEntry + params.stopLoss).toFixed(params.decimals));
          parseRes.shortTp1 = Number((parseRes.shortEntry - params.tp1).toFixed(params.decimals));
          parseRes.shortTp2 = Number((parseRes.shortEntry - params.tp2).toFixed(params.decimals));
        }
        
        // 設置默認值
        if (!parseRes.longCondition) parseRes.longCondition = "價格回調到進場價附近且出現止跌訊號";
        if (!parseRes.shortCondition) parseRes.shortCondition = "價格反彈到進場價附近且出現止漲訊號";
        if (!parseRes.emaStatus) parseRes.emaStatus = "無";
        if (!parseRes.rsi) parseRes.rsi = "無";
        
        // 添加偵測時間
        parseRes.time = new Date().toLocaleString();
        
        // 保存當前分析結果
        state.aiAnalysis = parseRes;
        
        // 添加到歷史記錄
        state.aiHistory.unshift(parseRes);
        
        // 限制歷史記錄最多保存50條
        if (state.aiHistory.length > 50) {
          state.aiHistory = state.aiHistory.slice(0, 50);
        }
        
        saveState();
        
        // 渲染AI結果
        renderAiResult();
        
        showDebug(`✅ ${parseRes.product} 專屬交易點位生成完成`);
        setTimeout(hideDebug, 2000);
        
      } catch (err) {
        console.error("AI解析錯誤:", err);
        state.aiError = `❌ 錯誤: ${err.message}\n\n⚠️ 請確保你已經正確部署並設置了Cloudflare代理伺服器！\n如果問題持續，請嘗試重新上傳截圖或檢查你的API Key`;
        document.getElementById('aiError').textContent = state.aiError;
        document.getElementById('aiError').classList.remove('hidden');
        showDebug(`錯誤詳情: ${err.stack}`);
      } finally {
        state.aiLoading = false;
        document.getElementById('analyzeButton').textContent = "生成產品專屬交易點位";
        document.getElementById('analyzeButton').disabled = false;
        render(); // 更新首頁顯示
      }
    };

    // 初始化事件
    const initEvents = () => {
      console.log("系統初始化中...");
      
      // 底部導航
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const tab = e.currentTarget.dataset.tab;
          state.tab = tab;
          
          document.querySelectorAll('.tab-button').forEach(b => {
            b.classList.remove('text-indigo');
            b.classList.add('text-gray-400');
          });
          e.currentTarget.classList.remove('text-gray-400');
          e.currentTarget.classList.add('text-indigo');
          
          render();
        });
      });

      // AI按鈕
      document.getElementById('aiButton').addEventListener('click', () => {
        console.log("打開AI分析模態框");
        document.getElementById('aiModal').classList.remove('hidden');
      });

      document.getElementById('closeAiModal').addEventListener('click', () => {
        console.log("關閉AI分析模態框");
        document.getElementById('aiModal').classList.add('hidden');
      });

      // 上傳按鈕
      document.getElementById('uploadButton').addEventListener('click', () => {
        console.log("點擊上傳按鈕");
        document.getElementById('fileInput').click();
      });

      // 文件選擇
      document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        console.log("選擇文件:", file.name, file.size, file.type);
        
        state.aiError = "";
        state.aiAnalysis = null;
        document.getElementById('aiError').classList.add('hidden');
        document.getElementById('aiResult').classList.add('hidden');
        hideDebug();
        
        const previewImg = document.getElementById('previewImg');
        previewImg.src = URL.createObjectURL(file);
        document.getElementById('imagePreview').classList.remove('hidden');
        document.getElementById('analyzeButton').disabled = false;
        
        const reader = new FileReader();
        reader.onload = (ev) => {
          state.aiBase64 = ev.target.result;
          console.log("圖片轉換為Base64完成");
        };
        reader.readAsDataURL(file);
      });

      // 分析按鈕
      document.getElementById('analyzeButton').addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        runAiAnalyze();
      });

      // 重置AI按鈕
      document.getElementById('resetAiButton').addEventListener('click', () => {
        console.log("重置AI面板");
        state.aiImage = null;
        state.aiBase64 = "";
        state.aiAnalysis = null;
        state.aiError = "";
        
        document.getElementById('imagePreview').classList.add('hidden');
        document.getElementById('aiError').classList.add('hidden');
        document.getElementById('aiResult').classList.add('hidden');
        document.getElementById('aiDebug').classList.add('hidden');
        document.getElementById('analyzeButton').disabled = false;
        document.getElementById('fileInput').value = "";
      });

      console.log("系統初始化完成");
    };

    // 頁面加載完成後初始化
    document.addEventListener('DOMContentLoaded', () => {
      initEvents();
      render();
    });
  </script>
