<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全品種AI智能偵測系統</title>
  <script src="https://cdn.txt.cn/tailwindcss/3.3.2/tailwind.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#07080f',
            darker: '#0d1018',
            card: '#111520',
            border: '#1a1e2e',
            green: '#1db954',
            red: '#e03e3e',
            blue: '#38bdf8',
            yellow: '#f59e0b',
            indigo: '#6366f1',
            purple: '#a855f7',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .draggable {
        cursor: move !important;
        user-select: none !important;
      }
      .float-btn {
        pointer-events: auto !important;
        cursor: pointer !important;
      }
    }
  </style>
</head>
<body class="bg-dark text-gray-100 font-sans min-h-screen pb-24 relative">
  <!-- 懸浮窗 -->
  <div id="floatWindow" class="fixed z-[999999] hidden w-[300px] bg-card rounded-xl shadow-2xl border border-indigo/50 overflow-hidden pointer-events-auto">
    <div id="floatDrag" class="draggable bg-indigo/20 px-3 py-2 flex justify-between items-center">
      <div class="text-xs font-bold text-white">📊 雙周期浮窗</div>
      <div class="flex gap-3">
        <button id="floatMin" class="float-btn text-xs text-white w-5 h-5 flex items-center justify-center">−</button>
        <button id="floatClose" class="float-btn text-xs text-white w-5 h-5 flex items-center justify-center">✕</button>
      </div>
    </div>
    <div id="floatContent" class="p-3 text-xs space-y-2 pointer-events-none">
      <div class="text-center font-bold text-indigo text-sm mb-1">暫無分析</div>
      <div id="floatData" class="space-y-1.5 text-[11px]"></div>
    </div>
  </div>

  <div class="bg-darker border-b border-border p-4 text-center">
    <div class="text-xs text-gray-500 tracking-widest mb-1">全品種AI智能偵測系統</div>
    <div class="text-xl font-bold">⚡ 5分看趨勢 · 1分找買點</div>
  </div>

  <div id="content" class="max-w-sm mx-auto p-4 space-y-4"></div>

  <!-- 功能按鈕 -->
  <button id="floatButton" class="fixed right-4 bottom-44 w-14 h-14 rounded-full bg-purple shadow-lg flex items-center justify-center text-2xl z-50 pointer-events-auto">
    📌
  </button>
  
  <button id="aiButton" class="fixed right-4 bottom-24 w-14 h-14 rounded-full bg-indigo shadow-lg flex items-center justify-center text-2xl z-50 pointer-events-auto">
    🤖
  </button>

  <!-- AI分析彈窗 -->
  <div id="aiModal" class="fixed inset-0 bg-black/80 z-[9999] flex items-end sm:items-center justify-center hidden pointer-events-auto">
    <div class="bg-card w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-5 max-h-[85vh] overflow-y-auto scrollbar-hide">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-white">📊 雙周期AI智能偵測</h3>
        <button id="closeAiModal" class="text-gray-300 text-xl">✕</button>
      </div>
      <input id="fileInput" type="file" accept="image/*" multiple hidden />
      <button id="uploadButton" class="w-full border border-dashed border-indigo/50 rounded-xl py-6 text-indigo-300 mb-3">
        上傳5分+1分K線截圖
        <div class="text-xs mt-1 text-gray-400">✅ 同時上傳兩張截圖獲得最佳效果</div>
      </button>
      <div id="imagePreview" class="mb-3 hidden grid grid-cols-2 gap-2">
        <img id="previewImg1" src="" alt="5分K線" class="w-full rounded-lg object-contain max-h-40" />
        <img id="previewImg2" src="" alt="1分K線" class="w-full rounded-lg object-contain max-h-40" />
      </div>
      <div id="aiError" class="text-red text-sm mb-3 p-3 bg-red/15 rounded border border-red/30 whitespace-pre-line hidden"></div>
      <div id="aiDebug" class="text-blue text-sm mb-3 p-3 bg-blue/15 rounded border border-blue/30 whitespace-pre-line hidden"></div>
      <button id="analyzeButton" class="w-full py-3 rounded-lg bg-indigo font-bold mb-3">
        🔍 雙周期精准批判點位
      </button>
      
      <div id="aiResult" class="space-y-4 hidden">
        <div id="trendCard" class="rounded-xl p-4 border">
          <div class="text-lg font-bold text-center mb-2" id="productTitle"></div>
          <div class="text-center text-sm text-gray-300" id="trendAdvice"></div>
          <div class="text-center text-xs text-gray-400 mt-1" id="productTypeLabel"></div>
          <div class="text-center text-xs text-green mt-1">✅ 基於5分+1分K線100%精准批判</div>
        </div>
        
        <div id="trend5mCard" class="rounded-xl p-4 border border-indigo/30 bg-indigo/5">
          <div class="text-sm font-bold text-indigo mb-2">📈 5分鐘大趨勢判斷</div>
          <div id="trend5mContent"></div>
        </div>
        
        <div id="entry1mCard" class="rounded-xl p-4 border border-green/30 bg-green/5">
          <div class="text-sm font-bold text-green mb-2">🎯 1分鐘精準買點</div>
          <div id="entry1mContent"></div>
        </div>
        
        <!-- 盤整盤專屬建議 -->
        <div id="rangeAdviceCard" class="rounded-xl p-4 border border-yellow/30 bg-yellow/5 hidden">
          <div class="text-sm font-bold text-yellow mb-2">⚠️ 盤整盤專屬進場建議</div>
          <div id="rangeAdviceContent" class="text-xs text-white space-y-1"></div>
        </div>
        
        <div class="bg-darker rounded-xl p-4 border border-gray-600">
          <div class="text-sm font-bold text-white mb-3">📊 雙周期技術指標詳情</div>
          <div class="space-y-2">
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">產品類型</span>
              <span id="productType" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">5分EMA角度</span>
              <span id="emaAngle5m" class="text-lg font-bold"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">1分EMA角度</span>
              <span id="emaAngle1m" class="text-lg font-bold"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">5分交易適配</span>
              <span id="emaSuitable5m" class="text-lg font-bold"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">1分交易適配</span>
              <span id="emaSuitable1m" class="text-lg font-bold"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">RSI詳細分析</span>
              <span id="rsiStatus" class="text-lg font-bold text-blue"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">當前價格</span>
              <span id="currentPrice" class="text-lg"></span>
            </div>
          </div>
        </div>
      </div>
      
      <button id="resetAiButton" class="w-full mt-3 py-2 border border-gray-600 rounded-lg text-gray-300 text-sm">
        重新上傳截圖
      </button>
    </div>
  </div>

  <!-- 底部導航 -->
  <div class="fixed bottom-0 left-0 right-0 bg-darker border-t border-border pb-3 pt-2 z-30">
    <div class="max-w-sm mx-auto grid grid-cols-4 text-xs text-center">
      <button data-tab="home" class="tab-button pt-1 pb-1 rounded-lg text-indigo">
        <div class="text-lg mb-1">🏠</div>最新
      </button>
      <button data-tab="log" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📓</div>歷史
      </button>
      <button data-tab="stats" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📈</div>統計
      </button>
      <button data-tab="settings" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">⚙️</div>設定
      </button>
    </div>
  </div>

  <script>
    // 懸浮窗功能
    let floatWindow, floatDrag, floatClose, floatMin, floatButton, floatData;
    let isDragging = false, offsetX, offsetY;

    const initFloatWindow = () => {
      floatWindow = document.getElementById('floatWindow');
      floatDrag = document.getElementById('floatDrag');
      floatClose = document.getElementById('floatClose');
      floatMin = document.getElementById('floatMin');
      floatButton = document.getElementById('floatButton');
      floatData = document.getElementById('floatData');

      floatButton.addEventListener('click', () => {
        floatWindow.classList.toggle('hidden');
        if(!floatWindow.classList.contains('hidden')) {
          syncFloatData();
          floatWindow.style.right = '10px';
          floatWindow.style.top = '100px';
          floatWindow.style.left = 'auto';
        }
      });

      floatClose.addEventListener('click', () => {
        floatWindow.classList.add('hidden');
      });
      
      floatMin.addEventListener('click', () => {
        const content = document.getElementById('floatContent');
        content.classList.toggle('hidden');
      });

      // 電腦端拖動
      floatDrag.addEventListener('mousedown', (e) => {
        isDragging = true;
        const rect = floatWindow.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        floatWindow.style.cursor = 'grabbing';
        e.stopPropagation();
      });

      document.addEventListener('mousemove', (e) => {
        if(!isDragging) return;
        let x = e.clientX - offsetX;
        let y = e.clientY - offsetY;
        x = Math.max(0, Math.min(x, window.innerWidth - floatWindow.offsetWidth));
        y = Math.max(0, Math.min(y, window.innerHeight - floatWindow.offsetHeight));
        floatWindow.style.left = x + 'px';
        floatWindow.style.right = 'auto';
        floatWindow.style.top = y + 'px';
      });

      document.addEventListener('mouseup', () => {
        isDragging = false;
      });

      // 手機端拖動
      floatDrag.addEventListener('touchstart', (e) => {
        isDragging = true;
        const touch = e.touches[0];
        const rect = floatWindow.getBoundingClientRect();
        offsetX = touch.clientX - rect.left;
        offsetY = touch.clientY - rect.top;
        e.stopPropagation();
      });

      document.addEventListener('touchmove', (e) => {
        if(!isDragging) return;
        const touch = e.touches[0];
        let x = touch.clientX - offsetX;
        let y = touch.clientY - offsetY;
        x = Math.max(0, Math.min(x, window.innerWidth - floatWindow.offsetWidth));
        y = Math.max(0, Math.min(y, window.innerHeight - floatWindow.offsetHeight));
        floatWindow.style.left = x + 'px';
        floatWindow.style.right = 'auto';
        floatWindow.style.top = y + 'px';
        e.preventDefault();
      });

      document.addEventListener('touchend', () => {
        isDragging = false;
      });
    };

    // 同步數據到浮窗
    const syncFloatData = () => {
      if(!state.aiAnalysis || !floatData) return;
      const a = state.aiAnalysis;
      const d = a.小數位數 || 0;
      
      floatData.innerHTML = `
        <div class="text-center font-bold text-white">${a.產品名稱}</div>
        <div class="border-t border-border pt-1 mb-1">
          <div class="text-center font-bold text-indigo">📈 5分鐘趨勢</div>
          <div class="flex justify-between ${a.五分趨勢==='做多'?'text-red':a.五分趨勢==='做空'?'text-green':'text-yellow'}">
            <span>方向</span><span>${a.五分趨勢}</span>
          </div>
          <div class="flex justify-between text-white">
            <span>EMA角度</span><span>${a.五分EMA角度 || 0}°</span>
          </div>
        </div>
        <div class="border-t border-border pt-1">
          <div class="text-center font-bold text-green">🎯 1分鐘買點</div>
          <div class="flex justify-between ${a.一分趨勢==='做多'?'text-red':a.一分趨勢==='做空'?'text-green':'text-yellow'}">
            <span>方向</span><span>${a.一分趨勢}</span>
          </div>
          <div class="flex justify-between text-white">
            <span>精準入場</span><span>${fmt(a.一分入場點, d)}</span>
          </div>
        </div>
        <div class="text-[10px] border-t border-border pt-1 mt-1">
          <div class="flex justify-between text-red">🔴 多: ${fmt(a.做多精準點, d)}</div>
          <div class="flex justify-between text-green">🟢 空: ${fmt(a.做空精準點, d)}</div>
          <div class="flex justify-between text-yellow">🎯 止盈: ${fmt(a.做多第一止盈, d)}/${fmt(a.做空第一止盈, d)}</div>
        </div>
      `;
    };

    // 工具函數
    const num = (v) => parseFloat(v) || 0;
    const fmt = (n, d = 0) => !n || isNaN(n) || !isFinite(n) ? "—" : Number(n).toFixed(d);
    const 優先級權重 = { "高": 3, "中": 2, "低": 1 };

    // 獲取勝率
    const 獲取勝率 = (優先級) => {
      switch(優先級) {
        case "高": return "75%";
        case "中": return "60%";
        case "低": return "50%";
        default: return "55%";
      }
    };

    // 產品類型
    const 產品類型 = {
      期貨: "期貨/指數",
      不支援: "不支援產品"
    };

    // 本地存儲
    const 保存數據 = (key, data) => {
      try { localStorage.setItem(`sniper_${key}`, JSON.stringify(data)); } catch (e) {}
    };
    const 加載數據 = (key, defaultValue) => {
      try {
        const data = localStorage.getItem(`sniper_${key}`);
        return data ? JSON.parse(data) : defaultValue;
      } catch (e) { return defaultValue; }
    };

    // 全局狀態(全中文)
    let state = {
      當前標籤: "首頁",
      API金鑰: 加載數據("apiKey", ""),
      代理地址: 加載數據("proxyUrl", "https://api.openai.com/v1/chat/completions"),
      AI分析結果: 加載數據("aiAnalysis", null),
      AI分析歷史: 加載數據("aiHistory", []),
      圖片數據: [],
      Base64數據: [],
      加載中: false,
      錯誤信息: ""
    };

    const 保存狀態 = () => {
      保存數據("apiKey", state.API金鑰);
      保存數據("proxyUrl", state.代理地址);
      保存數據("aiAnalysis", state.AI分析結果);
      保存數據("aiHistory", state.AI分析歷史);
    };

    const 顯示調試 = (msg) => {
      const el = document.getElementById('aiDebug');
      el.textContent = msg; el.classList.remove('hidden');
    };
    const 隱藏調試 = () => {
      document.getElementById('aiDebug').classList.add('hidden');
    };

    // 計算盈虧
    const 計算盈利 = (入場, 目標, 做多, 小數位) => {
      const 差值 = 做多 ? 目標 - 入場 : 入場 - 目標;
      const 百分比 = (差值 / 入場 * 100).toFixed(2);
      return `${fmt(差值, 小數位)} (盈利${百分比}%)`;
    };

    // 價格優化
    const 優化價格 = (價格) => Math.round(價格);

    // 計算止盈
    const 計算止盈點位 = (入場, 止損, 做多, 小數位, 一分鐘=false) => {
      const 風險 = Math.abs(入場 - 止損);
      const 倍數1 = 一分鐘 ? 2 : 3;
      const 倍數2 = 一分鐘 ? 3 : 5;
      let 止盈1, 止盈2;
      if (做多) {
        止盈1 = 優化價格(入場 + 風險 * 倍數1);
        止盈2 = 優化價格(入場 + 風險 * 倍數2);
      } else {
        止盈1 = 優化價格(入場 - 風險 * 倍數1);
        止盈2 = 優化價格(入場 - 風險 * 倍數2);
      }
      return { 止盈1, 止盈2 };
    };

    // 盤整盤進場建議生成
    const 生成盤整建議 = (數據) => {
      return `
        1. 觀察盤整區間：支撐位/壓力位<br>
        2. 突破上沿壓力 → 回踩確認後做多<br>
        3. 跌破下沿支撐 → 反彈確認後做空<br>
        4. 區間內高拋低吸，嚴格設置止損<br>
        5. 等待放量突破再進場，提高勝率
      `;
    };

    // ==================== 頁面渲染 ====================
    // 首頁
    const 渲染首頁 = () => {
      return `
        ${state.AI分析結果 ? `
          <div class="bg-card border border-border rounded-2xl p-4">
            <div class="flex justify-between items-center mb-3">
              <div class="text-xs font-bold text-gray-400">🤖 最新雙周期偵測結果</div>
              <button id="resetCurrentButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded">重置</button>
            </div>
            <div class="text-center mb-4">
              <div class="text-lg font-bold text-indigo">${state.AI分析結果.產品名稱}</div>
              <div class="text-xs text-gray-400">${state.AI分析結果.產品類型 || 產品類型.期貨}</div>
              <div class="text-sm text-green mt-1">✅ 100%匹配5分+1分K線批判</div>
              <div class="text-xs text-gray-500 mt-1">偵測時間: ${state.AI分析結果.時間}</div>
            </div>
            
            <div class="bg-indigo/10 rounded-xl p-3 border border-indigo/30 mb-3">
              <div class="text-sm font-bold text-indigo mb-2">📈 5分鐘大趨勢</div>
              <div class="text-center text-xl font-bold ${state.AI分析結果.五分趨勢 === '做多' ? 'text-red' : state.AI分析結果.五分趨勢 === '做空' ? 'text-green' : 'text-yellow'}">
                ${state.AI分析結果.五分趨勢 === '做多' ? '🔴 偏多趨勢' : state.AI分析結果.五分趨勢 === '做空' ? '🟢 偏空趨勢' : '🟡 盤整盤'}
              </div>
              <div class="text-sm text-gray-300 mt-1">EMA角度：${state.AI分析結果.五分EMA角度 || 0}° | ${state.AI分析結果.五分交易適配 || ''}</div>
              <div class="text-sm text-gray-300">${state.AI分析結果.五分建議 || ''}</div>
            </div>
            
            <div class="bg-green/10 rounded-xl p-3 border border-green/30">
              <div class="text-sm font-bold text-green mb-2">🎯 1分鐘精準買點</div>
              <div class="text-center text-xl font-bold ${state.AI分析結果.一分趨勢 === '做多' ? 'text-red' : state.AI分析結果.一分趨勢 === '做空' ? 'text-green' : 'text-yellow'}">
                ${state.AI分析結果.一分趨勢 === '做多' ? '🔴 做多入場' : state.AI分析結果.一分趨勢 === '做空' ? '🟢 做空入場' : '🟡 觀望等待'}
              </div>
              <div class="text-sm text-gray-300 mt-1">EMA角度：${state.AI分析結果.一分EMA角度 || 0}° | ${state.AI分析結果.一分交易適配 || ''}</div>
              <div class="text-sm text-gray-300">${state.AI分析結果.一分建議 || ''}</div>
            </div>

            <!-- 盤整盤建議 -->
            ${state.AI分析結果.五分趨勢 === '盤整盤' || state.AI分析結果.一分趨勢 === '盤整盤' ? `
            <div class="bg-yellow/10 rounded-xl p-3 border border-yellow/30 mt-3">
              <div class="text-sm font-bold text-yellow mb-2">⚠️ 盤整盤進場建議</div>
              <div class="text-xs text-white space-y-1">
                ${生成盤整建議(state.AI分析結果)}
              </div>
            </div>
            ` : ''}
            
            ${(() => {
              const 小數位 = state.AI分析結果.小數位數 || 0;
              const a = state.AI分析結果;
              let html = '';

              if(a.做多優先級){
                html += `
                  <div class="bg-darker rounded-xl p-3 border border-red/30 mt-3">
                    <div class="text-sm font-bold text-red mb-2">🔴 做多策略 (優先級: ${a.做多優先級} | 勝率: ${獲取勝率(a.做多優先級)})</div>
                    <div class="grid grid-cols-2 gap-2 text-xs mb-2">
                      <div class="bg-black/30 p-2 rounded text-center">
                        <div class="text-gray-400">趨勢入場</div>
                        <div class="font-bold text-red">${fmt(a.做多趨勢點, 小數位)}</div>
                      </div>
                      <div class="bg-black/30 p-2 rounded text-center">
                        <div class="text-gray-400">精準買點</div>

          一分趨勢, 一分建議, 一分EMA角度, 一分交易適配,
          做多優先級, 做多趨勢點, 做多精準點, 做多止損, 做多第一止盈, 做多第二止盈, 做多理由,
          做空優先級, 做空趨勢點, 做空精準點, 做空止損, 做空第一止盈, 做空第二止盈, 做空理由,
          RSI
          `
        }
      ];
      
      圖片數據.forEach(img => {
        內容.push({ type: 'image_url', image_url: { url: img } });
      });

      const 響應 = await fetch(state.代理地址, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.API金鑰}` },
        body: JSON.stringify({ model: 'gpt-4o', messages: [{ role: 'user', content: 內容 }], temperature: 0.1 })
      });

      if (!響應.ok) throw new Error(`API調用失敗：${響應.status}`);
      const 數據 = await 響應.json();
      const 匹配 = 數據.choices[0].message.content.match(/\{[\s\S]*\}/);
      if (!匹配) throw new Error("AI返回格式錯誤");
      return JSON.parse(匹配[0]);
    };

    // 執行分析
    const 執行AI分析 = async () => {
      顯示調試("分析中...");
      if (!state.API金鑰) {
        state.錯誤信息 = "❌ 請先輸入API金鑰";
        document.getElementById('aiError').textContent = state.錯誤信息;
        document.getElementById('aiError').classList.remove('hidden');
        隱藏調試(); return;
      }
      if (state.Base64數據.length === 0) {
        state.錯誤信息 = "❌ 請上傳K線截圖";
        document.getElementById('aiError').textContent = state.錯誤信息;
        document.getElementById('aiError').classList.remove('hidden');
        隱藏調試(); return;
      }
      
      state.加載中 = true;
      const 按鈕 = document.getElementById('analyzeButton');
      按鈕.textContent = "⏳ 分析中...";
      按鈕.disabled = true;

      try {
        let 結果 = await 調用AI(state.Base64數據);
        
        // 價格優化
        結果.做多趨勢點 = 優化價格(結果.做多趨勢點);
        結果.做多精準點 = 優化價格(結果.做多精準點);
        結果.做多止損 = 優化價格(結果.做多止損);
        結果.做空趨勢點 = 優化價格(結果.做空趨勢點);
        結果.做空精準點 = 優化價格(結果.做空精準點);
        結果.做空止損 = 優化價格(結果.做空止損);
        
        // 計算止盈
        const 多止盈5分 = 計算止盈點位(結果.做多趨勢點, 結果.做多止損, true, 結果.小數位數, false);
        const 多止盈1分 = 計算止盈點位(結果.做多精準點, 結果.做多止損, true, 結果.小數位數, true);
        const 空止盈5分 = 計算止盈點位(結果.做空趨勢點, 結果.做空止損, false, 結果.小數位數, false);
        const 空止盈1分 = 計算止盈點位(結果.做空精準點, 結果.做空止損, false, 結果.小數位數, true);
        
        結果.做多第一止盈 = 多止盈1分.止盈1;
        結果.做多第二止盈 = 多止盈1分.止盈2;
        結果.做空第一止盈 = 空止盈1分.止盈1;
        結果.做空第二止盈 = 空止盈1分.止盈2;
        
        結果.時間 = new Date().toLocaleString();
        state.AI分析結果 = 結果;
        // ✅ 強制保存歷史，每次都存
        state.AI分析歷史.unshift(結果);
        if (state.AI分析歷史.length > 100) state.AI分析歷史 = state.AI分析歷史.slice(0,100);
        保存狀態();
        渲染AI結果();
        顯示調試("✅ 分析完成");
        setTimeout(隱藏調試, 2000);
      } catch (err) {
        state.錯誤信息 = `❌ 錯誤：${err.message}`;
        document.getElementById('aiError').textContent = state.錯誤信息;
        document.getElementById('aiError').classList.remove('hidden');
      } finally {
        state.加載中 = false;
        按鈕.textContent = "🔍 雙周期精准批判點位";
        按鈕.disabled = false;
        渲染();
      }
    };

    // 初始化事件
    const 初始化事件 = () => {
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const 標籤映射 = { home:'首頁', log:'歷史', stats:'統計', settings:'設定' };
          state.當前標籤 = 標籤映射[e.currentTarget.dataset.tab];
          document.querySelectorAll('.tab-button').forEach(b => {b.classList.remove('text-indigo');b.classList.add('text-gray-400');});
          e.currentTarget.classList.add('text-indigo');
          渲染();
        });
      });

      document.getElementById('aiButton').addEventListener('click', () => {
        document.getElementById('aiModal').classList.remove('hidden');
      });
      document.getElementById('closeAiModal').addEventListener('click', () => {
        document.getElementById('aiModal').classList.add('hidden');
      });
      document.getElementById('uploadButton').addEventListener('click', () => {
        document.getElementById('fileInput').click();
      });

      // 上傳圖片
      document.getElementById('fileInput').addEventListener('change', (e) => {
        const 文件 = e.target.files;
        if (!文件.length) return;
        state.Base64數據 = [];
        let 加載數 = 0;
        
        Array.from(文件).forEach((文件, 索引) => {
          const 讀取器 = new FileReader();
          讀取器.onload = (ev) => {
            state.Base64數據.push(ev.target.result);
            加載數++;
            if(索引===0) document.getElementById('previewImg1').src = ev.target.result;
            if(索引===1) document.getElementById('previewImg2').src = ev.target.result;
            if(加載數 === 文件.length) document.getElementById('imagePreview').classList.remove('hidden');
          };
          讀取器.readAsDataURL(文件);
        });
      });

      document.getElementById('analyzeButton').addEventListener('click', 執行AI分析);
      document.getElementById('resetAiButton').addEventListener('click', () => {
        state.Base64數據 = [];
        document.getElementById('fileInput').value = "";
        document.getElementById('imagePreview').classList.add('hidden');
        document.getElementById('aiResult').classList.add('hidden');
        隱藏調試();
      });
    };

    // 啟動
    window.addEventListener('DOMContentLoaded', () => {
      initFloatWindow();
      初始化事件();
      渲染();
    });
  </script>
</body>
</html>
