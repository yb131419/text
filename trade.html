<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全品種AI智能偵測系統 | 整合中值版 · 趨勢50點獲利保證</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#07080f',
            darker: '#0d1018',
            card: '#111520',
            border: '#1a1e2e',
            green: '#1db954',
            red: '#e03e3e',
            blue: '#38bdf8',
            yellow: '#f59e0b',
            indigo: '#6366f1',
            purple: '#a855f7',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .draggable {
        cursor: move !important;
        user-select: none !important;
      }
      .float-btn {
        pointer-events: auto !important;
        cursor: pointer !important;
      }
      .tab-active {
        @apply bg-indigo/20 text-indigo;
      }
      .result-btn {
        @apply px-2 py-0.5 rounded text-[10px] font-bold border transition-all;
      }
      .result-win {
        @apply bg-green/20 text-green border-green/50;
      }
      .result-loss {
        @apply bg-red/20 text-red border-red/50;
      }
      .result-pending {
        @apply bg-gray-700/50 text-gray-400 border-gray-600;
      }
      .sl-stage-1 {
        @apply bg-yellow/20 text-yellow border-yellow/50;
      }
      .sl-stage-2 {
        @apply bg-red/20 text-red border-red/50;
      }
    }
  </style>
</head>
<body class="bg-dark text-gray-100 font-sans min-h-screen pb-24 relative">
  <!-- 可拖拽浮窗 -->
  <div id="floatWindow" class="fixed z-[999999] hidden w-[320px] bg-card rounded-xl shadow-2xl border border-indigo/50 overflow-hidden pointer-events-auto">
    <div id="floatDrag" class="draggable bg-indigo/20 px-3 py-2 flex justify-between items-center">
      <div class="text-xs font-bold text-white">📊 AI智能偵測浮窗</div>
      <div class="flex gap-3">
        <button id="floatMin" class="float-btn text-xs text-white w-5 h-5 flex items-center justify-center">−</button>
        <button id="floatClose" class="float-btn text-xs text-white w-5 h-5 flex items-center justify-center">✕</button>
      </div>
    </div>
    <div id="floatContent" class="p-3 text-xs space-y-2 pointer-events-none">
      <div class="text-center font-bold text-indigo text-sm mb-1">暫無分析</div>
      <div id="floatData" class="space-y-1.5 text-[11px]"></div>
    </div>
  </div>

  <!-- 頁頭 -->
  <div class="bg-darker border-b border-border p-4 text-center">
    <div class="text-xs text-gray-500 tracking-widest mb-1">全品種AI智能偵測系統</div>
    <div class="text-xl font-bold">⚡ 整合中值版 · 趨勢50點獲利保證</div>
    <div class="text-xs text-gray-400 mt-1">雙模型參數取中值預估 | 兩階段彈性停損 | 趨勢盤最低50點獲利目標</div>
  </div>

  <!-- 主要內容 -->
  <div id="content" class="max-w-sm mx-auto p-4 space-y-4"></div>

  <!-- 浮動按鈕 -->
  <button id="floatButton" class="fixed right-4 bottom-44 w-14 h-14 rounded-full bg-purple shadow-lg flex items-center justify-center text-2xl z-50 pointer-events-auto">
    📌
  </button>
  
  <button id="aiButton" class="fixed right-4 bottom-24 w-14 h-14 rounded-full bg-indigo shadow-lg flex items-center justify-center text-2xl z-50 pointer-events-auto">
    🤖
  </button>

  <!-- AI分析模態框 -->
  <div id="aiModal" class="fixed inset-0 bg-black/80 z-[9999] flex items-end sm:items-center justify-center hidden pointer-events-auto">
    <div class="bg-card w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-5 max-h-[85vh] overflow-y-auto scrollbar-hide">
      <div class="flex justify-between items-center mb-4">
        <h3 id="modalTitle" class="text-lg font-bold text-white">📊 整合中值AI智能偵測</h3>
        <button id="closeAiModal" class="text-gray-300 text-xl">✕</button>
      </div>
      <input id="fileInput" type="file" accept="image/*" multiple hidden />
      <button id="uploadButton" class="w-full border border-dashed border-indigo/50 rounded-xl py-6 text-indigo-300 mb-3">
        上傳K線截圖
        <div class="text-xs mt-1 text-gray-400">✅ 同時上傳5分+1分兩張獲得最佳效果 | 單張也可分析</div>
      </button>
      <div id="imagePreview" class="mb-3 hidden grid grid-cols-2 gap-2">
        <img id="previewImg1" src="" alt="K線1" class="w-full rounded-lg object-contain max-h-40" />
        <img id="previewImg2" src="" alt="K線2" class="w-full rounded-lg object-contain max-h-40" />
      </div>
      <div id="aiError" class="text-red text-sm mb-3 p-3 bg-red/15 rounded border border-red/30 whitespace-pre-line hidden"></div>
      <div id="aiDebug" class="text-blue text-sm mb-3 p-3 bg-blue/15 rounded border border-blue/30 whitespace-pre-line hidden"></div>
      <button id="analyzeButton" class="w-full py-3 rounded-lg bg-indigo font-bold mb-3">
        🔍 整合中值精準批判點位
      </button>
      
      <!-- AI分析結果 -->
      <div id="aiResult" class="space-y-4 hidden">
        <div id="trendCard" class="rounded-xl p-4 border">
          <div class="text-lg font-bold text-center mb-2" id="productTitle"></div>
          <div class="text-center text-sm text-gray-300" id="trendAdvice"></div>
          <div class="text-center text-xs text-gray-400 mt-1" id="productTypeLabel"></div>
          <div class="text-center text-xs font-bold text-green mt-1" id="finalSuitability"></div>
          <div class="text-center text-xs text-green mt-1" id="finalWinRate"></div>
          <div class="text-center text-xs font-bold text-yellow mt-1" id="profitGuarantee"></div>
        </div>
        
        <div id="trend5mCard" class="rounded-xl p-4 border border-indigo/30 bg-indigo/5">
          <div class="text-sm font-bold text-indigo mb-2">📈 大趨勢判斷 (5分K)</div>
          <div id="trend5mContent"></div>
        </div>
        
        <div id="entry1mCard" class="rounded-xl p-4 border border-green/30 bg-green/5">
          <div class="text-sm font-bold text-green mb-2">🎯 精準買點 (1分K)</div>
          <div id="entry1mContent"></div>
        </div>

        <!-- 兩階段停損卡片 -->
        <div id="slCard" class="rounded-xl p-4 border border-yellow/30 bg-yellow/5">
          <div class="text-sm font-bold text-yellow mb-2">🛡️ 兩階段停損機制</div>
          <div id="slContent"></div>
        </div>
        
        <div id="levelsCard" class="rounded-xl p-4 border border-purple/30 bg-purple/5">
          <div class="text-sm font-bold text-purple mb-2">📊 關鍵支撐/阻力位</div>
          <div id="levelsContent"></div>
        </div>
        
        <div class="bg-darker rounded-xl p-4 border border-gray-600" id="indicatorCard">
          <div class="text-sm font-bold text-white mb-3">📊 技術指標詳情</div>
          <div class="space-y-2">
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">產品類型</span>
              <span id="productType" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">整合EMA角度</span>
              <span id="emaAngle" class="text-lg font-bold"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">交易適配</span>
              <span id="emaSuitable" class="text-lg font-bold"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">ATR(14)</span>
              <span id="atrValue" class="text-lg font-bold text-blue"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">EMA5/EMA20</span>
              <span id="emaValues" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">當前價格</span>
              <span id="currentPrice" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">預期獲利空間</span>
              <span id="profitSpace" class="text-lg font-bold text-green"></span>
            </div>
          </div>
        </div>
      </div>
      
      <button id="resetAiButton" class="w-full mt-3 py-2 border border-gray-600 rounded-lg text-gray-300 text-sm">
        重新上傳截圖
      </button>
    </div>
  </div>

  <!-- 底部導航 -->
  <div class="fixed bottom-0 left-0 right-0 bg-darker border-t border-border pb-3 pt-2 z-30">
    <div class="max-w-sm mx-auto grid grid-cols-4 text-xs text-center">
      <button data-tab="home" class="tab-button pt-1 pb-1 rounded-lg text-indigo">
        <div class="text-lg mb-1">🏠</div>最新
      </button>
      <button data-tab="log" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📓</div>歷史
      </button>
      <button data-tab="stats" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📈</div>統計
      </button>
      <button data-tab="settings" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">⚙️</div>設定
      </button>
    </div>
  </div>

  <script>
    // ========== 整合中值核心邏輯 (通用+Mitrade取中值) ==========
    const STAGE1_SL_POINTS = 20;   // 第一階段：防守停損 20點
    const STAGE2_SL_POINTS = 50;   // 第二階段：壓力位終極停損 50點
    const MIN_TREND_PROFIT = 50;   // 趨勢盤保證最低獲利 50點
    const TREND_ANGLE_THRESHOLD = 25; // 判定為強趨勢的角度門檻

    // 整合EMA角度：通用(2.5倍) + Mitrade(3.0倍) 取中值 = 2.75倍
    const calculateMergedEmaAngle = (ema5, ema20, currentPrice) => {
      const emaDiff = ema5 - ema20;
      const priceRatio = emaDiff / currentPrice * 10000;
      return Math.round(priceRatio * 2.75);
    };

    // 整合支撐阻力：5分K(1.5+1.2)/2=1.35倍ATR，1分K(1.0+0.8)/2=0.9倍ATR
    const calculateMergedLevels = (currentPrice, atr14, is5mChart) => {
      const multiplier = is5mChart ? 1.35 : 0.9;
      return {
        support: Math.round(currentPrice - atr14 * multiplier),
        resistance: Math.round(currentPrice + atr14 * multiplier)
      };
    };

    // 整合入場與基礎停損：ATR乘數取中值
    const calculateMergedEntryBaseSL = (currentPrice, trend, atr14, emaAngle) => {
      const absAngle = Math.abs(emaAngle);
      const atrMultiplier = absAngle >= 20 ? 0.8 : 0.65; // 強趨勢0.8，盤整0.65
      
      const entryOffset = absAngle >= 20 ? 1.5 : 4;
      return {
        longEntry: Math.round(currentPrice + (emaAngle > 0 ? entryOffset : entryOffset + 2)),
        longBaseSL: Math.round(currentPrice - atr14 * atrMultiplier),
        shortEntry: Math.round(currentPrice - (emaAngle < 0 ? entryOffset : entryOffset + 2)),
        shortBaseSL: Math.round(currentPrice + atr14 * atrMultiplier)
      };
    };

    // 兩階段停損計算
    const calculateTwoStageSL = (entry, baseSL, isLong) => {
      const baseRisk = Math.abs(entry - baseSL);
      
      // 第一階段：固定20點防守停損（若基礎停損比20點小則以基礎為準）
      const stage1SL = isLong 
        ? Math.round(entry - Math.min(STAGE1_SL_POINTS, baseRisk * 0.6))
        : Math.round(entry + Math.min(STAGE1_SL_POINTS, baseRisk * 0.6));
      
      // 第二階段：50點壓力位終極停損（若基礎停損更大則以基礎為準）
      const stage2SL = isLong
        ? Math.round(entry - Math.max(STAGE2_SL_POINTS, baseRisk))
        : Math.round(entry + Math.max(STAGE2_SL_POINTS, baseRisk));

      return { stage1SL, stage2SL, baseRisk };
    };

    // 止盈計算：趨勢盤保證50點以上獲利
    const calculateTakeProfit = (entry, stage2SL, isLong, isTrend) => {
      const maxRisk = Math.abs(entry - stage2SL);
      
      let tp1 = Math.round(entry + (isLong ? maxRisk * 1.75 : -maxRisk * 1.75));
      let tp2 = Math.round(entry + (isLong ? maxRisk * 2.5 : -maxRisk * 2.5));
      
      // 強趨勢盤：強制TP2獲利空間 ≥ 50點
      if (isTrend) {
        const profit2 = Math.abs(tp2 - entry);
        if (profit2 < MIN_TREND_PROFIT) {
          const expandRatio = MIN_TREND_PROFIT / profit2;
          tp2 = Math.round(entry + (isLong ? maxRisk * 2.5 * expandRatio : -maxRisk * 2.5 * expandRatio));
          tp1 = Math.round(entry + (isLong ? maxRisk * 1.75 * expandRatio : -maxRisk * 1.75 * expandRatio));
        }
      }

      return { tp1, tp2 };
    };

    // ========== 適配性與勝率計算 (整合標準) ==========
    const getSuitabilityDescription = (angle) => {
      const absAngle = Math.abs(angle);
      if (absAngle >= 28) return "極適合交易";
      if (absAngle >= 18) return "適合交易";
      if (absAngle >= 10) return "尚可交易";
      return "不適合交易";
    };

    const getWinRateBySuitability = (suitability) => {
      const rates = {
        "極適合交易": "85%",
        "適合交易": "78%",
        "尚可交易": "65%",
        "不適合交易": "48%"
      };
      return rates[suitability] || "50%";
    };

    const isNoVolatility = (atrValue, emaAngle) => {
      const absAngle = Math.abs(emaAngle);
      return atrValue < 9 || absAngle < 9;
    };

    const isStrongTrend = (emaAngle) => {
      return Math.abs(emaAngle) >= TREND_ANGLE_THRESHOLD;
    };

    // ========== 浮窗初始化與同步 ==========
    let floatWindow, floatDrag, floatClose, floatMin, floatButton, floatData;
    let isDragging = false, offsetX, offsetY;

    const initFloatWindow = () => {
      floatWindow = document.getElementById('floatWindow');
      floatDrag = document.getElementById('floatDrag');
      floatClose = document.getElementById('floatClose');
      floatMin = document.getElementById('floatMin');
      floatButton = document.getElementById('floatButton');
      floatData = document.getElementById('floatData');

      floatButton.addEventListener('click', () => {
        floatWindow.classList.toggle('hidden');
        if(!floatWindow.classList.contains('hidden')) {
          syncFloatData();
          floatWindow.style.right = '10px';
          floatWindow.style.top = '100px';
          floatWindow.style.left = 'auto';
        }
      });

      floatClose.addEventListener('click', () => floatWindow.classList.add('hidden'));
      
      floatMin.addEventListener('click', () => {
        document.getElementById('floatContent').classList.toggle('hidden');
      });

      // 拖拽邏輯
      floatDrag.addEventListener('mousedown', (e) => {
        isDragging = true;
        const rect = floatWindow.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        floatWindow.style.cursor = 'grabbing';
        e.stopPropagation();
      });

      document.addEventListener('mousemove', (e) => {
        if(!isDragging) return;
        let x = Math.max(0, Math.min(e.clientX - offsetX, window.innerWidth - floatWindow.offsetWidth));
        let y = Math.max(0, Math.min(e.clientY - offsetY, window.innerHeight - floatWindow.offsetHeight));
        floatWindow.style.left = x + 'px';
        floatWindow.style.right = 'auto';
        floatWindow.style.top = y + 'px';
      });

      document.addEventListener('mouseup', () => isDragging = false);

      // 觸控支援
      floatDrag.addEventListener('touchstart', (e) => {
        isDragging = true;
        const touch = e.touches[0];
        const rect = floatWindow.getBoundingClientRect();
        offsetX = touch.clientX - rect.left;
        offsetY = touch.clientY - rect.top;
        e.stopPropagation();
      });

      document.addEventListener('touchmove', (e) => {
        if(!isDragging) return;
        const touch = e.touches[0];
        let x = Math.max(0, Math.min(touch.clientX - offsetX, window.innerWidth - floatWindow.offsetWidth));
        let y = Math.max(0, Math.min(touch.clientY - offsetY, window.innerHeight - floatWindow.offsetHeight));
        floatWindow.style.left = x + 'px';
        floatWindow.style.right = 'auto';
        floatWindow.style.top = y + 'px';
        e.preventDefault();
      });

      document.addEventListener('touchend', () => isDragging = false);
    };

    const syncFloatData = () => {
      if(!state.aiAnalysis || !floatData) return;
      const a = state.aiAnalysis;
      const d = a.decimals || 0;
      const suitability = getSuitabilityDescription(a.emaAngle || 0);
      const winRate = getWinRateBySuitability(suitability);
      const noVol = isNoVolatility(a.atr14, a.emaAngle);
      const strongTrend = isStrongTrend(a.emaAngle);
      const profitSpace = Math.abs(a.tp2 - a.entry);
      
      floatData.innerHTML = `
        <div class="text-center font-bold text-white">${a.product}</div>
        <div class="border-t border-border pt-1 mb-1">
          <div class="text-center font-bold text-indigo">📈 大趨勢 (5分K)</div>
          <div class="flex justify-between ${a.trend==='long'?'text-red':a.trend==='short'?'text-green':'text-yellow'}">
            <span>方向</span><span>${a.trend==='long'?'多頭':a.trend==='short'?'空頭':'盤整盤'}</span>
          </div>
          <div class="flex justify-between text-white">
            <span>交易適配</span><span>${suitability}</span>
          </div>
          <div class="flex justify-between text-white">
            <span>預期勝率</span><span>${winRate}</span>
          </div>
          ${strongTrend ? `<div class="flex justify-between text-green font-bold"><span>獲利保證</span><span>≥ ${MIN_TREND_PROFIT} 點</span></div>` : ''}
        </div>
        <div class="border-t border-border pt-1">
          <div class="text-center font-bold text-green">🎯 精準買點 (1分K)</div>
          <div class="flex justify-between text-white">
            <span>入場</span><span>${fmt(a.entry, d)}</span>
          </div>
          <div class="flex justify-between text-yellow">
            <span>一階停損</span><span>${fmt(a.stage1SL, d)}</span>
          </div>
          <div class="flex justify-between text-red">
            <span>終極停損</span><span>${fmt(a.stage2SL, d)}</span>
          </div>
          <div class="flex justify-between text-green font-bold">
            <span>目標獲利</span><span>${profitSpace} 點</span>
          </div>
        </div>
      `;
    };

    // ========== 工具函數 ==========
    const num = (v) => parseFloat(v) || 0;
    const fmt = (n, d = 0) => !n || isNaN(n) || !isFinite(n) ? "—" : Number(n).toFixed(d);

    const PRODUCT_TYPES = {
      FUTURES: "期貨/指數",
      UNSUPPORTED: "不支援產品"
    };

    // ========== 本地存儲 ==========
    const saveData = (key, data) => {
      try { localStorage.setItem(`sniper_${key}`, JSON.stringify(data)); } catch(e) {}
    };

    const loadData = (key, defaultValue) => {
      try {
        const data = localStorage.getItem(`sniper_${key}`);
        return data ? JSON.parse(data) : defaultValue;
      } catch(e) { return defaultValue; }
    };

    // ========== 全局狀態 ==========
    let state = {
      tab: "home",
      apiKey: loadData("apiKey", ""),
      proxyUrl: loadData("proxyUrl", "https://api.openai.com/v1/chat/completions"),
      aiAnalysis: loadData("aiAnalysis", null),
      aiHistory: loadData("aiHistory", []),
      aiBase64s: [],
      aiLoading: false,
      aiError: "",
      logFilter: "all",
      slStage1: loadData("slStage1", STAGE1_SL_POINTS),
      slStage2: loadData("slStage2", STAGE2_SL_POINTS),
      minTrendProfit: loadData("minTrendProfit", MIN_TREND_PROFIT)
    };

    const saveState = () => {
      saveData("apiKey", state.apiKey);
      saveData("proxyUrl", state.proxyUrl);
      saveData("aiAnalysis", state.aiAnalysis);
      saveData("aiHistory", state.aiHistory);
      saveData("slStage1", state.slStage1);
      saveData("slStage2", state.slStage2);
      saveData("minTrendProfit", state.minTrendProfit);
    };

    // ========== 交易結果標記功能 ==========
    const toggleTradeResult = (index, result) => {
      if (!state.aiHistory[index]) return;
      if (state.aiHistory[index].result === result) {
        state.aiHistory[index].result = null;
      } else {
        state.aiHistory[index].result = result;
      }
      saveState();
      render();
    };

    // ========== UI輔助函數 ==========
    const showDebug = (msg) => {
      const el = document.getElementById('aiDebug');
      el.textContent = msg;
      el.classList.remove('hidden');
    };

    const hideDebug = () => document.getElementById('aiDebug').classList.add('hidden');

    // ========== 頁面渲染函數 ==========
    const renderHome = () => {
      if (!state.aiAnalysis) {
        return `
          <div class="bg-card border border-border rounded-2xl p-4 text-center">
            <div class="text-gray-400 mb-2">還沒有偵測結果</div>
            <div class="text-sm text-gray-500">點擊右下角🤖按鈕上傳K線截圖</div>
          </div>
        `;
      }

      const a = state.aiAnalysis;
      const suitability = getSuitabilityDescription(a.emaAngle);
      const winRate = getWinRateBySuitability(suitability);

        1. 提取K線的EMA5、EMA20、ATR(14)、當前價、關鍵高低點

      const res = await fetch(state.proxyUrl, {

      const data = await res.json();
      const match = data.choices[0].message.content.match(/\{[\s\S]*\}/);
      const parsedData = JSON.parse(match[0]);
      
      // ===== 整合中值後處理 =====
      parsedData.result = null;
      parsedData.emaAngle = calculateMergedEmaAngle(parsedData.ema5, parsedData.ema20, parsedData.currentPrice);
      
      const levels = calculateMergedLevels(parsedData.currentPrice, parsedData.atr14, false);
      parsedData.support = levels.support;
      parsedData.resistance = levels.resistance;
      
      const entryBase = calculateMergedEntryBaseSL(parsedData.currentPrice, parsedData.trend, parsedData.atr14, parsedData.emaAngle);
      Object.assign(parsedData, entryBase);
      
      parsedData.entry = parsedData.trend === 'long' ? parsedData.longEntry : parsedData.shortEntry;
      
      // 兩階段停損
      const longSL = calculateTwoStageSL(parsedData.longEntry, parsedData.longBaseSL, true);
      const shortSL = calculateTwoStageSL(parsedData.shortEntry, parsedData.shortBaseSL, false);
      parsedData.longStage1SL = longSL.stage1SL;
      parsedData.longStage2SL = longSL.stage2SL;
      parsedData.shortStage1SL = shortSL.stage1SL;
      parsedData.shortStage2SL = shortSL.stage2SL;
      
      parsedData.stage1SL = parsedData.trend === 'long' ? parsedData.longStage1SL : parsedData.shortStage1SL;
      parsedData.stage2SL = parsedData.trend === 'long' ? parsedData.longStage2SL : parsedData.shortStage2SL;
      
      // 止盈計算（含趨勢盤50點保證）
      const strongTrend = isStrongTrend(parsedData.emaAngle);
      const longTP = calculateTakeProfit(parsedData.longEntry, parsedData.longStage2SL, true, strongTrend);
      const shortTP = calculateTakeProfit(parsedData.shortEntry, parsedData.shortStage2SL, false, strongTrend);
      parsedData.longTp1 = longTP.tp1;
      parsedData.longTp2 = longTP.tp2;
      parsedData.shortTp1 = shortTP.tp1;
      parsedData.shortTp2 = shortTP.tp2;
      parsedData.tp1 = parsedData.trend === 'long' ? parsedData.longTp1 : parsedData.shortTp1;
      parsedData.tp2 = parsedData.trend === 'long' ? parsedData.longTp2 : parsedData.shortTp2;
      
      return parsedData;
    };

    const runAiAnalyze = async () => {
      showDebug("整合中值分析中...");
      if (!state.apiKey) { 
        document.getElementById('aiError').textContent = "❌ 請輸入OpenAI API Key"; 
        document.getElementById('aiError').classList.remove('hidden'); 
        return; 
      }
      if (state.aiBase64s.length === 0) { 
        document.getElementById('aiError').textContent = "❌ 請上傳K線截圖"; 
        document.getElementById('aiError').classList.remove('hidden'); 
        return; 
      }
      
      document.getElementById('analyzeButton').textContent = "⏳ 分析中...";
      document.getElementById('analyzeButton').disabled = true;

      try {
        const r = await callOpenAI(state.aiBase64s);
        
        r.time = new Date().toLocaleString();
        state.aiAnalysis = r;
        state.aiHistory.unshift(r);
        if (state.aiHistory.length > 100) state.aiHistory = state.aiHistory.slice(0, 100);
        saveState();
        renderAiResult();
        showDebug("✅ 分析完成");
        setTimeout(hideDebug, 2000);
      } catch (e) {
        document.getElementById('aiError').textContent = `❌ 分析錯誤：${e.message}`;
        document.getElementById('aiError').classList.remove('hidden');
      } finally {
        document.getElementById('analyzeButton').textContent = "🔍 整合中值精準批判點位";
        document.getElementById('analyzeButton').disabled = false;
        render();
      }
    };

    // ========== 全局事件初始化 ==========
    const initEvents = () => {
      // 底部導航
      document.querySelectorAll('.tab-button').forEach(btn=>{
        btn.addEventListener('click', e=>{
          state.tab = e.currentTarget.dataset.tab;
          document.querySelectorAll('.tab-button').forEach(b=>{ 
            b.classList.remove('text-indigo'); 
            b.classList.add('text-gray-400'); 
          });
          e.currentTarget.classList.add('text-indigo');
          render();
        });
      });

      // AI模態框
      document.getElementById('aiButton').addEventListener('click', ()=>{
        document.getElementById('aiModal').classList.remove('hidden');
      });
      document.getElementById('closeAiModal').addEventListener('click', ()=>{
        document.getElementById('aiModal').classList.add('hidden');
      });
      document.getElementById('uploadButton').addEventListener('click', ()=>{
        document.getElementById('fileInput').click();
      });
      document.getElementById('fileInput').addEventListener('change', e=>{
        const files = e.target.files;
        if (!files.length) return;
        state.aiBase64s = [];
        let count = 0;
        Array.from(files).forEach((f,i)=>{
          const r = new FileReader();
          r.onload = ev=>{
            state.aiBase64s.push(ev.target.result);
            count++;
            if (i === 0) document.getElementById('previewImg1').src = ev.target.result;
            if (i === 1) document.getElementById('previewImg2').src = ev.target.result;
            if (count === files.length) {
              document.getElementById('imagePreview').classList.remove('hidden');
              document.getElementById('previewImg2').style.display = files.length === 1 ? 'none' : 'block';
            }
          };
          r.readAsDataURL(f);
        });
      });

      document.getElementById('analyzeButton').addEventListener('click', runAiAnalyze);
      document.getElementById('resetAiButton').addEventListener('click', ()=>{
        state.aiBase64s = [];
        document.getElementById('fileInput').value = "";
        document.getElementById('imagePreview').classList.add('hidden');
        document.getElementById('aiResult').classList.add('hidden');
        document.getElementById('aiError').classList.add('hidden');
        hideDebug();
      });
    };

    // 暴露全局函數給onclick使用
    window.toggleTradeResult = toggleTradeResult;

    // ========== 程式入口 ==========
    window.addEventListener('DOMContentLoaded', () => {
      initFloatWindow();
      initEvents();
      render();
    });
  </script>
</body>
</html>
