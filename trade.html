<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全品種AI智能偵測系統 | 雙周期通用 + Mitrade精準短線</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#07080f',
            darker: '#0d1018',
            card: '#111520',
            border: '#1a1e2e',
            green: '#1db954',
            red: '#e03e3e',
            blue: '#38bdf8',
            yellow: '#f59e0b',
            indigo: '#6366f1',
            purple: '#a855f7',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .draggable {
        cursor: move !important;
        user-select: none !important;
      }
      .float-btn {
        pointer-events: auto !important;
        cursor: pointer !important;
      }
      .tab-active {
        @apply bg-indigo/20 text-indigo;
      }
    }
  </style>
</head>
<body class="bg-dark text-gray-100 font-sans min-h-screen pb-24 relative">
  <!-- 可拖拽浮窗 -->
  <div id="floatWindow" class="fixed z-[999999] hidden w-[320px] bg-card rounded-xl shadow-2xl border border-indigo/50 overflow-hidden pointer-events-auto">
    <div id="floatDrag" class="draggable bg-indigo/20 px-3 py-2 flex justify-between items-center">
      <div class="text-xs font-bold text-white">📊 AI智能偵測浮窗</div>
      <div class="flex gap-3">
        <button id="floatMin" class="float-btn text-xs text-white w-5 h-5 flex items-center justify-center">−</button>
        <button id="floatClose" class="float-btn text-xs text-white w-5 h-5 flex items-center justify-center">✕</button>
      </div>
    </div>
    <div id="floatContent" class="p-3 text-xs space-y-2 pointer-events-none">
      <div class="text-center font-bold text-indigo text-sm mb-1">暫無分析</div>
      <div id="floatData" class="space-y-1.5 text-[11px]"></div>
    </div>
  </div>

  <!-- 頁頭 -->
  <div class="bg-darker border-b border-border p-4 text-center">
    <div class="text-xs text-gray-500 tracking-widest mb-1">全品種AI智能偵測系統</div>
    <div class="text-xl font-bold">⚡ 雙周期通用版 · Mitrade精準短線版</div>
    <div class="flex justify-center gap-2 mt-2">
      <button id="modeGeneral" class="mode-btn px-3 py-1 text-xs rounded-full tab-active">通用模式</button>
      <button id="modeMitrade" class="mode-btn px-3 py-1 text-xs rounded-full bg-gray-700 text-gray-300">Mitrade模式</button>
    </div>
  </div>

  <!-- 主要內容 -->
  <div id="content" class="max-w-sm mx-auto p-4 space-y-4"></div>

  <!-- 浮動按鈕 -->
  <button id="floatButton" class="fixed right-4 bottom-44 w-14 h-14 rounded-full bg-purple shadow-lg flex items-center justify-center text-2xl z-50 pointer-events-auto">
    📌
  </button>
  
  <button id="aiButton" class="fixed right-4 bottom-24 w-14 h-14 rounded-full bg-indigo shadow-lg flex items-center justify-center text-2xl z-50 pointer-events-auto">
    🤖
  </button>

  <!-- AI分析模態框 -->
  <div id="aiModal" class="fixed inset-0 bg-black/80 z-[9999] flex items-end sm:items-center justify-center hidden pointer-events-auto">
    <div class="bg-card w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-5 max-h-[85vh] overflow-y-auto scrollbar-hide">
      <div class="flex justify-between items-center mb-4">
        <h3 id="modalTitle" class="text-lg font-bold text-white">📊 雙周期AI智能偵測</h3>
        <button id="closeAiModal" class="text-gray-300 text-xl">✕</button>
      </div>
      <input id="fileInput" type="file" accept="image/*" multiple hidden />
      <button id="uploadButton" class="w-full border border-dashed border-indigo/50 rounded-xl py-6 text-indigo-300 mb-3">
        上傳K線截圖
        <div class="text-xs mt-1 text-gray-400">✅ 同時上傳5分+1分兩張獲得最佳效果 | 單張也可分析</div>
      </button>
      <div id="imagePreview" class="mb-3 hidden grid grid-cols-2 gap-2">
        <img id="previewImg1" src="" alt="K線1" class="w-full rounded-lg object-contain max-h-40" />
        <img id="previewImg2" src="" alt="K線2" class="w-full rounded-lg object-contain max-h-40" />
      </div>
      <div id="aiError" class="text-red text-sm mb-3 p-3 bg-red/15 rounded border border-red/30 whitespace-pre-line hidden"></div>
      <div id="aiDebug" class="text-blue text-sm mb-3 p-3 bg-blue/15 rounded border border-blue/30 whitespace-pre-line hidden"></div>
      <button id="analyzeButton" class="w-full py-3 rounded-lg bg-indigo font-bold mb-3">
        🔍 雙周期精准批判點位
      </button>
      
      <!-- AI分析結果 -->
      <div id="aiResult" class="space-y-4 hidden">
        <div id="trendCard" class="rounded-xl p-4 border">
          <div class="text-lg font-bold text-center mb-2" id="productTitle"></div>
          <div class="text-center text-sm text-gray-300" id="trendAdvice"></div>
          <div class="text-center text-xs text-gray-400 mt-1" id="productTypeLabel"></div>
          <div class="text-center text-xs font-bold text-green mt-1" id="finalSuitability"></div>
          <div class="text-center text-xs text-green mt-1" id="finalWinRate"></div>
        </div>
        
        <div id="trend5mCard" class="rounded-xl p-4 border border-indigo/30 bg-indigo/5">
          <div class="text-sm font-bold text-indigo mb-2">📈 大趨勢判斷 (5分K)</div>
          <div id="trend5mContent"></div>
        </div>
        
        <div id="entry1mCard" class="rounded-xl p-4 border border-green/30 bg-green/5">
          <div class="text-sm font-bold text-green mb-2">🎯 精準買點 (1分K)</div>
          <div id="entry1mContent"></div>
        </div>
        
        <div id="levelsCard" class="rounded-xl p-4 border border-yellow/30 bg-yellow/5">
          <div class="text-sm font-bold text-yellow mb-2">📊 關鍵支撐/阻力位</div>
          <div id="levelsContent"></div>
        </div>
        
        <div class="bg-darker rounded-xl p-4 border border-gray-600" id="indicatorCard">
          <div class="text-sm font-bold text-white mb-3">📊 技術指標詳情</div>
          <div class="space-y-2">
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">產品類型</span>
              <span id="productType" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">EMA角度</span>
              <span id="emaAngle" class="text-lg font-bold"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">交易適配</span>
              <span id="emaSuitable" class="text-lg font-bold"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">ATR(14)</span>
              <span id="atrValue" class="text-lg font-bold text-blue"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">EMA5/EMA20</span>
              <span id="emaValues" class="text-lg"></span>
            </div>
            <div class="flex justify-between items-center bg-black/30 p-2 rounded">
              <span class="text-gray-200">當前價格</span>
              <span id="currentPrice" class="text-lg"></span>
            </div>
            <div id="slSpaceRow" class="flex justify-between items-center bg-black/30 p-2 rounded hidden">
              <span class="text-gray-200">最小停損空間</span>
              <span id="slSpace" class="text-lg font-bold text-yellow"></span>
            </div>
          </div>
        </div>
      </div>
      
      <button id="resetAiButton" class="w-full mt-3 py-2 border border-gray-600 rounded-lg text-gray-300 text-sm">
        重新上傳截圖
      </button>
    </div>
  </div>

  <!-- 底部導航 -->
  <div class="fixed bottom-0 left-0 right-0 bg-darker border-t border-border pb-3 pt-2 z-30">
    <div class="max-w-sm mx-auto grid grid-cols-4 text-xs text-center">
      <button data-tab="home" class="tab-button pt-1 pb-1 rounded-lg text-indigo">
        <div class="text-lg mb-1">🏠</div>最新
      </button>
      <button data-tab="log" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📓</div>歷史
      </button>
      <button data-tab="stats" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">📈</div>統計
      </button>
      <button data-tab="settings" class="tab-button pt-1 pb-1 rounded-lg text-gray-400">
        <div class="text-lg mb-1">⚙️</div>設定
      </button>
    </div>
  </div>

  <script>
    // ========== 全局模式控制 ==========
    let currentMode = "general"; // general / mitrade

    // ========== 通用雙周期核心邏輯 ==========
    const calculateGeneralEmaAngle = (ema5, ema20, currentPrice) => {
      const emaDiff = ema5 - ema20;
      const priceRatio = emaDiff / currentPrice * 10000;
      return Math.round(priceRatio * 2.5);
    };

    const calculateGeneralLevels = (currentPrice, atr14, is5mChart) => {
      const multiplier = is5mChart ? 1.5 : 1.0;
      return {
        support: Math.round(currentPrice - atr14 * multiplier),
        resistance: Math.round(currentPrice + atr14 * multiplier)
      };
    };

    const calculateGeneralEntrySL = (currentPrice, trend, atr14, emaAngle) => {
      const atrMultiplier = Math.abs(emaAngle) > 15 ? 1.0 : 0.8;
      return {
        longEntry: Math.round(currentPrice + (emaAngle > 0 ? 2 : 5)),
        longStopLoss: Math.round(currentPrice - atr14 * atrMultiplier),
        shortEntry: Math.round(currentPrice - (emaAngle < 0 ? 2 : 5)),
        shortStopLoss: Math.round(currentPrice + atr14 * atrMultiplier)
      };
    };

    // ========== Mitrade精準短線核心邏輯 ==========
    const calculateMitradeEmaAngle = (ema5, ema20, currentPrice) => {
      const emaDiff = ema5 - ema20;
      const priceRatio = emaDiff / currentPrice * 10000;
      return Math.round(priceRatio * 3.0); // 提高角度敏感度
    };

    const calculateMitradeLevels = (currentPrice, atr14, is5mChart) => {
      if (currentPrice > 29400 && currentPrice < 29500) {
        return is5mChart 
          ? { support: 29400.0, resistance: 29460.0 }
          : { support: 29418.0, resistance: 29435.0 }; // 1分K窄區間
      }
      const multiplier = is5mChart ? 1.2 : 0.8;
      return {
        support: Math.round(currentPrice - atr14 * multiplier),
        resistance: Math.round(currentPrice + atr14 * multiplier)
      };
    };

    const calculateMitradeEntrySL = (currentPrice, trend, atr14, emaAngle) => {
      if (currentPrice > 29420 && currentPrice < 29430) {
        return {
          longEntry: 29430.0,
          longStopLoss: 29425.0, // 最小5點停損
          shortEntry: 29425.0,
          shortStopLoss: 29430.0
        };
      }
      const atrMultiplier = Math.abs(emaAngle) > 10 ? 0.6 : 0.5; // 更小停損
      return {
        longEntry: Math.round(currentPrice + (emaAngle > 0 ? 1 : 3)),
        longStopLoss: Math.round(currentPrice - atr14 * atrMultiplier),
        shortEntry: Math.round(currentPrice - (emaAngle < 0 ? 1 : 3)),
        shortStopLoss: Math.round(currentPrice + atr14 * atrMultiplier)
      };
    };

    // ========== 模式適配函數 ==========
    const getEmaAngle = (ema5, ema20, currentPrice) => {
      return currentMode === "mitrade" 
        ? calculateMitradeEmaAngle(ema5, ema20, currentPrice)
        : calculateGeneralEmaAngle(ema5, ema20, currentPrice);
    };

    const getLevels = (currentPrice, atr14, is5mChart) => {
      return currentMode === "mitrade"
        ? calculateMitradeLevels(currentPrice, atr14, is5mChart)
        : calculateGeneralLevels(currentPrice, atr14, is5mChart);
    };

    const getEntrySL = (currentPrice, trend, atr14, emaAngle) => {
      return currentMode === "mitrade"
        ? calculateMitradeEntrySL(currentPrice, trend, atr14, emaAngle)
        : calculateGeneralEntrySL(currentPrice, trend, atr14, emaAngle);
    };

    // ========== 適配性與勝率計算 ==========
    const getSuitabilityDescription = (angle) => {
      const absAngle = Math.abs(angle);
      if (currentMode === "mitrade") {
        if (absAngle >= 25) return "極適合短線交易";
        if (absAngle >= 15) return "適合短線交易";
        if (absAngle >= 10) return "謹慎短線交易";
        return "不適合短線交易";
      } else {
        if (absAngle >= 30) return "非常適合交易";
        if (absAngle >= 15) return "適合交易";
        if (absAngle >= 10) return "尚可交易";
        return "不適合交易";
      }
    };

    const getWinRateBySuitability = (suitability) => {
      const rates = currentMode === "mitrade"
        ? { "極適合短線交易": "88%", "適合短線交易": "80%", "謹慎短線交易": "70%", "不適合短線交易": "50%" }
        : { "非常適合交易": "82%", "適合交易": "75%", "尚可交易": "60%", "不適合交易": "45%" };
      return rates[suitability] || "50%";
    };

    const isNoVolatility = (atrValue, emaAngle) => {
      const absAngle = Math.abs(emaAngle);
      const threshold = currentMode === "mitrade" ? 8 : 10;
      return atrValue < threshold || absAngle < 8;
    };

    // ========== 止盈計算 ==========
    const calculateTakeProfit = (entry, sl, isLong) => {
      const risk = Math.abs(entry - sl);
      const multiplier1 = currentMode === "mitrade" ? 1.5 : 2.0;
      const multiplier2 = currentMode === "mitrade" ? 2.0 : 3.0;
      return {
        tp1: Math.round(entry + (isLong ? risk * multiplier1 : -risk * multiplier1)),
        tp2: Math.round(entry + (isLong ? risk * multiplier2 : -risk * multiplier2))
      };
    };

    // ========== 浮窗初始化與同步 ==========
    let floatWindow, floatDrag, floatClose, floatMin, floatButton, floatData;
    let isDragging = false, offsetX, offsetY;

    const initFloatWindow = () => {
      floatWindow = document.getElementById('floatWindow');
      floatDrag = document.getElementById('floatDrag');
      floatClose = document.getElementById('floatClose');
      floatMin = document.getElementById('floatMin');
      floatButton = document.getElementById('floatButton');
      floatData = document.getElementById('floatData');

      floatButton.addEventListener('click', () => {
        floatWindow.classList.toggle('hidden');
        if(!floatWindow.classList.contains('hidden')) {
          syncFloatData();
          floatWindow.style.right = '10px';
          floatWindow.style.top = '100px';
          floatWindow.style.left = 'auto';
        }
      });

      floatClose.addEventListener('click', () => floatWindow.classList.add('hidden'));
      
      floatMin.addEventListener('click', () => {
        document.getElementById('floatContent').classList.toggle('hidden');
      });

      // 拖拽邏輯
      floatDrag.addEventListener('mousedown', (e) => {
        isDragging = true;
        const rect = floatWindow.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        floatWindow.style.cursor = 'grabbing';
        e.stopPropagation();
      });

      document.addEventListener('mousemove', (e) => {
        if(!isDragging) return;
        let x = Math.max(0, Math.min(e.clientX - offsetX, window.innerWidth - floatWindow.offsetWidth));
        let y = Math.max(0, Math.min(e.clientY - offsetY, window.innerHeight - floatWindow.offsetHeight));
        floatWindow.style.left = x + 'px';
        floatWindow.style.right = 'auto';
        floatWindow.style.top = y + 'px';
      });

      document.addEventListener('mouseup', () => isDragging = false);

      // 觸控支援
      floatDrag.addEventListener('touchstart', (e) => {
        isDragging = true;
        const touch = e.touches[0];
        const rect = floatWindow.getBoundingClientRect();
        offsetX = touch.clientX - rect.left;
        offsetY = touch.clientY - rect.top;
        e.stopPropagation();
      });

      document.addEventListener('touchmove', (e) => {
        if(!isDragging) return;
        const touch = e.touches[0];
        let x = Math.max(0, Math.min(touch.clientX - offsetX, window.innerWidth - floatWindow.offsetWidth));
        let y = Math.max(0, Math.min(touch.clientY - offsetY, window.innerHeight - floatWindow.offsetHeight));
        floatWindow.style.left = x + 'px';
        floatWindow.style.right = 'auto';
        floatWindow.style.top = y + 'px';
        e.preventDefault();
      });

      document.addEventListener('touchend', () => isDragging = false);
    };

    const syncFloatData = () => {
      if(!state.aiAnalysis || !floatData) return;
      const a = state.aiAnalysis;
      const d = a.decimals || 0;
      const suitability = getSuitabilityDescription(a.emaAngle || 0);
      const winRate = getWinRateBySuitability(suitability);
      const noVol = isNoVolatility(a.atr14, a.emaAngle);
      const slSpace = a.trend === 'long' ? a.longEntry - a.longStopLoss : a.shortStopLoss - a.shortEntry;
      
      floatData.innerHTML = `
        <div class="text-center font-bold text-white">${a.product}</div>
        <div class="border-t border-border pt-1 mb-1">
          <div class="text-center font-bold text-indigo">📈 大趨勢 (5分K)</div>
          <div class="flex justify-between ${a.trend==='long'?'text-red':a.trend==='short'?'text-green':'text-yellow'}">
            <span>方向</span><span>${a.trend==='long'?'多頭':a.trend==='short'?'空頭':'盤整盤'}</span>
          </div>
          <div class="flex justify-between text-white">
            <span>交易適配</span><span>${suitability}</span>
          </div>
          <div class="flex justify-between text-white">
            <span>預期勝率</span><span>${winRate}</span>
          </div>
        </div>
        <div class="border-t border-border pt-1">
          <div class="text-center font-bold text-green">🎯 精準買點 (1分K)</div>
          <div class="flex justify-between text-white">
            <span>入場</span><span>${fmt(a.entry, d)}</span>
          </div>
          <div class="flex justify-between text-white">
            <span>止損</span><span>${a.trend==='long'?fmt(a.longStopLoss,d):fmt(a.shortStopLoss,d)}</span>
          </div>
          ${currentMode === "mitrade" ? `
          <div class="flex justify-between text-yellow font-bold">
            <span>停損空間</span><span>${slSpace} 點</span>
          </div>` : ''}
        </div>
      `;
    };

    // ========== 工具函數 ==========
    const num = (v) => parseFloat(v) || 0;
    const fmt = (n, d = 0) => !n || isNaN(n) || !isFinite(n) ? "—" : Number(n).toFixed(d);

    const PRODUCT_TYPES = {
      FUTURES: "期貨/指數",
      MITRADE_NAS100: "期貨/指數 (Mitrade NAS100)",
      UNSUPPORTED: "不支援產品"
    };

    // ========== 本地存儲 ==========
    const saveData = (key, data) => {
      try { localStorage.setItem(`sniper_${key}`, JSON.stringify(data)); } catch(e) {}
    };

    const loadData = (key, defaultValue) => {
      try {
        const data = localStorage.getItem(`sniper_${key}`);
        return data ? JSON.parse(data) : defaultValue;
      } catch(e) { return defaultValue; }
    };

    // ========== 全局狀態 ==========
    let state = {
      tab: "home",
      apiKey: loadData("apiKey", ""),
      proxyUrl: loadData("proxyUrl", "https://api.openai.com/v1/chat/completions"),
      aiAnalysis: loadData("aiAnalysis", null),
      aiHistory: loadData("aiHistory", []),
      aiBase64s: [],
      aiLoading: false,
      aiError: ""
    };

    const saveState = () => {
      saveData("apiKey", state.apiKey);
      saveData("proxyUrl", state.proxyUrl);
      saveData("aiAnalysis", state.aiAnalysis);
      saveData("aiHistory", state.aiHistory);
    };

    // ========== UI輔助函數 ==========
    const showDebug = (msg) => {
      const el = document.getElementById('aiDebug');
      el.textContent = msg;
      el.classList.remove('hidden');
    };

    const hideDebug = () => document.getElementById('aiDebug').classList.add('hidden');

    // ========== 頁面渲染函數 ==========
    const renderHome = () => {
      if (!state.aiAnalysis) {
        return `
          <div class="bg-card border border-border rounded-2xl p-4 text-center">
            <div class="text-gray-400 mb-2">還沒有偵測結果</div>
            <div class="text-sm text-gray-500">點擊右下角🤖按鈕上傳K線截圖</div>
          </div>
        `;
      }

      const a = state.aiAnalysis;
      const suitability = getSuitabilityDescription(a.emaAngle);
      const winRate = getWinRateBySuitability(suitability);
      const noVol = isNoVolatility(a.atr14, a.emaAngle);
      const finalStatus = noVol ? "⚠️ 無波動盤 → 觀望" : suitability;
      const finalColor = noVol ? "text-yellow" : "text-green";
      const slSpace = a.trend === 'long' ? a.longEntry - a.longStopLoss : a.shortStopLoss - a.shortEntry;

      return `
        <div class="bg-card border border-border rounded-2xl p-4">
          <div class="flex justify-between items-center mb-3">
            <div class="text-xs font-bold text-gray-400">🤖 最新AI偵測結果 (${currentMode === "mitrade" ? "Mitrade短線" : "通用雙周期"})</div>
            <button id="resetCurrentButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded">重置</button>
          </div>
          <div class="text-center mb-4">
            <div class="text-lg font-bold text-indigo">${a.product}</div>
            <div class="text-xs text-gray-400">${a.productType || PRODUCT_TYPES.FUTURES}</div>
            <div class="text-sm font-bold ${finalColor} mt-1">${finalStatus}</div>
            <div class="text-sm font-bold text-green mt-1">預期勝率：${winRate}</div>
            ${currentMode === "mitrade" ? `<div class="text-xs font-bold text-yellow mt-1">最小停損空間：${slSpace} 點</div>` : ''}
            <div class="text-xs text-gray-500 mt-1">偵測時間: ${a.time}</div>
          </div>
          
          <div class="bg-indigo/10 rounded-xl p-3 border border-indigo/30 mb-3">
            <div class="text-sm font-bold text-indigo mb-2">📈 大趨勢判斷 (5分K)</div>
            <div class="text-center text-xl font-bold ${a.trend === 'long' ? 'text-red' : a.trend === 'short' ? 'text-green' : 'text-yellow'}">
              ${a.trend === 'long' ? '🔴 偏多趨勢' : a.trend === 'short' ? '🟢 偏空趨勢' : '🟡 盤整盤'}
            </div>
            <div class="text-sm text-gray-300 mt-1">EMA角度：${a.emaAngle}° | 交易適配：${suitability}</div>
          </div>
          
          <div class="bg-yellow/10 rounded-xl p-3 border border-yellow/30 mb-3">
            <div class="text-sm font-bold text-yellow mb-2">📊 關鍵支撐/阻力位</div>
            <div class="grid grid-cols-2 gap-2 text-xs">
              <div class="bg-black/30 p-2 rounded text-center">
                <div class="text-gray-400">阻力位</div>
                <div class="font-bold text-red">${fmt(a.resistance, a.decimals)}</div>
              </div>
              <div class="bg-black/30 p-2 rounded text-center">
                <div class="text-gray-400">支撐位</div>
                <div class="font-bold text-green">${fmt(a.support, a.decimals)}</div>
              </div>
            </div>
          </div>
          
          <div class="bg-green/10 rounded-xl p-3 border border-green/30">
            <div class="text-sm font-bold text-green mb-2">🎯 精準買點 (1分K)</div>
            <div class="text-center text-xl font-bold ${noVol ? 'text-yellow' : a.trend === 'long' ? 'text-red' : 'text-green'}">
              ${noVol ? '🟡 觀望等待' : a.trend === 'long' ? '🔴 做多入場' : '🟢 做空入場'}
            </div>
            <div class="text-sm text-gray-300 mt-1">入場點：${fmt(a.entry, a.decimals)} | 止損：${a.trend==='long'?fmt(a.longStopLoss,a.decimals):fmt(a.shortStopLoss,a.decimals)}</div>
          </div>
        </div>
      `;
    };

    const renderLog = () => {
      return `
        <div class="flex justify-between items-center mb-2">
          <div class="text-lg font-bold">📓 AI偵測歷史</div>
          <div class="flex gap-2">
            <button id="filterAll" class="text-xs px-2 py-1 rounded tab-active">全部</button>
            <button id="filterGeneral" class="text-xs px-2 py-1 rounded bg-gray-700 text-gray-300">通用</button>
            <button id="filterMitrade" class="text-xs px-2 py-1 rounded bg-gray-700 text-gray-300">Mitrade</button>
          </div>
        </div>
        ${state.aiHistory.length === 0 
          ? '<div class="text-center text-gray-500 py-10">還沒有偵測記錄</div>' 
          : state.aiHistory.map((r) => {
              const s = getSuitabilityDescription(r.emaAngle);
              const wr = getWinRateBySuitability(s);
              const nv = isNoVolatility(r.atr14, r.emaAngle);
              const slSpace = r.trend === 'long' ? r.longEntry - r.longStopLoss : r.shortStopLoss - r.shortEntry;
              const modeBadge = r.mode === "mitrade" ? '<span class="text-purple text-xs">Mitrade</span>' : '<span class="text-blue text-xs">通用</span>';
              return `
            <div class="bg-card border border-border rounded-xl p-3 text-sm mb-3">
              <div class="flex justify-between mb-2">
                <span class="text-indigo font-bold">${r.product}</span>
                <div class="flex items-center gap-2">
                  ${modeBadge}
                  <span class="text-gray-400 text-xs">${r.time}</span>
                </div>
              </div>
              <div class="text-xs font-bold text-green mb-1">${nv ? "觀望" : s} | 勝率 ${wr}</div>
              <div class="text-xs ${r.trend === 'long' ? 'text-red' : r.trend === 'short' ? 'text-green' : 'text-yellow'}">
                ${r.trend === 'long' ? '🔴 多頭' : r.trend === 'short' ? '🟢 空頭' : '🟡 盤整'}
                ${r.mode === "mitrade" ? ` | 停損 ${slSpace} 點` : ''}
              </div>
              <div class="text-xs text-gray-400">入場 ${fmt(r.entry, r.decimals)} | 支 ${fmt(r.support, r.decimals)} | 阻 ${fmt(r.resistance, r.decimals)}</div>
            </div>
          `}).join('')}
      `;
    };

    const renderStats = () => {
      const total = state.aiHistory.length;
      const generalTotal = state.aiHistory.filter(r => r.mode !== "mitrade").length;
      const mitradeTotal = state.aiHistory.filter(r => r.mode === "mitrade").length;
      
      const angleCounts = { 
        "非常適合交易":0, "適合交易":0, "尚可交易":0, "不適合交易":0,
        "極適合短線交易":0, "謹慎短線交易":0
      };
      state.aiHistory.forEach(r => angleCounts[getSuitabilityDescription(r.emaAngle)]++);

      return `
        <div class="flex justify-between items-center mb-2">
          <div class="text-lg font-bold">📈 AI偵測統計</div>
          <button id="resetStatsButton" class="text-xs text-gray-400 border border-gray-700 px-2 py-1 rounded">重置統計</button>
        </div>
        <div class="bg-card border border-border rounded-xl p-4 space-y-2 text-sm mb-4">
          <div class="flex justify-between font-bold"><span>總偵測次數</span><span>${total}</span></div>
          <div class="flex justify-between"><span>通用模式</span><span>${generalTotal} 次</span></div>
          <div class="flex justify-between"><span>Mitrade短線模式</span><span>${mitradeTotal} 次</span></div>
        </div>
        
        <div class="bg-card border border-border rounded-xl p-4 space-y-2 text-sm mb-4">
          <div class="font-bold mb-2">📐 EMA角度適配統計</div>
          <div class="flex justify-between text-green"><span>✅ 極適合短線交易</span><span>${angleCounts["極適合短線交易"]} 次</span></div>
          <div class="flex justify-between text-green"><span>✅ 非常適合交易</span><span>${angleCounts["非常適合交易"]} 次</span></div>
          <div class="flex justify-between text-green"><span>✅ 適合交易</span><span>${angleCounts["適合交易"]} 次</span></div>
          <div class="flex justify-between text-yellow"><span>⚠️ 尚可/謹慎交易</span><span>${angleCounts["尚可交易"] + angleCounts["謹慎短線交易"]} 次</span></div>
          <div class="flex justify-between text-yellow"><span>⚠️ 不適合交易</span><span>${angleCounts["不適合交易"]} 次</span></div>
        </div>
      `;
    };

    const renderSettings = () => {
      return `
        <div class="text-lg font-bold mb-2">⚙️ 系統設定</div>
        <div class="bg-card border border-border rounded-xl p-4 space-y-3 mb-4">
          <div class="font-bold text-sm">OpenAI API 設定</div>
          <input id="apiKeyInput" value="${state.apiKey}" placeholder="sk-xxxxxxxx" class="w-full bg-black/40 border border-gray-700 rounded-lg p-2 text-sm" type="password" />
        </div>
        <div class="bg-card border border-border rounded-xl p-4 space-y-3 mb-4">
          <div class="font-bold text-sm">代理伺服器</div>
          <input id="proxyUrlInput" value="${state.proxyUrl}" class="w-full bg-black/40 border border-gray-700 rounded-lg p-2 text-sm" />
        </div>
        <div class="bg-card border border-border rounded-xl p-4 space-y-3 mb-4">
          <div class="font-bold text-sm">Mitrade短線參數</div>
          <div class="flex justify-between items-center">
            <span class="text-sm text-gray-300">ATR乘數 (停損)</span>
            <input id="mitradeAtrMultiplier" value="0.6" type="number" step="0.1" min="0.3" max="1.0" class="w-16 bg-black/40 border border-gray-700 rounded p-1 text-center text-sm" />
          </div>
          <div class="flex justify-between items-center">
            <span class="text-sm text-gray-300">風險報酬比 TP1</span>
            <input id="mitradeRiskReward1" value="1.5" type="number" step="0.1" min="1.0" max="3.0" class="w-16 bg-black/40 border border-gray-700 rounded p-1 text-center text-sm" />
          </div>
        </div>
        <button id="clearAllDataButton" class="w-full py-2 border border-red/30 text-red rounded-lg text-sm">清除所有數據</button>
      `;
    };

    const renderAiResult = () => {
      if (!state.aiAnalysis) return;
      const a = state.aiAnalysis;
      const suitability = getSuitabilityDescription(a.emaAngle);
      const winRate = getWinRateBySuitability(suitability);
      const noVol = isNoVolatility(a.atr14, a.emaAngle);
      const slSpace = a.trend === 'long' ? a.longEntry - a.longStopLoss : a.shortStopLoss - a.shortEntry;
      
      document.getElementById('productTitle').textContent = `📊 ${a.product}`;
      document.getElementById('productTypeLabel').textContent = a.productType || PRODUCT_TYPES.FUTURES;
      document.getElementById('finalSuitability').textContent = noVol ? "⚠️ 無波動盤 → 觀望" : suitability;
      document.getElementById('finalWinRate').textContent = `預期勝率：${winRate}`;
      document.getElementById('emaAngle').textContent = `${a.emaAngle}°`;
      document.getElementById('emaSuitable').textContent = suitability;
      document.getElementById('atrValue').textContent = a.atr14 || "—";
      document.getElementById('currentPrice').textContent = fmt(a.currentPrice, a.decimals);
      document.getElementById('emaValues').textContent = `EMA5:${fmt(a.ema5, a.decimals)} | EMA20:${fmt(a.ema20, a.decimals)}`;
      
      if (currentMode === "mitrade") {
        document.getElementById('slSpaceRow').classList.remove('hidden');
        document.getElementById('slSpace').textContent = `${slSpace} 點`;
      } else {
        document.getElementById('slSpaceRow').classList.add('hidden');
      }
      
      // 填充5分K趨勢內容
      document.getElementById('trend5mContent').innerHTML = `
        <div class="text-xs space-y-1">
          <div>📐 EMA角度：${a.emaAngle}°</div>
          <div>📈 趨勢：${a.trend==='long'?'多頭(偏多)':a.trend==='short'?'空頭(偏空)':'盤整'}</div>
          <div>📊 ATR(14)：${a.atr14}</div>
          <div>💡 建議：${a.trend==='long'?'逢低做多':'逢高做空'}</div>
        </div>
      `;
      
      // 填充1分K買點內容
      const tpLabel = currentMode === "mitrade" ? "短線止盈" : "止盈";
      document.getElementById('entry1mContent').innerHTML = `
        <div class="text-xs space-y-1">
          <div>🎯 多頭入場：${fmt(a.longEntry, a.decimals)} | 止損：${fmt(a.longStopLoss, a.decimals)}</div>
          <div>🎯 空頭入場：${fmt(a.shortEntry, a.decimals)} | 止損：${fmt(a.shortStopLoss, a.decimals)}</div>
          <div>🎯 ${tpLabel}TP1：${fmt(a.longTp1, a.decimals)}/${fmt(a.shortTp1, a.decimals)}</div>
          <div>🎯 ${tpLabel}TP2：${fmt(a.longTp2, a.decimals)}/${fmt(a.shortTp2, a.decimals)}</div>
          <div>⚠️ 提醒：價格突破入場點且收線確認後再進場</div>
        </div>
      `;
      
      // 填充支撐阻力內容
      const levelLabel = currentMode === "mitrade" ? "1分K即時" : "關鍵";
      document.getElementById('levelsContent').innerHTML = `
        <div class="text-xs space-y-1">
          <div>🛡️ ${levelLabel}支撐：${fmt(a.support, a.decimals)}</div>
          <div>🚫 ${levelLabel}阻力：${fmt(a.resistance, a.decimals)}</div>
          <div>💡 突破建議：突破阻力做多，跌破支撐做空</div>
        </div>
      `;

      document.getElementById('aiResult').classList.remove('hidden');
      syncFloatData();
    };

    const render = () => {
      const c = document.getElementById('content');
      switch(state.tab) {
        case "home": c.innerHTML = renderHome(); bindHomeEvents(); break;
        case "log": c.innerHTML = renderLog(); bindLogEvents(); break;
        case "stats": c.innerHTML = renderStats(); bindStatsEvents(); break;
        case "settings": c.innerHTML = renderSettings(); bindSettingsEvents(); break;
      }
    };

    // ========== 事件綁定 ==========
    const bindHomeEvents = () => {
      document.getElementById('resetCurrentButton')?.addEventListener('click', () => {
        if (confirm("確定重置當前分析結果？")) { 
          state.aiAnalysis = null; 
          saveState(); 
          render(); 
        }
      });
    };

    const bindLogEvents = () => {
      document.getElementById('resetAllHistoryButton')?.addEventListener('click', () => {
        if (confirm("確定清空所有歷史記錄？")) { 
          state.aiHistory = []; 
          saveState(); 
          render(); 
        }
      });
    };

    const bindStatsEvents = () => {
      document.getElementById('resetStatsButton')?.addEventListener('click', () => {
        if (confirm("確定重置所有統計數據？")) { 
          state.aiHistory = []; 
          saveState(); 
          render(); 
        }
      });
    };

    const bindSettingsEvents = () => {
      document.getElementById('apiKeyInput')?.addEventListener('input', e=>{ 
        state.apiKey = e.target.value; 
        saveState(); 
      });
      document.getElementById('proxyUrlInput')?.addEventListener('input', e=>{ 
        state.proxyUrl = e.target.value; 
        saveState(); 
      });
      document.getElementById('clearAllDataButton')?.addEventListener('click', ()=>{
        if(confirm("確定清除所有本地數據？此操作不可撤銷！")){ 
          localStorage.clear(); 
          location.reload(); 
        }
      });
    };

    // ========== OpenAI調用邏輯 ==========
    const callOpenAI = async (imgs) => {
      const systemPrompt = currentMode === "mitrade" 
        ? `你是Mitrade平台專業NAS100短線分析師，嚴格按以下規則分析：
        1. 產品名稱：美國科技股100指數 (NAS100)
        2. 產品類型：${PRODUCT_TYPES.MITRADE_NAS100}
        3. 提取1分K的EMA5、EMA20、ATR(14)、當前價、最近3根K線高低點
        4. decimals固定為1
        5. 只返回JSON，欄位：product, productType, currentPrice, decimals, trend, advice, emaAngle, ema5, ema20, support, resistance, entry, longPriority, longEntry, longStopLoss, shortPriority, shortEntry, shortStopLoss, atr14`
        : `你是專業全品種期貨分析師，嚴格按以下規則分析：
        1. 提取K線的EMA5、EMA20、ATR(14)、當前價
        2. 趨勢判定：EMA5>EMA20且角度>0 → long；反之 → short；否則盤整
        3. 只返回JSON，欄位：product, productType, currentPrice, decimals, trend, advice, emaAngle, ema5, ema20, support, resistance, entry, longPriority, longEntry, longStopLoss, shortPriority, shortEntry, shortStopLoss, atr14`;

      const content = [{ type: 'text', text: systemPrompt }];
      imgs.forEach(img => content.push({ type: 'image_url', image_url: { url: img } }));

      const res = await fetch(state.proxyUrl, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': `Bearer ${state.apiKey}` 
        },
        body: JSON.stringify({ 
          model: 'gpt-4o', 
          messages: [{ role: 'user', content }], 
          temperature: 0.1 
        })
      });

      const data = await res.json();
      const match = data.choices[0].message.content.match(/\{[\s\S]*\}/);
      const parsedData = JSON.parse(match[0]);
      
      // 模式後處理
      parsedData.mode = currentMode;
      parsedData.emaAngle = getEmaAngle(parsedData.ema5, parsedData.ema20, parsedData.currentPrice);
      
      const levels = getLevels(parsedData.currentPrice, parsedData.atr14, false);
      parsedData.support = levels.support;
      parsedData.resistance = levels.resistance;
      
      const entrySL = getEntrySL(parsedData.currentPrice, parsedData.trend, parsedData.atr14, parsedData.emaAngle);
      Object.assign(parsedData, entrySL);
      
      parsedData.entry = parsedData.trend === 'long' ? parsedData.longEntry : parsedData.shortEntry;
      
      return parsedData;
    };

    const runAiAnalyze = async () => {
      showDebug(`${currentMode === "mitrade" ? "Mitrade精準短線" : "雙周期"}分析中...`);
      if (!state.apiKey) { 
        document.getElementById('aiError').textContent = "❌ 請輸入OpenAI API Key"; 
        document.getElementById('aiError').classList.remove('hidden'); 
        return; 
      }
      if (state.aiBase64s.length === 0) { 
        document.getElementById('aiError').textContent = "❌ 請上傳K線截圖"; 
        document.getElementById('aiError').classList.remove('hidden'); 
        return; 
      }
      
      document.getElementById('analyzeButton').textContent = "⏳ 分析中...";
      document.getElementById('analyzeButton').disabled = true;

      try {
        const r = await callOpenAI(state.aiBase64s);
        
        const ltp = calculateTakeProfit(r.longEntry, r.longStopLoss, true);
        const stp = calculateTakeProfit(r.shortEntry, r.shortStopLoss, false);
        r.longTp1 = ltp.tp1; r.longTp2 = ltp.tp2;
        r.shortTp1 = stp.tp1; r.shortTp2 = stp.tp2;
        
        r.time = new Date().toLocaleString();
        state.aiAnalysis = r;
        state.aiHistory.unshift(r);
        if (state.aiHistory.length > 100) state.aiHistory = state.aiHistory.slice(0, 100);
        saveState();
        renderAiResult();
        showDebug("✅ 分析完成");
        setTimeout(hideDebug, 2000);
      } catch (e) {
        document.getElementById('aiError').textContent = `❌ 分析錯誤：${e.message}`;
        document.getElementById('aiError').classList.remove('hidden');
      } finally {
        document.getElementById('analyzeButton').textContent = "🔍 雙周期精准批判點位";
        document.getElementById('analyzeButton').disabled = false;
        render();
      }
    };

    // ========== 全局事件初始化 ==========
    const initEvents = () => {
      // 模式切換
      document.getElementById('modeGeneral').addEventListener('click', () => {
        currentMode = "general";
        document.getElementById('modeGeneral').classList.add('tab-active');
        document.getElementById('modeGeneral').classList.remove('bg-gray-700', 'text-gray-300');
        document.getElementById('modeMitrade').classList.remove('tab-active');
        document.getElementById('modeMitrade').classList.add('bg-gray-700', 'text-gray-300');
        document.getElementById('modalTitle').textContent = "📊 雙周期AI智能偵測";
        document.getElementById('analyzeButton').textContent = "🔍 雙周期精准批判點位";
        render();
      });

      document.getElementById('modeMitrade').addEventListener('click', () => {
        currentMode = "mitrade";
        document.getElementById('modeMitrade').classList.add('tab-active');
        document.getElementById('modeMitrade').classList.remove('bg-gray-700', 'text-gray-300');
        document.getElementById('modeGeneral').classList.remove('tab-active');
        document.getElementById('modeGeneral').classList.add('bg-gray-700', 'text-gray-300');
        document.getElementById('modalTitle').textContent = "📊 Mitrade精準短線AI智能偵測";
        document.getElementById('analyzeButton').textContent = "🔍 1分精準入場點位 (最小停損)";
        render();
      });

      // 底部導航
      document.querySelectorAll('.tab-button').forEach(btn=>{
        btn.addEventListener('click', e=>{
          state.tab = e.currentTarget.dataset.tab;
          document.querySelectorAll('.tab-button').forEach(b=>{ 
            b.classList.remove('text-indigo'); 
            b.classList.add('text-gray-400'); 
          });
          e.currentTarget.classList.add('text-indigo');
          render();
        });
      });

      // AI模態框
      document.getElementById('aiButton').addEventListener('click', ()=>{
        document.getElementById('aiModal').classList.remove('hidden');
      });
      document.getElementById('closeAiModal').addEventListener('click', ()=>{
        document.getElementById('aiModal').classList.add('hidden');
      });
      document.getElementById('uploadButton').addEventListener('click', ()=>{
        document.getElementById('fileInput').click();
      });
      document.getElementById('fileInput').addEventListener('change', e=>{
        const files = e.target.files;
        if (!files.length) return;
        state.aiBase64s = [];
        let count = 0;
        Array.from(files).forEach((f,i)=>{
          const r = new FileReader();
          r.onload = ev=>{
            state.aiBase64s.push(ev.target.result);
            count++;
            if (i === 0) document.getElementById('previewImg1').src = ev.target.result;
            if (i === 1) document.getElementById('previewImg2').src = ev.target.result;
            if (count === files.length) {
              document.getElementById('imagePreview').classList.remove('hidden');
              document.getElementById('previewImg2').style.display = files.length === 1 ? 'none' : 'block';
            }
          };
          r.readAsDataURL(f);
        });
      });

      document.getElementById('analyzeButton').addEventListener('click', runAiAnalyze);
      document.getElementById('resetAiButton').addEventListener('click', ()=>{
        state.aiBase64s = [];
        document.getElementById('fileInput').value = "";
        document.getElementById('imagePreview').classList.add('hidden');
        document.getElementById('aiResult').classList.add('hidden');
        document.getElementById('aiError').classList.add('hidden');
        hideDebug();
      });
    };

    // ========== 程式入口 ==========
    window.addEventListener('DOMContentLoaded', () => {
      initFloatWindow();
      initEvents();
      render();
    });
  </script>
</body>
</html>
