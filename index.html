<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彥彬 AI 比對系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        }
        .upload-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.07);
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .upload-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .upload-btn {
            background: linear-gradient(90deg, #3b82f6, #1d4ed8);
            transition: all 0.3s;
        }
        .upload-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        .action-btn {
            border-radius: 14px;
            transition: all 0.3s;
        }
        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.12);
        }
        .result-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.07);
        }
        img {
            object-fit: contain;
            object-position: center;
        }
        .section-title {
            font-size: 12px;
            color: #4b5563;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #d1d5db;
        }

        /* 3:4 固定比例容器 */
        .ratio-3-4 {
            aspect-ratio: 3 / 4;
            width: 100%;
        }
        /* 6:8 雙圖合併容器 = 3:4 */
        .split-zoom-container {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            width: 100%;
            aspect-ratio: 6 / 8;
            touch-action: none;
        }
        .left-img-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
            cursor: zoom-in;
        }
        .right-img-area {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
            cursor: zoom-in;
        }
        .split-img {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transition: transform 0.2s ease-out;
            transform-origin: center center;
            user-select: none;
            transform: translate(-50%, -50%) scale(1);
        }
        .divider-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: white;
            z-index: 5;
            transform: translateX(-50%);
        }

        /* 固定文字層 - 不會跟圖片移動 */
        .fixed-text {
            position: absolute;
            font-size: 26px;
            font-weight: bold;
            color: white;
            -webkit-text-stroke: 5px black;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            bottom: 50px;
            transform: translateX(-50%);
        }
        .fixed-text.left {
            left: 25%;
        }
        .fixed-text.right {
            left: 75%;
        }
    </style>
</head>
<body class="min-h-screen p-3">
    <div class="max-w-md mx-auto">
        <div class="text-center mb-4">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-700 bg-clip-text text-transparent">
                彥彬 AI 比對系統
            </h1>
            <p class="text-gray-600 mt-1 text-sm">標準證件照裁切 + 三庭五眼校正 + AI點評</p>
        </div>

        <div class="flex gap-3 mb-5">
            <div class="upload-card flex-1 p-3 text-center flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 text-sm mb-2">左邊照片</h3>
                <input type="file" id="leftImg" accept="image/*" class="hidden">
                <button onclick="document.getElementById('leftImg').click()" class="upload-btn text-white px-3 py-2 rounded-lg text-xs font-medium mb-2">
                    選擇圖片
                </button>
                <img id="leftPreview" class="hidden ratio-3-4 rounded-lg shadow-sm object-cover">
            </div>

            <div class="upload-card flex-1 p-3 text-center flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 text-sm mb-2">右邊照片</h3>
                <input type="file" id="rightImg" accept="image/*" class="hidden">
                <button onclick="document.getElementById('rightImg').click()" class="upload-btn text-white px-3 py-2 rounded-lg text-xs font-medium mb-2">
                    選擇圖片
                </button>
                <img id="rightPreview" class="hidden ratio-3-4 rounded-lg shadow-sm object-cover">
            </div>
        </div>

        <div class="section-title">主要功能</div>
        <div class="flex flex-wrap gap-2 justify-center mb-4">
            <button onclick="mergeImages()" class="action-btn bg-gradient-to-r from-green-500 to-green-700 text-white px-5 py-2.5 font-semibold text-xs">
                🔗 標準證件照拼圖
            </button>
            <button onclick="clearAll()" class="action-btn bg-gradient-to-r from-red-500 to-red-700 text-white px-5 py-2.5 font-semibold text-xs">
                🗑 清除全部
            </button>
            <button onclick="resetZoomState()" class="action-btn bg-gradient-to-r from-gray-500 to-gray-700 text-white px-5 py-2.5 font-semibold text-xs">
                🔄 還原預設
            </button>
        </div>

        <div class="section-title">文字編輯</div>
        <div class="flex flex-wrap gap-2 justify-center mb-4">
            <button onclick="addTextRight('兩小時')" class="action-btn bg-gradient-to-r from-yellow-400 to-orange-500 text-white px-3 py-2 text-xs">
                ⏱ 加入兩小時
            </button>
            <button onclick="addTextRight(getTaiwanDate())" class="action-btn bg-gradient-to-r from-blue-400 to-blue-600 text-white px-3 py-2 text-xs">
                📅 加入今日日期
            </button>
            <button onclick="clearRightText()" class="action-btn bg-gradient-to-r from-gray-500 to-gray-700 text-white px-3 py-2 text-xs">
                🧹 清除右側文字
            </button>
        </div>

        <div class="section-title">AI 分析</div>
        <div class="flex flex-wrap gap-2 justify-center mb-5">
            <button onclick="analyzeBoth()" class="action-btn bg-gradient-to-r from-purple-500 to-purple-700 text-white px-5 py-2.5 font-semibold text-xs w-full">
                🤖 AI 點評
            </button>
        </div>

        <div class="result-card p-4 mb-5 text-center">
            <h2 class="text-lg font-bold text-gray-800 mb-2">✅ 證件照級對比結果</h2>
            
            <!-- 截圖專用容器：只包含圖片 -->
            <div id="capture-target" class="split-zoom-container mx-auto" style="display: none;">
                <div class="left-img-area" id="leftImgArea">
                    <img id="leftSplitImg" class="split-img">
                </div>
                <div class="right-img-area" id="rightImgArea">
                    <img id="rightSplitImg" class="split-img">
                </div>
                <div class="divider-line"></div>
                <div id="leftText" class="fixed-text left"></div>
                <div id="rightText" class="fixed-text right"></div>
            </div>
            <canvas id="mergeCanvas" class="hidden"></canvas>
            <canvas id="finalCanvas" class="hidden"></canvas>

            <div class="flex gap-2 justify-center mt-3">
                <button onclick="downloadMerge()" class="bg-gray-800 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-gray-900 transition">
                    💾 下載相簿
                </button>
                <button onclick="shareImage()" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-blue-700 transition">
                    📤 分享照片
                </button>
            </div>
        </div>

        <div class="result-card p-4 mb-8">
            <h2 class="text-lg font-bold text-purple-700 mb-2">🤖 AI 點評</h2>
            <div id="aiResult" class="text-gray-700 text-sm leading-relaxed whitespace-pre-line">
                尚未分析...
            </div>
        </div>
    </div>

    <script>
        let leftFile, rightFile;
        const leftPreview = document.getElementById('leftPreview');
        const rightPreview = document.getElementById('rightPreview');
        const mergeCanvas = document.getElementById('mergeCanvas');
        const finalCanvas = document.getElementById('finalCanvas');
        const splitZoomContainer = document.getElementById('capture-target');
        const leftSplitImg = document.getElementById('leftSplitImg');
        const rightSplitImg = document.getElementById('rightSplitImg');
        const leftImgArea = document.getElementById('leftImgArea');
        const rightImgArea = document.getElementById('rightImgArea');
        const leftText = document.getElementById('leftText');
        const rightText = document.getElementById('rightText');
        const captureTarget = document.getElementById('capture-target');
        const ctx = mergeCanvas.getContext('2d');
        
        // 標準 3:4 證件照尺寸
        const FULL_WIDTH = 600;
        const FULL_HEIGHT = 800;
        const HALF_WIDTH = FULL_WIDTH / 2;
        const BORDER_WIDTH = 2;

        // 縮放狀態
        const zoomState = {
            left: { scale: 1, offsetX: 0, offsetY: 0, isDragging: false, startX: 0, startY: 0 },
            right: { scale: 1, offsetX: 0, offsetY: 0, isDragging: false, startX: 0, startY: 0 },
            currentArea: null
        };

        // 獲取台灣日期
        function getTaiwanDate() {
            const now = new Date();
            const year = now.getFullYear() - 1911;
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}/${month}/${day}`;
        }

        // 加載左圖
        document.getElementById('leftImg').addEventListener('change', loadLeftImage);
        function loadLeftImage() {
            const file = document.getElementById('leftImg').files[0];
            if (!file) return;
            leftFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                leftPreview.src = e.target.result;
                leftPreview.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        // 加載右圖
        document.getElementById('rightImg').addEventListener('change', loadRightImage);
        function loadRightImage() {
            const file = document.getElementById('rightImg').files[0];
            if (!file) return;
            rightFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                rightPreview.src = e.target.result;
                rightPreview.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        // 合併圖片
        function mergeImages() {
            if (!leftPreview.src || !rightPreview.src) {
                alert('請先上傳兩張照片');
                return;
            }

            const imgL = new Image();
            const imgR = new Image();
            imgL.crossOrigin = 'anonymous';
            imgR.crossOrigin = 'anonymous';

            imgL.onload = function() {
                imgR.onload = function() {
                    const TOP_CROP = 0.02;
                    const BOTTOM_CROP = 0.88;

                    // 左圖
                    const leftCanvas = document.createElement('canvas');
                    const leftCtx = leftCanvas.getContext('2d');
                    leftCanvas.width = HALF_WIDTH;
                    leftCanvas.height = FULL_HEIGHT;
                    leftCtx.fillStyle = "#fff";
                    leftCtx.fillRect(0,0,HALF_WIDTH,FULL_HEIGHT);
                    const cropH_L = imgL.height * (BOTTOM_CROP-TOP_CROP);
                    leftCtx.drawImage(imgL, 0,imgL.height*TOP_CROP,imgL.width,cropH_L, BORDER_WIDTH,BORDER_WIDTH, HALF_WIDTH-BORDER_WIDTH*2, FULL_HEIGHT-BORDER_WIDTH*2);
                    
                    // 右圖
                    const rightCanvas = document.createElement('canvas');
                    const rightCtx = rightCanvas.getContext('2d');
                    rightCanvas.width = HALF_WIDTH;
                    rightCanvas.height = FULL_HEIGHT;
                    rightCtx.fillStyle = "#fff";
                    rightCtx.fillRect(0,0,HALF_WIDTH,FULL_HEIGHT);
                    const cropH_R = imgR.height * (BOTTOM_CROP-TOP_CROP);
                    rightCtx.drawImage(imgR, 0,imgR.height*TOP_CROP,imgR.width,cropH_R, BORDER_WIDTH,BORDER_WIDTH, HALF_WIDTH-BORDER_WIDTH*2, FULL_HEIGHT-BORDER_WIDTH*2);

                    // 顯示
                    leftSplitImg.src = leftCanvas.toDataURL('image/png');
                    rightSplitImg.src = rightCanvas.toDataURL('image/png');
                    splitZoomContainer.style.display = 'block';
                    
                    // 固定文字
                    leftText.textContent = getTaiwanDate();
                    rightText.textContent = '';

                    initSplitZoomControls();
                }
                imgR.src = rightPreview.src;
            }
            imgL.src = leftPreview.src;
        }

        // 右側文字
        function addTextRight(text) {
            if(!splitZoomContainer.style.display){alert('請先產生拼圖');return;}
            rightText.textContent = text;
        }
        function clearRightText(){
            rightText.textContent = '';
        }

        // 重置
        function resetZoomState() {
            zoomState.left = { scale:1, offsetX:0, offsetY:0, isDragging:false, startX:0, startY:0 };
            zoomState.right = { scale:1, offsetX:0, offsetY:0, isDragging:false, startX:0, startY:0 };
            updateLeftTransform();
            updateRightTransform();
        }

        // 滑動 + 縮放
        function initSplitZoomControls() {
            resetZoomState();

            // 左
            leftImgArea.addEventListener('wheel',(e)=>{e.preventDefault();handleZoom(e,'left');});
            leftImgArea.addEventListener('mousedown',(e)=>{
                e.preventDefault(); zoomState.currentArea='left'; zoomState.left.isDragging=true;
                const r=leftImgArea.getBoundingClientRect();
                zoomState.left.startX=e.clientX-r.left-zoomState.left.offsetX;
                zoomState.left.startY=e.clientY-r.top-zoomState.left.offsetY;
            });

            // 右
            rightImgArea.addEventListener('wheel',(e)=>{e.preventDefault();handleZoom(e,'right');});
            rightImgArea.addEventListener('mousedown',(e)=>{
                e.preventDefault(); zoomState.currentArea='right'; zoomState.right.isDragging=true;
                const r=rightImgArea.getBoundingClientRect();
                zoomState.right.startX=e.clientX-r.left-zoomState.right.offsetX;
                zoomState.right.startY=e.clientY-r.top-zoomState.right.offsetY;
            });

            // 拖動
            document.addEventListener('mousemove',(e)=>{
                if(zoomState.left.isDragging){
                    const r=leftImgArea.getBoundingClientRect();
                    zoomState.left.offsetX=e.clientX-r.left-zoomState.left.startX;
                    zoomState.left.offsetY=e.clientY-r.top-zoomState.left.startY;
                    updateLeftTransform();
                }
                if(zoomState.right.isDragging){
                    const r=rightImgArea.getBoundingClientRect();
                    zoomState.right.offsetX=e.clientX-r.left-zoomState.right.startX;
                    zoomState.right.offsetY=e.clientY-r.top-zoomState.right.startY;
                    updateRightTransform();
                }
            });

            document.addEventListener('mouseup',()=>{
                zoomState.left.isDragging=false; zoomState.right.isDragging=false;
            });

            // 手機
            leftImgArea.addEventListener('touchstart',handleTouchStart);
            leftImgArea.addEventListener('touchmove',handleTouchMove);
            rightImgArea.addEventListener('touchstart',handleTouchStart);
            rightImgArea.addEventListener('touchmove',handleTouchMove);
            splitZoomContainer.addEventListener('touchend',()=>{
                zoomState.left.isDragging=false; zoomState.right.isDragging=false;
            });
        }

        // 縮放
        function handleZoom(e,area){
            const d=e.deltaY>0?-0.1:0.1;
            const ns=Math.min(4,Math.max(0.8,zoomState[area].scale+d));
            zoomState[area].scale=ns;
            area==='left'?updateLeftTransform():updateRightTransform();
        }
        function handleTouchStart(e){e.preventDefault();const t=e.touches[0];const a=t.clientX<splitZoomContainer.getBoundingClientRect().left+splitZoomContainer.offsetWidth/2?'left':'right';zoomState.currentArea=a;if(e.touches.length===1){zoomState[a].isDragging=true;const r=a==='left'?leftImgArea.getBoundingClientRect():rightImgArea.getBoundingClientRect();zoomState[a].startX=t.clientX-r.left-zoomState[a].offsetX;zoomState[a].startY=t.clientY-r.top-zoomState[a].offsetY;}}
        function handleTouchMove(e){e.preventDefault();if(!zoomState.currentArea)return;const a=zoomState.currentArea;const t=e.touches[0];if(e.touches.length===1&&zoomState[a].isDragging){const r=a==='left'?leftImgArea.getBoundingClientRect():rightImgArea.getBoundingClientRect();zoomState[a].offsetX=t.clientX-r.left-zoomState[a].startX;zoomState[a].offsetY=t.clientY-r.top-zoomState[a].startY;a==='left'?updateLeftTransform():updateRightTransform();}}

        function updateLeftTransform(){
            leftSplitImg.style.transform=`translate(-50%,-50%) translate(${zoomState.left.offsetX}px,${zoomState.left.offsetY}px) scale(${zoomState.left.scale})`;
        }
        function updateRightTransform(){
            rightSplitImg.style.transform=`translate(-50%,-50%) translate(${zoomState.right.offsetX}px,${zoomState.right.offsetY}px) scale(${zoomState.right.scale})`;
        }

        // 截圖：只截圖片區域
        async function captureImage(){
            try{
                const c=await html2canvas(captureTarget,{scale:2,useCORS:true,logging:false,backgroundColor:'#fff'});
                return c.toDataURL('image/png',1.0);
            }catch(e){console.error(e);alert('截圖失敗');return null;}
        }

        // 下載
        async function downloadMerge(){
            if(!splitZoomContainer.style.display){alert('請先產生拼圖');return;}
            const url=await captureImage();if(!url)return;
            const a=document.createElement('a');a.href=url;a.download='彥彬_證件照對比.png';
            document.body.appendChild(a);a.click();document.body.removeChild(a);
            setTimeout(()=>alert('✅ 下載成功（純圖片）'),500);
        }

        // 分享
        async function shareImage(){
            if(!splitZoomContainer.style.display){alert('請先產生拼圖');return;}
            const url=await captureImage();if(!url)return;
            const blob=await fetch(url).then(r=>r.blob());
            const file=new File([blob],'彥彬_證件照對比.png',{type:'image/png'});
            if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
                await navigator.share({files:[file],title:'彥彬證件照比對'});
            }else{alert('❌ 裝置不支援，請先下載');}
        }

        // 清除
        function clearAll(){location.reload();}

        // AI
        async function analyzeBoth(){
            if(!leftPreview.src||!rightPreview.src)return alert('請上傳兩張照片');
            const b=document.getElementById('aiResult');b.innerText='AI 分析中...';
            try{
                const res=await fetch("https://api.together.xyz/v1/chat/completions",{
                    method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer tgp_v018_36d8697871d6254683c5527d73ad97888f860b21'},
                    body:JSON.stringify({
                        model:"meta-llama/Llama-3.2-11B-Vision-Instruct-Turbo",
                        messages:[{role:'user',content:[
                            {type:'text',text:'你是專業攝影師、形象導師。請針對左右兩張照片進行對比點評，包含：1.姿態 2.表情 3.光影 4.構圖 5.整體建議。使用口語化、專業、有建設性的繁體中文。'},
                            {type:'image_url',image_url:{url:leftPreview.src}},
                            {type:'image_url',image_url:{url:rightPreview.src}}
                        ]}],
                        max_tokens:1024,temperature:0.7
                    })
                });
                const data=await res.json();
                b.innerText=data.choices?.[0]?.message?.content||'分析失敗';
            }catch(e){b.innerText='❌ AI 分析異常';console.error(e);}
        }
    </script>
</body>
</html>
