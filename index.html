<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彥彬 AI 比對系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        }
        .upload-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.07);
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .upload-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .upload-btn {
            background: linear-gradient(90deg, #3b82f6, #1d4ed8);
            transition: all 0.3s;
        }
        .upload-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        .action-btn {
            border-radius: 14px;
            transition: all 0.3s;
        }
        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.12);
        }
        .result-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.07);
        }
        img {
            object-fit: contain;
            object-position: center;
        }
        .section-title {
            font-size: 12px;
            color: #4b5563;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #d1d5db;
        }

        /* 预览容器：自适应尺寸，取消强制400×800限制 */
        .split-zoom-container {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            width: 100%;
            max-width: 800px;
            height: 600px; /* 预览高度自适应，不强制800px */
            touch-action: none;
            margin: 0 auto;
        }
        .left-img-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%; /* 预览用百分比，保证左右均分 */
            height: 100%;
            overflow: hidden;
            cursor: grab;
        }
        .right-img-area {
            position: absolute;
            top: 0;
            left: 50%; /* 预览用百分比，保证左右均分 */
            width: 50%;
            height: 100%;
            overflow: hidden;
            cursor: grab;
        }
        .split-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* 初始居中，不强制尺寸 */
            transform-origin: center center;
            transition: transform 0.1s ease-out;
            user-select: none;
            max-width: none; /* 取消宽度限制 */
            max-height: none; /* 取消高度限制 */
        }
        .divider-line {
            position: absolute;
            top: 0;
            left: 50%; /* 预览用百分比分割 */
            width: 2px;
            height: 100%;
            background: white;
            z-index: 5;
        }
    </style>
</head>
<body class="min-h-screen p-3">
    <div class="max-w-md mx-auto">
        <div class="text-center mb-4">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-700 bg-clip-text text-transparent">
                彥彬 AI 比對系統
            </h1>
            <p class="text-gray-600 mt-1 text-sm">標準證件照裁切 + 三庭五眼校正 + AI點評</p>
        </div>

        <div class="flex gap-3 mb-5">
            <div class="upload-card flex-1 p-3 text-center h-[220px] flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 text-sm mb-2">左邊照片</h3>
                <input type="file" id="leftImg" accept="image/*" class="hidden">
                <button onclick="document.getElementById('leftImg').click()" class="upload-btn text-white px-3 py-2 rounded-lg text-xs font-medium mb-2">
                    選擇圖片
                </button>
                <img id="leftPreview" class="hidden max-h-[130px] w-auto rounded-lg shadow-sm">
            </div>

            <div class="upload-card flex-1 p-3 text-center h-[220px] flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 text-sm mb-2">右邊照片</h3>
                <input type="file" id="rightImg" accept="image/*" class="hidden">
                <button onclick="document.getElementById('rightImg').click()" class="upload-btn text-white px-3 py-2 rounded-lg text-xs font-medium mb-2">
                    選擇圖片
                </button>
                <img id="rightPreview" class="hidden max-h-[130px] w-auto rounded-lg shadow-sm">
            </div>
        </div>

        <div class="section-title">主要功能</div>
        <div class="flex flex-wrap gap-2 justify-center mb-4">
            <button onclick="mergeImages()" class="action-btn bg-gradient-to-r from-green-500 to-green-700 text-white px-5 py-2.5 font-semibold text-xs">
                🔗 標準證件照拼圖
            </button>
            <button onclick="clearAll()" class="action-btn bg-gradient-to-r from-red-500 to-red-700 text-white px-5 py-2.5 font-semibold text-xs">
                🗑 清除全部
            </button>
            <button onclick="resetZoomState()" class="action-btn bg-gradient-to-r from-gray-500 to-gray-700 text-white px-5 py-2.5 font-semibold text-xs">
                🔄 還原預設
            </button>
        </div>

        <div class="section-title">文字編輯</div>
        <div class="flex flex-wrap gap-2 justify-center mb-4">
            <button onclick="addTextRight('兩小時')" class="action-btn bg-gradient-to-r from-yellow-400 to-orange-500 text-white px-3 py-2 text-xs">
                ⏱ 加入兩小時
            </button>
            <button onclick="addTextRight(getTaiwanDate())" class="action-btn bg-gradient-to-r from-blue-400 to-blue-600 text-white px-3 py-2 text-xs">
                📅 加入今日日期
            </button>
            <button onclick="clearRightText()" class="action-btn bg-gradient-to-r from-gray-500 to-gray-700 text-white px-3 py-2 text-xs">
                🧹 清除右側文字
            </button>
        </div>

        <div class="section-title">AI 分析</div>
        <div class="flex flex-wrap gap-2 justify-center mb-5">
            <button onclick="analyzeBoth()" class="action-btn bg-gradient-to-r from-purple-500 to-purple-700 text-white px-5 py-2.5 font-semibold text-xs w-full">
                🤖 AI 點評
            </button>
        </div>

        <div class="result-card p-4 mb-5 text-center">
            <h2 class="text-lg font-bold text-gray-800 mb-2">✅ 證件照級對比結果</h2>
            
            <div id="splitZoomContainer" class="split-zoom-container mx-auto" style="display: none;">
                <div class="left-img-area" id="leftImgArea">
                    <img id="leftSplitImg" class="split-img">
                </div>
                <div class="right-img-area" id="rightImgArea">
                    <img id="rightSplitImg" class="split-img">
                </div>
                <div class="divider-line"></div>
            </div>
            <canvas id="mergeCanvas" class="hidden"></canvas>
            <canvas id="finalCanvas" class="hidden"></canvas>

            <div class="flex gap-2 justify-center mt-3">
                <button onclick="downloadMerge()" class="bg-gray-800 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-gray-900 transition">
                    💾 下載相簿
                </button>
                <button onclick="shareImage()" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-blue-700 transition">
                    📤 分享照片
                </button>
            </div>
        </div>

        <div class="result-card p-4 mb-8">
            <h2 class="text-lg font-bold text-purple-700 mb-2">🤖 AI 點評</h2>
            <div id="aiResult" class="text-gray-700 text-sm leading-relaxed whitespace-pre-line">
                尚未分析...
            </div>
        </div>
    </div>

    <script>
        let leftFile, rightFile;
        const leftPreview = document.getElementById('leftPreview');
        const rightPreview = document.getElementById('rightPreview');
        const mergeCanvas = document.getElementById('mergeCanvas');
        const finalCanvas = document.getElementById('finalCanvas');
        const splitZoomContainer = document.getElementById('splitZoomContainer');
        const leftSplitImg = document.getElementById('leftSplitImg');
        const rightSplitImg = document.getElementById('rightSplitImg');
        const leftImgArea = document.getElementById('leftImgArea');
        const rightImgArea = document.getElementById('rightImgArea');
        const ctx = mergeCanvas.getContext('2d');
        const finalCtx = finalCanvas.getContext('2d');
        
        // 仅分享/下载时使用400×800标准尺寸
        const SHARE_FULL_SIZE = 800;
        const SHARE_HALF_SIZE = 400;
        const BORDER_WIDTH = 2;

        // 缩放状态：优化初始值，支持任意缩放后的移动
        const zoomState = {
            left:  { 
                scale: 1,
                x: 0,
                y: 0,
                isDragging: false,
                startX: 0,
                startY: 0,
                lastScale: 1,
                imgWidth: 0,  // 记录图片原始宽度
                imgHeight: 0  // 记录图片原始高度
            },
            right: { 
                scale: 1,
                x: 0,
                y: 0,
                isDragging: false,
                startX: 0,
                startY: 0,
                lastScale: 1,
                imgWidth: 0,
                imgHeight: 0
            }
        };

        // 獲取台灣日期
        function getTaiwanDate() {
            const now = new Date();
            const year = now.getFullYear() - 1911;
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}/${month}/${day}`;
        }

        // 加載左圖
        document.getElementById('leftImg').addEventListener('change', loadLeftImage);
        function loadLeftImage() {
            const file = document.getElementById('leftImg').files[0];
            if (!file) return;
            leftFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                leftPreview.src = e.target.result;
                leftPreview.classList.remove('hidden');
                
                // 预加载获取图片原始尺寸
                const tempImg = new Image();
                tempImg.onload = () => {
                    zoomState.left.imgWidth = tempImg.width;
                    zoomState.left.imgHeight = tempImg.height;
                };
                tempImg.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 加載右圖
        document.getElementById('rightImg').addEventListener('change', loadRightImage);
        function loadRightImage() {
            const file = document.getElementById('rightImg').files[0];
            if (!file) return;
            rightFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                rightPreview.src = e.target.result;
                rightPreview.classList.remove('hidden');
                
                // 预加载获取图片原始尺寸
                const tempImg = new Image();
                tempImg.onload = () => {
                    zoomState.right.imgWidth = tempImg.width;
                    zoomState.right.imgHeight = tempImg.height;
                };
                tempImg.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 合併圖片（修复只显示左边的问题，预览取消强制尺寸）
        function mergeImages() {
            if (!leftPreview.src || !rightPreview.src) {
                alert('請先上傳兩張照片');
                return;
            }

            const imgL = new Image();
            const imgR = new Image();
            imgL.crossOrigin = 'anonymous';
            imgR.crossOrigin = 'anonymous';

            imgL.onload = function() {
                // 记录左图原始尺寸
                zoomState.left.imgWidth = imgL.width;
                zoomState.left.imgHeight = imgL.height;
                
                imgR.onload = function() {
                    // 记录右图原始尺寸
                    zoomState.right.imgWidth = imgR.width;
                    zoomState.right.imgHeight = imgR.height;

                    // 预览用：直接显示原图，不强制400×800
                    leftSplitImg.src = imgL.src;
                    rightSplitImg.src = imgR.src;
                    splitZoomContainer.style.display = 'block';
                    
                    // 重置缩放状态
                    resetZoomState();
                    // 初始化交互控制
                    initInteractiveControls();
                    
                    // 生成分享用的400×800标准画布（仅用于下载/分享）
                    createShareCanvas(imgL, imgR);
                }
                imgR.src = rightPreview.src;
            }
            imgL.src = leftPreview.src;
        }

        // 创建分享用的400×800标准画布
        function createShareCanvas(imgL, imgR) {
            const TOP_CROP = 0.02;
            const BOTTOM_CROP = 0.88;

            // 左圖：400×800 標準框（仅分享用）
            const leftCanvas = document.createElement('canvas');
            const leftCtx = leftCanvas.getContext('2d');
            leftCanvas.width = SHARE_HALF_SIZE;
            leftCanvas.height = SHARE_FULL_SIZE;
            leftCtx.clearRect(0, 0, SHARE_HALF_SIZE, SHARE_FULL_SIZE);
            leftCtx.fillStyle = "#ffffff";
            leftCtx.fillRect(0, 0, SHARE_HALF_SIZE, SHARE_FULL_SIZE);
            
            const cropH_L = imgL.height * (BOTTOM_CROP - TOP_CROP);
            leftCtx.drawImage(
                imgL,
                0, imgL.height * TOP_CROP, imgL.width, cropH_L,
                BORDER_WIDTH, BORDER_WIDTH,
                SHARE_HALF_SIZE - BORDER_WIDTH * 2,
                SHARE_FULL_SIZE - BORDER_WIDTH * 2
            );
            // 左圖加日期文字
            leftCtx.font = 'bold 40px Arial';
            leftCtx.fillStyle = 'white';
            leftCtx.strokeStyle = 'black';
            leftCtx.lineWidth = 8;
            leftCtx.textAlign = 'center';
            leftCtx.strokeText(getTaiwanDate(), SHARE_HALF_SIZE/2, SHARE_FULL_SIZE - 65);
            leftCtx.fillText(getTaiwanDate(), SHARE_HALF_SIZE/2, SHARE_FULL_SIZE - 65);

            // 右圖：400×800 標準框（仅分享用）
            const rightCanvas = document.createElement('canvas');
            const rightCtx = rightCanvas.getContext('2d');
            rightCanvas.width = SHARE_HALF_SIZE;
            rightCanvas.height = SHARE_FULL_SIZE;
            rightCtx.clearRect(0, 0, SHARE_HALF_SIZE, SHARE_FULL_SIZE);
            rightCtx.fillStyle = "#ffffff";
            rightCtx.fillRect(0, 0, SHARE_HALF_SIZE, SHARE_FULL_SIZE);
            
            const cropH_R = imgR.height * (BOTTOM_CROP - TOP_CROP);
            rightCtx.drawImage(
                imgR,
                0, imgR.height * TOP_CROP, imgR.width, cropH_R,
                BORDER_WIDTH, BORDER_WIDTH,
                SHARE_HALF_SIZE - BORDER_WIDTH * 2,
                SHARE_FULL_SIZE - BORDER_WIDTH * 2
            );

            // 生成合併畫布（800×800，仅用于下载/分享）
            mergeCanvas.width = SHARE_FULL_SIZE;
            mergeCanvas.height = SHARE_FULL_SIZE;
            ctx.clearRect(0, 0, SHARE_FULL_SIZE, SHARE_FULL_SIZE);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, SHARE_FULL_SIZE, SHARE_FULL_SIZE);
            ctx.drawImage(leftCanvas, 0, 0);
            ctx.drawImage(rightCanvas, SHARE_HALF_SIZE, 0);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(SHARE_HALF_SIZE - 1, 0, 2, SHARE_FULL_SIZE);
            
            // 保存分享用的画布数据
            window.shareLeftCanvas = leftCanvas;
            window.shareRightCanvas = rightCanvas;
        }

        // 右圖添加文字（仅修改分享用画布）
        function addTextRight(text) {
            if (!splitZoomContainer.style.display) {
                alert('請先產生拼圖');
                return;
            }
            
            const imgR = new Image();
            imgR.crossOrigin = 'anonymous';
            imgR.onload = function() {
                const TOP_CROP = 0.02;
                const BOTTOM_CROP = 0.88;
                
                // 仅修改分享用的400×800画布
                const rightCanvas = document.createElement('canvas');
                const rightCtx = rightCanvas.getContext('2d');
                rightCanvas.width = SHARE_HALF_SIZE;
                rightCanvas.height = SHARE_FULL_SIZE;
                rightCtx.clearRect(0, 0, SHARE_HALF_SIZE, SHARE_FULL_SIZE);
                rightCtx.fillStyle = "#ffffff";
                rightCtx.fillRect(0, 0, SHARE_HALF_SIZE, SHARE_FULL_SIZE);
                
                const cropH_R = imgR.height * (BOTTOM_CROP - TOP_CROP);
                rightCtx.drawImage(
                    imgR,
                    0, imgR.height * TOP_CROP, imgR.width, cropH_R,
                    BORDER_WIDTH, BORDER_WIDTH,
                    SHARE_HALF_SIZE - BORDER_WIDTH * 2,
                    SHARE_FULL_SIZE - BORDER_WIDTH * 2
                );
                
                // 添加文字
                rightCtx.font = 'bold 40px Arial';
                rightCtx.fillStyle = 'white';
                rightCtx.strokeStyle = 'black';
                rightCtx.lineWidth = 8;
                rightCtx.textAlign = 'center';
                rightCtx.strokeText(text, SHARE_HALF_SIZE/2, SHARE_FULL_SIZE - 65);
                rightCtx.fillText(text, SHARE_HALF_SIZE/2, SHARE_FULL_SIZE - 65);
                
                // 更新分享用画布
                window.shareRightCanvas = rightCanvas;
                
                // 更新合併畫布
                mergeCanvas.width = SHARE_FULL_SIZE;
                mergeCanvas.height = SHARE_FULL_SIZE;
                ctx.clearRect(0, 0, SHARE_FULL_SIZE, SHARE_FULL_SIZE);
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, SHARE_FULL_SIZE, SHARE_FULL_SIZE);
                ctx.drawImage(window.shareLeftCanvas, 0, 0);
                ctx.drawImage(rightCanvas, SHARE_HALF_SIZE, 0);
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(SHARE_HALF_SIZE - 1, 0, 2, SHARE_FULL_SIZE);
            }
            imgR.src = rightPreview.src;
        }

        // 清除右側文字
        function clearRightText() {
            if (!leftPreview.src || !rightPreview.src) return;
            mergeImages();
        }

        // 重置縮放狀態
        function resetZoomState() {
            // 重置左图状态
            zoomState.left = {
                scale: 1,
                x: 0,
                y: 0,
                isDragging: false,
                startX: 0,
                startY: 0,
                lastScale: 1,
                imgWidth: zoomState.left.imgWidth || 0,
                imgHeight: zoomState.left.imgHeight || 0
            };
            
            // 重置右图状态
            zoomState.right = {
                scale: 1,
                x: 0,
                y: 0,
                isDragging: false,
                startX: 0,
                startY: 0,
                lastScale: 1,
                imgWidth: zoomState.right.imgWidth || 0,
                imgHeight: zoomState.right.imgHeight || 0
            };
            
            // 重置位置到中心
            leftSplitImg.style.transform = `translate(-50%, -50%) scale(1)`;
            rightSplitImg.style.transform = `translate(-50%, -50%) scale(1)`;
        }

        // 优化偏移限制：支持任意缩放后的移动（取消严格限制）
        function clampPosition(area) {
            const state = zoomState[area];
            const container = area === 'left' ? leftImgArea : rightImgArea;
            
            // 获取容器尺寸
            const containerWidth = container.offsetWidth;
            const containerHeight = container.offsetHeight;
            
            // 计算图片当前尺寸
            const imgWidth = state.imgWidth * state.scale;
            const imgHeight = state.imgHeight * state.scale;
            
            // 计算最大可移动范围（允许图片超出容器，仅做软限制）
            const maxX = (containerWidth / 2) + (imgWidth / 2);
            const maxY = (containerHeight / 2) + (imgHeight / 2);
            
            // 宽松限制：允许自由移动，仅防止过度偏移
            state.x = Math.max(-maxX, Math.min(maxX, state.x));
            state.y = Math.max(-maxY, Math.min(maxY, state.y));
        }

        // 更新圖片變換（修复缩小后无法移动的问题）
        function updateImageTransform(area) {
            const state = zoomState[area];
            const img = area === 'left' ? leftSplitImg : rightSplitImg;
            
            // 计算最终的平移和缩放
            const translateX = -50 + state.x / state.scale;
            const translateY = -50 + state.y / state.scale;
            
            img.style.transform = `translate(${translateX}%, ${translateY}%) scale(${state.scale})`;
        }

        // 初始化交互控制（修复缩小后无法移动的核心逻辑）
        function initInteractiveControls() {
            // 移除旧事件监听，避免重复绑定
            leftImgArea.removeEventListener('mousedown', handleMouseDown);
            rightImgArea.removeEventListener('mousedown', handleMouseDown);
            document.removeEventListener('mousemove', handleMouseMove);
            document.removeEventListener('mouseup', handleMouseUp);
            document.removeEventListener('mouseleave', handleMouseUp);
            
            // 滑鼠拖動 - 修复移动逻辑
            function handleMouseDown(e, area) {
                e.preventDefault();
                const state = zoomState[area];
                state.isDragging = true;
                // 修复起始位置计算
                state.startX = e.clientX - state.x;
                state.startY = e.clientY - state.y;
                (area === 'left' ? leftImgArea : rightImgArea).style.cursor = 'grabbing';
            }

            function handleMouseMove(e) {
                // 左圖拖動
                if (zoomState.left.isDragging) {
                    zoomState.left.x = e.clientX - zoomState.left.startX;
                    zoomState.left.y = e.clientY - zoomState.left.startY;
                    clampPosition('left');
                    updateImageTransform('left');
                }
                // 右圖拖動
                if (zoomState.right.isDragging) {
                    zoomState.right.x = e.clientX - zoomState.right.startX;
                    zoomState.right.y = e.clientY - zoomState.right.startY;
                    clampPosition('right');
                    updateImageTransform('right');
                }
            }

            function handleMouseUp() {
                zoomState.left.isDragging = false;
                zoomState.right.isDragging = false;
                leftImgArea.style.cursor = 'grab';
                rightImgArea.style.cursor = 'grab';
            }

            // 滾輪縮放（优化缩放逻辑，支持任意缩放）
            function handleWheel(e, area) {
                e.preventDefault();
                const state = zoomState[area];
                const container = area === 'left' ? leftImgArea : rightImgArea;
                
                // 計算滾輪方向
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                const newScale = Math.min(3.0, Math.max(0.1, state.scale + delta)); // 扩大缩放范围
                
                if (newScale === state.scale) return;
                
                // 獲取鼠標在容器內的相對位置
                const rect = container.getBoundingClientRect();
                const mouseXInContainer = e.clientX - rect.left;
                const mouseYInContainer = e.clientY - rect.top;
                
                // 計算縮放前鼠標在圖片上的相對位置
                const oldImgWidth = state.imgWidth * state.scale;
                const oldImgHeight = state.imgHeight * state.scale;
                
                const mouseXInImg = mouseXInContainer - (rect.width/2 - oldImgWidth/2) - state.x;
                const mouseYInImg = mouseYInContainer - (rect.height/2 - oldImgHeight/2) - state.y;
                
                // 計算縮放比例差
                const scaleDiff = newScale / state.scale;
                
                // 調整偏移量，保證鼠標位置不變
                state.x -= (mouseXInImg * (scaleDiff - 1));
                state.y -= (mouseYInImg * (scaleDiff - 1));
                
                // 更新縮放比例
                state.scale = newScale;
                
                // 限制位置
                clampPosition(area);
                
                // 更新圖片位置
                updateImageTransform(area);
            }

            // 觸控縮放
            let touchInfo = {
                distance: 0,
                centerX: 0,
                centerY: 0,
                area: null
            };

            function handleTouchStart(e) {
                e.preventDefault();
                const touches = e.touches;
                
                if (touches.length === 2) {
                    const t1 = touches[0];
                    const t2 = touches[1];
                    
                    touchInfo.distance = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                    touchInfo.centerX = (t1.clientX + t2.clientX) / 2;
                    touchInfo.centerY = (t1.clientY + t2.clientY) / 2;
                    
                    // 判斷屬於左/右區域
                    touchInfo.area = touchInfo.centerX < leftImgArea.getBoundingClientRect().right ? 'left' : 'right';
                    zoomState[touchInfo.area].lastScale = zoomState[touchInfo.area].scale;
                } else if (touches.length === 1) {
                    const touch = touches[0];
                    const area = touch.clientX < leftImgArea.getBoundingClientRect().right ? 'left' : 'right';
                    const state = zoomState[area];
                    
                    state.isDragging = true;
                    state.startX = touch.clientX - state.x;
                    state.startY = touch.clientY - state.y;
                }
            }

            function handleTouchMove(e) {
                e.preventDefault();
                const touches = e.touches;
                
                if (touches.length === 2 && touchInfo.area) {
                    const t1 = touches[0];
                    const t2 = touches[1];
                    const area = touchInfo.area;
                    const state = zoomState[area];
                    const container = area === 'left' ? leftImgArea : rightImgArea;
                    
                    const newDistance = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                    const newCenterX = (t1.clientX + t2.clientX) / 2;
                    const newCenterY = (t1.clientY + t2.clientY) / 2;
                    
                    const scaleRatio = newDistance / touchInfo.distance;
                    const newScale = Math.min(3.0, Math.max(0.1, state.lastScale * scaleRatio));
                    
                    if (newScale !== state.scale) {
                        const rect = container.getBoundingClientRect();
                        const centerXInContainer = newCenterX - rect.left;
                        const centerYInContainer = newCenterY - rect.top;
                        
                        const oldImgWidth = state.imgWidth * state.scale;
                        const oldImgHeight = state.imgHeight * state.scale;
                        
                        const centerXInImg = centerXInContainer - (rect.width/2 - oldImgWidth/2) - state.x;
                        const centerYInImg = centerYInContainer - (rect.height/2 - oldImgHeight/2) - state.y;
                        
                        const scaleDiff = newScale / state.scale;
                        
                        state.x -= (centerXInImg * (scaleDiff - 1));
                        state.y -= (centerYInImg * (scaleDiff - 1));
                        
                        state.scale = newScale;
                        clampPosition(area);
                        updateImageTransform(area);
                    }
                } else if (touches.length === 1) {
                    const touch = touches[0];
                    const area = touch.clientX < leftImgArea.getBoundingClientRect().right ? 'left' : 'right';
                    const state = zoomState[area];
                    
                    if (state.isDragging) {
                        state.x = touch.clientX - state.startX;
                        state.y = touch.clientY - state.startY;
                        clampPosition(area);
                        updateImageTransform(area);
                    }
                }
            }

            function handleTouchEnd() {
                touchInfo = {
                    distance: 0,
                    centerX: 0,
                    centerY: 0,
                    area: null
                };
                zoomState.left.isDragging = false;
                zoomState.right.isDragging = false;
            }

            // 重新綁定事件
            leftImgArea.addEventListener('mousedown', (e) => handleMouseDown(e, 'left'));
            rightImgArea.addEventListener('mousedown', (e) => handleMouseDown(e, 'right'));
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', handleMouseUp);
            document.addEventListener('mouseleave', handleMouseUp);

            // 滾輪事件
            leftImgArea.addEventListener('wheel', (e) => handleWheel(e, 'left'), { passive: false });
            rightImgArea.addEventListener('wheel', (e) => handleWheel(e, 'right'), { passive: false });

            // 觸控事件
            splitZoomContainer.addEventListener('touchstart', handleTouchStart, { passive: false });
            splitZoomContainer.addEventListener('touchmove', handleTouchMove, { passive: false });
            splitZoomContainer.addEventListener('touchend', handleTouchEnd);
            splitZoomContainer.addEventListener('touchcancel', handleTouchEnd);
        }

        // 生成最終分享圖片（400×800标准尺寸）
        function generateFinalImage() {
            return new Promise((resolve) => {
                finalCanvas.width = SHARE_FULL_SIZE;
                finalCanvas.height = SHARE_FULL_SIZE;
                finalCtx.fillStyle = "#fff";
                finalCtx.fillRect(0, 0, SHARE_FULL_SIZE, SHARE_FULL_SIZE);

                // 使用预先生成的分享用画布
                finalCtx.drawImage(window.shareLeftCanvas, 0, 0);
                finalCtx.drawImage(window.shareRightCanvas, SHARE_HALF_SIZE, 0);
                finalCtx.fillStyle = "#fff";
                finalCtx.fillRect(SHARE_HALF_SIZE - 1, 0, 2, SHARE_FULL_SIZE);
                
                setTimeout(() => {
                    resolve(finalCanvas.toDataURL("image/png", 1));
                }, 100);
            });
        }

        // 下載合併圖片
        async function downloadMerge() {
            if (!splitZoomContainer.style.display) return alert('請先產生拼圖');
            const url = await generateFinalImage();
            const a = document.createElement('a');
            a.href = url;
            a.download = "彥彬_證件照_800x800.png";
            a.click();
            alert('✅ 下載成功！800×800 標準尺寸');
        }

        // 分享圖片
        async function shareImage() {
            if (!splitZoomContainer.style.display) return alert('請先產生拼圖');
            const url = await generateFinalImage();
            const blob = await fetch(url).then(r => r.blob());
            const file = new File([blob], "彥彬_證件照_800x800.png", { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({ files: [file], title: '彥彬證件照' });
            } else {
                alert('❌ 裝置不支援分享功能');
            }
        }

        // 清除全部
        function clearAll() {
            localStorage.clear();
            location.reload();
        }
