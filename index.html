<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>半身照 AI 比對系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        }
        .upload-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .upload-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }
        .upload-btn {
            background: linear-gradient(90deg, #3b82f6, #1d4ed8);
            transition: all 0.3s;
        }
        .upload-btn:hover {
            opacity: 0.9;
            transform: scale(1.03);
        }
        .action-btn {
            border-radius: 16px;
            transition: all 0.3s;
        }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }
        .result-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        img {
            object-fit: contain;
            object-position: center;
        }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-xl mx-auto">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-indigo-700 bg-clip-text text-transparent">
                📷 半身照 AI 比對系統
            </h1>
            <p class="text-gray-600 mt-2">自動頭胸裁切 + 專業 AI 點評</p>
        </div>

        <!-- 全部改成「上下排列」 -->
        <div class="flex flex-col gap-4 mb-6">
            <div class="upload-card p-5 text-center h-[380px] flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 mb-3">上邊照片</h3>
                <input type="file" id="leftImg" accept="image/*" class="hidden" onchange="loadLeftImage()">
                <button onclick="document.getElementById('leftImg').click()" class="upload-btn text-white px-5 py-2.5 rounded-xl mb-3 font-medium">
                    選擇圖片
                </button>
                <img id="leftPreview" class="hidden max-h-[240px] w-auto rounded-lg shadow">
            </div>

            <div class="upload-card p-5 text-center h-[380px] flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 mb-3">下邊照片</h3>
                <input type="file" id="rightImg" accept="image/*" class="hidden" onchange="loadRightImage()">
                <button onclick="document.getElementById('rightImg').click()" class="upload-btn text-white px-5 py-2.5 rounded-xl mb-3 font-medium">
                    選擇圖片
                </button>
                <img id="rightPreview" class="hidden max-h-[240px] w-auto rounded-lg shadow">
            </div>
        </div>

        <div class="flex flex-wrap gap-3 justify-center mb-6">
            <button onclick="mergeImages()" class="action-btn bg-gradient-to-r from-green-500 to-green-700 text-white px-6 py-3 font-semibold text-sm">
                🔗 自動頭胸拼圖
            </button>
            <button onclick="analyzeBoth()" class="action-btn bg-gradient-to-r from-purple-500 to-purple-700 text-white px-6 py-3 font-semibold text-sm">
                🤖 AI 專業點評
            </button>
            <button onclick="clearAll()" class="action-btn bg-gradient-to-r from-red-500 to-red-700 text-white px-5 py-3 text-sm">
                🗑 清除
            </button>
        </div>

        <div class="result-card p-5 mb-6 text-center">
            <h2 class="text-xl font-bold text-gray-800 mb-3">✅ 頭胸對比拼圖結果</h2>
            <div class="inline-block max-w-full">
                <canvas id="mergeCanvas" class="rounded-xl shadow-lg max-w-full max-h-[400px]"></canvas>
                <div class="flex gap-3 justify-center mt-4">
                    <button onclick="downloadMerge()" class="bg-gray-800 text-white px-4 py-2 rounded-xl text-sm hover:bg-gray-900 transition">
                        💾 下載到相簿
                    </button>
                    <button onclick="shareImage()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm hover:bg-blue-700 transition">
                        📤 分享照片
                    </button>
                </div>
            </div>
        </div>

        <div class="result-card p-5 mb-10">
            <h2 class="text-xl font-bold text-purple-700 mb-3">🤖 AI 專業照片點評</h2>
            <div id="aiResult" class="text-gray-700 text-base leading-relaxed whitespace-pre-line">
                尚未分析...
            </div>
        </div>
    </div>

    <script>
        let leftFile, rightFile;
        const leftPreview = document.getElementById('leftPreview');
        const rightPreview = document.getElementById('rightPreview');
        const mergeCanvas = document.getElementById('mergeCanvas');
        const ctx = mergeCanvas.getContext('2d');

        function loadLeftImage() {
            const file = document.getElementById('leftImg').files[0];
            if (!file) return;
            leftFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                leftPreview.src = e.target.result;
                leftPreview.classList.remove('hidden');
                localStorage.setItem('leftImgCache', e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function loadRightImage() {
            const file = document.getElementById('rightImg').files[0];
            if (!file) return;
            rightFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                rightPreview.src = e.target.result;
                rightPreview.classList.remove('hidden');
                localStorage.setItem('rightImgCache', e.target.result);
            };
            reader.readAsDataURL(file);
        }

        // 頭胸裁切（完美比例：頭頂縮小 + 胸口加大）
        function mergeImages() {
            if (!leftPreview.src || !rightPreview.src) {
                alert('請先上傳兩張照片');
                return;
            }

            const imgL = new Image();
            const imgR = new Image();
            imgL.crossOrigin = 'anonymous';
            imgR.crossOrigin = 'anonymous';

            imgL.onload = function() {
                imgR.onload = function() {
                    const targetHeight = 800;
                    const leftW = imgL.width * targetHeight / imgL.height;
                    let rightW = imgR.width * targetHeight / imgR.height;
                    rightW *= 0.92;

                    mergeCanvas.width = leftW + rightW;
                    mergeCanvas.height = targetHeight;
                    ctx.clearRect(0, 0, mergeCanvas.width, mergeCanvas.height);

                    const cropTop = imgL.height * 0.12;
                    const cropHeight = imgL.height * 0.78;

                    ctx.drawImage(imgL, 0, cropTop, imgL.width, cropHeight, 0, 0, leftW, targetHeight);
                    ctx.drawImage(imgR, 0, cropTop, imgR.width, cropHeight, leftW, 0, rightW, targetHeight);
                }
                imgR.src = rightPreview.src;
            }
            imgL.src = leftPreview.src;
        }

        // 🔥 手機原生下載（安卓 + iOS 直接存相簿）
        async function downloadMerge() {
            if (!mergeCanvas.width) {
                alert('請先產生拼圖');
                return;
            }

            try {
                const blob = await new Promise(resolve => mergeCanvas.toBlob(resolve, 'image/png', 1.0));
                const fileName = "頭胸對比拼圖.png";
                
                if (navigator.share) {
                    const file = new File([blob], fileName, { type: 'image/png' });
                    await navigator.share({
                        files: [file],
                        title: '頭胸對比拼圖',
                    });
                } else {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName;
                    a.click();
                    URL.revokeObjectURL(url);
                }
                alert('✅ 已儲存至手機相簿！');
            } catch (e) {
                alert('❌ 下載失敗：' + e.message);
            }
        }

        // 🔥 手機原生分享（安卓 + iOS 通用）
        async function shareImage() {
            if (!mergeCanvas.width) {
                alert('請先產生拼圖');
                return;
            }

            try {
                const blob = await new Promise(resolve => mergeCanvas.toBlob(resolve, 'image/png', 1.0));
                const file = new File([blob], "頭胸對比拼圖.png", { type: 'image/png' });

                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: '半身照對比拼圖',
                        text: '分享我的頭胸比對照片',
                    });
                } else {
                    alert('❌ 你的裝置不支援分享功能，請使用下載');
                }
            } catch (e) {
                alert('❌ 分享失敗：' + e.message);
            }
        }

        function clearAll() {
            localStorage.clear();
            location.reload();
        }

        // AI 分析
        async function analyzeBoth() {
            if (!leftPreview.src || !rightPreview.src) {
                alert('請上傳兩張照片');
                return;
            }
            const resBox = document.getElementById('aiResult');
            resBox.innerText = 'AI 分析中，請稍候...';

            try {
                const response = await fetch("https://api.together.xyz/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer tgp_v018_36d8697871d6254683c5527d73ad97888f860b21"
                    },
                    body: JSON.stringify({
                        model: "meta-llama/Llama-3.2-11B-Vision-Instruct-Turbo",
                        messages: [
                            {
                                role: "user",
                                content: [
                                    { type: "text", text: "你是專業攝影師、形象導師。請針對上下兩張照片進行對比點評，包含：1.姿態 2.表情 3.光影 4.構圖 5.整體建議。使用口語化、專業、有建設性的繁體中文。" },
                                    { type: "image_url", image_url: { url: leftPreview.src } },
                                    { type: "image_url", image_url: { url: rightPreview.src } }
                                ]
                            }
                        ],
                        max_tokens: 1024,
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const result = data.choices?.[0]?.message?.content || '分析失敗，請稍後再試';
                resBox.innerText = result;
            } catch (e) {
                resBox.innerText = '❌ AI 分析異常：' + e.message;
            }
        }

        window.onload = function() {
            const leftCache = localStorage.getItem('leftImgCache');
            const rightCache = localStorage.getItem('rightImgCache');
            if (leftCache) {
                leftPreview.src = leftCache;
                leftPreview.classList.remove('hidden');
            }
            if (rightCache) {
                rightPreview.src = rightCache;
                rightPreview.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
