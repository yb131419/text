<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彥彬 AI 比對系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        }
        .upload-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .upload-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }
        .upload-btn {
            background: linear-gradient(90deg, #3b82f6, #1d4ed8);
            transition: all 0.3s;
        }
        .upload-btn:hover {
            opacity: 0.9;
            transform: scale(1.03);
        }
        .action-btn {
            border-radius: 16px;
            transition: all 0.3s;
        }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }
        .result-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        img {
            object-fit: contain;
            object-position: center;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-12">
    <div class="max-w-6xl mx-auto">
        <!-- 標題 -->
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-blue-600 to-indigo-700 bg-clip-text text-transparent">
                📷 半身照 AI 比對系統
            </h1>
            <p class="text-gray-600 mt-3 text-lg">自動頭胸裁切 + 專業 AI 點評</p>
        </div>

        <!-- 上傳區域：左右排列 -->
        <div class="flex flex-col md:flex-row gap-6 mb-10">
            <!-- 左邊照片 -->
            <div class="upload-card flex-1 p-6 text-center h-[420px] flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 text-lg mb-4">左邊照片</h3>
                <input type="file" id="leftImg" accept="image/*" class="hidden" onchange="loadLeftImage()">
                <button onclick="document.getElementById('leftImg').click()" class="upload-btn text-white px-6 py-3 rounded-xl mb-4 font-medium">
                    選擇圖片
                </button>
                <img id="leftPreview" class="hidden max-h-[280px] w-auto rounded-lg shadow">
            </div>

            <!-- 右邊照片 -->
            <div class="upload-card flex-1 p-6 text-center h-[420px] flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 text-lg mb-4">右邊照片</h3>
                <input type="file" id="rightImg" accept="image/*" class="hidden" onchange="loadRightImage()">
                <button onclick="document.getElementById('rightImg').click()" class="upload-btn text-white px-6 py-3 rounded-xl mb-4 font-medium">
                    選擇圖片
                </button>
                <img id="rightPreview" class="hidden max-h-[280px] w-auto rounded-lg shadow">
            </div>
        </div>

        <!-- 按鈕 -->
        <div class="flex flex-wrap gap-4 justify-center mb-10">
            <button onclick="mergeImages()" class="action-btn bg-gradient-to-r from-green-500 to-green-700 text-white px-8 py-3.5 font-semibold">
                🔗 自動頭胸拼圖
            </button>
            <button onclick="analyzeBoth()" class="action-btn bg-gradient-to-r from-purple-500 to-purple-700 text-white px-8 py-3.5 font-semibold">
                🤖 AI 專業點評
            </button>
            <button onclick="clearAll()" class="action-btn bg-gradient-to-r from-red-500 to-red-700 text-white px-6 py-3.5">
                🗑 清除全部
            </button>
        </div>

        <!-- 拼圖結果 -->
        <div class="result-card p-8 mb-10 text-center">
            <h2 class="text-2xl font-bold text-gray-800 mb-5">✅ 頭胸對比拼圖結果</h2>
            <div class="inline-block max-w-full">
                <canvas id="mergeCanvas" class="rounded-xl shadow-lg max-w-full max-h-[500px]"></canvas>
                <button onclick="downloadMerge()" class="mt-5 bg-gray-800 text-white px-5 py-2 rounded-xl hover:bg-gray-900 transition">
                    💾 下載高畫質拼圖
                </button>
            </div>
        </div>

        <!-- AI 評價 -->
        <div class="result-card p-8 mb-10">
            <h2 class="text-2xl font-bold text-purple-700 mb-5">🤖 AI 專業照片點評</h2>
            <div id="aiResult" class="text-gray-700 text-lg leading-relaxed whitespace-pre-line">
                尚未分析...
            </div>
        </div>
    </div>

    <script>
        let leftFile, rightFile;
        const leftPreview = document.getElementById('leftPreview');
        const rightPreview = document.getElementById('rightPreview');
        const mergeCanvas = document.getElementById('mergeCanvas');
        const ctx = mergeCanvas.getContext('2d');

        // 讀取左圖（完整顯示，不裁切）
        function loadLeftImage() {
            const file = document.getElementById('leftImg').files[0];
            if (!file) return;
            leftFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                leftPreview.src = e.target.result;
                leftPreview.classList.remove('hidden');
                localStorage.setItem('leftImgCache', e.target.result);
            };
            reader.readAsDataURL(file);
        }

        // 讀取右圖（完整顯示，不裁切）
        function loadRightImage() {
            const file = document.getElementById('rightImg').files[0];
            if (!file) return;
            rightFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                rightPreview.src = e.target.result;
                rightPreview.classList.remove('hidden');
                localStorage.setItem('rightImgCache', e.target.result);
            };
            reader.readAsDataURL(file);
        }

        // === 核心：自動偵測 頭 → 胸口 區域 並裁切 ===
        function mergeImages() {
            if (!leftPreview.src || !rightPreview.src) {
                alert('請先上傳左右兩張照片');
                return;
            }

            const imgL = new Image();
            const imgR = new Image();
            imgL.crossOrigin = 'anonymous';
            imgR.crossOrigin = 'anonymous';

            imgL.onload = function() {
                imgR.onload = function() {
                    // 固定高度：頭到胸口（自動適應人臉比例）
                    const faceHeight = 600;

                    // 左圖：等比例寬度
                    const leftW = imgL.width * faceHeight / imgL.height;
                    
                    // 右圖：等比例 → 稍微小一點
                    let rightW = imgR.width * faceHeight / imgR.height;
                    rightW *= 0.92;

                    // 畫布
                    mergeCanvas.width = leftW + rightW;
                    mergeCanvas.height = faceHeight;
                    ctx.clearRect(0, 0, mergeCanvas.width, mergeCanvas.height);

                    // 自動擷取「頭 → 胸口」(上方 55% 區域)
                    ctx.drawImage(imgL, 0, 0, imgL.width, imgL.height * 0.55, 0, 0, leftW, faceHeight);
                    ctx.drawImage(imgR, 0, 0, imgR.width, imgR.height * 0.55, leftW, 0, rightW, faceHeight);
                }
                imgR.src = rightPreview.src;
            }
            imgL.src = leftPreview.src;
        }

        // 下載
        function downloadMerge() {
            if (!mergeCanvas.width) {
                alert('請先產生拼圖');
                return;
            }
            const a = document.createElement('a');
            a.download = '頭胸對比拼圖.png';
            a.href = mergeCanvas.toDataURL('image/png');
            a.click();
        }

        // 清除
        function clearAll() {
            localStorage.clear();
            location.reload();
        }

        // AI 分析
        async function analyzeBoth() {
            if (!leftPreview.src || !rightPreview.src) {
                alert('請上傳兩張照片');
                return;
            }
            const resBox = document.getElementById('aiResult');
            resBox.innerText = 'AI 分析中，請稍候...';

            try {
                const response = await fetch("https://api.together.xyz/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer tgp_v018_36d8697871d6254683c5527d73ad97888f860b21"
                    },
                    body: JSON.stringify({
                        model: "meta-llama/Llama-3.2-11B-Vision-Instruct-Turbo",
                        messages: [
                            {
                                role: "user",
                                content: [
                                    { type: "text", text: "你是專業攝影師、形象導師。請針對左右兩張照片進行對比點評，包含：1.姿態 2.表情 3.光影 4.構圖 5.整體建議。使用口語化、專業、有建設性的繁體中文。" },
                                    { type: "image_url", image_url: { url: leftPreview.src } },
                                    { type: "image_url", image_url: { url: rightPreview.src } }
                                ]
                            }
                        ],
                        max_tokens: 1024,
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const result = data.choices?.[0]?.message?.content || '分析失敗，請稍後再試';
                resBox.innerText = result;
            } catch (e) {
                resBox.innerText = '❌ AI 分析異常：' + e.message;
            }
        }

        // 還原暫存
        window.onload = function() {
            const leftCache = localStorage.getItem('leftImgCache');
            const rightCache = localStorage.getItem('rightImgCache');
            if (leftCache) {
                leftPreview.src = leftCache;
                leftPreview.classList.remove('hidden');
            }
            if (rightCache) {
                rightPreview.src = rightCache;
                rightPreview.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
