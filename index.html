<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彥彬 AI 比對系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        }
        .upload-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.07);
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .upload-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .upload-btn {
            background: linear-gradient(90deg, #3b82f6, #1d4ed8);
            transition: all 0.3s;
        }
        .upload-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        .action-btn {
            border-radius: 14px;
            transition: all 0.3s;
        }
        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.12);
        }
        .result-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.07);
        }
        img {
            object-fit: contain;
            object-position: center;
        }
        .section-title {
            font-size: 12px;
            color: #4b5563;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #d1d5db;
        }

        /* 雙圖 6:8 容器 (單圖 3:4) */
        .split-zoom-container {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            width: 100%;
            height: 0;
            padding-top: 133.33%; /* 6:8 = 3:4 */
            touch-action: manipulation;
            background: #fff;
        }
        .left-img-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
            cursor: pointer;
        }
        .right-img-area {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
            cursor: pointer;
        }
        .split-img {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transition: transform 0.25s ease-out;
            transform-origin: center center;
            user-select: none;
            transform: translate(-50%, -50%) scale(1);
        }
        .divider-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: white;
            z-index: 5;
            transform: translateX(-50%);
        }

        /* 固定文字（畫面內可見，不會消失）*/
        .fixed-text {
            position: absolute;
            bottom: 30px;
            width: 50%;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 6px black;
            z-index: 10;
            pointer-events: none;
        }
        #fixedLeftText { left: 0; }
        #fixedRightText { right: 0; }
    </style>
</head>
<body class="min-h-screen p-3">
    <div class="max-w-md mx-auto">
        <div class="text-center mb-4">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-700 bg-clip-text text-transparent">彥彬 AI 比對系統</h1>
            <p class="text-gray-600 mt-1 text-sm">標準證件照裁切 + 三庭五眼校正 + AI點評</p>
        </div>

        <div class="flex gap-3 mb-5">
            <div class="upload-card flex-1 p-3 text-center h-[220px] flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 text-sm mb-2">左邊照片</h3>
                <input type="file" id="leftImg" accept="image/*" class="hidden">
                <button onclick="document.getElementById('leftImg').click()" class="upload-btn text-white px-3 py-2 rounded-lg text-xs font-medium mb-2">選擇圖片</button>
                <img id="leftPreview" class="max-h-[130px] w-auto rounded-lg shadow-sm hidden">
            </div>
            <div class="upload-card flex-1 p-3 text-center h-[220px] flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 text-sm mb-2">右邊照片</h3>
                <input type="file" id="rightImg" accept="image/*" class="hidden">
                <button onclick="document.getElementById('rightImg').click()" class="upload-btn text-white px-3 py-2 rounded-lg text-xs font-medium mb-2">選擇圖片</button>
                <img id="rightPreview" class="max-h-[130px] w-auto rounded-lg shadow-sm hidden">
            </div>
        </div>

        <div class="section-title">主要功能</div>
        <div class="flex flex-wrap gap-2 justify-center mb-4">
            <button onclick="mergeImages()" class="action-btn bg-gradient-to-r from-green-500 to-green-700 text-white px-5 py-2.5 font-semibold text-xs">🔗 標準證件照拼圖</button>
            <button onclick="clearAll()" class="action-btn bg-gradient-to-r from-red-500 to-red-700 text-white px-5 py-2.5 font-semibold text-xs">🗑 清除全部</button>
        </div>

        <div class="section-title">文字編輯</div>
        <div class="flex flex-wrap gap-2 justify-center mb-4">
            <button onclick="setLeftText(getTaiwanDate())" class="action-btn bg-gradient-to-r from-blue-400 to-blue-600 text-white px-3 py-2 text-xs">📅 左邊加入日期</button>
            <button onclick="clearLeftText()" class="action-btn bg-gradient-to-r from-gray-500 to-gray-700 text-white px-3 py-2 text-xs">🧹 清除左邊文字</button>
        </div>
        <div class="flex flex-wrap gap-2 justify-center mb-4">
            <button onclick="setRightText('兩小時')" class="action-btn bg-gradient-to-r from-yellow-400 to-orange-500 text-white px-3 py-2 text-xs">⏱ 右邊加入兩小時</button>
            <button onclick="setRightText(getTaiwanDate())" class="action-btn bg-gradient-to-r from-blue-400 to-blue-600 text-white px-3 py-2 text-xs">📅 右邊加入日期</button>
            <button onclick="clearRightText()" class="action-btn bg-gradient-to-r from-gray-500 to-gray-700 text-white px-3 py-2 text-xs">🧹 清除右邊文字</button>
        </div>

        <div class="section-title">AI 分析</div>
        <div class="flex flex-wrap gap-2 justify-center mb-5">
            <button onclick="analyzeBoth()" class="action-btn bg-gradient-to-r from-purple-500 to-purple-700 text-white px-5 py-2.5 font-semibold text-xs w-full">🤖 AI 點評</button>
        </div>

        <div class="result-card p-4 mb-5 text-center">
            <h2 class="text-lg font-bold text-gray-800 mb-2">✅ 證件照級對比結果</h2>
            <div id="capture-target" class="split-zoom-container mx-auto" style="display: none;">
                <div class="left-img-area" id="leftImgArea"><img id="leftSplitImg" class="split-img"></div>
                <div class="right-img-area" id="rightImgArea"><img id="rightSplitImg" class="split-img"></div>
                <div class="divider-line"></div>
                <div id="fixedLeftText" class="fixed-text"></div>
                <div id="fixedRightText" class="fixed-text"></div>
            </div>
            <div class="flex gap-2 justify-center mt-3">
                <button onclick="downloadMerge()" class="bg-gray-800 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-gray-900 transition">💾 下載相簿</button>
                <button onclick="shareImage()" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-blue-700 transition">📤 分享照片</button>
            </div>
        </div>

        <div class="result-card p-4 mb-8">
            <h2 class="text-lg font-bold text-purple-700 mb-2">🤖 AI 點評</h2>
            <div id="aiResult" class="text-gray-700 text-sm leading-relaxed whitespace-pre-line">尚未分析...</div>
        </div>
    </div>

    <script>
        let leftFile, rightFile;
        const leftPreview = document.getElementById('leftPreview');
        const rightPreview = document.getElementById('rightPreview');
        const splitZoomContainer = document.getElementById('capture-target');
        const leftSplitImg = document.getElementById('leftSplitImg');
        const rightSplitImg = document.getElementById('rightSplitImg');
        const leftImgArea = document.getElementById('leftImgArea');
        const rightImgArea = document.getElementById('rightImgArea');
        const captureContainer = document.getElementById('capture-target');
        
        const fixedLeftText = document.getElementById('fixedLeftText');
        const fixedRightText = document.getElementById('fixedRightText');

        // 匯出尺寸：單圖 3:4、雙圖 6:8
        const EXPORT_WIDTH = 600;
        const EXPORT_HEIGHT = 800;
        const HALF_WIDTH = EXPORT_WIDTH / 2;
        const BORDER_WIDTH = 2;

        const zoomState = {
            left: { scale: 1, offsetX: 0, offsetY: 0, isDragging: false, startX: 0, startY: 0 },
            right: { scale: 1, offsetX: 0, offsetY: 0, isDragging: false, startX: 0, startY: 0 },
            currentArea: null
        };

        function getTaiwanDate() {
            const now = new Date();
            const year = now.getFullYear() - 1911;
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}/${month}/${day}`;
        }

        function setLeftText(text) { if (!splitZoomContainer.style.display) { alert('請先產生拼圖'); return; } fixedLeftText.textContent = text; }
        function setRightText(text) { if (!splitZoomContainer.style.display) { alert('請先產生拼圖'); return; } fixedRightText.textContent = text; }
        function clearLeftText() { fixedLeftText.textContent = ''; }
        function clearRightText() { fixedRightText.textContent = ''; }

        document.getElementById('leftImg').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return; leftFile = file;
            const reader = new FileReader(); reader.onload = e => { leftPreview.src = e.target.result; leftPreview.classList.remove('hidden'); };
            reader.readAsDataURL(file);
        });
        document.getElementById('rightImg').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return; rightFile = file;
            const reader = new FileReader(); reader.onload = e => { rightPreview.src = e.target.result; rightPreview.classList.remove('hidden'); };
            reader.readAsDataURL(file);
        });

        function mergeImages() {
            if (!leftPreview.src || !rightPreview.src) { alert('請先上傳兩張照片'); return; }
            const imgL = new Image(); const imgR = new Image();
            imgL.crossOrigin = imgR.crossOrigin = 'anonymous';

            imgL.onload = () => { imgR.onload = () => {
                // 單圖 3:4 標準裁切
                const leftCanvas = document.createElement('canvas');
                leftCanvas.width = HALF_WIDTH; leftCanvas.height = EXPORT_HEIGHT;
                const leftCtx = leftCanvas.getContext('2d');
                leftCtx.fillStyle = "#fff"; leftCtx.fillRect(0,0,HALF_WIDTH,EXPORT_HEIGHT);
                leftCtx.drawImage(imgL, 0, 0, imgL.width, imgL.height, BORDER_WIDTH, BORDER_WIDTH, HALF_WIDTH - BORDER_WIDTH*2, EXPORT_HEIGHT - BORDER_WIDTH*2);

                const rightCanvas = document.createElement('canvas');
                rightCanvas.width = HALF_WIDTH; rightCanvas.height = EXPORT_HEIGHT;
                const rightCtx = rightCanvas.getContext('2d');
                rightCtx.fillStyle = "#fff"; rightCtx.fillRect(0,0,HALF_WIDTH,EXPORT_HEIGHT);
                rightCtx.drawImage(imgR, 0, 0, imgR.width, imgR.height, BORDER_WIDTH, BORDER_WIDTH, HALF_WIDTH - BORDER_WIDTH*2, EXPORT_HEIGHT - BORDER_WIDTH*2);

                leftSplitImg.src = leftCanvas.toDataURL('image/png');
                rightSplitImg.src = rightCanvas.toDataURL('image/png');
                splitZoomContainer.style.display = 'block';
                initTapZoomControls();
            }};
            imgR.src = rightPreview.src;
            imgL.src = leftPreview.src;
        }

        // 點擊放大縮小 + 滑動調整
        function initTapZoomControls() {
            zoomState.left = { scale:1, offsetX:0, offsetY:0, isDragging:false, startX:0, startY:0 };
            zoomState.right = { scale:1, offsetX:0, offsetY:0, isDragging:false, startX:0, startY:0 };
            updateLeftTransform(); updateRightTransform();

            leftImgArea.onclick = () => toggleZoom('left');
            rightImgArea.onclick = () => toggleZoom('right');

            leftImgArea.addEventListener('mousedown', startDrag);
            rightImgArea.addEventListener('mousedown', startDrag);
            document.addEventListener('mousemove', dragMove);
            document.addEventListener('mouseup', stopDrag);

            leftImgArea.addEventListener('touchstart', startDrag);
            rightImgArea.addEventListener('touchstart', startDrag);
            document.addEventListener('touchmove', dragMove);
            document.addEventListener('touchend', stopDrag);
        }

        function toggleZoom(area) {
            const s = zoomState[area]; s.scale = s.scale === 1 ? 1.3 : 1;
            clampOffset(area); area === 'left' ? updateLeftTransform() : updateRightTransform();
        }

        function startDrag(e) {
            e.preventDefault();
            const isTouch = e.type.includes('touch');
            const x = isTouch ? e.touches[0].clientX : e.clientX;
            const y = isTouch ? e.touches[0].clientY : e.clientY;
            let area = null, rect;
            if (leftImgArea.contains(e.target)) { area = 'left'; rect = leftImgArea.getBoundingClientRect(); }
            else if (rightImgArea.contains(e.target)) { area = 'right'; rect = rightImgArea.getBoundingClientRect(); }
            if (!area) return;
            zoomState.currentArea = area;
            const s = zoomState[area];
            s.isDragging = true;
            s.startX = x - rect.left - s.offsetX;
            s.startY = y - rect.top - s.offsetY;
        }

        function dragMove(e) {
            e.preventDefault();
            const area = zoomState.currentArea; if (!area) return;
            const s = zoomState[area]; if (!s.isDragging) return;
            const isTouch = e.type.includes('touch');
            const x = isTouch ? e.touches[0].clientX : e.clientX;
            const y = isTouch ? e.touches[0].clientY : e.clientY;
            const rect = area === 'left' ? leftImgArea.getBoundingClientRect() : rightImgArea.getBoundingClientRect();
            s.offsetX = x - rect.left - s.startX;
            s.offsetY = y - rect.top - s.startY;
            clampOffset(area);
            area === 'left' ? updateLeftTransform() : updateRightTransform();
        }

        function stopDrag() { zoomState.left.isDragging = false; zoomState.right.isDragging = false; }

        function clampOffset(area) {
            const c = area === 'left' ? leftImgArea : rightImgArea;
            const w = c.clientWidth, h = c.clientHeight, s = zoomState[area].scale;
            const mx = (w*s - w)/2, my = (h*s - h)/2;
            zoomState[area].offsetX = Math.max(-mx, Math.min(mx, zoomState[area].offsetX));
            zoomState[area].offsetY = Math.max(-my, Math.min(my, zoomState[area].offsetY));
        }

        function updateLeftTransform() {
            leftSplitImg.style.transform = `translate(-50%,-50%) translate(${zoomState.left.offsetX}px,${zoomState.left.offsetY}px) scale(${zoomState.left.scale})`;
        }
        function updateRightTransform() {
            rightSplitImg.style.transform = `translate(-50%,-50%) translate(${zoomState.right.offsetX}px,${zoomState.right.offsetY}px) scale(${zoomState.right.scale})`;
        }

        async function captureCurrentScreen() {
            return new Promise(async resolve => {
                try {
                    const canvas = await html2canvas(captureContainer, { scale:2, useCORS:true, logging:false, backgroundColor:'#fff' });
                    resolve(canvas.toDataURL('image/png',1));
                } catch(e) { console.error(e); alert('截圖失敗'); resolve(null); }
            });
        }

        async function downloadMerge() {
            if (!splitZoomContainer.style.display) { alert('請先產生拼圖'); return; }
            const url = await captureCurrentScreen(); if (!url) return;
            const a = document.createElement('a'); a.href = url; a.download = '彥彬_證件照對比_6x8.png';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            alert('✅ 下載成功！比例 6:8');
        }

        async function shareImage() {
            if (!splitZoomContainer.style.display) { alert('請先產生拼圖'); return; }
            const url = await captureCurrentScreen(); if (!url) return;
            const blob = await fetch(url).then(r=>r.blob());
            const file = new File([blob], '彥彬_證件照對比_6x8.png', {type:'image/png'});
            if (navigator.share && navigator.canShare({files:[file]})) await navigator.share({files:[file],title:'證件照對比'});
            else alert('❌ 裝置不支援分享');
        }

        function clearAll() { localStorage.clear(); location.reload(); }

        async function analyzeBoth() {
            if (!leftPreview.src || !rightPreview.src) return alert('請上傳兩張照片');
            const resBox = document.getElementById('aiResult');
            resBox.innerText = 'AI 分析中...';
            try {
                const res = await fetch("https://api.together.xyz/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer tgp_v018_36d8697871d6254683c5527d73ad97888f860b21"
                    },
                    body: JSON.stringify({
                        model: "meta-llama/Llama-3.2-11B-Vision-Instruct-Turbo",
                        messages: [{
                            role: "user",
                            content: [
                                { type: "text", text: "你是專業攝影師、形象導師。請針對左右兩張照片進行對比點評，包含：1.姿態 2.表情 3.光影 4.構圖 5.整體建議。使用口語化、專業、有建設性的繁體中文。" },
                                { type: "image_url", image_url: { url: leftPreview.src } },
                                { type: "image_url", image_url: { url: rightPreview.src } }
                            ]
                        }],
                        max_tokens: 1024,
                        temperature: 0.7
                    })
                });
                const data = await res.json();
                resBox.innerText = data.choices?.[0]?.message?.content || '分析失敗，請重試';
            } catch (error) {
                resBox.innerText = '❌ AI 分析異常，請檢查網路或稍後再試';
                console.error('AI分析錯誤：', error);
            }
        }
    </script>
</body>
</html>
