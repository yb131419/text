<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彥彬 AI 比對系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        }
        .upload-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.07);
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .upload-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .upload-btn {
            background: linear-gradient(90deg, #3b82f6, #1d4ed8);
            transition: all 0.3s;
        }
        .upload-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        .action-btn {
            border-radius: 14px;
            transition: all 0.3s;
        }
        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.12);
        }
        .result-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.07);
        }
        img {
            object-fit: contain;
            object-position: center;
        }
        .section-title {
            font-size: 12px;
            color: #4b5563;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #d1d5db;
        }

        /* 🔥 核心：原地放大縮小樣式 */
        .zoom-container {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            touch-action: none; /* 關閉默認觸控行為 */
            cursor: grab;
        }
        .zoom-target {
            position: absolute;
            top: 0;
            left: 0;
            transition: transform 0.1s ease-out;
            transform-origin: center center;
            user-select: none;
        }
        /* 縮放控制提示 */
        .zoom-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen p-3">
    <div class="max-w-sm mx-auto">
        <div class="text-center mb-4">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-700 bg-clip-text text-transparent">
                彥彬 AI 比對系統
            </h1>
            <p class="text-gray-600 mt-1 text-sm">標準證件照裁切 + 三庭五眼校正 + AI點評</p>
        </div>

        <div class="flex gap-3 mb-5">
            <div class="upload-card flex-1 p-3 text-center h-[220px] flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 text-sm mb-2">左邊照片</h3>
                <input type="file" id="leftImg" accept="image/*" class="hidden">
                <button onclick="document.getElementById('leftImg').click()" class="upload-btn text-white px-3 py-2 rounded-lg text-xs font-medium mb-2">
                    選擇圖片
                </button>
                <img id="leftPreview" class="hidden max-h-[130px] w-auto rounded-lg shadow-sm">
            </div>

            <div class="upload-card flex-1 p-3 text-center h-[220px] flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 text-sm mb-2">右邊照片</h3>
                <input type="file" id="rightImg" accept="image/*" class="hidden">
                <button onclick="document.getElementById('rightImg').click()" class="upload-btn text-white px-3 py-2 rounded-lg text-xs font-medium mb-2">
                    選擇圖片
                </button>
                <img id="rightPreview" class="hidden max-h-[130px] w-auto rounded-lg shadow-sm">
            </div>
        </div>

        <!-- 主要功能 -->
        <div class="section-title">主要功能</div>
        <div class="flex flex-wrap gap-2 justify-center mb-4">
            <button onclick="mergeImages()" class="action-btn bg-gradient-to-r from-green-500 to-green-700 text-white px-5 py-2.5 font-semibold text-xs">
                🔗 標準證件照拼圖
            </button>
            <button onclick="clearAll()" class="action-btn bg-gradient-to-r from-red-500 to-red-700 text-white px-5 py-2.5 font-semibold text-xs">
                🗑 清除全部
            </button>
        </div>

        <!-- 文字編輯 -->
        <div class="section-title">文字編輯</div>
        <div class="flex flex-wrap gap-2 justify-center mb-4">
            <button onclick="addTextRight('兩小時')" class="action-btn bg-gradient-to-r from-yellow-400 to-orange-500 text-white px-3 py-2 text-xs">
                ⏱ 加入兩小時
            </button>
            <button onclick="addTextRight(getTaiwanDate())" class="action-btn bg-gradient-to-r from-blue-400 to-blue-600 text-white px-3 py-2 text-xs">
                📅 加入今日日期
            </button>
            <button onclick="clearRightText()" class="action-btn bg-gradient-to-r from-gray-500 to-gray-700 text-white px-3 py-2 text-xs">
                🧹 清除右側文字
            </button>
        </div>

        <!-- AI 分析 -->
        <div class="section-title">AI 分析</div>
        <div class="flex flex-wrap gap-2 justify-center mb-5">
            <button onclick="analyzeBoth()" class="action-btn bg-gradient-to-r from-purple-500 to-purple-700 text-white px-5 py-2.5 font-semibold text-xs w-full">
                🤖 AI 點評
            </button>
        </div>

        <!-- 🔥 對比結果（原地放大縮小） -->
        <div class="result-card p-4 mb-5 text-center">
            <h2 class="text-lg font-bold text-gray-800 mb-2">✅ 證件照級對比結果</h2>
            <h3 class="text-xs text-gray-500 mb-3">👉 滑鼠滾輪/雙指縮放 | 拖動調整位置</h3>
            
            <!-- 放大縮小容器 -->
            <div id="zoomContainer" class="zoom-container mx-auto" style="width: 100%; height: 350px; display: none;">
                <img id="mergeResult" class="zoom-target" style="width: 100%; height: auto;">
                <div class="zoom-hint">滾輪/雙指縮放 | 拖動移動</div>
            </div>
            <canvas id="mergeCanvas" class="hidden"></canvas>

            <div class="flex gap-2 justify-center mt-3">
                <button onclick="downloadMerge()" class="bg-gray-800 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-gray-900 transition">
                    💾 下載相簿
                </button>
                <button onclick="shareImage()" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-blue-700 transition">
                    📤 分享照片
                </button>
            </div>
        </div>

        <div class="result-card p-4 mb-8">
            <h2 class="text-lg font-bold text-purple-700 mb-2">🤖 AI 點評</h2>
            <div id="aiResult" class="text-gray-700 text-sm leading-relaxed whitespace-pre-line">
                尚未分析...
            </div>
        </div>
    </div>

    <script>
        let leftFile, rightFile;
        const leftPreview = document.getElementById('leftPreview');
        const rightPreview = document.getElementById('rightPreview');
        const mergeCanvas = document.getElementById('mergeCanvas');
        const mergeResult = document.getElementById('mergeResult');
        const zoomContainer = document.getElementById('zoomContainer');
        const ctx = mergeCanvas.getContext('2d');
        
        const FULL_SIZE = 800;
        const HALF_SIZE = FULL_SIZE / 2;
        const BORDER_WIDTH = 2; // 細白線寬度

        // 縮放控制變量
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        let isDragging = false;
        let startX, startY;
        let lastScale = 1;

        // 日期格式：115/04/02
        function getTaiwanDate() {
            const now = new Date();
            const year = now.getFullYear() - 1911;
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}/${month}/${day}`;
        }

        // 上傳圖片
        document.getElementById('leftImg').addEventListener('change', loadLeftImage);
        document.getElementById('rightImg').addEventListener('change', loadRightImage);

        function loadLeftImage() {
            const file = document.getElementById('leftImg').files[0];
            if (!file) return;
            leftFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                leftPreview.src = e.target.result;
                leftPreview.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function loadRightImage() {
            const file = document.getElementById('rightImg').files[0];
            if (!file) return;
            rightFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                rightPreview.src = e.target.result;
                rightPreview.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        // 拼圖生成（保留細白線）
        function mergeImages() {
            if (!leftPreview.src || !rightPreview.src) {
                alert('請先上傳兩張照片');
                return;
            }

            const imgL = new Image();
            const imgR = new Image();
            imgL.crossOrigin = 'anonymous';
            imgR.crossOrigin = 'anonymous';

            imgL.onload = function() {
                imgR.onload = function() {
                    const TOP_CROP = 0.02;
                    const BOTTOM_CROP = 0.88;

                    mergeCanvas.width = FULL_SIZE;
                    mergeCanvas.height = FULL_SIZE;
                    ctx.clearRect(0, 0, FULL_SIZE, FULL_SIZE);

                    // 外圍白色細框
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, FULL_SIZE, FULL_SIZE);

                    // 左圖
                    const cropH_L = imgL.height * (BOTTOM_CROP - TOP_CROP);
                    ctx.drawImage(
                        imgL,
                        0, imgL.height * TOP_CROP, imgL.width, cropH_L,
                        BORDER_WIDTH, BORDER_WIDTH,
                        HALF_SIZE - BORDER_WIDTH,
                        FULL_SIZE - BORDER_WIDTH * 2
                    );

                    // 中間白色細分隔線
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(HALF_SIZE - 1, 0, 2, FULL_SIZE);

                    // 右圖
                    const cropH_R = imgR.height * (BOTTOM_CROP - TOP_CROP);
                    ctx.drawImage(
                        imgR,
                        0, imgR.height * TOP_CROP, imgR.width, cropH_R,
                        HALF_SIZE + BORDER_WIDTH, BORDER_WIDTH,
                        HALF_SIZE - BORDER_WIDTH,
                        FULL_SIZE - BORDER_WIDTH * 2
                    );

                    // 日期
                    drawText(getTaiwanDate(), HALF_SIZE/2, FULL_SIZE - 65);

                    // 顯示圖片並初始化縮放
                    mergeResult.src = mergeCanvas.toDataURL('image/png');
                    zoomContainer.style.display = 'block';
                    initZoomControls();
                }
                imgR.src = rightPreview.src;
            }
            imgL.src = leftPreview.src;
        }

        // 文字繪製
        function drawText(text, x, y) {
            ctx.font = 'bold 40px Arial';
            ctx.fillStyle = 'white';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 8;
            ctx.textAlign = 'center';
            ctx.strokeText(text, x, y);
            ctx.fillText(text, x, y);
        }

        // 右圖加入文字
        function addTextRight(text) {
            if (!mergeCanvas.width) {
                alert('請先產生拼圖');
                return;
            }
            drawText(text, HALF_SIZE + HALF_SIZE/2, FULL_SIZE - 65);
            mergeResult.src = mergeCanvas.toDataURL('image/png');
        }

        // 清除右側文字
        function clearRightText() {
            if (!leftPreview.src || !rightPreview.src) return;
            mergeImages();
        }

        // 🔥 核心：初始化原地放大縮小控制
        function initZoomControls() {
            // 重置縮放狀態
            scale = 1;
            offsetX = 0;
            offsetY = 0;
            updateTransform();

            // 滑鼠滾輪縮放（電腦）
            zoomContainer.addEventListener('wheel', (e) => {
                e.preventDefault();
                // 計算縮放增量
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                const newScale = Math.min(4, Math.max(0.8, scale + delta));
                
                // 基於滑鼠位置縮放（更直觀）
                const rect = zoomContainer.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                // 調整偏移量，讓縮放圍繞滑鼠位置
                offsetX = mouseX - (mouseX - offsetX) * (newScale / scale);
                offsetY = mouseY - (mouseY - offsetY) * (newScale / scale);
                
                scale = newScale;
                updateTransform();
            });

            // 滑鼠拖動（電腦）
            zoomContainer.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX - offsetX;
                startY = e.clientY - offsetY;
                zoomContainer.style.cursor = 'grabbing';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                offsetX = e.clientX - startX;
                offsetY = e.clientY - startY;
                updateTransform();
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
                zoomContainer.style.cursor = 'grab';
            });

            // 雙指縮放（手機）
            let touch1 = null, touch2 = null;
            let initialDistance = 0;
            let initialMidX = 0, initialMidY = 0;

            zoomContainer.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (e.touches.length === 1) {
                    // 單指拖動
                    isDragging = true;
                    startX = e.touches[0].clientX - offsetX;
                    startY = e.touches[0].clientY - offsetY;
                } else if (e.touches.length === 2) {
                    // 雙指縮放
                    touch1 = e.touches[0];
                    touch2 = e.touches[1];
                    initialDistance = getDistance(touch1, touch2);
                    initialMidX = (touch1.clientX + touch2.clientX) / 2;
                    initialMidY = (touch1.clientY + touch2.clientY) / 2;
                    lastScale = scale;
                }
            });

            zoomContainer.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length === 1 && isDragging) {
                    // 單指拖動
                    offsetX = e.touches[0].clientX - startX;
                    offsetY = e.touches[0].clientY - startY;
                    updateTransform();
                } else if (e.touches.length === 2) {
                    // 雙指縮放
                    const newTouch1 = e.touches[0];
                    const newTouch2 = e.touches[1];
                    const newDistance = getDistance(newTouch1, newTouch2);
                    
                    // 計算新縮放比例
                    const scaleRatio = newDistance / initialDistance;
                    scale = Math.min(4, Math.max(0.8, lastScale * scaleRatio));
                    
                    // 基於雙指中點調整偏移
                    const newMidX = (newTouch1.clientX + newTouch2.clientX) / 2;
                    const newMidY = (newTouch1.clientY + newTouch2.clientY) / 2;
                    
                    offsetX += (newMidX - initialMidX);
                    offsetY += (newMidY - initialMidY);
                    
                    updateTransform();
                }
            });

            zoomContainer.addEventListener('touchend', () => {
                isDragging = false;
                touch1 = null;
                touch2 = null;
            });
        }

        // 計算兩個觸控點的距離
        function getDistance(t1, t2) {
            const dx = t2.clientX - t1.clientX;
            const dy = t2.clientY - t1.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // 更新圖片變換（縮放+偏移）
        function updateTransform() {
            mergeResult.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
        }

        // 下載（手機直接存）
        async function downloadMerge() {
            if (!mergeCanvas.width) {
                alert('請先產生拼圖');
                return;
            }
            try {
                const dataUrl = mergeCanvas.toDataURL('image/png');
                const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
                const isAndroid = /Android/.test(navigator.userAgent);

                if (isIOS || isAndroid) {
                    const link = document.createElement('a');
                    link.href = dataUrl;
                    link.download = "彥彬_證件照級對比.png";
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    setTimeout(() => {
                        alert('✅ 下載成功！照片已儲存至相簿');
                    }, 500);
                } else {
                    const blob = await new Promise(resolve => mergeCanvas.toBlob(resolve, 'image/png', 1.0));
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = "彥彬_證件照級對比.png";
                    a.click();
                    URL.revokeObjectURL(url);
                    alert('✅ 下載成功！');
                }
            } catch (e) {
                alert('❌ 下載失敗，請截圖儲存');
            }
        }

        // 分享
        async function shareImage() {
            if (!mergeCanvas.width) {
                alert('請先產生拼圖');
                return;
            }
            try {
                const blob = await new Promise(resolve => mergeCanvas.toBlob(resolve, 'image/png', 1.0));
                const file = new File([blob], "彥彬_證件照級對比.png", { type: 'image/png' });
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: '彥彬 證件照比對' });
                } else {
                    alert('❌ 裝置不支援分享');
                }
            } catch (e) {
                alert('❌ 分享失敗');
            }
        }

        function clearAll() {
            localStorage.clear();
            location.reload();
        }

        // AI 分析
        async function analyzeBoth() {
            if (!leftPreview.src || !rightPreview.src) {
                alert('請上傳兩張照片');
                return;
            }
            const resBox = document.getElementById('aiResult');
            resBox.innerText = 'AI 分析中...';

            try {
                const response = await fetch("https://api.together.xyz/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer tgp_v018_36d8697871d6254683c5527d73ad97888f860b21"
                    },
                    body: JSON.stringify({
                        model: "meta-llama/Llama-3.2-11B-Vision-Instruct-Turbo",
                        messages: [{
                            role: "user",
                            content: [
                                { type: "text", text: "你是專業攝影師、形象導師。請針對左右兩張照片進行對比點評，包含：1.姿態 2.表情 3.光影 4.構圖 5.整體建議。使用口語化、專業、有建設性的繁體中文。" },
                                { type: "image_url", image_url: { url: leftPreview.src } },
                                { type: "image_url", image_url: { url: rightPreview.src } }
                            ]
                        }],
                        max_tokens: 1024,
                        temperature: 0.7
                    })
                });
                const data = await response.json();
                resBox.innerText = data.choices?.[0]?.message?.content || '分析失敗';
            } catch (e) {
                resBox.innerText = '❌ AI 分析異常';
            }
        }

        // 啟動空白
        window.onload = function() {
            leftPreview.classList.add('hidden');
            rightPreview.classList.add('hidden');
        };
    </script>
</body>
</html>
