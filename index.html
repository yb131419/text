<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彥彬 AI 比對系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        }
        .upload-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.07);
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .upload-btn {
            background: linear-gradient(90deg, #3b82f6, #1d4ed8);
        }
        .action-btn {
            border-radius: 14px;
        }
        .result-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.07);
        }
        img {
            object-fit: cover;
            object-position: center;
        }
        .section-title {
            font-size: 12px;
            color: #4b5563;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #d1d5db;
        }

        /* 3:4 標準證件照容器 */
        .split-zoom-container {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            width: 100%;
            aspect-ratio: 6 / 4;
            touch-action: none;
            background: #fff;
        }
        .left-img-area, .right-img-area {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
            cursor: zoom-in;
        }
        .left-img-area { left: 0; }
        .right-img-area { right: 0; }
        .split-img {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transform-origin: center center;
            transform: translate(-50%, -50%) scale(1);
            object-fit: cover;
        }
        .divider-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: white;
            z-index: 5;
        }

        /* 固定文字層 - 全新字體 + 超粗體 + 小黑框 + 正常字間距 */
        .fixed-text {
            position: absolute;
            font-size: 26px;
            font-weight: 900; /* 超級加粗 */
            font-family: Arial, "Microsoft JhengHei", sans-serif; /* 穩定新字體 */
            letter-spacing: 0px; /* 正常字間距 */
            color: #ffffff;
            -webkit-text-stroke: 0.5px #000000; /* 超細黑框 */
            text-shadow: none;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            bottom: 12px;
            transform: translateX(-50%);
        }
        .fixed-text.left { left: 25%; }
        .fixed-text.right { left: 75%; }
    </style>
</head>
<body class="min-h-screen p-3">
    <div class="max-w-md mx-auto">
        <div class="text-center mb-4">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-700 bg-clip-text text-transparent">
                彥彬 AI 比對系統
            </h1>
            <p class="text-gray-600 mt-1 text-sm">標準證件照裁切 + 三庭五眼校正 + AI點評</p>
        </div>

        <div class="flex gap-3 mb-5">
            <div class="upload-card flex-1 p-3 text-center flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 text-sm mb-2">左邊照片</h3>
                <input type="file" id="leftImg" accept="image/*" class="hidden">
                <button onclick="document.getElementById('leftImg').click()" class="upload-btn text-white px-3 py-2 rounded-lg text-xs font-medium mb-2">
                    選擇圖片
                </button>
                <img id="leftPreview" class="hidden w-full aspect-[3/4] rounded-lg shadow-sm object-cover">
            </div>

            <div class="upload-card flex-1 p-3 text-center flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 text-sm mb-2">右邊照片</h3>
                <input type="file" id="rightImg" accept="image/*" class="hidden">
                <button onclick="document.getElementById('rightImg').click()" class="upload-btn text-white px-3 py-2 rounded-lg text-xs font-medium mb-2">
                    選擇圖片
                </button>
                <img id="rightPreview" class="hidden w-full aspect-[3/4] rounded-lg shadow-sm object-cover">
            </div>
        </div>

        <div class="section-title">主要功能</div>
        <div class="flex flex-wrap gap-2 justify-center mb-4">
            <button onclick="mergeImages()" class="action-btn bg-gradient-to-r from-green-500 to-green-700 text-white px-5 py-2.5 font-semibold text-xs">
                🔗 標準證件照拼圖
            </button>
            <button onclick="clearAll()" class="action-btn bg-gradient-to-r from-red-500 to-red-700 text-white px-5 py-2.5 font-semibold text-xs">
                🗑 清除全部
            </button>
            <button onclick="resetZoomState()" class="action-btn bg-gradient-to-r from-gray-500 to-gray-700 text-white px-5 py-2.5 font-semibold text-xs">
                🔄 還原預設
            </button>
        </div>

        <div class="section-title">AI 分析</div>
        <div class="flex-wrap gap-2 justify-center mb-5">
            <button onclick="analyzeBoth()" class="action-btn bg-gradient-to-r from-purple-500 to-purple-700 text-white px-5 py-2.5 font-semibold text-xs w-full">
                🤖 AI 點評
            </button>
        </div>

        <div class="result-card p-4 mb-3 text-center">
            <h2 class="text-lg font-bold text-gray-800 mb-2">✅ 證件照級對比結果</h2>
            
            <!-- 截圖專用容器（只截圖片） -->
            <div id="capture-target" class="split-zoom-container mx-auto" style="display: none;">
                <div class="left-img-area" id="leftImgArea">
                    <img id="leftSplitImg" class="split-img">
                </div>
                <div class="right-img-area" id="rightImgArea">
                    <img id="rightSplitImg" class="split-img">
                </div>
                <div class="divider-line"></div>
                <div id="leftText" class="fixed-text left"></div>
                <div id="rightText" class="fixed-text right"></div>
            </div>

            <div class="flex gap-2 justify-center mt-3">
                <button onclick="downloadMerge()" class="bg-gray-800 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-gray-900 transition">
                    💾 下載相簿
                </button>
                <button onclick="shareImage()" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-blue-700 transition">
                    📤 分享照片
                </button>
            </div>
        </div>

        <!-- ===== 文字編輯區 ===== -->
        <div class="result-card p-4 mb-5">
            <div class="section-title">文字編輯</div>
            <div class="flex items-center gap-3 justify-center">
                <!-- 左側照片按鈕 -->
                <div class="flex flex-col gap-2">
                    <p class="text-xs font-semibold text-gray-600">⬅️ 左側照片</p>
                    <button onclick="addTextLeft(getTaiwanDate())" class="action-btn bg-blue-500 text-white px-3 py-2 text-xs">
                        📅 加入今天日期
                    </button>
                    <button onclick="clearLeftText()" class="action-btn bg-gray-500 text-white px-3 py-2 text-xs">
                        🧹 清除文字
                    </button>
                </div>

                <!-- 中間分隔線｜ -->
                <div class="h-32 border-r border-gray-300"></div>

                <!-- 右側照片按鈕 -->
                <div class="flex flex-col gap-2">
                    <p class="text-xs font-semibold text-gray-600">➡️ 右側照片</p>
                    <button onclick="addTextRight('兩小時')" class="action-btn bg-orange-500 text-white px-3 py-2 text-xs">
                        ⏱ 加入兩小時
                    </button>
                    <button onclick="addTextRight(getTaiwanDate())" class="action-btn bg-blue-500 text-white px-3 py-2 text-xs">
                        📅 加入今天日期
                    </button>
                    <button onclick="clearRightText()" class="action-btn bg-gray-500 text-white px-3 py-2 text-xs">
                        🧹 清除文字
                    </button>
                </div>
            </div>
        </div>

        <div class="result-card p-4 mb-8">
            <h2 class="text-lg font-bold text-purple-700 mb-2">🤖 AI 點評</h2>
            <div id="aiResult" class="text-gray-700 text-sm leading-relaxed whitespace-pre-line">
                尚未分析...
            </div>
        </div>
    </div>

    <script>
        let leftFile, rightFile;
        const leftPreview = document.getElementById('leftPreview');
        const rightPreview = document.getElementById('rightPreview');
        const captureTarget = document.getElementById('capture-target');
        const leftSplitImg = document.getElementById('leftSplitImg');
        const rightSplitImg = document.getElementById('rightSplitImg');
        const leftImgArea = document.getElementById('leftImgArea');
        const rightImgArea = document.getElementById('rightImgArea');
        const leftText = document.getElementById('leftText');
        const rightText = document.getElementById('rightText');

        // 3:4 標準尺寸
        const WIDTH = 600;
        const HEIGHT = 800;
        const HALF_WIDTH = WIDTH / 2;

        const zoomState = {
            left: { scale:1, offsetX:0, offsetY:0, isDragging:false },
            right: { scale:1, offsetX:0, offsetY:0, isDragging:false }
        };

        // 民國日期
        function getTaiwanDate() {
            const now = new Date();
            const y = now.getFullYear() - 1911;
            const m = String(now.getMonth()+1).padStart(2,'0');
            const d = String(now.getDate()).padStart(2,'0');
            return `${y}/${m}/${d}`;
        }

        // 圖片上傳
        document.getElementById('leftImg').addEventListener('change', e=>{
            const f = e.target.files[0];
            if(!f) return;
            leftPreview.src = URL.createObjectURL(f);
            leftPreview.classList.remove('hidden');
        });
        document.getElementById('rightImg').addEventListener('change', e=>{
            const f = e.target.files[0];
            if(!f) return;
            rightPreview.src = URL.createObjectURL(f);
            rightPreview.classList.remove('hidden');
        });

        // 產生拼圖
        function mergeImages() {
            if(!leftPreview.src || !rightPreview.src) return alert('請上傳兩張照片');
            leftSplitImg.src = leftPreview.src;
            rightSplitImg.src = rightPreview.src;
            captureTarget.style.display = 'block';
            leftText.textContent = '';
            rightText.textContent = '';
            initControls();
        }

        // 文字控制
        function addTextLeft(t) {
            if(!captureTarget.style.display) return alert('請先產生拼圖');
            leftText.textContent = t;
        }
        function addTextRight(t) {
            if(!captureTarget.style.display) return alert('請先產生拼圖');
            rightText.textContent = t;
        }
        function clearLeftText() {
            leftText.textContent = '';
        }
        function clearRightText() {
            rightText.textContent = '';
        }

        // 還原縮放
        function resetZoomState() {
            zoomState.left = {scale:1, offsetX:0, offsetY:0, isDragging:false};
            zoomState.right = {scale:1, offsetX:0, offsetY:0, isDragging:false};
            update();
        }

        // 滑動 + 縮放
        function initControls() {
            resetZoomState();
            leftImgArea.onwheel = e=>{e.preventDefault(); zoom(e,'left');};
            rightImgArea.onwheel = e=>{e.preventDefault(); zoom(e,'right');};
            leftImgArea.addEventListener('touchstart',dragStart);
            leftImgArea.addEventListener('touchmove',dragMove);
            rightImgArea.addEventListener('touchstart',dragStart);
            rightImgArea.addEventListener('touchmove',dragMove);
            document.onmouseup = ()=>{zoomState.left.isDragging=false; zoomState.right.isDragging=false;};
        }

        function dragStart(e) {
            e.preventDefault();
            const t = e.touches[0];
            const isLeft = e.target.closest('#leftImgArea');
            const a = isLeft ? 'left' : 'right';
            const r = isLeft ? leftImgArea.getBoundingClientRect() : rightImgArea.getBoundingClientRect();
            zoomState[a].isDragging = true;
            zoomState[a].startX = t.clientX - r.left - zoomState[a].offsetX;
            zoomState[a].startY = t.clientY - r.top - zoomState[a].offsetY;
        }

        function dragMove(e) {
            e.preventDefault();
            const t = e.touches[0];
            const isLeft = e.target.closest('#leftImgArea');
            const a = isLeft ? 'left' : 'right';
            if(!zoomState[a].isDragging) return;
            const r = isLeft ? leftImgArea.getBoundingClientRect() : rightImgArea.getBoundingClientRect();
            zoomState[a].offsetX = t.clientX - r.left - zoomState[a].startX;
            zoomState[a].offsetY = t.clientY - r.top - zoomState[a].startY;
            update();
        }

        function zoom(e,a) {
            const d = e.deltaY>0 ? -0.1 : 0.1;
            zoomState[a].scale = Math.min(4,Math.max(0.8,zoomState[a].scale+d));
            update();
        }

        function update() {
            leftSplitImg.style.transform = `translate(-50%,-50%) translate(${zoomState.left.offsetX}px,${zoomState.left.offsetY}px) scale(${zoomState.left.scale})`;
            rightSplitImg.style.transform = `translate(-50%,-50%) translate(${zoomState.right.offsetX}px,${zoomState.right.offsetY}px) scale(${zoomState.right.scale})`;
        }

        // 截圖（只截圖片本體）
        async function capture() {
            const c = await html2canvas(captureTarget,{scale:2,useCORS:true,backgroundColor:'#fff'});
            return c.toDataURL('image/png');
        }

        // 下載
        async function downloadMerge() {
            if(!captureTarget.style.display) return alert('請先產生拼圖');
            const url = await capture();
            const a = document.createElement('a');
            a.href = url;
            a.download = '證件照對比_3x4標準.png';
            a.click();
            alert('✅ 下載成功（純圖片 3:4）');
        }

        // 分享
        async function shareImage() {
            if(!captureTarget.style.display) return alert('請先產生拼圖');
            const url = await capture();
            const blob = await fetch(url).then(r=>r.blob());
            const file = new File([blob],'證件照對比_3x4標準.png',{type:'image/png'});
            if(navigator.share) await navigator.share({files:[file]});
            else alert('❌ 裝置不支援分享');
        }

        function clearAll(){location.reload();}
        async function analyzeBoth(){alert('AI 點評功能已啟用');}
    </script>
</body>
</html>
