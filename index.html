<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>半身照 AI 比對系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .upload-area { border: 2px dashed #ccc; }
        .upload-area.active { border-color: #3b82f6; background: #eff6ff; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-6 text-blue-700">📷 半身照 AI 比對系統</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="upload-area p-6 rounded-lg text-center h-72 flex flex-col items-center justify-center relative">
                <h3 class="font-semibold mb-2">左邊照片（半身照）</h3>
                <input type="file" id="leftImg" accept="image/*" class="hidden" onchange="loadLeftImage()">
                <button onclick="document.getElementById('leftImg').click()" class="bg-blue-500 text-white px-4 py-2 rounded mb-2">選擇圖片</button>
                <img id="leftPreview" class="max-h-60 object-contain hidden">
            </div>

            <div class="upload-area p-6 rounded-lg text-center h-72 flex flex-col items-center justify-center relative">
                <h3 class="font-semibold mb-2">右邊照片（半身照）</h3>
                <input type="file" id="rightImg" accept="image/*" class="hidden" onchange="loadRightImage()">
                <button onclick="document.getElementById('rightImg').click()" class="bg-blue-500 text-white px-4 py-2 rounded mb-2">選擇圖片</button>
                <img id="rightPreview" class="max-h-60 object-contain hidden">
            </div>
        </div>

        <div class="flex flex-wrap gap-3 justify-center mb-6">
            <button onclick="mergeImages()" class="bg-green-600 text-white px-5 py-2 rounded-lg font-semibold">🔗 自動左右拼圖</button>
            <button onclick="analyzeBoth()" class="bg-purple-600 text-white px-5 py-2 rounded-lg font-semibold">🤖 AI 專業點評</button>
            <button onclick="clearAll()" class="bg-red-500 text-white px-5 py-2 rounded-lg">🗑 清除全部</button>
        </div>

        <div class="mb-6 text-center">
            <h2 class="text-xl font-bold mb-3">✅ 左右拼圖結果</h2>
            <div class="border rounded-lg p-3 bg-white inline-block max-w-full">
                <canvas id="mergeCanvas" class="max-w-full max-h-[500px] shadow-md"></canvas>
                <button onclick="downloadMerge()" class="mt-3 bg-gray-700 text-white px-3 py-1 rounded">💾 下載拼圖</button>
            </div>
        </div>

        <div class="bg-white p-5 rounded-lg shadow mb-8">
            <h2 class="text-xl font-bold mb-3 text-purple-700">🤖 AI 半身照點評</h2>
            <div id="aiResult" class="whitespace-pre-line text-gray-700 leading-relaxed">尚未分析...</div>
        </div>
    </div>

    <script>
        let leftFile, rightFile;
        const leftPreview = document.getElementById('leftPreview');
        const rightPreview = document.getElementById('rightPreview');
        const mergeCanvas = document.getElementById('mergeCanvas');
        const ctx = mergeCanvas.getContext('2d');

        function loadLeftImage() {
            const file = document.getElementById('leftImg').files[0];
            if (!file) return;
            leftFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                leftPreview.src = e.target.result;
                leftPreview.classList.remove('hidden');
                localStorage.setItem('leftImgCache', e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function loadRightImage() {
            const file = document.getElementById('rightImg').files[0];
            if (!file) return;
            rightFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                rightPreview.src = e.target.result;
                rightPreview.classList.remove('hidden');
                localStorage.setItem('rightImgCache', e.target.result);
            };
            reader.readAsDataURL(file);
        }

        // === 核心優化：自動校正尺寸 + 右邊略小一點 ===
        function mergeImages() {
            if (!leftPreview.src || !rightPreview.src) {
                alert('請先上傳左右兩張照片');
                return;
            }

            const imgL = new Image();
            const imgR = new Image();
            imgL.crossOrigin = 'anonymous';
            imgR.crossOrigin = 'anonymous';

            imgL.onload = function() {
                imgR.onload = function() {
                    // 固定統一高度（兩張一樣高）
                    const targetHeight = 600;
                    
                    // 左邊寬度
                    const leftWidth = imgL.width * targetHeight / imgL.height;
                    
                    // 右邊寬度 = 自動等比例 → 再縮小 8%（你要的小一點點）
                    let rightWidth = imgR.width * targetHeight / imgR.height;
                    rightWidth = rightWidth * 0.92;

                    // 畫布總寬
                    const totalWidth = leftWidth + rightWidth;

                    mergeCanvas.width = totalWidth;
                    mergeCanvas.height = targetHeight;
                    
                    ctx.clearRect(0, 0, totalWidth, targetHeight);
                    
                    // 畫左圖
                    ctx.drawImage(imgL, 0, 0, leftWidth, targetHeight);
                    
                    // 畫右圖（自動對齊、略小）
                    ctx.drawImage(imgR, leftWidth, 0, rightWidth, targetHeight);
                }
                imgR.src = rightPreview.src;
            }
            imgL.src = leftPreview.src;
        }

        function downloadMerge() {
            if (!mergeCanvas.width) {
                alert('請先產生拼圖');
                return;
            }
            const a = document.createElement('a');
            a.download = '照片對比拼圖.png';
            a.href = mergeCanvas.toDataURL('image/png');
            a.click();
        }

        function clearAll() {
            localStorage.clear();
            location.reload();
        }

        async function analyzeBoth() {
            if (!leftPreview.src || !rightPreview.src) {
                alert('請上傳兩張半身照');
                return;
            }
            const resBox = document.getElementById('aiResult');
            resBox.innerText = 'AI 分析中，請稍候...';

            try {
                const response = await fetch("https://api.together.xyz/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer tgp_v018_36d8697871d6254683c5527d73ad97888f860b21"
                    },
                    body: JSON.stringify({
                        model: "meta-llama/Llama-3.2-11B-Vision-Instruct-Turbo",
                        messages: [
                            {
                                role: "user",
                                content: [
                                    { type: "text", text: "你是專業攝影師、形象導師。請針對左右兩張半身照進行對比點評，包含：1.姿態 2.表情 3.光影 4.構圖 5.整體建議。使用口語化、專業、有建設性的繁體中文。" },
                                    { type: "image_url", image_url: { url: leftPreview.src } },
                                    { type: "image_url", image_url: { url: rightPreview.src } }
                                ]
                            }
                        ],
                        max_tokens: 1024,
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const result = data.choices?.[0]?.message?.content || '分析失敗，請稍後再試';
                resBox.innerText = result;
            } catch (e) {
                resBox.innerText = '❌ AI 分析異常：' + e.message;
            }
        }

        window.onload = function() {
            const leftCache = localStorage.getItem('leftImgCache');
            const rightCache = localStorage.getItem('rightImgCache');
            if (leftCache) {
                leftPreview.src = leftCache;
                leftPreview.classList.remove('hidden');
            }
            if (rightCache) {
                rightPreview.src = rightCache;
                rightPreview.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
