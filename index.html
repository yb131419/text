<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彥彬 AI 比對系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        }
        .upload-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.07);
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .upload-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .upload-btn {
            background: linear-gradient(90deg, #3b82f6, #1d4ed8);
            transition: all 0.3s;
        }
        .upload-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        .action-btn {
            border-radius: 14px;
            transition: all 0.3s;
        }
        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.12);
        }
        .result-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.07);
        }
        img {
            object-fit: contain;
            object-position: center;
        }
        .section-title {
            font-size: 12px;
            color: #4b5563;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #d1d5db;
        }

        .split-zoom-container {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            width: 100%;
            height: 450px;
            touch-action: none;
        }
        .left-img-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
            cursor: zoom-in;
        }
        .right-img-area {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
            cursor: zoom-in;
        }
        .split-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 永遠以 400×800 中心為基準 */
            transform-origin: center center;
            transition: transform 0.1s ease-out;
            user-select: none;
        }
        .divider-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: white;
            z-index: 5;
            transform: translateX(-50%);
        }
    </style>
</head>
<body class="min-h-screen p-3">
    <div class="max-w-md mx-auto">
        <div class="text-center mb-4">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-700 bg-clip-text text-transparent">
                彥彬 AI 比對系統
            </h1>
            <p class="text-gray-600 mt-1 text-sm">標準證件照裁切 + 三庭五眼校正 + AI點評</p>
        </div>

        <div class="flex gap-3 mb-5">
            <div class="upload-card flex-1 p-3 text-center h-[220px] flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 text-sm mb-2">左邊照片</h3>
                <input type="file" id="leftImg" accept="image/*" class="hidden">
                <button onclick="document.getElementById('leftImg').click()" class="upload-btn text-white px-3 py-2 rounded-lg text-xs font-medium mb-2">
                    選擇圖片
                </button>
                <img id="leftPreview" class="hidden max-h-[130px] w-auto rounded-lg shadow-sm">
            </div>

            <div class="upload-card flex-1 p-3 text-center h-[220px] flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 text-sm mb-2">右邊照片</h3>
                <input type="file" id="rightImg" accept="image/*" class="hidden">
                <button onclick="document.getElementById('rightImg').click()" class="upload-btn text-white px-3 py-2 rounded-lg text-xs font-medium mb-2">
                    選擇圖片
                </button>
                <img id="rightPreview" class="hidden max-h-[130px] w-auto rounded-lg shadow-sm">
            </div>
        </div>

        <div class="section-title">主要功能</div>
        <div class="flex flex-wrap gap-2 justify-center mb-4">
            <button onclick="mergeImages()" class="action-btn bg-gradient-to-r from-green-500 to-green-700 text-white px-5 py-2.5 font-semibold text-xs">
                🔗 標準證件照拼圖
            </button>
            <button onclick="clearAll()" class="action-btn bg-gradient-to-r from-red-500 to-red-700 text-white px-5 py-2.5 font-semibold text-xs">
                🗑 清除全部
            </button>
        </div>

        <div class="section-title">文字編輯</div>
        <div class="flex flex-wrap gap-2 justify-center mb-4">
            <button onclick="addTextRight('兩小時')" class="action-btn bg-gradient-to-r from-yellow-400 to-orange-500 text-white px-3 py-2 text-xs">
                ⏱ 加入兩小時
            </button>
            <button onclick="addTextRight(getTaiwanDate())" class="action-btn bg-gradient-to-r from-blue-400 to-blue-600 text-white px-3 py-2 text-xs">
                📅 加入今日日期
            </button>
            <button onclick="clearRightText()" class="action-btn bg-gradient-to-r from-gray-500 to-gray-700 text-white px-3 py-2 text-xs">
                🧹 清除右側文字
            </button>
        </div>

        <div class="section-title">AI 分析</div>
        <div class="flex flex-wrap gap-2 justify-center mb-5">
            <button onclick="analyzeBoth()" class="action-btn bg-gradient-to-r from-purple-500 to-purple-700 text-white px-5 py-2.5 font-semibold text-xs w-full">
                🤖 AI 點評
            </button>
        </div>

        <div class="result-card p-4 mb-5 text-center">
            <h2 class="text-lg font-bold text-gray-800 mb-2">✅ 證件照級對比結果</h2>
            
            <div id="splitZoomContainer" class="split-zoom-container mx-auto" style="display: none;">
                <div class="left-img-area" id="leftImgArea">
                    <img id="leftSplitImg" class="split-img">
                </div>
                <div class="right-img-area" id="rightImgArea">
                    <img id="rightSplitImg" class="split-img">
                </div>
                <div class="divider-line"></div>
            </div>
            <canvas id="mergeCanvas" class="hidden"></canvas>
            <canvas id="finalCanvas" class="hidden"></canvas>

            <div class="flex gap-2 justify-center mt-3">
                <button onclick="downloadMerge()" class="bg-gray-800 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-gray-900 transition">
                    💾 下載相簿
                </button>
                <button onclick="shareImage()" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-blue-700 transition">
                    📤 分享照片
                </button>
            </div>
        </div>

        <div class="result-card p-4 mb-8">
            <h2 class="text-lg font-bold text-purple-700 mb-2">🤖 AI 點評</h2>
            <div id="aiResult" class="text-gray-700 text-sm leading-relaxed whitespace-pre-line">
                尚未分析...
            </div>
        </div>
    </div>

    <script>
        let leftFile, rightFile;
        const leftPreview = document.getElementById('leftPreview');
        const rightPreview = document.getElementById('rightPreview');
        const mergeCanvas = document.getElementById('mergeCanvas');
        const finalCanvas = document.getElementById('finalCanvas');
        const splitZoomContainer = document.getElementById('splitZoomContainer');
        const leftSplitImg = document.getElementById('leftSplitImg');
        const rightSplitImg = document.getElementById('rightSplitImg');
        const leftImgArea = document.getElementById('leftImgArea');
        const rightImgArea = document.getElementById('rightImgArea');
        const ctx = mergeCanvas.getContext('2d');
        const finalCtx = finalCanvas.getContext('2d');
        
        // 核心尺寸：400×800（左右各一個），整體800×800
        const FULL_SIZE = 800;
        const HALF_SIZE = 400;
        const BORDER_WIDTH = 2;

        // 縮放狀態：以 400×800 中心為基準
        const zoomState = {
            left:  { 
                scale: 1,        // 縮放比例（0.5~1.0）
                offsetX: 0,      // X偏移
                offsetY: 0,      // Y偏移
                isDragging: false,
                startX: 0,
                startY: 0,
                lastScale: 1      // 上一次縮放比例
            },
            right: { 
                scale: 1,
                offsetX: 0,
                offsetY: 0,
                isDragging: false,
                startX: 0,
                startY: 0,
                lastScale: 1
            }
        };

        // 獲取台灣日期
        function getTaiwanDate() {
            const now = new Date();
            const year = now.getFullYear() - 1911;
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}/${month}/${day}`;
        }

        // 加載左圖
        document.getElementById('leftImg').addEventListener('change', loadLeftImage);
        function loadLeftImage() {
            const file = document.getElementById('leftImg').files[0];
            if (!file) return;
            leftFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                leftPreview.src = e.target.result;
                leftPreview.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        // 加載右圖
        document.getElementById('rightImg').addEventListener('change', loadRightImage);
        function loadRightImage() {
            const file = document.getElementById('rightImg').files[0];
            if (!file) return;
            rightFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                rightPreview.src = e.target.result;
                rightPreview.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        // 合併圖片（生成400×800標準框）
        function mergeImages() {
            if (!leftPreview.src || !rightPreview.src) {
                alert('請先上傳兩張照片');
                return;
            }

            const imgL = new Image();
            const imgR = new Image();
            imgL.crossOrigin = 'anonymous';
            imgR.crossOrigin = 'anonymous';

            imgL.onload = function() {
                imgR.onload = function() {
                    const TOP_CROP = 0.02;
                    const BOTTOM_CROP = 0.88;

                    // 左圖：400×800 標準框
                    const leftCanvas = document.createElement('canvas');
                    const leftCtx = leftCanvas.getContext('2d');
                    leftCanvas.width = HALF_SIZE;
                    leftCanvas.height = FULL_SIZE;
                    leftCtx.clearRect(0, 0, HALF_SIZE, FULL_SIZE);
                    leftCtx.fillStyle = "#ffffff";
                    leftCtx.fillRect(0, 0, HALF_SIZE, FULL_SIZE);
                    
                    const cropH_L = imgL.height * (BOTTOM_CROP - TOP_CROP);
                    leftCtx.drawImage(
                        imgL,
                        0, imgL.height * TOP_CROP, imgL.width, cropH_L,
                        BORDER_WIDTH, BORDER_WIDTH,
                        HALF_SIZE - BORDER_WIDTH * 2,
                        FULL_SIZE - BORDER_WIDTH * 2
                    );
                    // 左圖加日期文字
                    leftCtx.font = 'bold 40px Arial';
                    leftCtx.fillStyle = 'white';
                    leftCtx.strokeStyle = 'black';
                    leftCtx.lineWidth = 8;
                    leftCtx.textAlign = 'center';
                    leftCtx.strokeText(getTaiwanDate(), HALF_SIZE/2, FULL_SIZE - 65);
                    leftCtx.fillText(getTaiwanDate(), HALF_SIZE/2, FULL_SIZE - 65);

                    // 右圖：400×800 標準框
                    const rightCanvas = document.createElement('canvas');
                    const rightCtx = rightCanvas.getContext('2d');
                    rightCanvas.width = HALF_SIZE;
                    rightCanvas.height = FULL_SIZE;
                    rightCtx.clearRect(0, 0, HALF_SIZE, FULL_SIZE);
                    rightCtx.fillStyle = "#ffffff";
                    rightCtx.fillRect(0, 0, HALF_SIZE, FULL_SIZE);
                    
                    const cropH_R = imgR.height * (BOTTOM_CROP - TOP_CROP);
                    rightCtx.drawImage(
                        imgR,
                        0, imgR.height * TOP_CROP, imgR.width, cropH_R,
                        BORDER_WIDTH, BORDER_WIDTH,
                        HALF_SIZE - BORDER_WIDTH * 2,
                        FULL_SIZE - BORDER_WIDTH * 2
                    );

                    // 設置分割圖片
                    leftSplitImg.src = leftCanvas.toDataURL('image/png');
                    rightSplitImg.src = rightCanvas.toDataURL('image/png');
                    splitZoomContainer.style.display = 'block';
                    
                    // 重置縮放狀態（回到400×800中心）
                    resetZoomState();
                    // 初始化交互控制
                    initInteractiveControls();
                    
                    // 生成合併畫布
                    mergeCanvas.width = FULL_SIZE;
                    mergeCanvas.height = FULL_SIZE;
                    ctx.clearRect(0, 0, FULL_SIZE, FULL_SIZE);
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, FULL_SIZE, FULL_SIZE);
                    ctx.drawImage(leftCanvas, 0, 0);
                    ctx.drawImage(rightCanvas, HALF_SIZE, 0);
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(HALF_SIZE - 1, 0, 2, FULL_SIZE);
                }
                imgR.src = rightPreview.src;
            }
            imgL.src = leftPreview.src;
        }

        // 右圖添加文字
        function addTextRight(text) {
            if (!splitZoomContainer.style.display) {
                alert('請先產生拼圖');
                return;
            }
            
            const imgR = new Image();
            imgR.crossOrigin = 'anonymous';
            imgR.onload = function() {
                const TOP_CROP = 0.02;
                const BOTTOM_CROP = 0.88;
                
                const rightCanvas = document.createElement('canvas');
                const rightCtx = rightCanvas.getContext('2d');
                rightCanvas.width = HALF_SIZE;
                rightCanvas.height = FULL_SIZE;
                rightCtx.clearRect(0, 0, HALF_SIZE, FULL_SIZE);
                rightCtx.fillStyle = "#ffffff";
                rightCtx.fillRect(0, 0, HALF_SIZE, FULL_SIZE);
                
                const cropH_R = imgR.height * (BOTTOM_CROP - TOP_CROP);
                rightCtx.drawImage(
                    imgR,
                    0, imgR.height * TOP_CROP, imgR.width, cropH_R,
                    BORDER_WIDTH, BORDER_WIDTH,
                    HALF_SIZE - BORDER_WIDTH * 2,
                    FULL_SIZE - BORDER_WIDTH * 2
                );
                
                // 添加文字
                rightCtx.font = 'bold 40px Arial';
                rightCtx.fillStyle = 'white';
                rightCtx.strokeStyle = 'black';
                rightCtx.lineWidth = 8;
                rightCtx.textAlign = 'center';
                rightCtx.strokeText(text, HALF_SIZE/2, FULL_SIZE - 65);
                rightCtx.fillText(text, HALF_SIZE/2, FULL_SIZE - 65);
                
                rightSplitImg.src = rightCanvas.toDataURL('image/png');
                
                // 更新合併畫布
                mergeCanvas.width = FULL_SIZE;
                mergeCanvas.height = FULL_SIZE;
                ctx.clearRect(0, 0, FULL_SIZE, FULL_SIZE);
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, FULL_SIZE, FULL_SIZE);
                const leftImg = new Image();
                leftImg.onload = function() {
                    ctx.drawImage(leftImg, 0, 0);
                    ctx.drawImage(rightCanvas, HALF_SIZE, 0);
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(HALF_SIZE - 1, 0, 2, FULL_SIZE);
                }
                leftImg.src = leftSplitImg.src;
            }
            imgR.src = rightPreview.src;
        }

        // 清除右側文字（還原400×800原始框）
        function clearRightText() {
            if (!leftPreview.src || !rightPreview.src) return;
            mergeImages();
        }

        // 重置縮放狀態（回到400×800中心）
        function resetZoomState() {
            zoomState.left = {
                scale: 1,
                offsetX: 0,
                offsetY: 0,
                isDragging: false,
                startX: 0,
                startY: 0,
                lastScale: 1
            };
            zoomState.right = {
                scale: 1,
                offsetX: 0,
                offsetY: 0,
                isDragging: false,
                startX: 0,
                startY: 0,
                lastScale: 1
            };
            updateImageTransform('left');
            updateImageTransform('right');
        }

        // 限制偏移在400×800框內（中心基準）
        function clampOffset(area) {
            const state = zoomState[area];
            const maxOffsetX = (HALF_SIZE * (state.scale - 1)) / 2;
            const maxOffsetY = (FULL_SIZE * (state.scale - 1)) / 2;
            
            state.offsetX = Math.max(-maxOffsetX, Math.min(maxOffsetX, state.offsetX));
            state.offsetY = Math.max(-maxOffsetY, Math.min(maxOffsetY, state.offsetY));
        }

        // 更新圖片變換（以400×800中心為基準）
        function updateImageTransform(area) {
            const state = zoomState[area];
            const img = area === 'left' ? leftSplitImg : rightSplitImg;
            
            // 永遠以400×800中心點縮放/移動
            img.style.transform = `translate(${state.offsetX}px, ${state.offsetY}px) scale(${state.scale})`;
        }

        // 初始化交互控制（滑鼠+觸控，中心基準）
        function initInteractiveControls() {
            // 滑鼠拖動
            function handleMouseDown(e, area) {
                e.preventDefault();
                const state = zoomState[area];
                state.isDragging = true;
                state.startX = e.clientX - state.offsetX;
                state.startY = e.clientY - state.offsetY;
                (area === 'left' ? leftImgArea : rightImgArea).style.cursor = 'grabbing';
            }

            function handleMouseMove(e) {
                // 左圖拖動
                if (zoomState.left.isDragging) {
                    zoomState.left.offsetX = e.clientX - zoomState.left.startX;
                    zoomState.left.offsetY = e.clientY - zoomState.left.startY;
                    clampOffset('left');
                    updateImageTransform('left');
                }
                // 右圖拖動
                if (zoomState.right.isDragging) {
                    zoomState.right.offsetX = e.clientX - zoomState.right.startX;
                    zoomState.right.offsetY = e.clientY - zoomState.right.startY;
                    clampOffset('right');
                    updateImageTransform('right');
                }
            }

            function handleMouseUp() {
                zoomState.left.isDragging = false;
                zoomState.right.isDragging = false;
                leftImgArea.style.cursor = 'zoom-in';
                rightImgArea.style.cursor = 'zoom-in';
            }

            // 滾輪縮放（中心基準）
            function handleWheel(e, area) {
                e.preventDefault();
                const state = zoomState[area];
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                const newScale = Math.min(1.0, Math.max(0.5, state.scale + delta));
                
                // 以滑鼠位置為參考，保持縮放中心
                const rect = area === 'left' ? leftImgArea.getBoundingClientRect() : rightImgArea.getBoundingClientRect();
                const mouseX = e.clientX - rect.left - HALF_SIZE/2;
                const mouseY = e.clientY - rect.top - FULL_SIZE/2;
                
                // 計算偏移補償，保證縮放圍繞400×800中心
                state.offsetX += mouseX * (newScale - state.scale);
                state.offsetY += mouseY * (newScale - state.scale);
                
                state.scale = newScale;
                clampOffset(area);
                updateImageTransform(area);
            }

            // 觸控縮放（雙指，中心基準）
            let touchDistance = 0;
            function handleTouchStart(e) {
                e.preventDefault();
                if (e.touches.length === 2) {
                    // 計算初始距離
                    const t1 = e.touches[0];
                    const t2 = e.touches[1];
                    touchDistance = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                    
                    // 判斷左右區域
                    const midX = (t1.clientX + t2.clientX) / 2;
                    const area = midX < window.innerWidth/2 ? 'left' : 'right';
                    zoomState[area].lastScale = zoomState[area].scale;
                } else if (e.touches.length === 1) {
                    // 單指拖動
                    const touch = e.touches[0];
                    const area = touch.clientX < window.innerWidth/2 ? 'left' : 'right';
                    const state = zoomState[area];
                    state.isDragging = true;
                    state.startX = touch.clientX - state.offsetX;
                    state.startY = touch.clientY - state.offsetY;
                }
            }

            function handleTouchMove(e) {
                e.preventDefault();
                if (e.touches.length === 2) {
                    // 雙指縮放
                    const t1 = e.touches[0];
                    const t2 = e.touches[1];
                    const newDistance = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                    
                    // 判斷左右區域
                    const midX = (t1.clientX + t2.clientX) / 2;
                    const area = midX < window.innerWidth/2 ? 'left' : 'right';
                    const state = zoomState[area];
                    
                    // 計算新比例（0.5~1.0）
                    const scaleRatio = newDistance / touchDistance;
                    const newScale = Math.min(1.0, Math.max(0.5, state.lastScale * scaleRatio));
                    
                    // 以雙指中心為參考，保持縮放中心
                    const rect = area === 'left' ? leftImgArea.getBoundingClientRect() : rightImgArea.getBoundingClientRect();
                    const midTouchX = (t1.clientX + t2.clientX) / 2 - rect.left - HALF_SIZE/2;
                    const midTouchY = (t1.clientY + t2.clientY) / 2 - rect.top - FULL_SIZE/2;
                    
                    // 補償偏移，保證圍繞400×800中心
                    state.offsetX += midTouchX * (newScale - state.scale);
                    state.offsetY += midTouchY * (newScale - state.scale);
                    
                    state.scale = newScale;
                    clampOffset(area);
                    updateImageTransform(area);
                } else if (e.touches.length === 1) {
                    // 單指拖動
                    const touch = e.touches[0];
                    const area = touch.clientX < window.innerWidth/2 ? 'left' : 'right';
                    const state = zoomState[area];
                    if (state.isDragging) {
                        state.offsetX = touch.clientX - state.startX;
                        state.offsetY = touch.clientY - state.startY;
                        clampOffset(area);
                        updateImageTransform(area);
                    }
                }
            }

            function handleTouchEnd() {
                touchDistance = 0;
                zoomState.left.isDragging = false;
                zoomState.right.isDragging = false;
            }

            // 綁定事件
            // 滑鼠事件
            leftImgArea.addEventListener('mousedown', (e) => handleMouseDown(e, 'left'));
            rightImgArea.addEventListener('mousedown', (e) => handleMouseDown(e, 'right'));
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', handleMouseUp);
            document.addEventListener('mouseleave', handleMouseUp);

            // 滾輪事件
            leftImgArea.addEventListener('wheel', (e) => handleWheel(e, 'left'));
            rightImgArea.addEventListener('wheel', (e) => handleWheel(e, 'right'));

            // 觸控事件
            splitZoomContainer.addEventListener('touchstart', handleTouchStart);
            splitZoomContainer.addEventListener('touchmove', handleTouchMove);
            splitZoomContainer.addEventListener('touchend', handleTouchEnd);
            splitZoomContainer.addEventListener('touchcancel', handleTouchEnd);
        }

        // 生成最終圖片（800×800，保留當前縮放/移動）
        function generateFinalImage() {
            return new Promise((resolve) => {
                finalCanvas.width = FULL_SIZE;
                finalCanvas.height = FULL_SIZE;
                finalCtx.fillStyle = "#fff";
                finalCtx.fillRect(0, 0, FULL_SIZE, FULL_SIZE);

                // 繪製左圖（400×800，中心基準）
                const leftImg = new Image();
                leftImg.crossOrigin = "anonymous";
                leftImg.onload = () => {
                    finalCtx.save();
                    // 定位到左圖400×800中心
                    finalCtx.translate(HALF_SIZE/2, FULL_SIZE/2);
                    // 應用縮放和偏移（中心基準）
                    finalCtx.scale(zoomState.left.scale, zoomState.left.scale);
                    finalCtx.translate(zoomState.left.offsetX/zoomState.left.scale, zoomState.left.offsetY/zoomState.left.scale);
                    // 繪製圖片
                    finalCtx.drawImage(leftImg, -HALF_SIZE/2, -FULL_SIZE/2, HALF_SIZE, FULL_SIZE);
                    finalCtx.restore();

                    // 繪製右圖（400×800，中心基準）
                    const rightImg = new Image();
                    rightImg.crossOrigin = "anonymous";
                    rightImg.onload = () => {
                        finalCtx.save();
                        // 定位到右圖400×800中心
                        finalCtx.translate(FULL_SIZE - HALF_SIZE/2, FULL_SIZE/2);
                        // 應用縮放和偏移（中心基準）
                        finalCtx.scale(zoomState.right.scale, zoomState.right.scale);
                        finalCtx.translate(zoomState.right.offsetX/zoomState.right.scale, zoomState.right.offsetY/zoomState.right.scale);
                        // 繪製圖片
                        finalCtx.drawImage(rightImg, -HALF_SIZE/2, -FULL_SIZE/2, HALF_SIZE, FULL_SIZE);
                        finalCtx.restore();

                        // 中間分隔線
                        finalCtx.fillStyle = "#fff";
                        finalCtx.fillRect(HALF_SIZE - 1, 0, 2, FULL_SIZE);
                        
                        setTimeout(() => {
                            resolve(finalCanvas.toDataURL("image/png", 1));
                        }, 100);
                    };
                    rightImg.src = rightSplitImg.src;
                };
                leftImg.src = leftSplitImg.src;
            });
        }

        // 下載合併圖片
        async function downloadMerge() {
            if (!splitZoomContainer.style.display) return alert('請先產生拼圖');
            const url = await generateFinalImage();
            const a = document.createElement('a');
            a.href = url;
            a.download = "彥彬_證件照_800x800.png";
            a.click();
            alert('✅ 下載成功！800×800 標準尺寸');
        }

        // 分享圖片
        async function shareImage() {
            if (!splitZoomContainer.style.display) return alert('請先產生拼圖');
            const url = await generateFinalImage();
            const blob = await fetch(url).then(r => r.blob());
            const file = new File([blob], "彥彬_證件照_800x800.png", { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({ files: [file], title: '彥彬證件照' });
            } else {
                alert('❌ 裝置不支援分享功能');
            }
        }

        // 清除全部
        function clearAll() {
            localStorage.clear();
            location.reload();
        }

        // AI分析
        async function analyzeBoth() {

            const resBox = document.getElementById('aiResult');

            try {

                    method: "POST",
                    headers: {

                    },
                    body: JSON.stringify({
                        model: "meta-llama/Llama-3.2-11B-Vision-Instruct-Turbo",
                        messages: [{
                            role: "user",
                            content: [
                                { type: "text", text: "你是專業攝影師、形象導師。請針對左右兩張照片進行對比點評，包含：1.姿態 2.表情 3.光影 4.構圖 5.整體建議。使用口語化、專業、有建設性的繁體中文。" },
                                { type: "image_url", image_url: { url: leftPreview.src } },

        }
    </script>
