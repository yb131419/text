<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彥彬 AI 比對系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        }
        .upload-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.07);
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .upload-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .upload-btn {
            background: linear-gradient(90deg, #3b82f6, #1d4ed8);
            transition: all 0.3s;
        }
        .upload-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        .action-btn {
            border-radius: 14px;
            transition: all 0.3s;
        }
        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.12);
        }
        .result-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.07);
        }
        img {
            object-fit: contain;
            object-position: center;
        }
        .section-title {
            font-size: 12px;
            color: #4b5563;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #d1d5db;
        }

        /* 恢复代码一的容器样式，保证原始比例 */
        .split-zoom-container {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            width: 100%;
            height: 450px; /* 恢复代码一的高度 */
            touch-action: none;
        }
        /* 左側圖片區域 - 恢复代码一样式 */
        .left-img-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
            cursor: zoom-in;
        }
        /* 右側圖片區域 - 恢复代码一样式 */
        .right-img-area {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
            cursor: zoom-in;
        }
        /* 左右圖片元素 - 恢复代码一的定位方式 */
        .split-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.2s ease-out;
            transform-origin: center center;
            user-select: none;
        }
        /* 中間分隔線 - 恢复代码一样式 */
        .divider-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: white;
            z-index: 5;
            transform: translateX(-50%);
        }
    </style>
</head>
<body class="min-h-screen p-3">
    <div class="max-w-md mx-auto"> <!-- 保持max-w-md宽度 -->
        <div class="text-center mb-4">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-700 bg-clip-text text-transparent">
                彥彬 AI 比對系統
            </h1>
            <p class="text-gray-600 mt-1 text-sm">標準證件照裁切 + 三庭五眼校正 + AI點評</p>
        </div>

        <div class="flex gap-3 mb-5">
            <div class="upload-card flex-1 p-3 text-center h-[220px] flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 text-sm mb-2">左邊照片</h3>
                <input type="file" id="leftImg" accept="image/*" class="hidden">
                <button onclick="document.getElementById('leftImg').click()" class="upload-btn text-white px-3 py-2 rounded-lg text-xs font-medium mb-2">
                    選擇圖片
                </button>
                <img id="leftPreview" class="hidden max-h-[130px] w-auto rounded-lg shadow-sm">
            </div>

            <div class="upload-card flex-1 p-3 text-center h-[220px] flex flex-col items-center justify-center relative">
                <h3 class="font-semibold text-gray-700 text-sm mb-2">右邊照片</h3>
                <input type="file" id="rightImg" accept="image/*" class="hidden">
                <button onclick="document.getElementById('rightImg').click()" class="upload-btn text-white px-3 py-2 rounded-lg text-xs font-medium mb-2">
                    選擇圖片
                </button>
                <img id="rightPreview" class="hidden max-h-[130px] w-auto rounded-lg shadow-sm">
            </div>
        </div>

        <div class="section-title">主要功能</div>
        <div class="flex flex-wrap gap-2 justify-center mb-4">
            <button onclick="mergeImages()" class="action-btn bg-gradient-to-r from-green-500 to-green-700 text-white px-5 py-2.5 font-semibold text-xs">
                🔗 標準證件照拼圖
            </button>
            <button onclick="clearAll()" class="action-btn bg-gradient-to-r from-red-500 to-red-700 text-white px-5 py-2.5 font-semibold text-xs">
                🗑 清除全部
            </button>
            <button onclick="resetZoomState()" class="action-btn bg-gradient-to-r from-gray-500 to-gray-700 text-white px-5 py-2.5 font-semibold text-xs">
                🔄 還原預設
            </button>
        </div>

        <div class="section-title">文字編輯</div>
        <div class="flex flex-wrap gap-2 justify-center mb-4">
            <button onclick="addTextRight('兩小時')" class="action-btn bg-gradient-to-r from-yellow-400 to-orange-500 text-white px-3 py-2 text-xs">
                ⏱ 加入兩小時
            </button>
            <button onclick="addTextRight(getTaiwanDate())" class="action-btn bg-gradient-to-r from-blue-400 to-blue-600 text-white px-3 py-2 text-xs">
                📅 加入今日日期
            </button>
            <button onclick="clearRightText()" class="action-btn bg-gradient-to-r from-gray-500 to-gray-700 text-white px-3 py-2 text-xs">
                🧹 清除右側文字
            </button>
        </div>

        <div class="section-title">AI 分析</div>
        <div class="flex flex-wrap gap-2 justify-center mb-5">
            <button onclick="analyzeBoth()" class="action-btn bg-gradient-to-r from-purple-500 to-purple-700 text-white px-5 py-2.5 font-semibold text-xs w-full">
                🤖 AI 點評
            </button>
        </div>

        <div class="result-card p-4 mb-5 text-center">
            <h2 class="text-lg font-bold text-gray-800 mb-2">✅ 證件照級對比結果</h2>
            
            <div id="splitZoomContainer" class="split-zoom-container mx-auto" style="display: none;">
                <div class="left-img-area" id="leftImgArea">
                    <img id="leftSplitImg" class="split-img">
                </div>
                <div class="right-img-area" id="rightImgArea">
                    <img id="rightSplitImg" class="split-img">
                </div>
                <div class="divider-line"></div>
            </div>
            <canvas id="mergeCanvas" class="hidden"></canvas>
            <canvas id="finalCanvas" class="hidden"></canvas>

            <div class="flex gap-2 justify-center mt-3">
                <button onclick="downloadMerge()" class="bg-gray-800 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-gray-900 transition">
                    💾 下載相簿
                </button>
                <button onclick="shareImage()" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-blue-700 transition">
                    📤 分享照片
                </button>
            </div>
        </div>

        <div class="result-card p-4 mb-8">
            <h2 class="text-lg font-bold text-purple-700 mb-2">🤖 AI 點評</h2>
            <div id="aiResult" class="text-gray-700 text-sm leading-relaxed whitespace-pre-line">
                尚未分析...
            </div>
        </div>
    </div>

    <script>
        let leftFile, rightFile;
        const leftPreview = document.getElementById('leftPreview');
        const rightPreview = document.getElementById('rightPreview');
        const mergeCanvas = document.getElementById('mergeCanvas');
        const finalCanvas = document.getElementById('finalCanvas');
        const splitZoomContainer = document.getElementById('splitZoomContainer');
        const leftSplitImg = document.getElementById('leftSplitImg');
        const rightSplitImg = document.getElementById('rightSplitImg');
        const leftImgArea = document.getElementById('leftImgArea');
        const rightImgArea = document.getElementById('rightImgArea');
        const ctx = mergeCanvas.getContext('2d');
        const finalCtx = finalCanvas.getContext('2d');
        
        // 恢复代码一的尺寸定义
        const FULL_SIZE = 800;
        const HALF_SIZE = FULL_SIZE / 2;
        const BORDER_WIDTH = 2; // 細白線寬度

        // 恢复代码一的缩放状态定义
        const zoomState = {
            left: { scale: 1, offsetX: 0, offsetY: 0, isDragging: false, startX: 0, startY: 0 },
            right: { scale: 1, offsetX: 0, offsetY: 0, isDragging: false, startX: 0, startY: 0 },
            currentArea: null
        };

        // 獲取台灣日期
        function getTaiwanDate() {
            const now = new Date();
            const year = now.getFullYear() - 1911;
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}/${month}/${day}`;
        }

        // 加載左圖
        document.getElementById('leftImg').addEventListener('change', loadLeftImage);
        function loadLeftImage() {
            const file = document.getElementById('leftImg').files[0];
            if (!file) return;
            leftFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                leftPreview.src = e.target.result;
                leftPreview.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        // 加載右圖
        document.getElementById('rightImg').addEventListener('change', loadRightImage);
        function loadRightImage() {
            const file = document.getElementById('rightImg').files[0];
            if (!file) return;
            rightFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                rightPreview.src = e.target.result;
                rightPreview.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        // 恢复代码一的mergeImages逻辑，保证原始比例显示
        function mergeImages() {
            if (!leftPreview.src || !rightPreview.src) {
                alert('請先上傳兩張照片');
                return;
            }

            const imgL = new Image();
            const imgR = new Image();
            imgL.crossOrigin = 'anonymous';
            imgR.crossOrigin = 'anonymous';

            imgL.onload = function() {
                imgR.onload = function() {
                    const TOP_CROP = 0.02;
                    const BOTTOM_CROP = 0.88;

                    // 生成左側圖片（恢复代码一逻辑）
                    const leftCanvas = document.createElement('canvas');
                    const leftCtx = leftCanvas.getContext('2d');
                    leftCanvas.width = HALF_SIZE;
                    leftCanvas.height = FULL_SIZE;
                    leftCtx.clearRect(0, 0, HALF_SIZE, FULL_SIZE);
                    
                    // 左圖白色外框
                    leftCtx.fillStyle = "#ffffff";
                    leftCtx.fillRect(0, 0, HALF_SIZE, FULL_SIZE);
                    
                    const cropH_L = imgL.height * (BOTTOM_CROP - TOP_CROP);
                    leftCtx.drawImage(
                        imgL,
                        0, imgL.height * TOP_CROP, imgL.width, cropH_L,
                        BORDER_WIDTH, BORDER_WIDTH,
                        HALF_SIZE - BORDER_WIDTH * 2,
                        FULL_SIZE - BORDER_WIDTH * 2
                    );
                    // 左圖日期
                    leftCtx.font = 'bold 40px Arial';
                    leftCtx.fillStyle = 'white';
                    leftCtx.strokeStyle = 'black';
                    leftCtx.lineWidth = 8;
                    leftCtx.textAlign = 'center';
                    leftCtx.strokeText(getTaiwanDate(), HALF_SIZE/2, FULL_SIZE - 65);
                    leftCtx.fillText(getTaiwanDate(), HALF_SIZE/2, FULL_SIZE - 65);

                    // 生成右側圖片（恢复代码一逻辑）
                    const rightCanvas = document.createElement('canvas');
                    const rightCtx = rightCanvas.getContext('2d');
                    rightCanvas.width = HALF_SIZE;
                    rightCanvas.height = FULL_SIZE;
                    rightCtx.clearRect(0, 0, HALF_SIZE, FULL_SIZE);
                    
                    // 右圖白色外框
                    rightCtx.fillStyle = "#ffffff";
                    rightCtx.fillRect(0, 0, HALF_SIZE, FULL_SIZE);
                    
                    const cropH_R = imgR.height * (BOTTOM_CROP - TOP_CROP);
                    rightCtx.drawImage(
                        imgR,
                        0, imgR.height * TOP_CROP, imgR.width, cropH_R,
                        BORDER_WIDTH, BORDER_WIDTH,
                        HALF_SIZE - BORDER_WIDTH * 2,
                        FULL_SIZE - BORDER_WIDTH * 2
                    );

                    // 顯示左右分區圖片（恢复代码一逻辑）
                    leftSplitImg.src = leftCanvas.toDataURL('image/png');
                    rightSplitImg.src = rightCanvas.toDataURL('image/png');
                    splitZoomContainer.style.display = 'block';
                    
                    // 初始化左右分區縮放控制
                    initSplitZoomControls();
                    
                    // 同時生成完整拼圖用於初始下載
                    mergeCanvas.width = FULL_SIZE;
                    mergeCanvas.height = FULL_SIZE;
                    ctx.clearRect(0, 0, FULL_SIZE, FULL_SIZE);
                    // 完整拼圖白色外框
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, FULL_SIZE, FULL_SIZE);
                    // 繪製左圖
                    ctx.drawImage(leftCanvas, 0, 0);
                    // 繪製右圖
                    ctx.drawImage(rightCanvas, HALF_SIZE, 0);
                    // 中間分隔線
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(HALF_SIZE - 1, 0, 2, FULL_SIZE);
                    
                    // 保存分享用的画布数据
                    window.shareLeftCanvas = leftCanvas;
                    window.shareRightCanvas = rightCanvas;
                }
                imgR.src = rightPreview.src;
            }
            imgL.src = leftPreview.src;
        }

        // 右圖添加文字（保留代码二的优化，修复分享画布更新）
        function addTextRight(text) {
            if (!splitZoomContainer.style.display) {
                alert('請先產生拼圖');
                return;
            }
            
            const imgR = new Image();
            imgR.crossOrigin = 'anonymous';
            imgR.onload = function() {
                const TOP_CROP = 0.02;
                const BOTTOM_CROP = 0.88;
                
                // 生成右側圖片
                const rightCanvas = document.createElement('canvas');
                const rightCtx = rightCanvas.getContext('2d');
                rightCanvas.width = HALF_SIZE;
                rightCanvas.height = FULL_SIZE;
                rightCtx.clearRect(0, 0, HALF_SIZE, FULL_SIZE);
                
                // 右圖白色外框
                rightCtx.fillStyle = "#ffffff";
                rightCtx.fillRect(0, 0, HALF_SIZE, FULL_SIZE);
                
                const cropH_R = imgR.height * (BOTTOM_CROP - TOP_CROP);
                rightCtx.drawImage(
                    imgR,
                    0, imgR.height * TOP_CROP, imgR.width, cropH_R,
                    BORDER_WIDTH, BORDER_WIDTH,
                    HALF_SIZE - BORDER_WIDTH * 2,
                    FULL_SIZE - BORDER_WIDTH * 2
                );
                
                // 添加文字
                rightCtx.font = 'bold 40px Arial';
                rightCtx.fillStyle = 'white';
                rightCtx.strokeStyle = 'black';
                rightCtx.lineWidth = 8;
                rightCtx.textAlign = 'center';
                rightCtx.strokeText(text, HALF_SIZE/2, FULL_SIZE - 65);
                rightCtx.fillText(text, HALF_SIZE/2, FULL_SIZE - 65);
                
                // 更新右側圖片
                rightSplitImg.src = rightCanvas.toDataURL('image/png');
                
                // 更新分享用画布
                window.shareRightCanvas = rightCanvas;
                
                // 更新完整拼圖
                mergeCanvas.width = FULL_SIZE;
                mergeCanvas.height = FULL_SIZE;
                ctx.clearRect(0, 0, FULL_SIZE, FULL_SIZE);
                // 完整拼圖白色外框
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, FULL_SIZE, FULL_SIZE);
                // 重新繪製左圖
                const leftImg = new Image();
                leftImg.onload = function() {
                    ctx.drawImage(leftImg, 0, 0);
                    // 繪製更新後的右圖
                    ctx.drawImage(rightCanvas, HALF_SIZE, 0);
                    // 中間分隔線
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(HALF_SIZE - 1, 0, 2, FULL_SIZE);
                }
                leftImg.src = leftSplitImg.src;
            }
            imgR.src = rightPreview.src;
        }

        // 清除右側文字
        function clearRightText() {
            if (!leftPreview.src || !rightPreview.src) return;
            mergeImages();
        }

        // 重置縮放狀態（新增功能）
        function resetZoomState() {
            // 重置縮放狀態
            zoomState.left = { scale: 1, offsetX: 0, offsetY: 0, isDragging: false, startX: 0, startY: 0 };
            zoomState.right = { scale: 1, offsetX: 0, offsetY: 0, isDragging: false, startX: 0, startY: 0 };
            zoomState.currentArea = null;
            
            updateLeftTransform();
            updateRightTransform();
        }

        // 恢复代码一的核心缩放控制逻辑
        function initSplitZoomControls() {
            // 重置縮放狀態
            zoomState.left = { scale: 1, offsetX: 0, offsetY: 0, isDragging: false, startX: 0, startY: 0 };
            zoomState.right = { scale: 1, offsetX: 0, offsetY: 0, isDragging: false, startX: 0, startY: 0 };
            zoomState.currentArea = null;
            
            updateLeftTransform();
            updateRightTransform();

            // ========== 左側區域控制 ==========
            // 滑鼠滾輪縮放（左區）
            leftImgArea.addEventListener('wheel', (e) => {
                e.preventDefault();
                zoomState.currentArea = 'left';
                handleZoom(e, 'left');
            });

            // 左區滑鼠拖動開始
            leftImgArea.addEventListener('mousedown', (e) => {
                e.preventDefault();
                zoomState.currentArea = 'left';
                zoomState.left.isDragging = true;
                const rect = leftImgArea.getBoundingClientRect();
                zoomState.left.startX = e.clientX - zoomState.left.offsetX;
                zoomState.left.startY = e.clientY - zoomState.left.offsetY;
                leftImgArea.style.cursor = 'grabbing';
            });

            // ========== 右側區域控制 ==========
            // 滑鼠滾輪縮放（右區）
            rightImgArea.addEventListener('wheel', (e) => {
                e.preventDefault();
                zoomState.currentArea = 'right';
                handleZoom(e, 'right');
            });

            // 右區滑鼠拖動開始
            rightImgArea.addEventListener('mousedown', (e) => {
                e.preventDefault();
                zoomState.currentArea = 'right';
                zoomState.right.isDragging = true;
                const rect = rightImgArea.getBoundingClientRect();
                zoomState.right.startX = e.clientX - zoomState.right.offsetX;
                zoomState.right.startY = e.clientY - zoomState.right.offsetY;
                rightImgArea.style.cursor = 'grabbing';
            });

            // ========== 全域拖動處理 ==========
            document.addEventListener('mousemove', (e) => {
                // 左區拖動
                if (zoomState.left.isDragging) {
                    zoomState.left.offsetX = e.clientX - zoomState.left.startX;
                    zoomState.left.offsetY = e.clientY - zoomState.left.startY;
                    updateLeftTransform();
                }
                // 右區拖動
                if (zoomState.right.isDragging) {
                    zoomState.right.offsetX = e.clientX - zoomState.right.startX;
                    zoomState.right.offsetY = e.clientY - zoomState.right.startY;
                    updateRightTransform();
                }
            });

            // 拖動結束
            document.addEventListener('mouseup', () => {
                if (zoomState.left.isDragging) {
                    zoomState.left.isDragging = false;
                    leftImgArea.style.cursor = 'zoom-in';
                }
                if (zoomState.right.isDragging) {
                    zoomState.right.isDragging = false;
                    rightImgArea.style.cursor = 'zoom-in';
                }
                zoomState.currentArea = null;
            });

            // ========== 手機觸控支援 ==========
            // 左區觸控
            leftImgArea.addEventListener('touchstart', handleTouchStart);
            leftImgArea.addEventListener('touchmove', handleTouchMove);
            // 右區觸控
            rightImgArea.addEventListener('touchstart', handleTouchStart);
            rightImgArea.addEventListener('touchmove', handleTouchMove);
            // 觸控結束
            splitZoomContainer.addEventListener('touchend', () => {
                zoomState.left.isDragging = false;
                zoomState.right.isDragging = false;
                zoomState.currentArea = null;
            });
        }

        // 恢复代码一的滾輪縮放處理
        function handleZoom(e, area) {
            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            const newScale = Math.min(4, Math.max(0.8, zoomState[area].scale + delta));
            
            // 基於滑鼠位置縮放
            const rect = area === 'left' ? leftImgArea.getBoundingClientRect() : rightImgArea.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            // 調整偏移量，讓縮放圍繞滑鼠位置
            zoomState[area].offsetX = mouseX - (mouseX - zoomState[area].offsetX) * (newScale / zoomState[area].scale);
            zoomState[area].offsetY = mouseY - (mouseY - zoomState[area].offsetY) * (newScale / zoomState[area].scale);
            
            zoomState[area].scale = newScale;
            
            // 更新對應區域的變換
            if (area === 'left') {
                updateLeftTransform();
            } else {
                updateRightTransform();
            }
        }

        // 恢复代码一的觸控處理
        function handleTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            
            // 判斷當前操作區域
            const rectLeft = leftImgArea.getBoundingClientRect();
            const rectRight = rightImgArea.getBoundingClientRect();
            let area = null;
            
            if (touch.clientX >= rectLeft.left && touch.clientX <= rectLeft.right) {
                area = 'left';
            } else if (touch.clientX >= rectRight.left && touch.clientX <= rectRight.right) {
                area = 'right';
            }
            
            if (!area) return;
            
            zoomState.currentArea = area;
            
            // 單指拖動
            if (e.touches.length === 1) {
                zoomState[area].isDragging = true;
                zoomState[area].startX = touch.clientX - zoomState[area].offsetX;
                zoomState[area].startY = touch.clientY - zoomState[area].offsetY;
            } 
            // 雙指縮放
            else if (e.touches.length === 2) {
                const t1 = e.touches[0];
                const t2 = e.touches[1];
                const initialDistance = getDistance(t1, t2);
                zoomState[area].initialDistance = initialDistance;
                zoomState[area].lastScale = zoomState[area].scale;
            }
        }

        // 恢复代码一的觸控移動處理
        function handleTouchMove(e) {
            e.preventDefault();
            if (!zoomState.currentArea) return;
            
            const area = zoomState.currentArea;
            const touch = e.touches[0];
            
            // 單指拖動
            if (e.touches.length === 1 && zoomState[area].isDragging) {
                zoomState[area].offsetX = touch.clientX - zoomState[area].startX;
                zoomState[area].offsetY = touch.clientY - zoomState[area].startY;
                
                if (area === 'left') {
                    updateLeftTransform();
                } else {
                    updateRightTransform();
                }
            }
            // 雙指縮放
            else if (e.touches.length === 2) {
                const t1 = e.touches[0];
                const t2 = e.touches[1];
                const newDistance = getDistance(t1, t2);
                const scaleRatio = newDistance / zoomState[area].initialDistance;
                
                zoomState[area].scale = Math.min(4, Math.max(0.8, zoomState[area].lastScale * scaleRatio));
                
                if (area === 'left') {
                    updateLeftTransform();
                } else {
                    updateRightTransform();
                }
            }
        }

        // 恢复代码一的距離計算
        function getDistance(t1, t2) {
            const dx = t2.clientX - t1.clientX;
            const dy = t2.clientY - t1.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // 恢复代码一的變換更新
        function updateLeftTransform() {
            leftSplitImg.style.transform = `translate(${zoomState.left.offsetX}px, ${zoomState.left.offsetY}px) scale(${zoomState.left.scale})`;
        }

        function updateRightTransform() {
            rightSplitImg.style.transform = `translate(${zoomState.right.offsetX}px, ${zoomState.right.offsetY}px) scale(${zoomState.right.scale})`;
        }

        // 恢复代码一的最終圖片生成邏輯
        function generateFinalImage() {
            return new Promise((resolve) => {
                // 获取容器的实际尺寸
                const containerRect = splitZoomContainer.getBoundingClientRect();
                const containerWidth = containerRect.width;
                const containerHeight = containerRect.height;
                
                // 设置finalCanvas尺寸与显示容器完全一致
                finalCanvas.width = containerWidth;
                finalCanvas.height = containerHeight;
                finalCtx.clearRect(0, 0, containerWidth, containerHeight);
                
                // 先绘制白色背景
                finalCtx.fillStyle = "#ffffff";
                finalCtx.fillRect(0, 0, containerWidth, containerHeight);
                
                // 加载左侧图片
                const leftImg = new Image();
                leftImg.crossOrigin = 'anonymous';
                leftImg.onload = function() {
                    // 绘制左侧调整后的图片
                    finalCtx.save();
                    // 切换到左侧区域坐标系
                    finalCtx.translate(containerWidth / 4, containerHeight / 2);
                    // 应用缩放
                    finalCtx.scale(zoomState.left.scale, zoomState.left.scale);
                    // 应用偏移
                    finalCtx.translate(
                        zoomState.left.offsetX / zoomState.left.scale,
                        zoomState.left.offsetY / zoomState.left.scale
                    );
                    // 居中绘制图片
                    finalCtx.drawImage(leftImg, -leftImg.width / 2, -leftImg.height / 2);
                    finalCtx.restore();
                    
                    // 加载右侧图片
                    const rightImg = new Image();
                    rightImg.crossOrigin = 'anonymous';
                    rightImg.onload = function() {
                        // 绘制右侧调整后的图片
                        finalCtx.save();
                        // 切换到右侧区域坐标系
                        finalCtx.translate(containerWidth * 3 / 4, containerHeight / 2);
                        // 应用缩放
                        finalCtx.scale(zoomState.right.scale, zoomState.right.scale);
                        // 应用偏移
                        finalCtx.translate(
                            zoomState.right.offsetX / zoomState.right.scale,
                            zoomState.right.offsetY / zoomState.right.scale
                        );
                        // 居中绘制图片
                        finalCtx.drawImage(rightImg, -rightImg.width / 2, -rightImg.height / 2);
                        finalCtx.restore();
                        
                        // 绘制中间分隔线
                        finalCtx.fillStyle = "#ffffff";
                        finalCtx.fillRect(containerWidth / 2 - 1, 0, 2, containerHeight);
                        
                        // 等待绘制完成后返回数据URL
                        setTimeout(() => {
                            resolve(finalCanvas.toDataURL('image/png', 1.0));
                        }, 100);
                    };
                    rightImg.src = rightSplitImg.src;
                };
                leftImg.src = leftSplitImg.src;
            });
        }

        // 恢复代码一的下載邏輯
        async function downloadMerge() {
            if (!splitZoomContainer.style.display) {
                alert('請先產生拼圖');
                return;
            }
            
            try {
                // 生成調整後的最終圖片
                const finalDataUrl = await generateFinalImage();
                const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
                const isAndroid = /Android/.test(navigator.userAgent);

                if (isIOS || isAndroid) {
                    const link = document.createElement('a');
                    link.href = finalDataUrl;
                    link.download = "彥彬_證件照級對比_調整後.png";
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    setTimeout(() => {
                        alert('✅ 下載成功！照片已儲存至相簿（包含你的縮放/拖動調整）');
                    }, 500);
                } else {
                    const blob = await fetch(finalDataUrl).then(res => res.blob());
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = "彥彬_證件照級對比_調整後.png";
                    a.click();
                    URL.revokeObjectURL(url);
                    alert('✅ 下載成功！（包含你的縮放/拖動調整）');
                }
            } catch (e) {
                console.error('下載失敗:', e);
                alert('❌ 下載失敗，請截圖儲存');
            }
        }

        // 恢复代码一的分享邏輯
        async function shareImage() {
            if (!splitZoomContainer.style.display) {
                alert('請先產生拼圖');
                return;
            }
            
            try {
                // 生成調整後的最終圖片
                const finalDataUrl = await generateFinalImage();
                const blob = await fetch(finalDataUrl).then(res => res.blob());
                const file = new File([blob], "彥彬_證件照級對比_調整後.png", { type: 'image/png' });
                
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ 
                        files: [file], 
                        title: '彥彬 證件照比對（已調整）' 
                    });
                } else {
                    alert('❌ 裝置不支援分享');
                }
            } catch (e) {
                console.error('分享失敗:', e);
                alert('❌ 分享失敗');
            }
        }

        // 清除全部
        function clearAll() {
            localStorage.clear();
            location.reload();
        }

        // AI分析（保留代码二的优化）
        async function analyzeBoth() {
            if (!leftPreview.src || !rightPreview.src) return alert('請上傳兩張照片');
            const resBox = document.getElementById('aiResult');
            resBox.innerText = 'AI 分析中...';
            try {
                const res = await fetch("https://api.together.xyz/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer tgp_v018_36d8697871d6254683c5527d73ad97888f860b21"
                    },
                    body: JSON.stringify({
                        model: "meta-llama/Llama-3.2-11B-Vision-Instruct-Turbo",
                        messages: [{
                            role: "user",
                            content: [
                                { type: "text", text: "你是專業攝影師、形象導師。請針對左右兩張照片進行對比點評，包含：1.姿態 2.表情 3.光影 4.構圖 5.整體建議。使用口語化、專業、有建設性的繁體中文。" },
                                { type: "image_url", image_url: { url: leftPreview.src } },
                                { type: "image_url", image_url: { url: rightPreview.src } }
                            ]
                        }],
                        max_tokens: 1024,
                        temperature: 0.7
                    })
                });
                const data = await res.json();
                resBox.innerText = data.choices?.[0]?.message?.content || '分析失敗，請重試';
            } catch (error) {
                resBox.innerText = '❌ AI 分析異常，請檢查網路或稍後再試';
                console.error('AI分析錯誤：', error);
            }
        }

        // 啟動空白
        window.onload = function() {
            leftPreview.classList.add('hidden');
            rightPreview.classList.add('hidden');
        };
    </script>
